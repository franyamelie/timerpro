'use strict';
// ═══════════════════════════════════════════════════════
// TIMERPRO - Control Horario Laboral
// Vanilla JS, sin frameworks, sin compilación

// ── UTILIDADES ──────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
const htmlToText = html => {
  if(!html) return '';
  return html
    .replace(/<br\s*\/?>/gi,'\n')
    .replace(/<\/p>/gi,'\n').replace(/<\/div>/gi,'\n')
    .replace(/<\/tr>/gi,'\n').replace(/<\/td>/gi,'  ')
    .replace(/<\/th>/gi,'  ').replace(/<[^>]+>/g,'')
    .replace(/&nbsp;/g,' ').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&#39;/g,"'")
    .replace(/\r\n|\r/g,'\n').replace(/\n{3,}/g,'\n\n')
    .replace(/[ \t]{2,}/g,' ').trim();
};
const today = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const firstDayOfMonth = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-01`; };
const nowTime = () => { const d=new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; };
const fmtTime = t => t||'—';
const calcH = (a,b) => { if(!a||!b)return 0; const [ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number); let d=(bh*60+bm)-(ah*60+am); if(d<0)d+=1440; return Math.round(d*100/60)/100; };
const fmtH = h => { if(!h)return '0h'; const hh=Math.floor(h),mm=Math.round((h-hh)*60); return hh>0&&mm>0?`${hh}h ${mm}m`:hh>0?`${hh}h`:`${mm}m`; };
const eur = v => Number(v||0).toFixed(2).replace('.',',')+' €';
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const WDAYS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const WSHORT = ['L','M','X','J','V','S','D'];
const cap = s => s?s.charAt(0).toUpperCase()+s.slice(1):s;
const dlbl = s => { if(!s)return ''; const[y,m,d]=s.split('-'); return `${parseInt(d)} de ${MONTHS[parseInt(m)-1]} de ${y}`; };
const wday = s => { if(!s)return ''; return WDAYS[new Date(s+'T12:00:00').getDay()]; };
// Amount options: 0.50, 1, 1.50, 2 ... 100 (0.50 increments)
const IMPORTE_OPTS = [0.50, ...Array.from({length:100},(_,i)=>i+1)];
const isStdAmount = v => IMPORTE_OPTS.includes(Number(v));

// ── INDEXEDDB ────────────────────────────────────────────
const DB_NAME='TimerProV2',DB_VER=2;
const ST={entries:'entries',tasks:'tasks',sites:'sites',workorders:'workorders',vehicles:'vehicles',settings:'settings',workers:'workers',companies:'companies',snapshots:'snapshots'};
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      // SAFE: only ADD new stores, never delete or modify existing ones
      Object.values(ST).forEach(s=>{
        try{
          if(!d.objectStoreNames.contains(s)){
            d.createObjectStore(s,{keyPath:'id',autoIncrement:true});
          }
        }catch(err){ console.warn('Store already exists:',s); }
      });
    };
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror=()=>rej(r.error);
  });
}
const dbAll=st=>new Promise((res,rej)=>{const t=db.transaction(st,'readonly'),r=t.objectStore(st).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const dbPut=(st,obj)=>new Promise((res,rej)=>{const t=db.transaction(st,'readwrite'),r=t.objectStore(st).put(obj);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const dbDel=(st,id)=>new Promise((res,rej)=>{const t=db.transaction(st,'readwrite'),r=t.objectStore(st).delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbClear=st=>new Promise((res,rej)=>{const t=db.transaction(st,'readwrite'),r=t.objectStore(st).clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});

// ── ESTADO GLOBAL ────────────────────────────────────────
// ── TIPOS DE TAREA (dinámicos, guardados en localStorage) ──
function getTaskTypes(){
  try{
    var saved=JSON.parse(localStorage.getItem('tp_task_types')||'null');
    if(saved&&saved.length) return saved;
  }catch(e){}
  return [
    {id:'ot',nombre:'O.T.',icono:'🔧',color:'#f59e0b'},
    {id:'estral',nombre:'ESTRAL',icono:'⚡',color:'#7c3aed'}
  ];
}
function saveTaskTypes(types){

function h(tag, attrs, ...children){
  const el = document.createElement(tag);
  const BOOL=['selected','checked','disabled','multiple','readonly','required','autofocus','spellcheck'];
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='on') Object.entries(v).forEach(([ev,fn])=>el.addEventListener(ev,fn));
    else if(k==='class') el.className=v;
    else if(k==='html') el.innerHTML=v;
    else if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(k==='data') Object.entries(v).forEach(([dk,dv])=>el.dataset[dk]=dv);
    else if(k==='spellcheck'){ el.spellcheck=(v===true||v===''||v==='true'); el.setAttribute('spellcheck',v?'true':'false'); }
    else if(BOOL.includes(k)){ el[k]=(v===true||v===''||v==='true'); }
    else if(k==='value'&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA')){
      el.setAttribute('value',v); // set default
      el.value=v; // also set current value property
    }
    else if(v!==false&&v!==null&&v!==undefined) el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c===null||c===undefined||c===false)return;
    if(el.tagName==='TEXTAREA'&&(typeof c==='string'||typeof c==='number')){
      el.value=String(c);
    } else {
      el.appendChild(typeof c==='string'||typeof c==='number' ? document.createTextNode(c) : c);
    }
  });
  return el;
}

// Capture ALL current DOM input values into fEntry before each render
// This prevents data loss when theme changes, tab switches, or auto-rerenders happen
function captureFormState(){
  if(_skipDomCapture) return; // switching days — don't read stale DOM
  try{
    fEntry.timerDeduct=timerDeduct; // keep break-minutes in sync with the entry being saved
  fEntry._horaFinManual=timerEndManual||fEntry._horaFinManual||'';
  fEntry._horaInicioManual=timerStart?new Date(timerStart).toTimeString().slice(0,5):(fEntry._horaInicioManual||'');

    // Read notas FIRST before persisting (fix: was saving stale data)
    const notasElFirst=document.getElementById('notas-editor');
    if(notasElFirst && notasElFirst.innerHTML.trim()){
      fEntry.notas=notasElFirst.innerHTML;
      localStorage.setItem('notas_'+fEntry.fecha, notasElFirst.innerHTML);
    }
    persistEntry(); // save to localStorage immediately
    const fichRows = document.querySelectorAll('.fich-row');
    const activeEl = document.activeElement;
    fichRows.forEach((row,i)=>{
      if(!fEntry.fichajes[i]) return;
      // Read text inputs in order: first=entrada, second=salida
      // Usar IDs únicos para capturar valores con precisión
      const entEl=document.getElementById('fich-ent-'+fEntry.fichajes[i]._fid);
      const salEl=document.getElementById('fich-sal-'+fEntry.fichajes[i]._fid);
      if(entEl&&entEl.value) fEntry.fichajes[i].entrada=entEl.value;
      if(salEl&&salEl.value) fEntry.fichajes[i].salida=salEl.value;
      // Read nota from textarea only
      const notaEl=row.querySelector('textarea');
      if(notaEl) fEntry.fichajes[i].nota=notaEl.value||fEntry.fichajes[i].nota||'';
    });
    const notasEl=document.getElementById('notas-editor');
    if(notasEl && notasEl.innerHTML.trim()){
      fEntry.notas=notasEl.innerHTML;
      localStorage.setItem('notas_'+fEntry.fecha, notasEl.innerHTML);
    }
    // Note: don't read from localStorage notas_fecha - fEntry.notas is source of truth
    // Capture numeric fields
    ['horasNormales','precioHoraNormal','horasExtra','precioHoraExtra',
     'horasNocturnas','precioHoraNocturna','horasFestivas','precioHoraFestiva',
     'dieta','transporte'].forEach(f=>{
      const el=document.querySelector('[data-field="'+f+'"]');
      if(el&&el.value!=='') fEntry[f]=parseFloat(el.value)||0;
    });
  }catch(e){}
}

        return renderTareasPorTipo(tipoId);
      }

// ── AUTO CÁLCULO HORAS DESDE FICHAJES ──────────────────
function autoCalcHorasFromFichajes(){
  // Solo calcular si no hay horas introducidas manualmente
  if(!fEntry.fichajes || fEntry.fichajes.length===0) return;
  // Si ya hay horas normales o extras introducidas manualmente, no sobreescribir
  if(fEntry.horasNormales>0 || fEntry.horasExtra>0) return;
  fEntry.fichajes.forEach((fj,i)=>{
    if(!fEntry.fichajes[i]) return;
    const _eEl=document.getElementById('fich-ent-'+fj._fid);
    const _sEl=document.getElementById('fich-sal-'+fj._fid);
    if(_eEl&&_eEl.value) fEntry.fichajes[i].entrada=_eEl.value;
    if(_sEl&&_sEl.value) fEntry.fichajes[i].salida=_sEl.value;
  });
  let totalMins=0;
  fEntry.fichajes.forEach(fj=>{
    if(fj.entrada&&fj.salida) totalMins+=calcH(fj.entrada,fj.salida)*60;
  });
  if(totalMins===0) return;
  const netMins=Math.max(0,totalMins-timerDeduct);
  const netHours=Math.round(netMins*100/60)/100;
  fEntry.horasNormales=netHours;
  if(fEntry.precioHoraNormal>0)
    fEntry.importeNormales=Math.round(netHours*fEntry.precioHoraNormal*100)/100;
}

    +'<div style="display:flex;gap:.8rem;justify-content:center;margin-top:1.2rem">'
    +'<button id="cc-ok" style="background:'+color+';color:'+(color==='#22c55e'?'#000':'#fff')+';border:none;border-radius:8px;padding:.6rem 1.4rem;font-weight:700;font-size:.9rem;cursor:pointer">Sí, continuar</button>'
    +'<button id="cc-cancel" style="background:var(--surf3);color:var(--ink);border:none;border-radius:8px;padding:.6rem 1.4rem;font-weight:700;font-size:.9rem;cursor:pointer">Cancelar</button>'

}

  const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const mesesL=['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  const horasT = Math.round(((e.horasNormales||0)+(e.horasExtra||0))*100)/100;
  const importeT = Math.round(((e.importeNormales||0)+(e.importeExtra||0)+(e.importeNocturnas||0)+(e.importeFestivas||0)+(e.dieta||0)+(e.transporte||0)+(e.otrosConceptos||[]).reduce((a,b)=>a+(b.importe||0),0))*100)/100;
  const fichajes = (e.fichajes||[]).filter(f=>f.entrada&&f.salida).length;

  try{ if(sitio&&sitio.startsWith('{')){ const s=JSON.parse(sitio); sitio=s.label||s.url||sitio; } }catch(ex){}

  const worked = horasT>0||fichajes>0||importeT>0;
  const cardColor = worked ? 'var(--acc)' : 'var(--red)';
  return h('div',{class:'card',style:{padding:'.7rem',marginBottom:'.6rem',borderLeft:'4px solid '+cardColor,display:'grid',gridTemplateColumns:'auto 1fr',gap:'.8rem',alignItems:'center',cursor:'pointer'},on:{click:()=>{S.tab='calendario';rerender();}}},[
    // Left: calendar block

      h('div',{style:{fontSize:'1.6rem',fontWeight:900,color:'#000',lineHeight:1}},fecha.getDate()),
      h('div',{style:{fontSize:'.6rem',fontWeight:700,color:'#000',letterSpacing:'.05em'}},meses[fecha.getMonth()].toUpperCase()),
    ]),
    // Right: data
    h('div',{style:{display:'flex',flexDirection:'column',gap:'.2rem'}},[
      h('div',{style:{fontSize:'.95rem',fontWeight:800,color:'var(--ink)',letterSpacing:'.02em'}},
        dias[fecha.getDay()]+', '+fecha.getDate()+' de '+mesesL[fecha.getMonth()]+' '+fecha.getFullYear()
      ),
      h('div',{style:{display:'flex',gap:'.8rem',flexWrap:'wrap'}},[
        (()=>{
          // Calcular hora entrada y salida — prioridad: fEntry > entrada guardada > fichajes
          const fichs=(e.fichajes||[]).filter(f=>f.entrada);
          const priEnt=fEntry.horaEntrada||e.horaEntrada||(fichs.length>0?fichs[0].entrada:'');
          const ulSal=fEntry.horaSalida||e.horaSalida||(fichs.length>0?(fichs[fichs.length-1].salida||''):'');
          const desc=(e.timerDeduct||0);

function _renderHistorial(){
  const q = (histSearch||'').toLowerCase().trim();
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const filtered = S.entries.filter(en=>{
    if(!q) return true;
    const f=en.fecha||'';
    const parts=f.split('-');
    const mesNombre=parts[1]?meses[parseInt(parts[1])-1]||'':'';
    // Convert stored YYYY-MM-DD to dd/mm/aaaa for display search
    const fDisplay=parts[2]+'/'+parts[1]+'/'+(parts[0]||'');
    return fDisplay.includes(q)||f.includes(q)||
      (parts[2]||'').includes(q)||(parts[1]||'').includes(q)||(parts[0]||'').includes(q)||
      mesNombre.includes(q)||(en.notas||'').replace(/<[^>]*>/g,'').toLowerCase().includes(q)||
      (wday(en.fecha)||'').toLowerCase().includes(q)||(en.tipoJornada||'').toLowerCase().includes(q);
  }).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  
  const container = document.getElementById('historial-list');
  if(!container){ rerender(); return; }
  
  // Clear and rebuild
  while(container.firstChild) container.removeChild(container.firstChild);
  
  if(filtered.length===0){
    const msg=document.createElement('div');
    msg.style.cssText='padding:1rem;text-align:center;color:var(--ink3);font-size:.85rem';
    msg.textContent='Sin resultados para "'+q+'"';
    container.appendChild(msg);
    return;
  }
  
  filtered.forEach(en=>{
    const h=(en.horasNormales||0)+(en.horasExtra||0)+(en.horasNocturnas||0)+(en.horasFestivas||0);
    const fi=(en.fichajes||[]).length;
    const row=document.createElement('div');
    row.className='sum-row';
    row.style.cssText='cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:.5rem .3rem;border-bottom:1px solid var(--brd)';
    row.onclick=()=>loadHistorial(en);
    
    const info=document.createElement('div');
    const title=document.createElement('div');
    title.style.cssText='font-weight:700;font-size:.85rem';
    title.textContent=cap(wday(en.fecha))+', '+dlbl(en.fecha);
    const sub=document.createElement('div');
    sub.style.cssText='font-size:.72rem;color:var(--ink2)';
    sub.textContent=fmtH(h)+' · '+fi+' fichaje'+(fi!==1?'s':'');
    info.appendChild(title);
    info.appendChild(sub);
    
    const btns=document.createElement('div');
    btns.style.cssText='display:flex;gap:.3rem';
    const editBtn=document.createElement('button');
    editBtn.className='btn btn-b btn-sm';
    editBtn.textContent='✏️';
    editBtn.onclick=ev=>{ev.stopPropagation();loadHistorial(en);};
    const delBtn=document.createElement('button');
    delBtn.className='btn btn-r btn-sm';
    delBtn.textContent='🗑';
    delBtn.onclick=ev=>{ev.stopPropagation();deleteEntry(en.id);};
    btns.appendChild(editBtn);
    btns.appendChild(delBtn);
    
    row.appendChild(info);
    row.appendChild(btns);
    container.appendChild(row);
  });
}

            ...S.entries.filter(en=>{
              if(!histSearch)return true;
              const q=histSearch.toLowerCase();
              const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
              const f=en.fecha||'';
              const parts=f.split('-');
              const mesNombre=parts[1]?meses[parseInt(parts[1])-1]||'':'';
              return f.includes(q)||
                (parts[2]&&parts[2].includes(q))||
                (parts[1]&&parts[1].includes(q))||
                (parts[0]&&parts[0].includes(q))||
                mesNombre.includes(q)||
                en.notas?.toLowerCase().includes(q)||
                wday(en.fecha)?.toLowerCase().includes(q)||
                (en.tipoJornada||'').toLowerCase().includes(q)||
                (en.tipoJornada||'').toLowerCase().includes(q);

                    // Read DOM first THEN snapshot (fichajes + notas need DOM read first)
                    captureFormState();
                    const notasEl=document.getElementById('notas-editor');
                    if(notasEl&&notasEl.innerHTML.trim()) fEntry.notas=notasEl.innerHTML;
                    // Read inputs directly before snapshot
                    fEntry.fichajes.forEach((fj,i)=>{
                      if(!fEntry.fichajes[i]) return;
                      const _eEl=document.getElementById('fich-ent-'+fj._fid);
                      const _sEl=document.getElementById('fich-sal-'+fj._fid);
                      if(_eEl&&_eEl.value) fEntry.fichajes[i].entrada=_eEl.value;
                      if(_sEl&&_sEl.value) fEntry.fichajes[i].salida=_sEl.value;
                    });

                      S.entries=S.entries.map(e=>e.id===en.id?{...saved}:e);
                      showAlert('Jornada guardada ✓');
                      rerender();
                    });
                  }}},'💾'),
                  h('button',{class:'btn btn-r btn-sm',title:'Eliminar jornada',on:{click:ev=>{
                    ev.stopPropagation();
                    if(!confirm('¿Eliminar la jornada del '+en.fecha+'? Esta acción no se puede deshacer.')) return;
                    deleteEntry(en.id);
                  }}},'🗑')
                )
              )
            )
          )
    )
  );
}

function renderFichaje(fj,i){
  const ftimer = fichajeTimers[fj._fid]||{running:false,elapsed:0};
  if(ftimer.running && ftimer.start) ftimer.elapsed=Math.floor((Date.now()-ftimer.start)/1000);
  const taskOpts=[{id:'',titulo:'Sin tarea'},...S.tasks];

  const timeInput=(field,fidPart)=>h('div',{style:{display:'flex',alignItems:'center',gap:'.3rem'}},
    h('input',{
      type:'text',
      id:'fich-'+fidPart+'-'+fj._fid,
      value:fj[field]||'',
      placeholder:'--:--',
      maxlength:'5',
      style:{
        background:'var(--surf2)',border:'1.5px solid var(--brd)',
        borderRadius:'var(--r2)',padding:'.35rem .5rem',
        color:'var(--ink)',fontSize:'.9rem',width:'80px',
        cursor:'text',fontFamily:'inherit',textAlign:'center'
      },
      on:{
        input:ev=>{ if(ev.target.value) fEntry.fichajes[i][field]=ev.target.value; },
        blur:ev=>{ if(ev.target.value) fEntry.fichajes[i][field]=ev.target.value; scheduleDraftSave(); },
        change:ev=>{ if(ev.target.value) fEntry.fichajes[i][field]=ev.target.value; scheduleDraftSave(); }
      }
    }),
    // "Ahora" button - sets current time
    h('button',{
      class:'btn btn-b',
      style:{padding:'.3rem .6rem',fontSize:'1.2rem',flexShrink:0,minWidth:'44px'},
      title:'Abrir reloj para seleccionar hora',
      on:{click:()=>{
        showClockPicker(fEntry.fichajes[i][field]||'', v=>{
          fEntry.fichajes[i][field]=v;
          const el=document.getElementById('fich-'+fidPart+'-'+fj._fid);
          if(el) el.value=v;
          scheduleDraftSave();
          rerender();
        });
      }}
    },'🕐')
  );

  return h('div',{class:'fich-row',style:{flexDirection:'column',alignItems:'stretch',padding:'.6rem',gap:'.4rem'}},
    // Row 1: numero + entrada + salida + duracion + timer + borrar
    h('div',{style:{display:'flex',alignItems:'center',gap:'.4rem',flexWrap:'wrap'}},
      h('span',{style:{fontSize:'.75rem',color:'var(--ink2)',minWidth:'16px',fontWeight:700}},i+1+'.'),
      h('div',{style:{display:'flex',alignItems:'center',gap:'.3rem',flex:1,flexWrap:'wrap'}},
        timeInput('entrada','ent'),
        h('span',{style:{color:'var(--ink3)'}},'→'),
        timeInput('salida','sal'),
        fj.entrada&&fj.salida
          ? h('span',{class:'badge badge-g',style:{flexShrink:0}},
            (function(){
              var raw=calcH(fj.entrada,fj.salida);
              var dec=fEntry.fichajes.length===1?timerDeduct/60:0;
              return fmtH(Math.max(0,raw-dec));
            })())
          : null
      ),
      // Live timer button
      h('button',{
        class:'btn btn-sm '+(ftimer.running?'btn-y':'btn-gh'),
        style:{flexShrink:0,padding:'.25rem .4rem',fontSize:'.7rem'},
        title:ftimer.running?'Pausar':'Iniciar timer',
        on:{click:()=>{
          if(!fichajeTimers[fj._fid]) fichajeTimers[fj._fid]={running:false,elapsed:0,start:null};
          const ft=fichajeTimers[fj._fid];
          if(ft.running){
            ft.running=false; ft.elapsed=Math.floor((Date.now()-ft.start)/1000);
            fEntry.fichajes[i].salida=nowTime();
            scheduleDraftSave();
          } else {
            ft.running=true; ft.start=Date.now()-ft.elapsed*1000;
            if(!fEntry.fichajes[i].entrada) fEntry.fichajes[i].entrada=nowTime();
          }
          rerender();
        }}
      },ftimer.running?'⏸':'▶'),
      // Delete button
      h('button',{class:'btn btn-r btn-sm',style:{flexShrink:0},
        on:{click:()=>{
          fEntry.fichajes=[...fEntry.fichajes.slice(0,i),...fEntry.fichajes.slice(i+1)];
          delete fichajeTimers[fj._fid];
          scheduleDraftSave(); rerender();
        }}},'✕')
    ),
    // Row 2: nota + tarea asociada
    h('div',{style:{display:'flex',gap:'.4rem',alignItems:'center'}},
      h('textarea',{
        spellcheck:true,lang:'es',rows:1,
        placeholder:'Nota del fichaje...',
        style:{flex:1,background:'var(--surf2)',border:'1px solid var(--brd)',
               borderRadius:'var(--r2)',padding:'.3rem .5rem',color:'var(--ink)',
               fontSize:'.8rem',resize:'vertical',fontFamily:'inherit',
               minHeight:'30px',maxHeight:'80px'},
        on:{
          input:ev=>{fEntry.fichajes[i].nota=ev.target.value;},
          blur:ev=>{fEntry.fichajes[i].nota=ev.target.value;scheduleDraftSave();}
        }
      },fj.nota||''),
      h('select',{
        style:{background:'var(--surf2)',border:'1px solid var(--brd)',borderRadius:'var(--r2)',
               padding:'.3rem .4rem',color:'var(--ink)',fontSize:'.75rem',maxWidth:'130px'},
        on:{change:ev=>{fEntry.fichajes[i].taskId=ev.target.value;scheduleDraftSave();}}
      },
        ...taskOpts.map(t=>h('option',{value:t.id||'',selected:(t.id||'')===(fj.taskId||'')?true:false},
          t.id?(t.titulo||'Tarea').slice(0,20)+(t.otNumero?' ['+t.otNumero+']':''):'Sin tarea'
        ))
      )
    ),
    ftimer.running
      ? h('div',{id:'fichaje-timer-'+fj._fid,style:{fontSize:'.72rem',color:'var(--acc)',fontWeight:700}},
          '⏱ En curso: '+formatTimer(ftimer.elapsed))
      : null
  );
}



function renderJourney(j,i,ctx){
  const vehOpts = [{id:'',nombre:'Manual'},...S.vehicles];
  const selVeh = S.vehicles.find(v=>v.id==j.vehicleId);
  const precio = j.vehicleId&&selVeh ? selVeh.precioPorKm : j.precioManual;
  const coste = (j.km||0)*precio;
  
  return h('div',{class:'journey-card'},
    h('div',{class:'grid-2',style:{marginBottom:'.4rem'}},
      h('div',{class:'field'},
        h('label',{},'VEHÍCULO'),
        h('select',{value:j.vehicleId,on:{change:ev=>{
          if(ctx==='entry')fEntry.journeys[i].vehicleId=ev.target.value;
          else fTask.journeys[i].vehicleId=ev.target.value;
          rerender();
        }}},
          ...vehOpts.map(v=>h('option',{value:v.id,selected:v.id==j.vehicleId?'':null},v.nombre||v.tipo||'Manual'))
        )
      ),
      !j.vehicleId
        ? h('div',{class:'field'},
            h('label',{},'TIPO'),
            h('select',{on:{change:ev=>{if(ctx==='entry')fEntry.journeys[i].tipoManual=ev.target.value;else fTask.journeys[i].tipoManual=ev.target.value;}}},
              ['coche','moto','furgoneta','camión','otro'].map(t=>h('option',{value:t,selected:t===j.tipoManual?'':null},t))
            )
          )
        : h('div',{class:'field'},h('label',{},'MATRÍCULA'),h('div',{style:{padding:'.5rem',color:'var(--ink2)'}},selVeh?.matricula||'—'))
    ),
    h('div',{class:'grid-3',style:{marginBottom:'.4rem'}},
      field('Origen','text',j.origen,v=>{if(ctx==='entry')fEntry.journeys[i].origen=v;else fTask.journeys[i].origen=v;}),
      field('Destino','text',j.destino,v=>{if(ctx==='entry')fEntry.journeys[i].destino=v;else fTask.journeys[i].destino=v;}),
      field('Km','number',j.km,v=>{if(ctx==='entry')fEntry.journeys[i].km=parseFloat(v)||0;else fTask.journeys[i].km=parseFloat(v)||0;rerender();},{min:'0',step:'0.1'})
    ),
    h('div',{class:'grid-2',style:{marginBottom:'.4rem'}},
      field('Hora inicio','time',j.horaInicio,v=>{if(ctx==='entry')fEntry.journeys[i].horaInicio=v;else fTask.journeys[i].horaInicio=v;}),
      field('Hora fin','time',j.horaFin,v=>{if(ctx==='entry')fEntry.journeys[i].horaFin=v;else fTask.journeys[i].horaFin=v;})
    ),
    !j.vehicleId
      ? h('div',{class:'field'},h('label',{},'€/KM'),h('input',{type:'number',min:'0',step:'0.001',value:j.precioManual,on:{input:ev=>{if(ctx==='entry')fEntry.journeys[i].precioManual=parseFloat(ev.target.value)||0;else fTask.journeys[i].precioManual=parseFloat(ev.target.value)||0;}}}))
      : null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'.3rem'}},
      h('span',{class:'badge badge-b'},`Coste: ${eur(coste)}`),
      h('button',{class:'btn btn-r btn-sm',on:{click:()=>{if(ctx==='entry')fEntry.journeys.splice(i,1);else fTask.journeys.splice(i,1);rerender();}}},'✕')
    )
  );
}

// ── SELECTOR TIPO TAREA (dinámico) ────────────────────────
function mostrarSelectorTipoTarea(fecha){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:99999;display:flex;align-items:center;justify-content:center;padding:1rem;overflow-y:auto';
  const tipos=taskTypes;
  const cols=Math.min(tipos.length,2);
  let btns=tipos.map(t=>`
    <button data-tipo="${t.id}" style="background:${t.color};color:${t.id==='ot'?'#1e293b':'#fff'};border:none;border-radius:10px;padding:1rem;font-size:.9rem;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.3rem;min-height:80px">
      <span style="font-size:1.4rem">${t.icono}</span>
      <span>${t.nombre}</span>
    </button>`).join('');
  overlay.innerHTML=`
    <div style="background:var(--surf);border-radius:16px;padding:1.5rem;max-width:340px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.5)">
      <div style="font-weight:900;font-size:1.1rem;color:var(--ink);margin-bottom:.8rem;text-align:center">➕ Nueva Tarea</div>
      <div style="font-size:.82rem;color:var(--ink2);text-align:center;margin-bottom:1rem">¿Qué tipo de tarea quieres añadir?</div>
      <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:.7rem;margin-bottom:.8rem">${btns}</div>
      <button id="sel-nuevo-tipo" style="width:100%;background:var(--surf2);color:var(--ink);border:2px dashed var(--brd);border-radius:10px;padding:.7rem;cursor:pointer;font-size:.85rem;font-weight:700;margin-bottom:.6rem">➕ Crear nuevo tipo de tarea</button>
      <button id="sel-cancel" style="width:100%;background:var(--surf3);color:var(--ink2);border:1px solid var(--brd);border-radius:8px;padding:.55rem;cursor:pointer;font-size:.82rem">Cancelar</button>
    </div>`;
  document.body.appendChild(overlay);
  // Click en tipo existente
  overlay.querySelectorAll('[data-tipo]').forEach(function(btn){
    btn.onclick=function(){
      const tipoId=btn.getAttribute('data-tipo');
      document.body.removeChild(overlay);
      fTask={...defTask(fecha),tipoTarea:tipoId,usaOT:true};editTaskId=null;
      S.tab='tareas';rerender();
    };
  });
  // Crear nuevo tipo
  document.getElementById('sel-nuevo-tipo').onclick=function(){
    document.body.removeChild(overlay);
    crearNuevoTipoTarea(fecha);
  };
  document.getElementById('sel-cancel').onclick=function(){document.body.removeChild(overlay);};
}

// Colores predefinidos para nuevos tipos
var COLORES_TIPO=['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f59e0b'];
var ICONOS_TIPO=['📌','🔩','🛠','⚙️','🔨','📐','🏗','🔌','💡','🪛','🔑','📦','🚧','🪚','🔬'];

function crearNuevoTipoTarea(fecha){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:99999;display:flex;align-items:center;justify-content:center;padding:1rem';
  overlay.innerHTML=`
    <div style="background:var(--surf);border-radius:16px;padding:1.5rem;max-width:340px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.5)">
      <div style="font-weight:900;font-size:1rem;color:var(--ink);margin-bottom:1rem">🆕 Nuevo tipo de tarea</div>
      <div style="margin-bottom:.8rem">
        <label style="font-size:.78rem;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em">Nombre del tipo</label>
        <input id="tipo-nombre" type="text" placeholder="Ej: MANTENIMIENTO, GUARDIA..." maxlength="20"
          style="width:100%;margin-top:.3rem;padding:.6rem;border-radius:8px;border:1px solid var(--brd);background:var(--surf2);color:var(--ink);font-size:.95rem;font-weight:700">
      </div>
      <div style="margin-bottom:.8rem">
        <label style="font-size:.78rem;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em">Color</label>
        <div id="tipo-colores" style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem">
          ${COLORES_TIPO.map((c,i)=>`<button data-color="${c}" style="width:28px;height:28px;background:${c};border:2px solid transparent;border-radius:6px;cursor:pointer;flex-shrink:0" title="${c}"></button>`).join('')}
        </div>
        <input id="tipo-color-val" type="hidden" value="${COLORES_TIPO[0]}">
      </div>
      <div style="margin-bottom:1rem">
        <label style="font-size:.78rem;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em">Icono</label>
        <div id="tipo-iconos" style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem">
          ${ICONOS_TIPO.map((ic,i)=>`<button data-icono="${ic}" style="width:32px;height:32px;font-size:1.1rem;border:2px solid ${i===0?'var(--acc)':'var(--brd)'};border-radius:6px;cursor:pointer;background:var(--surf2)">${ic}</button>`).join('')}
        </div>
        <input id="tipo-icono-val" type="hidden" value="${ICONOS_TIPO[0]}">
      </div>
      <div style="display:flex;gap:.6rem">
        <button id="tipo-cancel" style="flex:1;background:var(--surf3);color:var(--ink2);border:1px solid var(--brd);border-radius:8px;padding:.65rem;cursor:pointer;font-size:.85rem">Cancelar</button>
        <button id="tipo-ok" style="flex:2;background:var(--acc);color:#000;border:none;border-radius:8px;padding:.65rem;cursor:pointer;font-size:.9rem;font-weight:800">✅ Crear y usar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  // Seleccionar color
  overlay.querySelectorAll('[data-color]').forEach(function(btn){
    btn.onclick=function(){
      overlay.querySelectorAll('[data-color]').forEach(function(b){b.style.border='2px solid transparent';});
      btn.style.border='2px solid #fff';
      document.getElementById('tipo-color-val').value=btn.getAttribute('data-color');
    };
  });
  // Seleccionar icono
  overlay.querySelectorAll('[data-icono]').forEach(function(btn){
    btn.onclick=function(){
      overlay.querySelectorAll('[data-icono]').forEach(function(b){b.style.border='2px solid var(--brd)';});
      btn.style.border='2px solid var(--acc)';
      document.getElementById('tipo-icono-val').value=btn.getAttribute('data-icono');
    };
  });
  document.getElementById('tipo-cancel').onclick=function(){document.body.removeChild(overlay);mostrarSelectorTipoTarea(fecha);};
  document.getElementById('tipo-ok').onclick=function(){
    const nombre=document.getElementById('tipo-nombre').value.trim().toUpperCase();
    if(!nombre){alert('Escribe un nombre para el tipo');return;}
    const color=document.getElementById('tipo-color-val').value;
    const icono=document.getElementById('tipo-icono-val').value;
    const id=nombre.toLowerCase().replace(/[^a-z0-9]/g,'_');
    if(taskTypes.find(t=>t.id===id)){alert('Ya existe un tipo con ese nombre');return;}
    taskTypes.push({id,nombre,icono,color});
    saveTaskTypes(taskTypes);
    document.body.removeChild(overlay);
    fTask={...defTask(fecha),tipoTarea:id,usaOT:true};editTaskId=null;
    S.tab='tareas';rerender();
    showAlert('Tipo "'+nombre+'" creado ✓');
  };
}

          </div>`).join('')}

        <button id="gestor-cerrar" style="width:100%;margin-top:.5rem;background:var(--surf3);color:var(--ink2);border:1px solid var(--brd);border-radius:8px;padding:.55rem;cursor:pointer;font-size:.82rem">Cerrar</button>
      </div>`;
    overlay.querySelectorAll('[data-del]').forEach(function(btn){
      btn.onclick=function(){
        const id=btn.getAttribute('data-del');
        const tipo=taskTypes.find(t=>t.id===id);
        if(!confirm('¿Eliminar el tipo "'+tipo.nombre+'"?'))return;
        taskTypes=taskTypes.filter(t=>t.id!==id);
        saveTaskTypes(taskTypes);
        if(S.tab==='tipo_'+id) S.tab='fichar';
        rerender();
        renderContent();
      };
    });
    document.getElementById('gestor-nuevo').onclick=function(){
      document.body.removeChild(overlay);
      crearNuevoTipoTarea(today());
    };
    document.getElementById('gestor-cerrar').onclick=function(){document.body.removeChild(overlay);};
  }
  document.body.appendChild(overlay);
  renderContent();
}

async function adjuntarTareaADia(t){
  // Show date picker modal instead of prompt
  const fecha = await new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99999;display:flex;align-items:center;justify-content:center;padding:1rem';
    const box = document.createElement('div');
    box.style.cssText = 'background:var(--surf);border-radius:14px;padding:1.5rem;max-width:320px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4)';
    box.innerHTML = '<div style="font-weight:800;font-size:1rem;color:var(--ink);margin-bottom:1rem">📅 Adjuntar tarea al día</div>'
      +'<div style="font-size:.85rem;color:var(--ink2);margin-bottom:.3rem">'+t.titulo+'</div>'
      +'<div style="font-size:.8rem;color:var(--ink3);margin-bottom:.8rem">'+(taskTypes.find(function(x){return x.id===(t.tipoTarea||'ot');})||{nombre:'OT'}).nombre+': '+(t.otNumero||'')+' </div>'
      +'<input type="date" id="adj-date" value="'+(t.fecha||today())+'" style="width:100%;padding:.6rem;border-radius:8px;border:1px solid var(--brd);background:var(--surf2);color:var(--ink);font-size:1rem;margin-bottom:1rem">'
      +'<div style="display:flex;gap:.6rem;justify-content:flex-end">'
      +'<button id="adj-cancel" style="padding:.5rem 1rem;border-radius:8px;border:1px solid var(--brd);background:var(--surf3);color:var(--ink);cursor:pointer;font-weight:600">Cancelar</button>'
      +'<button id="adj-ok" style="padding:.5rem 1rem;border-radius:8px;border:none;background:var(--acc);color:#000;cursor:pointer;font-weight:700">Adjuntar</button>'
      +'</div>';
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    document.getElementById('adj-ok').onclick = () => {
      const v = document.getElementById('adj-date').value;
      document.body.removeChild(overlay);
      resolve(v);
    };
    document.getElementById('adj-cancel').onclick = () => {
      document.body.removeChild(overlay);
      resolve(null);
    };
  });
  if(!fecha) return;
  if(fecha === t.fecha){ showAlert('La tarea ya está en ese día','err'); return; }
  // COPIAR la tarea al nuevo día (no mover) para no perder la del día original
  const nuevaTarea = {...t, fecha:fecha};
  delete nuevaTarea.id;
  try{
    const newId = await dbPut(ST.tasks, nuevaTarea);
    S.tasks.push({...nuevaTarea, id:newId});
    showAlert('Tarea copiada al '+dlbl(fecha)+' ✓ (la original del '+dlbl(t.fecha)+' se mantiene)');
  }catch(ex){ showAlert('Error al copiar tarea','err'); return; }
  // Link to entry for that day
  let entry = S.entries.find(e=>e.fecha===fecha);
  if(!entry){
    // Create empty entry for that day
    entry = {...defEntry(), fecha:fecha};
    S.entries.push(entry);
  }
  const entryIdx = S.entries.findIndex(e=>e.fecha===fecha);
  const journeys = S.entries[entryIdx].journeys||[];
  if(!journeys.find(j=>j.id===t.id)){
    journeys.push({id:t.id, titulo:t.titulo, otNumero:t.otNumero, fecha:fecha});
    S.entries[entryIdx] = {...S.entries[entryIdx], journeys};
    try{ dbPut(ST.entries, S.entries[entryIdx]); }catch(ex){}
  }
  showAlert('✅ Tarea adjuntada al '+dlbl(fecha));
  rerender();
}

function renderWeekView(){
  const now = new Date(selDate+'T12:00:00');
  const dow = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dow===0?6:dow-1));
  const days = Array.from({length:7},(_,i)=>{
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    return d.toISOString().slice(0,10);
  });
  return h('div',{},
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px',marginBottom:'.5rem'}},
      ...days.map(ds=>{
        const entry=S.entries.find(e=>e.fecha===ds);
        const tasks=S.tasks.filter(t=>t.fecha===ds);
        const isToday=ds===today();
        const isSel=ds===selDate;
        return h('div',{
          style:{
            background:isSel?'var(--acc)':isToday?'var(--acc-lt)':'var(--surf2)',
            color:isSel?'#000':'var(--ink)',
            borderRadius:'var(--r2)',padding:'.5rem .3rem',
            cursor:'pointer',minHeight:'80px',fontSize:'.75rem',
            border:'1px solid '+(isSel?'var(--acc)':'var(--brd)')
          },
          on:{
  click:()=>{selDate=ds;rerender();},
  dblclick:()=>goToDay(ds)
}
        },
          h('div',{style:{fontWeight:700,fontSize:'.8rem',marginBottom:'.2rem'}},
            WSHORT[days.indexOf(ds)]+' '+parseInt(ds.slice(8))
          ),
          entry?h('div',{style:{background:'var(--acc)',color:'#000',borderRadius:'4px',padding:'1px 3px',marginBottom:'2px',fontSize:'.65rem'}},
            fmtH((entry.horasNormales||0)+(entry.horasExtra||0)+(entry.horasNocturnas||0)+(entry.horasFestivas||0))
          ):null,
          tasks.length>0?h('div',{style:{background:'var(--blu-lt)',color:'var(--blu)',borderRadius:'4px',padding:'1px 3px',fontSize:'.65rem'}},
            tasks.length+' tarea'+(tasks.length>1?'s':'')
          ):null
        );
      })
    )
  );
}

function renderCalendario(){
  const year=calYear, month=calMonth;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const offset=(firstDay+6)%7; // Monday first
  const cells=[];
  for(let i=0;i<offset;i++)cells.push({d:null});
  for(let d=1;d<=daysInMonth;d++)cells.push({d,curr:true});
  
  return h('div',{},
    h('div',{class:'card'},
      h('div',{class:'cal-nav'},
        h('button',{on:{click:()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--;}rerender();}}},'◄'),
        h('span',{},MONTHS[month].toUpperCase()+' '+year),
        h('button',{on:{click:()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++;}rerender();}}},'►'),
        h('button',{
          class:'btn btn-gh btn-sm',
          style:{fontSize:'.7rem',padding:'.2rem .5rem'},
          on:{click:()=>{calView=calView==='month'?'week':'month';rerender();}}
        },calView==='month'?'Semana':'Mes')
      ),
      calView==='week' ? renderWeekView() :
      h('div',{class:'cal-grid'},
        ...WSHORT.map(d=>h('div',{class:'cal-dn'},d)),
        ...cells.map(cell=>{
          if(!cell.d)return h('div',{class:'cal-day other-month'});
          const ds=`${year}-${pad(month+1)}-${pad(cell.d)}`;
          const hasEntry=S.entries.some(e=>e.fecha===ds);
          const hasTasks=S.tasks.some(t=>t.fecha===ds);
          const isToday=ds===today();
          const isSel=ds===selDate;
          let cls='cal-day';
          const isWorked = hasEntry;
          const isHol = isHolidayES(ds);
          const isVac = isVacacion(ds);
          const dow = new Date(ds+'T12:00:00').getDay(); // 0=Sun,6=Sat
          const isWeekend = dow===0||dow===6;
          if(isSel) cls+=' selected';
          else if(isToday) cls+=' today';
          // Weekends and holidays in red UNLESS worked
          if((isWeekend||isHol) && !isWorked) cls+=' weekend-rest';
          // Add ALL applicable classes
          if(isWorked) cls+=' worked';
          if(isHol) cls+=' holiday';
          if(isVac && !isWorked) cls+=' vacation';
          if(hasEntry||hasTasks) cls+=' has-e';
          return h('div',{class:cls,
            on:{
              click:()=>{selDate=ds;rerender();},
              dblclick:()=>goToDay(ds),
              contextmenu:ev=>{
                ev.preventDefault();
                // Right click = toggle vacation
                if(!isWorked) toggleVacacion(ds);
              }
            },
            title:isHol?'Festivo nacional'+(isWorked?' (trabajado)':''):isVac?'Vacaciones (clic derecho para quitar)':'Clic derecho para marcar vacaciones'
          },cell.d);
        })
      )
    ),
    // Leyenda mejorada
    h('div',{style:{display:'flex',gap:'.6rem',flexWrap:'wrap',padding:'.6rem',background:'var(--surf2)',borderRadius:'var(--r2)',fontSize:'.72rem',marginTop:'.5rem'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:'.3rem'}},
        h('div',{style:{width:'16px',height:'16px',borderRadius:'3px',background:'rgba(34,197,94,.28)',border:'1.5px solid rgba(34,197,94,.5)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.55rem',color:'#16a34a'}},'✓'),
        h('span',{},'Trabajado')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:'.3rem'}},
        h('div',{style:{width:'16px',height:'16px',borderRadius:'3px',background:'rgba(239,68,68,.18)',border:'1.5px solid rgba(239,68,68,.4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.55rem',color:'#dc2626'}},'★'),
        h('span',{},'Festivo')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:'.3rem'}},
        h('div',{style:{width:'16px',height:'16px',borderRadius:'3px',background:'rgba(34,197,94,.28)',border:'1.5px solid rgba(34,197,94,.5)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.55rem',color:'#dc2626'}},'★'),
        h('span',{style:{color:'#16a34a'}},'Festivo trabajado')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:'.3rem'}},
        h('div',{style:{width:'16px',height:'16px',borderRadius:'3px',background:'rgba(234,179,8,.25)',border:'1.5px dashed rgba(234,179,8,.6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.55rem',color:'#b45309'}},'☀'),
        h('span',{},'Vacaciones')
      ),
      h('span',{style:{color:'var(--ink3)',marginLeft:'auto'}},'Clic derecho en dia = vacaciones')
    ),

    // Detalle del día seleccionado

function goToDay(ds){
  // Save current day before switching
  try{
    const notasEl=document.getElementById('notas-editor');
    if(notasEl && fEntry.fecha && notasEl.innerHTML.trim()){
      fEntry.notas=notasEl.innerHTML;
      localStorage.setItem('notas_'+fEntry.fecha, notasEl.innerHTML);
      persistEntry();
    }
  }catch(e){}
  pauseAndSaveTimerForDay(); // save current day's timer
  localStorage.removeItem('_fEntry');
  _skipDomCapture=true;
  // Navigate to Fichar tab for specific date
  const existing=S.entries.find(e=>e.fecha===ds);
  if(existing){
    fEntry={...existing, fichajes:[...(existing.fichajes||[]).map(f=>({...f}))], dietasExtra:[...(existing.dietasExtra||[])], otrosConceptos:[...(existing.otrosConceptos||[])], journeys:[...(existing.journeys||[])]};
    // notas come from DB entry
    editingEntry=true;
  } else {
    fEntry={...defEntry(), fecha:ds,
      precioHoraNormal:S.precioHoraNormalDefault||0,
      precioHoraExtra:S.precioHoraExtraDefault||0,
      precioHoraNocturna:S.precioHoraNocturnaDefault||0,
      precioHoraFestiva:S.precioHoraFestivaDefault||0,
      dieta:S.dietaDefault||0
    };
    editingEntry=false;
  }
  selDate=null;
  S.tab='fichar';
  restoreTimerForDay(ds); // restore this day's timer if it has one
  timerDeduct=fEntry.timerDeduct||0; // restore this jornada's break minutes (restoreTimerForDay resets to 0)
  timerEndManual=fEntry._horaFinManual||'';
  rerender();
  requestAnimationFrame(()=>{ _skipDomCapture=false; });
  window.scrollTo(0,0);
}

        class:'btn btn-g',
        style:{flex:1,fontWeight:700},

      entry && entry._draft

            class:'btn btn-b btn-sm',

async function searchSiteAddress(){
  const input=document.getElementById('site-search-input');
  const q=input?.value?.trim();
  if(!q){ showAlert('Escribe una direccion para buscar','err'); return; }
  const container=document.getElementById('site-search-results');
  if(container) container.innerHTML='<div style="padding:.5rem;font-size:.75rem;color:var(--ink2)">Buscando...</div>';
  try{
    const res=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q)+'&limit=4&addressdetails=1');
    const data=await res.json();
    if(!container) return;
    if(!data.length){ container.innerHTML='<div style="padding:.5rem;font-size:.75rem;color:var(--red)">Sin resultados</div>'; return; }
    container.innerHTML='';
    data.forEach(r=>{
      const btn=document.createElement('div');
      btn.style.cssText='padding:.4rem .6rem;cursor:pointer;font-size:.78rem;border-bottom:1px solid var(--brd);color:var(--ink);background:var(--surf2)';
      btn.textContent=r.display_name;
      btn.onmouseenter=()=>btn.style.background='var(--surf3)';
      btn.onmouseleave=()=>btn.style.background='var(--surf2)';
      btn.onclick=()=>{
        fSite.lat=parseFloat(r.lat).toFixed(6);
        fSite.lng=parseFloat(r.lon).toFixed(6);
        fSite.direccion=r.display_name.split(',').slice(0,2).join(',').trim();
        if(!fSite.ciudad) fSite.ciudad=r.address?.city||r.address?.town||r.address?.village||'';
        if(!fSite.nombre) fSite.nombre=fSite.direccion;
        container.innerHTML='';
        rerender();
      };
      container.appendChild(btn);
    });
  }catch(e){ if(container) container.innerHTML='<div style="padding:.5rem;font-size:.75rem;color:var(--red)">Error buscando</div>'; }
}

function openSiteSelector(tipo){
  S.siteSelector = S.siteSelector===tipo ? null : tipo;
  rerender();
}

function captureSiteGPS(){
  if(!navigator.geolocation){ showAlert('GPS no disponible','err'); return; }
  showAlert('Obteniendo ubicacion...');
  navigator.geolocation.getCurrentPosition(pos=>{
    fSite.lat=pos.coords.latitude.toFixed(6);
    fSite.lng=pos.coords.longitude.toFixed(6);
    fSite.acc=Math.round(pos.coords.accuracy);
    if(!fSite.direccion) fSite.direccion=fSite.lat+', '+fSite.lng;
    showAlert('GPS capturado (+-'+fSite.acc+'m)');
    rerender();
  },err=>{showAlert('Error GPS: '+err.message,'err');},{enableHighAccuracy:true,timeout:15000});
}

// ── RESUMEN: selección de jornadas (rango de fechas O días sueltos) ──
function getResumenEntries(){
  let base;
  if(S.resMode==='days'){
    const set=new Set(S.resDays||[]);
    base=S.entries.filter(e=>set.has(e.fecha)&&!e._draft).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  } else {
    const from=S.resFrom||firstDayOfMonth();
    const to=S.resTo||today();
    base=S.entries.filter(e=>e.fecha>=from&&e.fecha<=to&&!e._draft).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  }
  const c=S.resConcepto||'all';
  if(c==='all') return base;
  return base.filter(e=>{
    if(c==='hnormal') return (e.horasNormales||0)>0;
    if(c==='hextra') return (e.horasExtra||0)>0;
    if(c==='hnocturna') return (e.horasNocturnas||0)>0;
    if(c==='hfestiva') return (e.horasFestivas||0)>0;
    if(c==='dieta') return (e.dieta||0)>0||(e.dietasExtra||[]).length>0;
    if(c==='coche') return (e._transportType==='coche')&&(e.transporte||0)>0;
    if(c==='camion') return (e._transportType==='camion')&&(e.transporte||0)>0;
    if(c==='otros') return (e.otrosConceptos||[]).length>0||(e.journeys||[]).length>0;
    return true;
  });
}
function resumenPeriodoLabel(){
  if(S.resMode==='days'){
    const n=(S.resDays||[]).length;
    return n>0?n+' día'+(n>1?'s':'')+' seleccionado'+(n>1?'s':''):'Sin días seleccionados';
  }
  const from=S.resFrom||firstDayOfMonth(), to=S.resTo||today();
  return 'Del '+dlbl(from)+' al '+dlbl(to);
}
function resumenFileTag(){
  if(S.resMode==='days') return 'dias_sueltos';
  return (S.resFrom||firstDayOfMonth())+'_'+(S.resTo||today());
}

function openExportModal(mode){
  const entries = getResumenEntries();
  const from = S.resMode==='days'?((entries[0]||{}).fecha||today()):(S.resFrom||firstDayOfMonth());
  const to = S.resMode==='days'?((entries[entries.length-1]||{}).fecha||today()):(S.resTo||today());
  if(!entries.length){showAlert(S.resMode==='days'?'No hay jornadas en los días seleccionados':'No hay jornadas en el rango','err');return;}
  const cp = mode==='con';
  const eur2 = v=>v>0?v.toFixed(2).replace('.',',')+' €':'—';
  const fh = h=>h>0?(h%1===0?h+'h':Math.floor(h)+'h '+Math.round((h%1)*60)+'m'):'—';
  const fhd = h=>h>0?String(h).replace('.',',')+'h':'—';
  const worker = workers.find(w=>w.id===activeWorkerId)||{};
  const company = companies.find(c=>c.id===activeCompanyId)||{};

  let diasHtml = '';
  let totHN=0,totHE=0,totHNoc=0,totHFes=0,totIN=0,totIE=0,totINoc=0,totIFes=0,totD=0,totT=0,totO=0,totViaj=0;
  let totTranspCoche=0,totTranspCamion=0,totTranspOtro=0,nCoche=0,nCamion=0,nOtroTransp=0;

  // Price breakdown maps: {precio: cantidad}
  const dietaPrecios={}, cochePrecio={}, camionPrecio={};
  let totTotal2=0;
  entries.forEach(e=>{
    const hN=e.horasNormales||0, hE=e.horasExtra||0, hNoc=e.horasNocturnas||0, hFes=e.horasFestivas||0;
    const iN=e.importeNormales||0, iE=e.importeExtra||0, iNoc=e.importeNocturnas||0, iFes=e.importeFestivas||0;
    const dieta=e.dieta||0, transp=e.transporte||0;
    const tt=e._transportType||'';
    if(transp>0){
      if(tt==='coche'){
        totTranspCoche+=transp;nCoche++;
        const pk=transp.toFixed(2);cochePrecio[pk]=(cochePrecio[pk]||0)+1;
      } else if(tt==='camion'){
        totTranspCamion+=transp;nCamion++;
        const pk=transp.toFixed(2);camionPrecio[pk]=(camionPrecio[pk]||0)+1;
      } else if(transp>0){totTranspOtro+=transp;nOtroTransp++;}
    }
    // Track dieta price breakdown
    if(dieta>0){
      const pk=dieta.toFixed(2);
      dietaPrecios[pk]=(dietaPrecios[pk]||0)+1;
    }
    const dietasE=(e.dietasExtra||[]).reduce((a,d)=>a+(d.importe||0),0);
    const otros=(e.otrosConceptos||[]).reduce((a,o)=>a+(o.importe||0),0);
    const viajes=(e.journeys||[]).reduce((a,j)=>a+(j.precioManual||0),0);
    const total=iN+iE+iNoc+iFes+dieta+transp+dietasE+otros+viajes;
    totHN+=hN;totHE+=hE;totHNoc+=hNoc;totHFes+=hFes;
    totIN+=iN;totIE+=iE;totINoc+=iNoc;totIFes+=iFes;totD+=dieta+dietasE;totT+=transp;totO+=otros;totViaj+=viajes;

    const tareas=(S.tasks||[]).filter(t=>t.fecha===e.fecha);

    if(hNoc>0) filas+=`<tr><td>Horas nocturnas</td><td>${fh(hNoc)}</td>${cp?`<td>${eur2(e.precioHoraNocturna||0)}/h</td><td>${eur2(iNoc)}</td>`:'<td colspan="2">✓</td>'}</tr>`;
    if(hFes>0) filas+=`<tr><td>Horas festivas</td><td>${fh(hFes)}</td>${cp?`<td>${eur2(e.precioHoraFestiva||0)}/h</td><td>${eur2(iFes)}</td>`:'<td colspan="2">✓</td>'}</tr>`;

    *{box-sizing:border-box;margin:0;padding:0}

    .header .meta{font-size:11px;color:#64748b;line-height:1.6}
    .header .periodo{font-size:11px;text-align:right;color:#64748b}
    .dia{border:1px solid #e2e8f0;border-radius:6px;margin-bottom:10px;overflow:hidden;page-break-inside:avoid}
    .dia-head{background:#1e293b;color:#fff;padding:7px 12px;display:flex;justify-content:space-between;font-weight:700;font-size:12px}
    .dia-total{color:#4ade80;font-weight:800}
    .sub-sec{padding:4px 12px;font-size:11px;color:#475569;border-top:1px solid #f1f5f9}
    .nota{font-style:italic}
    table.det{width:100%;border-collapse:collapse;font-size:11px}
    table.det th{background:#f8fafc;padding:5px 12px;text-align:left;color:#64748b;font-weight:600;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0}
    table.det td{padding:4px 12px;border-bottom:1px solid #f1f5f9}
    table.det td:last-child{text-align:right;font-weight:600}
    .resumen{margin-top:16px;border:2px solid #1e293b;border-radius:6px;overflow:hidden}
    .resumen-head{background:#1e293b;color:#fff;padding:8px 14px;font-weight:800;font-size:13px}
    .resumen table{width:100%;border-collapse:collapse;font-size:12px}
    .resumen td{padding:5px 14px;border-bottom:1px solid #e2e8f0}
    .resumen td:last-child{text-align:right;font-weight:700}
    .gran-total{background:#f0fdf4;font-size:14px;font-weight:800;color:#166534}
    @media print{body{padding:10px}.dia{page-break-inside:avoid}}
  </style></head><body>
  <div class="header">
    <div>
      <h1>${company.nombre||'TimerPro'} — Informe de Jornadas</h1>
      <div class="meta">
        ${worker.nombre?'Trabajador: <strong>'+worker.nombre+'</strong><br>':''}
        ${worker.dni?'DNI: '+worker.dni+'<br>':''}
        Generado: ${new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
      </div>
    </div>
    <div class="periodo">
      ${S.resMode==='days'?'<strong>'+resumenPeriodoLabel()+'</strong><br>':'Período:<br><strong>'+dlbl(from)+'</strong><br>al<br><strong>'+dlbl(to)+'</strong><br>'}
      <strong>${entries.length} jornadas</strong>
    </div>
  </div>
  ${diasHtml}
  <div class="resumen">
    <div class="resumen-head">RESUMEN TOTAL <span style="font-size:.7rem;font-weight:400;opacity:.7">${from.split("-").reverse().join(".")} – ${to.split("-").reverse().join(".")}</span></div>
    <table>
      ${totHN>0?`<tr><td>Horas normales</td><td>${fhd(totHN)}</td>${cp?'<td>'+eur2(totIN)+'</td>':''}</tr>`:''}
      ${totHE>0?`<tr><td>Horas extra</td><td>${fhd(totHE)}</td>${cp?'<td>'+eur2(totIE)+'</td>':''}</tr>`:''}
      ${totHNoc>0?`<tr><td>Horas nocturnas</td><td>${fhd(totHNoc)}</td>${cp?'<td>'+eur2(totINoc)+'</td>':''}</tr>`:''}
      ${totHFes>0?`<tr><td>Horas festivas</td><td>${fhd(totHFes)}</td>${cp?'<td>'+eur2(totIFes)+'</td>':''}</tr>`:''}
      ${cp&&totD>0?(()=>{
        const keys=Object.keys(dietaPrecios).map(Number).sort((a,b)=>b-a);
        if(keys.length===1){
          const pr=keys[0],cnt=dietaPrecios[pr.toFixed(2)];
          return `<tr><td>Dietas</td><td>${cnt} × ${eur2(pr)}</td><td>${eur2(cnt*pr)}</td></tr>`;
        }
        return keys.map(pr=>{
          const cnt=dietaPrecios[pr.toFixed(2)];
          return `<tr><td>Dieta</td><td>${cnt} × ${eur2(pr)}</td><td>${eur2(cnt*pr)}</td></tr>`;
        }).join('')+`<tr><td><em>Total dietas</em></td><td></td><td>${eur2(totD)}</td></tr>`;
      })():''}
      ${cp&&totTranspCoche>0?(()=>{
        const keys=Object.keys(cochePrecio).map(Number).sort((a,b)=>b-a);
        if(keys.length===1){
          const pr=keys[0],cnt=cochePrecio[pr.toFixed(2)];
          return `<tr><td>Transp. coche</td><td>${cnt} viaje${cnt>1?'s':''} × ${eur2(pr)}</td><td>${eur2(totTranspCoche)}</td></tr>`;
        }
        return keys.map(pr=>{
          const cnt=cochePrecio[pr.toFixed(2)];
          return `<tr><td>Transp. coche</td><td>${cnt} viaje${cnt>1?'s':''} × ${eur2(pr)}</td><td>${eur2(cnt*pr)}</td></tr>`;
        }).join('')+`<tr><td><em>Total coche</em></td><td></td><td>${eur2(totTranspCoche)}</td></tr>`;
      })():''}
      ${cp&&totTranspCamion>0?(()=>{
        const keys=Object.keys(camionPrecio).map(Number).sort((a,b)=>b-a);
        if(keys.length===1){
          const pr=keys[0],cnt=camionPrecio[pr.toFixed(2)];
          return `<tr><td>Transp. camión</td><td>${cnt} viaje${cnt>1?'s':''} × ${eur2(pr)}</td><td>${eur2(totTranspCamion)}</td></tr>`;
        }
        return keys.map(pr=>{
          const cnt=camionPrecio[pr.toFixed(2)];
          return `<tr><td>Transp. camión</td><td>${cnt} viaje${cnt>1?'s':''} × ${eur2(pr)}</td><td>${eur2(cnt*pr)}</td></tr>`;
        }).join('')+`<tr><td><em>Total camión</em></td><td></td><td>${eur2(totTranspCamion)}</td></tr>`;
      })():''}
      ${cp&&totTranspOtro>0?`<tr><td>Transporte otros</td><td>${nOtroTransp} viajes</td><td>${eur2(totTranspOtro)}</td></tr>`:''}
      ${cp&&totO>0?`<tr><td>Otros conceptos</td><td>—</td><td>${eur2(totO)}</td></tr>`:''}
      ${cp&&totViaj>0?`<tr><td>Viajes</td><td>—</td><td>${eur2(totViaj)}</td></tr>`:''}
      ${cp?`<tr class="gran-total"><td>TOTAL</td><td>${fhd(totHN+totHE+totHNoc+totHFes)}</td><td>${totTotal.toFixed(2).replace('.',',')} €</td></tr>`:`<tr class="gran-total"><td>TOTAL HORAS</td><td colspan="2">${fhd(totHN+totHE+totHNoc+totHFes)}</td></tr>`}
    </table>
  </div>
  </body></html>`;

  try{
    const locE=entries[0].ubicacionEntrada;
    const locS=entries[0].ubicacionSalida;
  }catch(ex){}

  const w=window.open('','_blank','width=900,height=700');
  if(!w){showAlert('Permite ventanas emergentes para exportar','err');return;}
  w.document.write(htmlContent);
  w.document.close();
  setTimeout(()=>w.print(),800);

  // Además: ofrecer guardar el HTML en el dispositivo
  const fname='TimerPro_'+resumenFileTag()+(cp?'':'_SinImportes')+'.html';
  const blob=new Blob([htmlContent],{type:'text/html;charset=utf-8'});
  dlDialog={blob,filename:fname,type:'html',title:'Guardar informe en este dispositivo'};
  S.modal='dl';rerender();
}

function exportXLSX(conPrecios){
  try{
    const ents=getResumenEntries();
    const from=S.resMode==='days'?((ents[0]||{}).fecha||today()):(S.resFrom||firstDayOfMonth());
    const to=S.resMode==='days'?((ents[ents.length-1]||{}).fecha||today()):(S.resTo||today());
    if(!ents.length){showAlert(S.resMode==='days'?'No hay jornadas en los días seleccionados':'No hay jornadas en el rango','err');return;}

    const n=v=>parseFloat((v||0).toFixed(2));
    const fh=h=>{if(!h)return '';return h%1===0?h+'h':Math.floor(h)+'h '+Math.round((h%1)*60)+'m';};
    const eur2=v=>v>0?n(v).toFixed(2).replace('.',',')+'€':'';
    const worker=workers.find(w=>w.id===activeWorkerId)||{};
    const company=companies.find(c=>c.id===activeCompanyId)||{};

    // Counters
    let totHN=0,totHE=0,totHNoc=0,totHFes=0;
    let totIN=0,totIE=0,totINoc=0,totIFes=0,totD=0,totT=0,totO=0;
    let nDietaJ=0,totTCoche=0,totTCamion=0,totTOtro=0,nCoche=0,nCamion=0,nOtroT=0;

    // Build rows
    const dataRows=ents.map(e=>{
      const hN=n(e.horasNormales),hE=n(e.horasExtra),hNoc=n(e.horasNocturnas),hFes=n(e.horasFestivas);
      const iN=n(e.importeNormales),iE=n(e.importeExtra),iNoc=n(e.importeNocturnas),iFes=n(e.importeFestivas);
      const dBase=n(e.dieta);
      const dExtra=(e.dietasExtra||[]);
      const dExtraT=n(dExtra.reduce((a,d)=>a+(d.importe||0),0));
      const dTotal=n(dBase+dExtraT);
      const transp=n(e.transporte);
      const tt=e._transportType||'';
      const ttN=tt==='coche'?'Coche':tt==='camion'?'Camión':tt||'';
      const otros=n((e.otrosConceptos||[]).reduce((a,o)=>a+(o.importe||0),0));
      const total=n(iN+iE+iNoc+iFes+dTotal+transp+otros);
      totHN+=hN;totHE+=hE;totHNoc+=hNoc;totHFes+=hFes;
      totIN+=iN;totIE+=iE;totINoc+=iNoc;totIFes+=iFes;
      totD+=dTotal;totT+=transp;totO+=otros;
      if(dTotal>0) nDietaJ++;
      if(transp>0){if(tt==='coche'){totTCoche+=transp;nCoche++;}else if(tt==='camion'){totTCamion+=transp;nCamion++;}else{totTOtro+=transp;nOtroT++;}}
      let locE='',locS='';
      try{locE=JSON.parse(e.ubicacionEntrada).label||'';}catch(ex){locE=e.ubicacionEntrada||'';}
      try{locS=JSON.parse(e.ubicacionSalida).label||'';}catch(ex){locS=e.ubicacionSalida||'';}
      const notas=(e.notas||'').replace(/<[^>]*>/g,' ').trim();
      const tareas=(S.tasks||[]).filter(t=>t.fecha===e.fecha).map(t=>(t.titulo||'')+(t.otNumero?' (OT:'+t.otNumero+')':'')).join('; ');
      const fParts=e.fecha.split('-');
      const fDisp=(fParts[2]||'')+'/'+(fParts[1]||'')+'/'+(fParts[0]||'');
      return {fDisp,dia:cap(wday(e.fecha)),hN,hE,hNoc,hFes,fichajes:(e.fichajes||[]).filter(f=>f.entrada&&f.salida).length,
        pN:n(e.precioHoraNormal),iN,pE:n(e.precioHoraExtra),iE,pNoc:n(e.precioHoraNocturna),iNoc,pFes:n(e.precioHoraFestiva),iFes,
        dBase,dExtraStr:dExtra.map(d=>(d.concepto||'Extra')+':'+n(d.importe||0).toFixed(2)+'€').join('; '),
        transp,ttN,dTotal,otros,total,tareas,locE,locS,notas};
    });

    // Build desglose string
    let des='';
    if(nCoche>0) des+='Coche: '+nCoche+' viaje'+(nCoche>1?'s':'')+' ('+n(totTCoche).toFixed(2)+'€)   ';
    if(nCamion>0) des+='Camión: '+nCamion+' viaje'+(nCamion>1?'s':'')+' ('+n(totTCamion).toFixed(2)+'€)   ';
    if(nOtroT>0) des+='Otros: '+nOtroT+' ('+n(totTOtro).toFixed(2)+'€)   ';
    if(nDietaJ>0) des+='Dietas: '+nDietaJ+' jornada'+(nDietaJ>1?'s':'')+' ('+n(totD).toFixed(2)+'€)';

    const totalG=n(totIN+totIE+totINoc+totIFes+totD+totT+totO);
    const totalH=fh(n(totHN+totHE+totHNoc+totHFes));

    // CSS styles identical to PDF
    const css=`
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:Arial,sans-serif;font-size:11px;color:#1e293b}
      .hdr{background:#1e293b;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
      .hdr-title{font-size:13px;font-weight:700}
      .hdr-sub{font-size:10px;color:#94a3b8;margin-top:2px}
      .hdr-date{font-size:10px;color:#94a3b8}
      table{width:100%;border-collapse:collapse;font-size:11px}
      thead tr{background:#334155;color:#fff}
      thead th{padding:6px 10px;text-align:right;font-weight:600;white-space:nowrap;border:1px solid #475569}
      thead th:first-child,thead th:nth-child(2){text-align:left}
      tbody tr:nth-child(even){background:#f8fafc}
      tbody tr:nth-child(odd){background:#ffffff}
      tbody td{padding:5px 10px;border:1px solid #e2e8f0;text-align:right;white-space:nowrap}
      tbody td:first-child,tbody td:nth-child(2){text-align:left;font-weight:600}
      .amt{color:#166534;font-weight:700}
      .empty{color:#94a3b8}
      tfoot .tot-row{background:#1e293b;color:#fff}
      tfoot .tot-row td{padding:7px 10px;border:1px solid #334155;font-weight:700;text-align:right}
      tfoot .tot-row td:first-child{text-align:left}
      tfoot .tot-row .grand{color:#4ade80}
      tfoot .des-row{background:#0f172a;color:#94a3b8}
      tfoot .des-row td{padding:5px 10px;border:1px solid #1e293b;font-size:10px}
      thead th.green{background:#166534;color:#4ade80}
    `;

    // Build header columns
    const cpCols=conPrecios?`
      <th>€/h Norm</th><th>€ Norm</th><th>€/h Extra</th><th>€ Extra</th>
      <th>€/h Noc</th><th>€ Noc</th><th>€/h Fest</th><th>€ Fest</th>
      <th>€ Dieta</th><th>Transp.</th><th class="green">TOTAL</th>`:'<th>Total Horas</th>';

    let tbody='';
    dataRows.forEach((r,idx2)=>{
      const cpCells=conPrecios
        ?`<td>${r.pN?r.pN.toFixed(2):''}</td><td>${eur2(r.iN)}</td><td>${r.pE?r.pE.toFixed(2):''}</td><td>${eur2(r.iE)}</td>`
         +`<td>${r.pNoc?r.pNoc.toFixed(2):''}</td><td>${eur2(r.iNoc)}</td><td>${r.pFes?r.pFes.toFixed(2):''}</td><td>${eur2(r.iFes)}</td>`
         +`<td>${eur2(r.dTotal)}</td><td>${eur2(r.transp)}</td><td class="amt">${eur2(r.total)}</td>`
        :`<td>${fh(r.hN+r.hE+r.hNoc+r.hFes)}</td>`;
      tbody+=`<tr>
        <td>${r.fDisp}</td><td>${r.dia}</td>
        <td>${fh(r.hN)||'<span class="empty">—</span>'}</td>
        <td>${fh(r.hE)||'<span class="empty">—</span>'}</td>
        <td>${fh(r.hNoc)||'<span class="empty">—</span>'}</td>
        <td>${fh(r.hFes)||'<span class="empty">—</span>'}</td>
        <td>${r.fichajes}</td>
        ${cpCells}
      </tr>`;
    });

    const totCpCells=conPrecios
      ?`<td></td><td>${eur2(totIN)}</td><td></td><td>${eur2(totIE)}</td>`
       +`<td></td><td>${eur2(totINoc)}</td><td></td><td>${eur2(totIFes)}</td>`
       +`<td>${eur2(totD)}</td><td>${eur2(totT)}</td><td class="grand">${totalG.toFixed(2).replace('.',',')+'€'}</td>`
      :`<td>${totalH}</td>`;

    const ncols=7+(conPrecios?11:1);
    const htmlContent=`<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8">
<style>${css}</style>
</head><body>
<div class="hdr">
  <div>
    <div class="hdr-title">${company.nombre||'TimerPro'} — Informe de jornadas</div>
    <div class="hdr-sub">${worker.nombre||''} · ${S.resMode==='days'?resumenPeriodoLabel():'Del '+dlbl(from)+' al '+dlbl(to)} · ${ents.length} jornadas</div>
  </div>
  <div class="hdr-date">Generado: ${new Date().toLocaleDateString('es-ES')}</div>
</div>
<table>
  <thead><tr>
    <th>Fecha</th><th>Día</th>
    <th>H.Norm</th><th>H.Extra</th><th>H.Noc</th><th>H.Fest</th><th>Fich.</th>
    ${cpCols}
  </tr></thead>
  <tbody>${tbody}</tbody>
  <tfoot>
    <tr class="tot-row">
      <td colspan="2">TOTALES</td>
      <td>${fh(totHN)}</td><td>${fh(totHE)}</td><td>${fh(totHNoc)}</td><td>${fh(totHFes)}</td><td></td>
      ${totCpCells}
    </tr>
    <tr class="des-row">
      <td colspan="${Math.floor(ncols/2)}">${des}</td>
      <td colspan="${ncols-Math.floor(ncols/2)}" style="text-align:right">Horas totales: ${totalH}</td>
    </tr>
  </tfoot>
</table>
</body></html>`;

    // Download as .xls (HTML-based Excel)
    const blob=new Blob([htmlContent],{type:'application/vnd.ms-excel;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='TimerPro_'+resumenFileTag()+'.xls';
    a.click();
    URL.revokeObjectURL(url);
    showAlert('✅ Excel descargado');
  }catch(e){
    showAlert('Error Excel: '+e.message,'err');
    console.error(e);
  }
}


async function exportPlantilla(){
  const from = S.resMode==='days'?'':(S.resFrom||firstDayOfMonth());
  const to = S.resMode==='days'?'':(S.resTo||today());
  const worker = workers.find(w=>w.id===activeWorkerId)||{};
  const company = companies.find(c=>c.id===activeCompanyId)||{};

  // Generate days: either every day in the range, or just the loose selected days
  const days = [];
  if(S.resMode==='days'){
    [...(S.resDays||[])].sort().forEach(fecha=>{
      const[yyyy,mm,dd]=fecha.split('-');
      days.push({fecha, fDisp:dd+'/'+mm+'/'+yyyy, dia:cap(wday(fecha))});
    });
  } else {
    let cur = new Date(from+'T12:00:00');
    const end = new Date(to+'T12:00:00');
    while(cur <= end){
      const yyyy = cur.getFullYear();
      const mm = String(cur.getMonth()+1).padStart(2,'0');
      const dd = String(cur.getDate()).padStart(2,'0');
      days.push({fecha:yyyy+'-'+mm+'-'+dd, fDisp:dd+'/'+mm+'/'+yyyy, dia:cap(wday(yyyy+'-'+mm+'-'+dd))});
      cur.setDate(cur.getDate()+1);
    }
  }
  if(S.resMode==='days'&&!days.length){showAlert('No hay días seleccionados','err');return;}

  const css=`
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;font-size:11px;color:#1e293b}
    .hdr{background:#1e293b;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}

    .hdr-sub{font-size:10px;color:#94a3b8;margin-top:2px}
    table{width:100%;border-collapse:collapse;font-size:11px}
    thead tr{background:#334155;color:#fff}
    thead th{padding:6px 10px;text-align:center;font-weight:600;white-space:nowrap;border:1px solid #475569}

    tbody tr:nth-child(even){background:#f0f4f8}
    tbody tr:nth-child(odd){background:#ffffff}
    tbody td{padding:6px 10px;border:1px solid #e2e8f0;text-align:center;min-width:70px}
    tbody td:first-child{text-align:left;font-weight:600;white-space:nowrap;background:#f8fafc}
    tbody td:nth-child(2){text-align:left;color:#475569;background:#f8fafc}
    tfoot .tot-row{background:#1e293b;color:#fff}
    tfoot .tot-row td{padding:7px 10px;border:1px solid #334155;font-weight:700;text-align:center}
    tfoot .tot-row td:first-child{text-align:left}
    thead th.green{background:#166534;color:#4ade80}
  `;

  let tbody = '';
  days.forEach(d=>{
    tbody+=`<tr>
      <td>${d.fDisp}</td>
      <td>${d.dia}</td>
      <td></td><td></td><td></td><td></td>
      <td></td>
      <td></td><td></td>
      <td></td><td></td>
      <td></td>
    </tr>`;
  });

  const ncols = 12;
  const htmlContent=`<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8"><style>${css}</style></head><body>
<div class="hdr">
  <div>
    <div class="hdr-title">${company.nombre||'TimerPro'} — Plantilla de jornadas</div>
    <div class="hdr-sub">${worker.nombre||''} · ${S.resMode==='days'?resumenPeriodoLabel():'Del '+dlbl(from)+' al '+dlbl(to)} · ${days.length} días</div>
  </div>
  <div style="font-size:10px;color:#94a3b8">Generado: ${new Date().toLocaleDateString('es-ES')}</div>
</div>
<table>
  <thead><tr>
    <th>Fecha</th><th>Día</th>
    <th>H.Normales</th><th>H.Extra</th><th>H.Nocturnas</th><th>H.Festivas</th>
    <th>Fichajes<br><small>(HH:MM→HH:MM)</small></th>
    <th>€/h Norm</th><th>€/h Extra</th>
    <th>Dieta (€)</th><th>Transporte (€)</th>
    <th class="green">Notas / OT</th>
  </tr></thead>
  <tbody>${tbody}</tbody>
  <tfoot>
    <tr class="tot-row">
      <td colspan="2">TOTALES</td>
      <td></td><td></td><td></td><td></td><td></td>
      <td></td><td></td><td></td><td></td><td></td>
    </tr>
  </tfoot>
</table>
</body></html>`;

  const fname='TimerPro_Plantilla_'+resumenFileTag()+'.xls';
  const blob=new Blob([htmlContent],{type:'application/vnd.ms-excel;charset=utf-8'});
  const file=new File([blob],fname,{type:blob.type});
  if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file],title:'Plantilla TimerPro'}); showAlert('Plantilla compartida'); return; }
    catch(ex){ if(ex.name==='AbortError') return; }
  }
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=fname;
  a.click();
  URL.revokeObjectURL(url);
  showAlert('✅ Plantilla descargada ('+days.length+' días)');
}

// ── EXPORTACIÓN PERSONALIZADA: PDF y Excel con los campos elegidos por el usuario ──
// (Funciones independientes de exportPDFReal/exportExcel — no tocan ni comparten lógica con ellas)
// ── EXPORTACIÓN PERSONALIZADA HTML (mismo estilo que openExportModal) ──
function openCustomExportHTML(fields){
  const entries=getResumenEntries();
  if(!entries.length){showAlert('No hay jornadas que exportar','err');return;}
  const anyField=fields.hNormales||fields.hExtra||fields.hNocturnas||fields.hFestivas||
    fields.fichajes||fields.notas||fields.ubicacion||fields.importes||
    fields.dietas||fields.transpCoche||fields.transpCamion||fields.otros||fields.viajes;
  if(!anyField){showAlert('Selecciona al menos un dato a mostrar','err');return;}

  const worker=workers.find(w=>w.id===activeWorkerId)||{};
  const company=companies.find(c=>c.id===activeCompanyId)||{};
  const fh=h=>h>0?(h%1===0?h+'h':Math.floor(h)+'h '+Math.round((h%1)*60)+'m'):'—';
  const fhd=h=>h>0?String(h).replace('.',',')+'h':'—';
  const eur2=v=>v>0?v.toFixed(2).replace('.',',')+' €':'—';

  let diasHtml='';
  let totHN=0,totHE=0,totHNoc=0,totHFes=0,totIN=0,totIE=0,totINoc=0,totIFes=0,totD=0,totT=0,totO=0,totViaj=0;
  let nCoche=0,nCamion=0;

  entries.forEach(e=>{
    const hN=+e.horasNormales||0,hE=+e.horasExtra||0,hNoc=+e.horasNocturnas||0,hFes=+e.horasFestivas||0;
    const iN=+e.importeNormales||0,iE=+e.importeExtra||0,iNoc=+e.importeNocturnas||0,iFes=+e.importeFestivas||0;
    const diet=(+e.dieta||0)+((e.dietasExtra||[]).reduce((a,d)=>a+(+d.importe||0),0));
    const transp=+e.transporte||0;
    const otros=(e.otrosConceptos||[]).reduce((a,c)=>a+(+c.importe||0),0);
    const viajes=(e.journeys||[]).reduce((a,j)=>a+(+j.precioManual||0),0);

    if(fields.hNormales)totHN+=hN;
    if(fields.hExtra)totHE+=hE;
    if(fields.hNocturnas)totHNoc+=hNoc;
    if(fields.hFestivas)totHFes+=hFes;
    if(fields.importes){totIN+=iN;totIE+=iE;totINoc+=iNoc;totIFes+=iFes;}
    if(fields.dietas)totD+=diet;
    if(fields.transpCoche&&e._transportType==='coche'){totT+=transp;nCoche++;}
    if(fields.transpCamion&&e._transportType==='camion'){totT+=transp;nCamion++;}
    if(fields.otros)totO+=otros;
    if(fields.viajes)totViaj+=viajes;

    const _isTransp=(e._transportType==='coche'&&fields.transpCoche)||(e._transportType==='camion'&&fields.transpCamion);
    const totalDia=(fields.importes?((fields.hNormales?iN:0)+(fields.hExtra?iE:0)+(fields.hNocturnas?iNoc:0)+(fields.hFestivas?iFes:0)):0)+(fields.dietas?diet:0)+(_isTransp?transp:0)+(fields.otros?otros:0)+(fields.viajes?viajes:0);
    const fichajes=fields.fichajes?(e.fichajes||[]).filter(f=>f.entrada||f.salida):[];
    const notasText=fields.notas?htmlToText(e.notas||''):'';

    let filas='';
    if(fields.hNormales&&hN>0)filas+=`<tr><td>Horas normales</td><td>${fh(hN)}</td>${fields.importes?`<td>${e.precioHoraNormal?e.precioHoraNormal+' €/h':'—'}</td><td>${eur2(iN)}</td>`:''}</tr>`;
    if(fields.hExtra&&hE>0)filas+=`<tr><td>Horas extra</td><td>${fh(hE)}</td>${fields.importes?`<td>${e.precioHoraExtra?e.precioHoraExtra+' €/h':'—'}</td><td>${eur2(iE)}</td>`:''}</tr>`;
    if(fields.hNocturnas&&hNoc>0)filas+=`<tr><td>Horas nocturnas</td><td>${fh(hNoc)}</td>${fields.importes?`<td>—</td><td>${eur2(iNoc)}</td>`:''}</tr>`;
    if(fields.hFestivas&&hFes>0)filas+=`<tr><td>Horas festivas</td><td>${fh(hFes)}</td>${fields.importes?`<td>—</td><td>${eur2(iFes)}</td>`:''}</tr>`;
    if(fields.dietas&&diet>0)filas+=`<tr><td>Dieta</td><td>—</td>${fields.importes?`<td>—</td><td>${eur2(diet)}</td>`:''}</tr>`;
    const _tt=e._transportType;
    if(transp>0&&((_tt==='coche'&&fields.transpCoche)||(_tt==='camion'&&fields.transpCamion))){const tt=(S.transportTypes||[]).find(t=>t.id===_tt);filas+=`<tr><td>Transporte${tt?' ('+tt.nombre+')':''}</td><td>1 × ${eur2(transp)}</td>${fields.importes?`<td>${eur2(transp)}</td>`:''}</tr>`;}
    if(fields.otros)(e.otrosConceptos||[]).forEach(o=>{if(+o.importe>0)filas+=`<tr><td>${o.concepto||'Otro'}</td><td>—</td>${fields.importes?`<td>—</td><td>${eur2(o.importe)}</td>`:''}</tr>`;});
    if(fields.viajes)(e.journeys||[]).forEach(j=>{if(+j.precioManual>0)filas+=`<tr><td>Viaje</td><td>—</td>${fields.importes?`<td>—</td><td>${eur2(j.precioManual)}</td>`:''}</tr>`;});

    let locE='',locS='';
    if(fields.ubicacion){
      try{locE=JSON.parse(e.ubicacionEntrada||'{}').label||'';}catch(ex){locE='';}
      try{locS=JSON.parse(e.ubicacionSalida||'{}').label||'';}catch(ex){locS='';}
    }

    const thCols=fields.importes?'<th>Concepto</th><th>Horas</th><th>Precio</th><th>Importe</th>':'<th>Concepto</th><th>Horas</th>';

    diasHtml+=`
    <div class="dia">
      <div class="dia-head">
        <span>${cap(wday(e.fecha))}, ${dlbl(e.fecha)}</span>
        ${fields.importes&&totalDia>0?`<span class="dia-total">${totalDia.toFixed(2).replace('.',',')} €</span>`:''}
      </div>
      ${fichajes.length>0?`<div class="sub-sec">Fichajes: ${fichajes.map(f=>(f.entrada||'--')+'→'+(f.salida||'--')).join(' | ')}</div>`:''}
      ${filas?`<table class="det"><thead><tr>${thCols}</tr></thead><tbody>${filas}</tbody></table>`:''}
      ${locE?`<div class="sub-sec">📍 Entrada: ${locE}</div>`:''}
      ${locS&&locS!==locE?`<div class="sub-sec">📍 Salida: ${locS}</div>`:''}
      ${notasText?`<div class="sub-sec nota">📝 ${notasText}</div>`:''}
    </div>`;
  });

  const totTotal=totIN+totIE+totINoc+totIFes+totD+totT+totO+totViaj;
  const totH=totHN+totHE+totHNoc+totHFes;

  const htmlContent=`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Exportación personalizada TimerPro</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;font-size:12px;color:#1e293b;padding:20px}
    .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #1e293b}
    .header h1{font-size:16px;font-weight:800}
    .header .meta{font-size:11px;color:#64748b;line-height:1.6}
    .header .periodo{font-size:11px;text-align:right;color:#64748b}
    .dia{border:1px solid #e2e8f0;border-radius:6px;margin-bottom:10px;overflow:hidden;page-break-inside:avoid}
    .dia-head{background:#1e293b;color:#fff;padding:7px 12px;display:flex;justify-content:space-between;font-weight:700;font-size:12px}
    .dia-total{color:#4ade80;font-weight:800}
    .sub-sec{padding:4px 12px;font-size:11px;color:#475569;border-top:1px solid #f1f5f9}
    .nota{font-style:italic}
    table.det{width:100%;border-collapse:collapse;font-size:11px}
    table.det th{background:#f8fafc;padding:5px 12px;text-align:left;color:#64748b;font-weight:600;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0}
    table.det td{padding:4px 12px;border-bottom:1px solid #f1f5f9}
    table.det td:last-child{text-align:right;font-weight:600}
    .resumen{margin-top:16px;border:2px solid #1e293b;border-radius:6px;overflow:hidden}
    .resumen-head{background:#1e293b;color:#fff;padding:8px 14px;font-weight:800;font-size:13px}
    .resumen table{width:100%;border-collapse:collapse;font-size:12px}
    .resumen td{padding:5px 14px;border-bottom:1px solid #e2e8f0}
    .resumen td:last-child{text-align:right;font-weight:700}
    .gran-total{background:#f0fdf4;font-size:14px;font-weight:800;color:#166534}
    @media print{body{padding:10px}.dia{page-break-inside:avoid}}
  </style></head><body>
  <div class="header">
    <div>
      <h1>${company.nombre||'TimerPro'} — Exportación personalizada</h1>
      <div class="meta">
        ${worker.nombre?'Trabajador: <strong>'+worker.nombre+'</strong><br>':''}
        ${worker.dni?'DNI: '+worker.dni+'<br>':''}
        Generado: ${new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
      </div>
    </div>
    <div class="periodo">
      <strong>${resumenPeriodoLabel()}</strong><br>
      <strong>${entries.length} jornadas</strong>
    </div>
  </div>
  ${diasHtml}
  <div class="resumen">
    <div class="resumen-head">RESUMEN TOTAL</div>
    <table>
      ${fields.hNormales&&totHN>0?`<tr><td>Horas normales</td><td>${fh(totHN)}</td>${fields.importes?'<td>'+eur2(totIN)+'</td>':''}</tr>`:''}
      ${fields.hExtra&&totHE>0?`<tr><td>Horas extra</td><td>${fh(totHE)}</td>${fields.importes?'<td>'+eur2(totIE)+'</td>':''}</tr>`:''}
      ${fields.hNocturnas&&totHNoc>0?`<tr><td>Horas nocturnas</td><td>${fh(totHNoc)}</td>${fields.importes?'<td>'+eur2(totINoc)+'</td>':''}</tr>`:''}
      ${fields.hFestivas&&totHFes>0?`<tr><td>Horas festivas</td><td>${fh(totHFes)}</td>${fields.importes?'<td>'+eur2(totIFes)+'</td>':''}</tr>`:''}
      ${fields.dietas&&totD>0?`<tr><td>Dietas</td><td>—</td>${fields.importes?'<td>'+eur2(totD)+'</td>':''}</tr>`:''}
      ${(fields.transpCoche||fields.transpCamion)&&totT>0?`<tr><td>Transporte${fields.transpCoche&&fields.transpCamion?' (coche+camión)':fields.transpCoche?' (coche)':' (camión)'}</td><td>${nCoche+nCamion} viajes</td>${fields.importes?`<td>${eur2(totT)}</td>`:''}</tr>`:''}
      ${fields.otros&&totO>0?`<tr><td>Otros conceptos</td><td>—</td>${fields.importes?'<td>'+eur2(totO)+'</td>':''}</tr>`:''}
      ${fields.viajes&&totViaj>0?`<tr><td>Viajes</td><td>—</td>${fields.importes?'<td>'+eur2(totViaj)+'</td>':''}</tr>`:''}
      <tr class="gran-total"><td>TOTAL${fields.importes&&totTotal>0?' GENERAL':' HORAS'}</td><td>${fh(totH)}</td>${fields.importes&&totTotal>0?'<td>'+totTotal.toFixed(2).replace('.',',')+' €</td>':''}</tr>
    </table>
  </div>
  ${fields.firma&&worker.firma?`<div style="margin-top:20px;padding-top:10px;border-top:1px solid #e2e8f0"><p style="font-size:11px;color:#64748b;margin-bottom:8px">FIRMA DEL TRABAJADOR</p><img src="${worker.firma}" style="max-height:80px;border:1px solid #e2e8f0"><p style="font-size:11px;color:#64748b;margin-top:4px">${worker.nombre||''} ${worker.apellidos||''}${worker.dni?' — DNI: '+worker.dni:''}</p></div>`:''}
  </body></html>`;

  const w=window.open('','_blank','width=900,height=700');

  const fname='TimerPro_Personalizado_'+resumenFileTag()+'.html';
