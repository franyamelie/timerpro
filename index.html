    const f1=(e.fichajes||[])[0];
    csv+=`${e.fecha},${wday(e.fecha)},${f1?.entrada||''},${f1?.salida||''},`;
    csv+=`${e.horasNormales||0},${e.importeNormales||0},${e.horasExtra||0},${e.importeExtra||0},`;
    csv+=`${e.horasNocturnas||0},${e.importeNocturnas||0},${e.horasFestivas||0},${e.importeFestivas||0},`;
    csv+=`${e.dieta||0},${e.transporte||0},"${e.notas||''}"\n`;
  });
  csv+='\nTAREAS\n';
  csv+='Fecha,Día,Título,H.Inicio,H.Fin,Sitio,Con O.T.,Código O.T.,Nº O.T.,Fotos,Descripción\n';
  tasks.forEach(t=>{
    const site=S.sites.find(s=>s.id==t.siteId);
    const wo=S.workorders.find(w=>w.id==t.workOrderId);
    csv+=`${t.fecha},${wday(t.fecha)},"${t.titulo||''}",${t.horaInicio||''},${t.horaFin||''},`;
    csv+=`"${site?.nombre||''}",${t.usaOT?'Sí':'No'},"${wo?.codigo||''}","${t.otNumero||''}",${(t.fotos||[]).length},"${t.descripcion||''}"\n`;
  });
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  dlDialog={blob,filename:`TimerPro_${today()}.csv`,type:'csv',title:'Exportar CSV'};
  S.modal='dl';rerender();
}


async function exportPDFReal(noImportes=false, entriesOverride=null, periodoLabelOverride=null, tasksOverride=null, fileTagOverride=null){
  try{
    if(!window.jspdf){showAlert('Cargando libreria PDF...','err');setTimeout(()=>exportPDFReal(noImportes,entriesOverride,periodoLabelOverride,tasksOverride,fileTagOverride),2000);return;}
    const {jsPDF}=window.jspdf;
    const entries=(entriesOverride||filterEntries()).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    const tasks=(tasksOverride!==null?tasksOverride:filterTasks()).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    if(!entries.length){showAlert('No hay jornadas que exportar','err');return;}
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const G=[22,163,74],D=[20,20,20],GR=[120,120,120],BL=[59,130,246];
    const W=210,M=14;

    function addPage(){doc.addPage();}
    function checkY(needed,y){if(y+needed>280){addPage();return 16;}return y;}

    // ── HEADER ──
    doc.setFillColor(...G);doc.rect(0,0,W,28,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(20);doc.setFont('helvetica','bold');
    doc.text('TimerPro',M,12);
    doc.setFontSize(10);doc.setFont('helvetica','normal');
    doc.text('Control Horario Laboral',M,19);
    const periodo=periodoLabelOverride||(filterMonth?MONTHS[parseInt(filterMonth.slice(5))-1]+' '+filterMonth.slice(0,4):'Periodo completo');
    doc.text(periodo,W-M,12,{align:'right'});
    doc.text(new Date().toLocaleDateString('es-ES'),W-M,19,{align:'right'});

    let y=34;

    // ── WORKER & COMPANY ──
    if(fWorker.nombre||fCompany.nombre){
      doc.setFillColor(245,255,248);doc.rect(M,y,W-2*M,fWorker.nombre&&fCompany.nombre?18:10,'F');
      doc.setTextColor(...D);
      if(fWorker.nombre){
        doc.setFont('helvetica','bold');doc.setFontSize(10);
        doc.text(fWorker.nombre+' '+fWorker.apellidos,M+3,y+6);
        doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...GR);
        const info=[fWorker.dni&&'DNI: '+fWorker.dni,fWorker.cargo,fWorker.email,fWorker.telefono].filter(Boolean).join('  ·  ');
        if(info)doc.text(info,M+3,y+11);
      }
      if(fCompany.nombre){
        const cy=fWorker.nombre?y+14:y+6;
        doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...D);
        doc.text(fCompany.nombre,M+3,cy);
        doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...GR);
        const ci=[fCompany.cif&&'CIF: '+fCompany.cif,fCompany.ciudad,fCompany.email].filter(Boolean).join('  ·  ');
        if(ci)doc.text(ci,M+3,cy+5);
      }
      y+=fWorker.nombre&&fCompany.nombre?22:14;
    }

    // ── TOTALS SUMMARY ──
    const tot=entries.reduce((a,e)=>({
      hn:a.hn+(+e.horasNormales||0),he:a.he+(+e.horasExtra||0),
      hnoc:a.hnoc+(+e.horasNocturnas||0),hf:a.hf+(+e.horasFestivas||0),
      in_:a.in_+(+e.importeNormales||0),ie:a.ie+(+e.importeExtra||0),
      inoc:a.inoc+(+e.importeNocturnas||0),if_:a.if_+(+e.importeFestivas||0),
      diet:a.diet+(+e.dieta||0)+((e.dietasExtra||[]).reduce((x,d)=>x+(+d.importe||0),0)),
      transp:a.transp+(+e.transporte||0),
      otros:a.otros+((e.otrosConceptos||[]).reduce((x,c)=>x+(+c.importe||0),0))
    }),{hn:0,he:0,hnoc:0,hf:0,in_:0,ie:0,inoc:0,if_:0,diet:0,transp:0,otros:0});
    const totalH=tot.hn+tot.he+tot.hnoc+tot.hf;
    const totalImp=tot.in_+tot.ie+tot.inoc+tot.if_;
    const totalOther=tot.diet+tot.transp+tot.otros;
    const grandTotal=totalImp+totalOther;

    doc.setFillColor(245,245,245);
    doc.rect(M,y,W-2*M,16,'F');
    doc.setDrawColor(...G);doc.rect(M,y,W-2*M,16,'S');
    doc.setTextColor(...G);doc.setFont('helvetica','bold');doc.setFontSize(8);
    doc.text('RESUMEN',M+3,y+5);
    doc.setTextColor(...D);doc.setFontSize(9);
    doc.text('Total horas: '+fmtH(totalH),M+3,y+12);
    if(!noImportes){
      doc.text('Horas: '+eur(totalImp),70,y+12);
      doc.text('Otros: '+eur(totalOther),120,y+12);
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...G);
      doc.text('TOTAL: '+eur(grandTotal),W-M,y+12,{align:'right'});
    }
    y+=20;

    // ── JORNADAS: tarjeta por día (formato Informe_TimerPro) ──
    doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...D);
    doc.text('JORNADAS ('+entries.length+')',M,y);y+=5;

    for(const e of entries){
      const f1=(e.fichajes||[])[0];
      const diet=(+e.dieta||0)+((e.dietasExtra||[]).reduce((x,d)=>x+(+d.importe||0),0));
      const impH=(+e.importeNormales||0)+(+e.importeExtra||0)+(+e.importeNocturnas||0)+(+e.importeFestivas||0);
      const totalDia=impH+diet+(+e.transporte||0)+((e.otrosConceptos||[]).reduce((x,c)=>x+(+c.importe||0),0));
      const eTasks=tasks.filter(t=>t.fecha===e.fecha);
      const notaLimpia=htmlToText(e.notas||'');

      // Estimar altura mínima de la tarjeta para decidir si cabe
      const notaLineas=notaLimpia?doc.splitTextToSize(notaLimpia,W-2*M-8).length:0;
      const alturaMin=9+6+(eTasks.length>0?6:0)+(notaLimpia?notaLineas*4.5+2:0)+4;
      y=checkY(Math.max(alturaMin,22),y);

      // Cabecera de la tarjeta (verde claro)
      doc.setFillColor(245,245,245);doc.rect(M,y,W-2*M,8,'F');
      doc.setDrawColor(...G);doc.rect(M,y,W-2*M,8,'S');
      doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(20,20,20);
      doc.text(cap(wday(e.fecha))+', '+dlbl(e.fecha),M+3,y+5.5);
      if(!noImportes&&totalDia>0){
        doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(20,20,20);
        doc.text(eur(totalDia),W-M-2,y+5.5,{align:'right'});
      }
      y+=10;

      // Fichajes
      if(f1?.entrada||f1?.salida){
        y=checkY(5,y);
        doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...GR);
        const fich=(e.fichajes||[]).filter(f=>f.entrada||f.salida).map(f=>(f.entrada||'--')+'→'+(f.salida||'--')).join('  |  ');
        doc.text('Fichajes: '+fich,M+3,y);y+=5;
      }

      // Mini-tabla de conceptos por día
      const conceptRows=[];
      if((+e.horasNormales||0)>0||!noImportes){
        conceptRows.push(['Horas normales',fmtH(+e.horasNormales||0),
          noImportes?'':(e.precioHoraNormal?e.precioHoraNormal+' €/h':'—'),
          noImportes?'':eur(e.importeNormales||0)]);
      }
      if((+e.horasExtra||0)>0){
        conceptRows.push(['Horas extra',fmtH(+e.horasExtra||0),
          noImportes?'':(e.precioHoraExtra?e.precioHoraExtra+' €/h':'—'),
          noImportes?'':eur(e.importeExtra||0)]);
      }
      if((+e.horasNocturnas||0)>0){
        conceptRows.push(['Horas nocturnas',fmtH(+e.horasNocturnas||0),'',noImportes?'':eur(e.importeNocturnas||0)]);
      }
      if((+e.horasFestivas||0)>0){
        conceptRows.push(['Horas festivas',fmtH(+e.horasFestivas||0),'',noImportes?'':eur(e.importeFestivas||0)]);
      }
      if(diet>0){
        const dLabel=(e.dietasExtra||[]).length?'Dieta + extras':'Dieta';
        conceptRows.push([dLabel,'—','—',noImportes?eur(diet):eur(diet)]);
      }
      if((+e.transporte||0)>0){
        const vt=e.tipoTransporte?(' ('+cap(e.tipoTransporte)+')'):'';
        conceptRows.push(['Transporte'+vt,'—','—',eur(e.transporte||0)]);
      }
      (e.otrosConceptos||[]).forEach(c=>{if(+c.importe>0)conceptRows.push([c.concepto,'—','—',eur(c.importe)]);});

      if(conceptRows.length>0){
        y=checkY(conceptRows.length*5+6,y);
        doc.autoTable({
          startY:y,
          head:[noImportes?['Concepto','Horas']:['Concepto','Horas','Precio','Importe']],
          body:noImportes?conceptRows.map(r=>[r[0],r[1]]):conceptRows,
          styles:{fontSize:7.5,cellPadding:1.8},
          headStyles:{fillColor:[245,245,245],textColor:[20,20,20],fontStyle:'bold',fontSize:7},
          bodyStyles:{textColor:D},
          alternateRowStyles:{fillColor:[249,249,249]},
          columnStyles:noImportes?{0:{cellWidth:100},1:{cellWidth:32}}:{0:{cellWidth:80},1:{cellWidth:22},2:{cellWidth:28},3:{cellWidth:28}},
          margin:{left:M+2,right:M+2},
          tableLineColor:G,tableLineWidth:.2
        });
        y=doc.lastAutoTable.finalY+3;
      }

      // Tareas del día
      if(eTasks.length>0){
        y=checkY(5,y);
        doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(...BL);
        const tDesc=eTasks.map(t=>(t.titulo||(t.descripcion||'').slice(0,40))+(t.otNumero?' (OT:'+t.otNumero+')':'')).join('  |  ');
        const tLines=doc.splitTextToSize('Tareas: '+tDesc,W-2*M-6);
        tLines.forEach(l=>{y=checkY(5,y);doc.text(l,M+3,y);y+=4;});
        y+=1;
      }

      // GPS (sin emoji — usa texto plano para compatibilidad con jsPDF)
      ['Entrada','Salida'].forEach(tipo=>{
        const locStr=e['ubicacion'+tipo];if(!locStr)return;
        y=checkY(5,y);
        try{
          const d=JSON.parse(locStr);
          doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...BL);
          doc.text('GPS '+tipo+': '+d.label,M+3,y);
        }catch(ex){
          doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...GR);
          doc.text('GPS '+tipo+': '+locStr,M+3,y);
        }
        y+=4.5;
      });

      // Notas
      if(notaLimpia){
        y=checkY(6,y);
        doc.setFont('helvetica','italic');doc.setFontSize(7.5);doc.setTextColor(...GR);
        const lineas=doc.splitTextToSize('Nota: '+notaLimpia,W-2*M-6);
        lineas.forEach(l=>{y=checkY(5,y);doc.text(l,M+3,y);y+=4.2;});
      }

      // Viajes
      if((e.journeys||[]).length){
        y=checkY(5,y);
        doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(...D);
        doc.text('Viajes:',M+3,y);y+=4;
        e.journeys.forEach((j,ji)=>{
          y=checkY(5,y);
          const v=S.vehicles.find(vv=>vv.id==j.vehicleId);
          const veh=v?v.nombre+' ('+v.matricula+')':j.tipoManual||'Vehiculo';
          const precio=v?v.precioPorKm:(j.precioManual||0);
          const ruta=[j.origen,j.destino].filter(Boolean).join(' > ')||'Sin ruta';
          doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(...GR);
          doc.text((ji+1)+'. '+veh+' | '+ruta+(j.km?' | '+j.km+'km':'')+' | '+eur((j.km||0)*precio),M+6,y);y+=4;
        });
      }

      y+=4; // separación entre tarjetas
    }

    // ── TAREAS (tabla resumen si las hay) ──
    if(tasks.length>0){
      y=checkY(15,y);
      doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...D);
      doc.text('TAREAS ('+tasks.length+')',M,y);y+=4;
      doc.autoTable({
        startY:y,
        head:[['Fecha','Día','Título','H.Inicio','H.Fin','Sitio','O.T.','Descripción']],
        body:tasks.map(t=>{
          const site=S.sites.find(s=>s.id==t.siteId);
          const wo=S.workorders.find(w=>w.id==t.workOrderId);
          const dur=t.horaInicio&&t.horaFin?fmtH(calcH(t.horaInicio,t.horaFin)):'—';
          return[t.fecha,cap(wday(t.fecha)),t.titulo||'—',t.horaInicio||'—',t.horaFin||'—',site?.nombre||'—',wo?.codigo||'Sin O.T.',t.descripcion||''];
        }),
        styles:{fontSize:7,cellPadding:1.5},
        headStyles:{fillColor:BL,textColor:[255,255,255],fontStyle:'bold'},
        alternateRowStyles:{fillColor:[239,246,255]},
        margin:{left:M,right:M}
      });
      y=doc.lastAutoTable.finalY+5;

      // Fotos de gastos
      const jornadasConFotos=entries.filter(e=>(e.fotosGastos||[]).length>0);
      if(jornadasConFotos.length>0&&!noImportes){
        y=checkY(15,y);
        doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...D);
        doc.text('TICKETS Y GASTOS',M,y);y+=5;
        for(const e of jornadasConFotos){
          y=checkY(12,y);doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...GR);
          doc.text(cap(wday(e.fecha))+', '+dlbl(e.fecha),M,y);y+=4;
          let fx=M;
          for(const foto of(e.fotosGastos||[])){
            if(fx+45>W-M){fx=M;y+=45;y=checkY(45,y);}
            try{doc.addImage(foto,'JPEG',fx,y,42,42);fx+=44;}catch(ex){}
          }
          y+=46;
        }
      }

      // Fotos de tareas
      const tareasConFotos=tasks.filter(t=>(t.fotos||[]).length>0);
      if(tareasConFotos.length>0){
        y=checkY(15,y);
        doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...D);
        doc.text('FOTOGRAFIAS DE TAREAS',M,y);y+=5;
        for(const t of tareasConFotos){
          y=checkY(12,y);doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...GR);
          doc.text(t.titulo||t.fecha,M,y);y+=4;
          let fx=M;
          for(const foto of(t.fotos||[])){
            if(fx+45>W-M){fx=M;y+=45;y=checkY(45,y);}
            try{doc.addImage(foto,'JPEG',fx,y,42,42);fx+=44;}catch(ex){}
          }
          y+=46;
        }
      }
    }

    // ── RESUMEN FINAL (igual que Informe_TimerPro) ──
    y=checkY(40,y);
    doc.setFillColor(220,220,220);doc.rect(M,y,W-2*M,1,'F');
    doc.setDrawColor(...G);doc.rect(M,y,W-2*M,2,'S');
    y+=5;
    doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...D);
    doc.text('RESUMEN TOTAL',M,y);y+=5;
    const resRows=[];
    if(tot.hn>0)resRows.push(['Horas normales',fmtH(tot.hn),noImportes?'':('—'),noImportes?'':eur(tot.in_)]);
    if(tot.he>0)resRows.push(['Horas extra',fmtH(tot.he),noImportes?'':(entries[0]?.precioHoraExtra?entries[0].precioHoraExtra+' €/h':'—'),noImportes?'':eur(tot.ie)]);
    if(tot.hnoc>0)resRows.push(['Horas nocturnas',fmtH(tot.hnoc),'',noImportes?'':eur(tot.inoc)]);
    if(tot.hf>0)resRows.push(['Horas festivas',fmtH(tot.hf),'',noImportes?'':eur(tot.if_)]);
    if(!noImportes&&tot.diet>0){
      const nd=entries.filter(e=>(+e.dieta||0)>0||(e.dietasExtra||[]).length>0).length;
      resRows.push(['Dietas ('+nd+' jornadas)','—','—',eur(tot.diet)]);
    }
    if(!noImportes&&tot.transp>0){
      const nt=entries.filter(e=>(+e.transporte||0)>0).length;
      resRows.push(['Transporte ('+nt+' viajes)','—','—',eur(tot.transp)]);
    }
    if(!noImportes&&tot.otros>0)resRows.push(['Otros conceptos','—','—',eur(tot.otros)]);
    if(resRows.length>0){
      doc.autoTable({
        startY:y,
        head:[noImportes?['Concepto','Horas']:['Concepto','Horas','Precio','Importe']],
        body:noImportes?resRows.map(r=>[r[0],r[1]]):resRows,
        styles:{fontSize:8,cellPadding:2},
        headStyles:{fillColor:G,textColor:[255,255,255],fontStyle:'bold'},
        alternateRowStyles:{fillColor:[248,255,250]},
        columnStyles:noImportes?{0:{cellWidth:100},1:{cellWidth:40}}:{0:{cellWidth:80},1:{cellWidth:22},2:{cellWidth:28},3:{cellWidth:28}},
        foot:noImportes?[['TOTAL HORAS',fmtH(totalH),'']]:
          [['TOTAL',fmtH(totalH),'',eur(grandTotal)]],
        footStyles:{fillColor:G,textColor:[255,255,255],fontStyle:'bold',fontSize:9},
        margin:{left:M,right:M}
      });
      y=doc.lastAutoTable.finalY+5;
    }

    // ── FOOTER ──
    const pc=doc.internal.getNumberOfPages();
    for(let i=1;i<=pc;i++){
      doc.setPage(i);
      doc.setFillColor(...G);doc.rect(0,287,W,10,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','normal');
      doc.text('TimerPro — Control Horario  |  Pagina '+i+'/'+pc,M,293);
      doc.text(new Date().toLocaleDateString('es-ES'),W-M,293,{align:'right'});
    }

    // ── SAVE/SHARE via dlDialog (siempre ofrece Guardar + Compartir) ──
    const fname='TimerPro_'+(fileTagOverride||today())+'.pdf';
    const blob=doc.output('blob');
    dlDialog={blob,filename:fname,type:'pdf',title:'Informe PDF listo'};
    S.modal='dl';rerender();
  }catch(e){
    showAlert('Error PDF: '+e.message,'err');
    console.error(e);
  }
}

async function exportExcel(noImportes=false, entriesOverride=null, periodoLabelOverride=null, fileTagOverride=null){
  try{
    if(!window.XLSX){showAlert('Cargando libreria Excel...','err');setTimeout(()=>exportExcel(noImportes,entriesOverride,periodoLabelOverride,fileTagOverride),2000);return;}
    const entries=entriesOverride||filterEntries();
    const tasks=entriesOverride?[]:filterTasks();
    if(!entries.length){showAlert('No hay jornadas que exportar','err');return;}
    const wb=XLSX.utils.book_new();
    const jorData=[['TIMERPRO - JORNADAS'],['Trabajador:',fWorker.nombre+' '+fWorker.apellidos,'','Empresa:',fCompany.nombre],['Periodo:',periodoLabelOverride||filterMonth||'Completo'],[]];
    jorData.push(noImportes
      ? ['Fecha','Dia','Entrada','Salida','H.Norm','H.Extra','H.Noct','H.Fest','Dieta','Transp','Nota']
      : ['Fecha','Dia','Entrada','Salida','H.Normales','Imp.Normales','H.Extra','Imp.Extra','H.Nocturnas','Imp.Nocturnas','H.Festivas','Imp.Festivas','Dieta','Dietas Extra','Transporte','Otros Conceptos','Nota','Ubic.Entrada','Ubic.Salida']);;
    entries.sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(e=>{
      const f1=(e.fichajes||[])[0];
      const dex=(e.dietasExtra||[]).reduce((x,d)=>x+(+d.importe||0),0);
      const otros=(e.otrosConceptos||[]).map(c=>c.concepto+': '+c.importe+'eu').join('; ');
      let le='',ls='';try{const o=JSON.parse(e.ubicacionEntrada||'{}');le=o.label||o.address||'';}catch(ex){}try{const o=JSON.parse(e.ubicacionSalida||'{}');ls=o.label||o.address||'';}catch(ex){}
      jorData.push(noImportes
        ? [e.fecha,cap(wday(e.fecha)),f1?.entrada||'',f1?.salida||'',
           +e.horasNormales||0,+e.horasExtra||0,+e.horasNocturnas||0,+e.horasFestivas||0,
           +e.dieta||0,+e.transporte||0,e.notas||'']
        : [e.fecha,cap(wday(e.fecha)),f1?.entrada||'',f1?.salida||'',+e.horasNormales||0,+e.importeNormales||0,+e.horasExtra||0,+e.importeExtra||0,+e.horasNocturnas||0,+e.importeNocturnas||0,+e.horasFestivas||0,+e.importeFestivas||0,+e.dieta||0,dex,+e.transporte||0,otros,htmlToText(e.notas||''),le,ls]);
    });
    const ws1=XLSX.utils.aoa_to_sheet(jorData);
    ws1['!cols']=[10,8,8,8,10,11,8,11,10,12,10,12,8,10,10,20,20,25,25].map(w=>({wch:w}));

function doOpen(dlg){

}
function doSave(dlg){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(dlg.blob);
  a.download=dlg.filename;
  a.click();
  S.modal=null;dlDialog=null;rerender();
}
async function doShare(dlg){
  if(!navigator.share){doSave(dlg);return;}
  try{
    const file=new File([dlg.blob],dlg.filename,{type:dlg.blob.type});
    await navigator.share({files:[file],title:'TimerPro'});
  }catch(e){if(e.name!=='AbortError')doSave(dlg);}

}

function saveFirebaseConfig(){
  const apiKey=document.getElementById('fb-apiKey')?.value.trim();
  const authDomain=document.getElementById('fb-authDomain')?.value.trim();
  const projectId=document.getElementById('fb-projectId')?.value.trim();
  if(!apiKey||!authDomain||!projectId){showAlert('Completa todos los campos','err');return;}
  fbConfig={apiKey,authDomain,projectId,storageBucket:projectId+'.appspot.com',messagingSenderId:'',appId:''};
  localStorage.setItem('fbConfig',JSON.stringify(fbConfig));
  S.modal=null; rerender();
  initFirebase().then(()=>fbSignIn()).catch(e=>showAlert('Error Firebase: '+e.message,'err'));
}

async function initFirebase(){
  if(!fbConfig)return;
  if(fbApp){return;} // already initialized
  try{
    fbApp=firebase.initializeApp(fbConfig);
    fbAuth=firebase.auth();
    fbDb=firebase.firestore();
    // Listen for auth state
    fbAuth.onAuthStateChanged(user=>{
      fbUser=user;
      if(user){ fbSyncFromCloud().catch(()=>{}); }
      rerender();
    });
  }catch(e){
    showAlert('Error iniciando Firebase: '+e.message,'err');
    throw e;
  }
}

async function fbSignIn(){
  if(!fbAuth)return;
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    await fbAuth.signInWithPopup(provider);
    showAlert('Sesión iniciada con Google ✓');
  }catch(e){
    if(e.code==='auth/popup-blocked'){
      // Try redirect on mobile
      try{ await fbAuth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()); }
      catch(e2){ showAlert('Error login: '+e2.message,'err'); }
    } else { showAlert('Error: '+e.message,'err'); }
  }
}

async function fbSignOut(){
  if(!fbAuth)return;
  await fbAuth.signOut();
  fbUser=null; S.modal=null;
  showAlert('Sesión cerrada');
  rerender();
}

async function fbSync(){
  if(!fbUser||!fbDb)return;
  syncStatus='syncing'; rerender();
  try{
    await fbSyncToCloud();
    syncStatus='ok';
    showAlert('Datos sincronizados en la nube ✓');
    rerender();
  }catch(e){
    syncStatus='err';
    showAlert('Error sync: '+e.message,'err');
    rerender();
  }
}

async function fbSyncToCloud(){
  if(!fbUser||!fbDb)return;
  const uid=fbUser.uid;
  const ref=fbDb.collection('timerpro').doc(uid);
  const data={
    entries:S.entries, tasks:S.tasks, sites:S.sites,
    workorders:S.workorders, vehicles:S.vehicles,
    worker:fWorker, company:fCompany,
    updatedAt:new Date().toISOString()
  };
  // Firestore has 1MB limit per doc — chunk if needed
  await ref.set(data);
}

async function fbSyncFromCloud(){
  if(!fbUser||!fbDb)return;
  syncStatus='syncing'; rerender();
  try{
    const uid=fbUser.uid;
    const doc=await fbDb.collection('timerpro').doc(uid).get();
    if(doc.exists){
      const d=doc.data();
      // Import to IndexedDB
      await Promise.all(Object.values(ST).map(s=>dbClear(s)));
      for(const e of(d.entries||[]))await dbPut(ST.entries,e);
      for(const t of(d.tasks||[]))await dbPut(ST.tasks,t);
      for(const s of(d.sites||[]))await dbPut(ST.sites,s);
      for(const w of(d.workorders||[]))await dbPut(ST.workorders,w);
      for(const v of(d.vehicles||[]))await dbPut(ST.vehicles,v);
      if(d.worker)fWorker={...defWorker,...d.worker};
      if(d.company)fCompany={...defCompany,...d.company};
      await loadData();
      syncStatus='ok';
      showAlert('Datos cargados desde la nube ✓');
      rerender();
    } else {
      // First time: push local data
      await fbSyncToCloud();
      syncStatus='ok'; rerender();
    }
  }catch(e){
    syncStatus='err'; rerender();
    throw e;
  }
}

// Silent auto-load on startup (doesn't ask confirmation)
async function driveAutoLoad(force){
  if(!driveUrl)return;
  const cbName='driveAutoLoad_'+Date.now();
  const script=document.createElement('script');
  let done=false;
  window[cbName]=async function(result){
    done=true;
    delete window[cbName];
    script.remove();
    if(!result||!result.ok||!result.data||!result.data.entries)return;
    const d=result.data;
    // Only load if Drive has newer data (unless forced)
    if(!force){
      const driveTime=new Date(d.exportedAt||0).getTime();
      const localTime=new Date(localStorage.getItem('lastSave')||0).getTime();
      if(driveTime<=localTime && d.entries.length<=S.entries.length)return;
    }
    // Import silently
    try{
      await Promise.all(Object.values(ST).map(s=>dbClear(s)));
      for(const e of(d.entries||[]))await dbPut(ST.entries,e);
      for(const t of(d.tasks||[]))await dbPut(ST.tasks,t);
      for(const s of(d.sites||[]))await dbPut(ST.sites,s);
      for(const w of(d.workorders||[]))await dbPut(ST.workorders,w);
      for(const v of(d.vehicles||[]))await dbPut(ST.vehicles,v);
      for(const w of(d.workers||[]))await dbPut(ST.workers,w);
      for(const c of(d.companies||[]))await dbPut(ST.companies,c);
      if(d.worker)fWorker={...defWorker,...d.worker};
      if(d.company)fCompany={...defCompany,...d.company};
      activeWorkerId=d.activeWorkerId||null;
      activeCompanyId=d.activeCompanyId||null;
      await loadData();
      syncStatus='ok';
      lastSync=new Date().toLocaleTimeString('es-ES');
      localStorage.setItem('lastSync',lastSync);
      // Keep current form data - do NOT reset fEntry
      showAlert('☁️ Datos actualizados desde Drive ('+S.entries.length+' jornadas, '+S.tasks.length+' tareas)');
      rerender();
    }catch(e){ console.error('Import error:',e); showAlert('Error importando: '+e.message,'err'); }
  };
  setTimeout(()=>{ if(!done){ delete window[cbName]; script.remove(); }},10000);
  script.src=driveUrl+'?action=load&callback='+cbName+'&t='+Date.now();
  document.body.appendChild(script);
}

// driveLinkLoad: manual load from Drive with confirmation

// ── COMPRIMIR IMAGEN PARA SYNC ────────────────────────────
function compressImage(dataUrl, maxSize=150, quality=0.6){
  return new Promise(res=>{
    if(!dataUrl){ res(''); return; }
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const ratio=Math.min(maxSize/img.width, maxSize/img.height, 1);
      canvas.width=img.width*ratio;
      canvas.height=img.height*ratio;
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      res(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>res('');
    img.src=dataUrl;
  });
}

async function buildSyncDataWithPhotos(){
  // Get base data first
  const base = buildSyncData();
  // Compress photos for sync (small enough for Drive URL limits)
  const [wFoto, wFirma, cLogo] = await Promise.all([
    compressImage(fWorker.foto, 120, 0.6),
    compressImage(fWorker.firma, 250, 0.7),
    compressImage(fCompany.logo, 120, 0.6)
  ]);
  const compWorkers = await Promise.all(workers.map(async w=>({
    ...w,
    foto: await compressImage(w.foto, 120, 0.6),
    firma: await compressImage(w.firma, 250, 0.7)
  })));
  const compCompanies = await Promise.all(companies.map(async c=>({
    ...c,
    logo: await compressImage(c.logo, 120, 0.6)
  })));
  // Override the stripped photo fields with compressed versions
  return {
    ...base,
    workers: compWorkers,
    companies: compCompanies,
    worker: {...base.worker, foto:wFoto, firma:wFirma},
    company: {...base.company, logo:cLogo}
  };
}

const GDRIVE_CLIENT_ID = '322929735993-rasn2bg5nrppq35to944f4g2tqpbo423.apps.googleusercontent.com';
const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const GDRIVE_FILE_NAME = 'TimerPro_Datos.json';
let gdriveToken = localStorage.getItem('gdrive_token') || '';
let gdriveFileId = localStorage.getItem('gdrive_file_id') || '';
let gdriveTokenExpiry = parseInt(localStorage.getItem('gdrive_token_expiry') || '0');

function gdriveTokenValid(){
  return gdriveToken && Date.now() < gdriveTokenExpiry - 60000;
}

function gdriveLogin(){
  // Save current state before redirect
  localStorage.setItem('gdrive_pending_sync', _syncInProgress?'upload':'load');
  const params = new URLSearchParams({
    client_id: GDRIVE_CLIENT_ID,
    redirect_uri: 'https://franyamelie.github.io/timerpro',
    response_type: 'token',
    scope: GDRIVE_SCOPE,
    prompt: 'select_account'
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?'+params;
}

function gdriveHandleRedirect(){
  // Check if we're returning from OAuth redirect
  const hash = window.location.hash;
  if(!hash.includes('access_token')) return false;
  const params = new URLSearchParams(hash.substring(1));
  const token = params.get('access_token');
  const expiresIn = parseInt(params.get('expires_in') || '3600');
  if(!token) return false;
  gdriveToken = token;
  gdriveTokenExpiry = Date.now() + expiresIn * 1000;
  localStorage.setItem('gdrive_token', token);
  localStorage.setItem('gdrive_token_expiry', gdriveTokenExpiry.toString());
  // Clean URL
  history.replaceState(null, '', window.location.pathname);
  return true;
}

async function gdriveEnsureToken(){
  if(!gdriveTokenValid()){
    gdriveToken = '';
    localStorage.removeItem('gdrive_token');
    gdriveLogin(); // This redirects, no return
    await new Promise(()=>{}); // Never resolves - page will redirect
  }
}

async function gdriveFindFile(){
  const r = await fetch(
    'https://www.googleapis.com/drive/v3/files?q=name%3D%22'+GDRIVE_FILE_NAME+'%22+and+trashed%3Dfalse&fields=files(id,name)',
    {headers: {'Authorization': 'Bearer '+gdriveToken}}
  );
  const d = await r.json();
  if(d.files && d.files.length > 0){
    gdriveFileId = d.files[0].id;
    localStorage.setItem('gdrive_file_id', gdriveFileId);
    return gdriveFileId;
  }
  return null;
}

async function gdriveSaveData(data){
  localStorage.setItem('gdrive_pending_sync','upload');
  await gdriveEnsureToken();
  const payload = JSON.stringify({
    entries: data.entries.map(e=>({...e, fotosGastos:[]})),
    tasks: data.tasks,
    sites: data.sites,
    workorders: data.workorders,
    vehicles: data.vehicles,
    workers: data.workers,
    companies: data.companies,
    activeWorkerId: data.activeWorkerId,
    activeCompanyId: data.activeCompanyId,
    exportedAt: new Date().toISOString()
  });
  const blob = new Blob([payload], {type:'application/json'});
  
  let fileId = gdriveFileId || await gdriveFindFile();
  
  if(fileId){
    // Update existing file
    const r = await fetch('https://www.googleapis.com/upload/drive/v3/files/'+fileId+'?uploadType=media', {
      method: 'PATCH',
      headers: {'Authorization':'Bearer '+gdriveToken, 'Content-Type':'application/json'},
      body: blob
    });
    if(!r.ok){if(r.status===401){gdriveToken='';localStorage.removeItem('gdrive_token');localStorage.removeItem('gdrive_token_expiry');gdriveLogin();await new Promise(()=>{});}throw new Error('Drive update error: '+r.status);}
  } else {
    // Create new file
    const meta = JSON.stringify({name: GDRIVE_FILE_NAME, mimeType:'application/json'});
    const form = new FormData();
    form.append('metadata', new Blob([meta], {type:'application/json'}));
    form.append('file', blob);
    const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: {'Authorization':'Bearer '+gdriveToken},
      body: form
    });
    if(!r.ok){if(r.status===401){gdriveToken='';localStorage.removeItem('gdrive_token');localStorage.removeItem('gdrive_token_expiry');gdriveLogin();await new Promise(()=>{});}throw new Error('Drive create error: '+r.status);}
    const result = await r.json();
    gdriveFileId = result.id;
    localStorage.setItem('gdrive_file_id', gdriveFileId);
  }
}

async function gdriveLoadData(){
  localStorage.setItem('gdrive_pending_sync','load');
  await gdriveEnsureToken();
  let fileId = gdriveFileId || await gdriveFindFile();
  if(!fileId) return null;
  const r = await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media', {
    headers: {'Authorization':'Bearer '+gdriveToken}
  });
  if(!r.ok){
    if(r.status===401){
      // Token expired - clear it and re-authenticate
      gdriveToken='';
      localStorage.removeItem('gdrive_token');
      localStorage.removeItem('gdrive_token_expiry');
      gdriveLogin();
      await new Promise(()=>{});
    }
    throw new Error('Drive load error: '+r.status);
  }
  return await r.json();
}

async function mergeDriveData(d){
  // Merge: keep local entries that don't exist in Drive, add Drive entries
  try{
    const localEntries = [...S.entries];
    const driveEntries = d.entries||[];

    // Merge by fecha: Drive wins for same date, keep local if not in Drive
    const merged = [];
    const driveDates = new Set(driveEntries.map(e=>e.fecha));

    // Add all Drive entries
    driveEntries.forEach(e=>merged.push(e));

    // Add local entries not in Drive
    localEntries.forEach(e=>{
      if(!driveDates.has(e.fecha)){
        merged.push(e);
      }
    });

    // Sort by date
    merged.sort((a,b)=>a.fecha.localeCompare(b.fecha));

    // Save merged data
    const mergedData = {...d, entries: merged};
    await importDriveData(mergedData, false);
    showAlert('✅ Fusionado: '+merged.length+' jornadas totales');

    // Upload merged data back to Drive
    // auto-sync disabled
  }catch(e){
    showAlert('Error fusionando: '+e.message,'err');
  }
}

// Checks GitHub for new version every time app opens
async function checkForUpdate(){
  if(Date.now() - lastActivity < 60000) return; // wait 60s inactivity before showing update
  try{
    const baseUrl = location.href.split('?')[0];
    const r = await fetch(baseUrl + '?t=' + Date.now(), {cache:'no-store'});
    if(!r.ok) return;
    const text = await r.text();
    const m = text.match(/<!-- v(\d+) -->/);
    if(m && m[1] > (localStorage.getItem('appVersion')||'0')){
      // Show update banner WITHOUT reloading automatically
      const existing = document.getElementById('update-banner');
      if(existing) return;
      // Don't spam: only show once per 30 min
      const lastBanner = parseInt(localStorage.getItem('lastUpdateBanner')||'0');
      if(Date.now()-lastBanner < 30*60*1000) return;
      localStorage.setItem('lastUpdateBanner', Date.now().toString());
      const newV = m[1];
      const banner = document.createElement('div');
      banner.id = 'update-banner';
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#22c55e;color:#000;padding:.5rem 1rem;display:flex;align-items:center;gap:.8rem;font-size:.82rem;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.3)';
      const txt = document.createElement('span');
      txt.style.flex = '1';
      txt.textContent = 'Nueva version disponible';
      const btnUpdate = document.createElement('button');
      btnUpdate.textContent = 'Actualizar';
      btnUpdate.style.cssText = 'background:#000;color:#fff;border:none;padding:.3rem .8rem;border-radius:6px;cursor:pointer;font-weight:700';
      btnUpdate.onclick = ()=>{localStorage.setItem('appVersion',newV);window.location.replace(location.href.split('?')[0]+'?v='+newV);};
      const btnLater = document.createElement('button');
      btnLater.textContent = 'Luego';
      btnLater.style.cssText = 'background:rgba(0,0,0,.2);color:#000;border:none;padding:.3rem .6rem;border-radius:6px;cursor:pointer';
      btnLater.onclick = ()=>banner.remove();
      banner.appendChild(txt);banner.appendChild(btnUpdate);banner.appendChild(btnLater);
      document.body.appendChild(banner);
    }
  }catch(e){}
}

// ── CHECK DRIVE FOR NEW DATA ─────────────────────────────
function checkDriveForNewData(){
  // Only run if user has been idle for at least 10 seconds
  if(Date.now() - lastActivity < 10000) return;
  if(!driveUrl) return;
  const cbName='chk_'+Date.now();
  const s=document.createElement('script');
  window[cbName]=function(res){
    delete window[cbName]; s.remove();
    if(!res||!res.ok||!res.data) return;
    const exportedAt = new Date(res.data.exportedAt||0).getTime();
    const lastLoaded = parseInt(localStorage.getItem('lastDriveLoad')||'0');
    const newHasNew = exportedAt > lastLoaded + 3000;
    if(newHasNew !== driveHasNew || !driveChecked){
      driveChecked = true;
      driveHasNew = newHasNew;
      // Update only badge DOM elements - never rerender full app
      requestAnimationFrame(()=>{
        document.querySelectorAll('.drive-badge').forEach((el,i)=>{
          const active = i===0 ? driveHasNew : (driveChecked&&!driveHasNew);
          const bg = i===0 ? 'var(--acc)' : 'var(--red)';
          const col = i===0 ? '#000' : '#fff';
          el.style.background = active ? bg : 'var(--surf3)';
          el.style.color = active ? col : 'var(--ink3)';
          el.style.border = '1px solid '+(active ? bg : 'var(--brd)');
          el.style.cursor = (i===0 && active) ? 'pointer' : 'default';
          const dot = el.querySelector('.badge-dot');
          if(dot) dot.style.background = active ? col : 'var(--ink3)';
        });
      });
    }
    driveChecked = true;
    driveHasNew = newHasNew;
  };
  setTimeout(()=>{delete window[cbName];s.remove();},8000);
  s.src=driveUrl+'?action=load&callback='+cbName+'&t='+Date.now();
  document.body.appendChild(s);
}

function formatTimerFull(s){
  if(!s||s<=0) return '00h 00m 00s';
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return pad(h)+'h '+pad(m)+'m '+pad(sec)+'s';
  return pad(m)+'m '+pad(sec)+'s';
}
function formatTimer(secs){
  const h=Math.floor(secs/3600);
  const m=Math.floor((secs%3600)/60);
  const s=secs%60;
  return pad(h)+':'+pad(m)+':'+pad(s);
}

function startTimer(){
  if(timerRunning) return;
  timerRunning=true;
  timerStart=Date.now()-timerElapsed*1000;
  // Persist to localStorage so survives page reload
  localStorage.setItem('timerState', JSON.stringify({
    running:true, start:timerStart, fecha:fEntry.fecha||today(), deduct:timerDeduct
  }));
  timerInterval=setInterval(()=>{
    timerElapsed=Math.floor((Date.now()-timerStart)/1000);
    updateTitle();
    let anyRunning=false;
    Object.values(fichajeTimers).forEach(ft=>{ if(ft.running) anyRunning=true; });
    if(anyRunning){
      // Don't rebuild DOM while user is typing in a fichaje time input (now type=text with id prefix)
      const active = document.activeElement;
      const typingFichaje = active && active.id && (active.id.startsWith('fich-ent-') || active.id.startsWith('fich-sal-'));
      if(!typingFichaje) rerender();
    }
  },1000);
  rerender();
}

function stopTimer(){
  if(!timerRunning) return;
  timerRunning=false;
  localStorage.setItem('timerState', JSON.stringify({running:false,start:timerStart,fecha:fEntry.fecha||today(),deduct:timerDeduct}));
  clearInterval(timerInterval);
  timerInterval=null;
  rerender();
}

function resetTimer(){
  stopTimer();
  timerElapsed=0;
  timerStart=null;
  timerEndManual='';
  rerender();
}

function finishTimer(){
  // fEntry.fichajes already up to date
  const totalSecs=timerElapsed;
  const netSecs=Math.max(0,timerElapsed-timerDeduct*60);
  const netHours=Math.round(netSecs/36)/100;
  const now=new Date();
  const manualEnd=timerEndManual||document.getElementById('timer-end-manual')?.value;
  const endTime=manualEnd||pad(now.getHours())+':'+pad(now.getMinutes());
  const startTs=timerStart+(timerDeduct*60*1000/2);
  const startDate=new Date(startTs);
  const startTime=pad(startDate.getHours())+':'+pad(startDate.getMinutes());
  stopTimer();
  // Add fichaje
  fEntry.fichajes.push({
    _fid:Date.now(),entrada:startTime,salida:endTime,
    nota:'⏱ '+formatTimerFull(totalSecs)+(timerDeduct>0?' (-'+timerDeduct+'min descanso)':''),
    editing:false,taskId:''
  });
  // Auto-fill horas normales
  if(!fEntry.horasNormales||fEntry.horasNormales===0){
    fEntry.horasNormales=netHours;
    if(fEntry.precioHoraNormal>0) fEntry.importeNormales=Math.round(netHours*fEntry.precioHoraNormal*100)/100;
  }
  localStorage.removeItem('timerState');
  resetTimer();
  showAlert('✅ '+startTime+' → '+endTime+' | Total: '+formatTimerFull(totalSecs)+' | Neto: '+fmtH(netHours));
  scheduleDraftSave();
  rerender();
}

const MAX_SNAPSHOTS = 50; // max snapshots to keep

async function createSnapshot(label=''){
  try{
    const data = {
      entries: [...S.entries],
      tasks: [...S.tasks],
      sites: [...S.sites],
      workorders: [...S.workorders],
      vehicles: [...S.vehicles],
      workers: [...workers],
      companies: [...companies],
      worker: {...fWorker},
      company: {...fCompany},
      activeWorkerId, activeCompanyId
    };
    const snap = {
      createdAt: new Date().toISOString(),
      label: label || ('Auto - '+new Date().toLocaleString('es-ES')),
      entriesCount: S.entries.length,
      tasksCount: S.tasks.length,
      data: JSON.stringify(data)
    };
    await dbPut(ST.snapshots, snap);
    // Trim old snapshots keeping only MAX_SNAPSHOTS
    const all = await dbAll(ST.snapshots);
    all.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    if(all.length > MAX_SNAPSHOTS){
      for(const old of all.slice(MAX_SNAPSHOTS)){
        await dbDel(ST.snapshots, old.id);
      }
    }
    return true;
  }catch(e){ console.error('Snapshot failed:',e); return false; }
}

async function restoreSnapshot(snap){
  try{
    const data = JSON.parse(snap.data);
    await Promise.all(Object.values(ST).filter(s=>s!=='snapshots').map(s=>dbClear(s)));
    for(const e of(data.entries||[])) await dbPut(ST.entries,e);
    for(const t of(data.tasks||[])) await dbPut(ST.tasks,t);
    for(const s of(data.sites||[])) await dbPut(ST.sites,s);
    for(const w of(data.workorders||[])) await dbPut(ST.workorders,w);
    for(const v of(data.vehicles||[])) await dbPut(ST.vehicles,v);
    for(const w of(data.workers||[])) await dbPut(ST.workers,w);
    for(const c of(data.companies||[])) await dbPut(ST.companies,c);
    if(data.worker) fWorker={...defWorker,...data.worker};
    if(data.company) fCompany={...defCompany,...data.company};
    activeWorkerId=data.activeWorkerId||null;
    activeCompanyId=data.activeCompanyId||null;
    await loadData();
    fEntry=defEntry();
    editingEntry=false;
    showAlert('Restaurado: '+snap.label);
    rerender();
  }catch(e){ showAlert('Error al restaurar: '+e.message,'err'); }
}

async function renderSnapshots(){
  const all = await dbAll(ST.snapshots);
  all.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  return all;
}

// Auto-snapshot: once per day on startup

}

      for(const w of (d.workorders||[])) await dbPut(ST.workorders, w);

let vacaciones = []; // array of 'YYYY-MM-DD' strings

function isHolidayES(dateStr){
  // Festivos nacionales España (fijos)
  const [y,m,d] = dateStr.split('-').map(Number);
  const fixed = [
    `${y}-01-01`, // Año Nuevo
    `${y}-01-06`, // Reyes
    `${y}-05-01`, // Día del Trabajo
    `${y}-08-15`, // Asunción
    `${y}-10-12`, // Fiesta Nacional
    `${y}-11-01`, // Todos los Santos
    `${y}-12-06`, // Constitución
    `${y}-12-08`, // Inmaculada
    `${y}-12-25`, // Navidad
    `${y}-12-26`, // San Esteban (Cataluña/otras)
  ];
  // Semana Santa (Viernes Santo) - aproximado
  const easter = getEasterDate(y);
  const goodFriday = new Date(easter); goodFriday.setDate(easter.getDate()-2);
  fixed.push(goodFriday.toISOString().slice(0,10));
  return fixed.includes(dateStr);
}

function getEasterDate(y){
  // Algoritmo de Meeus/Jones/Butcher
  const a=y%19,b=Math.floor(y/100),c=y%100;
  const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m2=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m2+114)/31);
  const day=((h+l-7*m2+114)%31)+1;
  return new Date(y,month-1,day);
}

          const cb='boot_'+Date.now();
          const sc=document.createElement('script');
          let done=false;
          window[cb]=async function(result){
            done=true; delete window[cb]; sc.remove();
            if(result&&result.ok&&result.data){
              // Silent boot load - MERGE, never lose local data
              const d=result.data;
              try{
                const driveTs = new Date(d.exportedAt||0).getTime();
                const localTs = parseInt(localStorage.getItem('lastDriveLoad')||'0');
                const lastSaveTs = new Date(localStorage.getItem('lastSave')||0).getTime();
                // STRICT: Skip boot load if we have ANY local entries
                // Only load from Drive if this is a fresh install (no local data)
                if(S.entries.length > 0){
                  console.log('Skipping boot load: local data exists ('+S.entries.length+' entries)');
                  // Just show notification if Drive has newer data
                  if(driveTs > localTs + 5000) driveHasNew=true;
                  syncStatus='ok'; rerender(); res(); return;
                }
                // Build local maps for merging
                const savedFoto=fWorker.foto||'', savedFirma=fWorker.firma||'', savedLogo=fCompany.logo||'';
                const localEntryMap={}; S.entries.forEach(e=>{localEntryMap[e.fecha]=e;});
                const localWorkerMap={}; workers.forEach(w=>{if(w.id)localWorkerMap[w.id]=w;});
                const localCompanyMap={}; companies.forEach(c=>{if(c.id)localCompanyMap[c.id]=c;});

                // MERGE entries: keep local if newer or not in Drive
                const driveEntryMap={};
                (d.entries||[]).forEach(e=>{driveEntryMap[e.fecha]=e;});
                // Add/update entries from Drive that don't exist locally or are newer
                for(const [fecha,de] of Object.entries(driveEntryMap)){
                  const le=localEntryMap[fecha];
                  if(!le){
                    // Drive has entry we don't have locally - add it
                    await dbPut(ST.entries,{...de,fotosGastos:de.fotosGastos||[]});
                    S.entries.push({...de});
                  } else if(!le._draft && driveTs > localTs){
                    // Drive data is newer than last load - update
                    await dbPut(ST.entries,{...de,id:le.id,fotosGastos:le.fotosGastos||de.fotosGastos||[]});
                    S.entries=S.entries.map(e=>e.fecha===fecha?{...de,id:le.id,fotosGastos:le.fotosGastos||[]}:e);
                  }
                  // If local has a draft or is newer - keep local
                }
                // Merge other collections (replace if Drive has them)
                if((d.tasks||[]).length>0){ await dbClear(ST.tasks); for(const t of d.tasks) await dbPut(ST.tasks,t); }
                if((d.sites||[]).length>0){ await dbClear(ST.sites); for(const s of d.sites) await dbPut(ST.sites,s); }

                if(d.worker&&d.worker.nombre) fWorker={...defWorker,...d.worker,foto:savedFoto,firma:d.worker.firma||savedFirma};

          sc.src=driveUrl+'?action=load&callback='+cb+'&t='+Date.now();
          document.body.appendChild(sc);

    // Load task draft if any

    // Load most recent entry on boot
    if(S.entries.length>0 && !editingEntry){

    if(savedTimer){

        const ts=JSON.parse(savedTimer);
        if(ts.running && ts.start){
          timerStart=ts.start;
          timerElapsed=Math.floor((Date.now()-ts.start)/1000);
          timerDeduct=typeof ts.deduct==='number'?ts.deduct:(fEntry.timerDeduct||0);
          fEntry.timerDeduct=timerDeduct;
          timerRunning=true;
          timerInterval=setInterval(()=>{
            timerElapsed=Math.floor((Date.now()-timerStart)/1000);
            updateTitle();
          },1000);
          showAlert('⏱ Jornada en curso desde '+new Date(ts.start).toTimeString().slice(0,5));
        }
      }catch(e){}
    }
    // Restore draft if exists for today
    const todayDraft = S.entries.find(e=>e.fecha===today()&&e._draft);
    if(todayDraft){ fEntry={...todayDraft}; editingEntry=true; timerDeduct=fEntry.timerDeduct||0; }
    if(driveUrl && syncStatus!=='ok') syncStatus='ok';
    // Auto sync: idle-based (see trackActivity above)
    // Auto backup weekly
    if(driveUrl){
      const lastBackup=localStorage.getItem('lastBackup')||'';
      const weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);
      if(!lastBackup||new Date(lastBackup)<weekAgo){
        localStorage.setItem('lastBackup',new Date().toISOString());
      }
    }
    // Load Firebase config if saved
    const savedCfg=localStorage.getItem('fbConfig');
    if(savedCfg){ try{ fbConfig=JSON.parse(savedCfg); await initFirebase(); }catch(e){} }
    await loadVacaciones();
    if(!localStorage.getItem('groq_api_key')) localStorage.setItem('groq_api_key','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');
    // Handle Google OAuth redirect
    if(gdriveHandleRedirect()){
      const pending = localStorage.getItem('gdrive_pending_sync');
      localStorage.removeItem('gdrive_pending_sync');
      renderApp(); startClock();
      setTimeout(()=>{
        if(pending==='upload') driveSync();
        else if(pending==='load') _doLoad(true,false,true);
      }, 1000);
    } else {
      renderApp(); startClock();
    }
    updateTitle();
    autoSnapshot();
    // Clean URL param on load
    if(location.search){ history.replaceState(null,'',location.pathname); }
    // Version check: on startup after 10s, then every 5 minutes
    setTimeout(checkForUpdate, 10000);
    setInterval(checkForUpdate, 5 * 60 * 1000);
    // Adaptive Drive check: 30s active, 8s inactive (>10s idle)
    lastActivity = Date.now(); // reset on startup
    let _idleSyncTimer = null;
    let _idleCheckTimer = null;
    const IDLE_MS = 90000; // 90 seconds idle before auto-sync

    function trackActivity(){
      lastActivity = Date.now();
      // Reset idle timers on any user action
      clearTimeout(_idleSyncTimer);
      clearTimeout(_idleCheckTimer);
      // Schedule auto-sync after 30s idle
      _idleSyncTimer = setTimeout(()=>{
        if(!_syncInProgress && isOnline && driveUrl){
          console.log('Auto-sync: 90s idle');
          driveSync();
        }
      }, IDLE_MS);
      // Schedule drive check after 35s idle
      _idleCheckTimer = setTimeout(()=>{
        checkDriveForNewData();
      }, IDLE_MS + 5000);
    }

    // Track all user interactions
    ['click','touchstart','keydown','scroll','input','mousedown'].forEach(ev=>
      document.addEventListener(ev, trackActivity, {passive:true})
    );
    // Start first idle timer
    // ── CONTINUOUS FORM SAVE (every 500ms) ──────────────
    // Saves ALL visible form field values to fEntry/fTask
    // regardless of events - prevents ANY data loss on tab switch
    setInterval(()=>{
      if(_isSaving) return; // don't interfere during save
      // Save notas de jornada
      const notasEl = document.getElementById('notas-editor');
      if(notasEl && notasEl.innerHTML.trim()) {
        fEntry.notas = notasEl.innerHTML;
      }
      // fichajes maintained by event handlers - no DOM polling needed
      // Save numeric inputs by data-field attribute
      document.querySelectorAll('input[data-field]').forEach(el => {
        const f = el.dataset.field;
        if(f && el.value !== '') fEntry[f] = parseFloat(el.value) || 0;
      });
      // Save task form if on tareas tab
      if(S.tab === 'tareas') {
        const taskTitle = document.querySelector('input[placeholder="Título de la tarea"]');
        if(taskTitle && taskTitle.value) fTask.titulo = taskTitle.value;
      }
    }, 500);

  } catch(e) {
    document.getElementById('app').innerHTML = '<div style="color:red;padding:20px;font-family:monospace;font-size:12px">Render error: '+e.message+'</div>';
  }
})();

// MEJORA 1: GPS - iframe OSM en vez de staticmap (ERR_NAME_NOT_RESOLVED)
function gpsDisplay(loc){
  if(!loc) return h('div',{style:{fontSize:'.75rem',color:'var(--ink3)'}},'No registrada');
  try{
    const d=JSON.parse(loc);
    const lat=parseFloat(d.lat),lng=parseFloat(d.lng);
    if(!lat||!lng) throw new Error('no coords');
    const mapsUrl='https://www.google.com/maps?q='+lat+','+lng;
    const osmBbox=(lng-0.003)+','+(lat-0.002)+','+(lng+0.003)+','+(lat+0.002);
    const osmUrl='https://www.openstreetmap.org/export/embed.html?bbox='+osmBbox+'&layer=mapnik&marker='+lat+','+lng;
    return h('div',{style:{marginTop:'.4rem'}},
      h('a',{href:mapsUrl,target:'_blank',rel:'noopener',style:{display:'block',textDecoration:'none'}},
        h('div',{style:{position:'relative',borderRadius:'var(--r)',overflow:'hidden',border:'2px solid var(--acc)',maxWidth:'300px',cursor:'pointer',boxShadow:'var(--sh)',height:'130px',backgroundColor:'#e8f4f8'}},
          h('iframe',{src:osmUrl,style:{width:'100%',height:'100%',border:'none',pointerEvents:'none'},loading:'lazy',title:'Ubicación'},null),
          h('div',{style:{position:'absolute',bottom:'0',left:'0',right:'0',background:'rgba(0,0,0,.75)',color:'#fff',padding:'.35rem .6rem',fontSize:'.72rem',display:'flex',alignItems:'center',gap:'.4rem'}},
            h('div',{style:{flex:1}},
              h('div',{style:{fontWeight:700,fontSize:'.78rem'}},d.acc?'±'+d.acc+'m de precisión':'Ubicación GPS'),
              h('div',{style:{opacity:.8,fontSize:'.68rem'}},d.label||lat.toFixed(4)+', '+lng.toFixed(4))
            ),
            h('div',{style:{background:'var(--acc)',color:'#000',padding:'.2rem .5rem',borderRadius:'20px',fontSize:'.68rem',fontWeight:700}},'Maps →')
          )
        )
      )
    );
  }catch(e){
    let label=loc,url='';
    try{const d=JSON.parse(loc);label=d.label||d.address||loc;url=d.url||'';}catch(ex){}
    if(url) return h('a',{href:url,target:'_blank',rel:'noopener',style:{fontSize:'.8rem',color:'var(--acc)',textDecoration:'none'}},label);
    return h('div',{style:{fontSize:'.75rem',color:'var(--ink2)'}},label);
  }
}

// MEJORA 2: finishTimer - actualizar fichaje abierto en vez de crear nuevo
function finishTimer(){
  const totalSecs=timerElapsed;
  const netSecs=Math.max(0,timerElapsed-timerDeduct*60);
  const netHours=Math.round(netSecs/36)/100;
  const now=new Date();
  const manualEnd=document.getElementById('timer-end-manual')?.value;
  const endTime=manualEnd||pad(now.getHours())+':'+pad(now.getMinutes());
  const startTs=timerStart+(timerDeduct*60*1000/2);
  const startDate=new Date(startTs);
  const startTime=pad(startDate.getHours())+':'+pad(startDate.getMinutes());
  stopTimer();
  const openIdx=fEntry.fichajes.findIndex(fj=>fj.entrada&&!fj.salida);
  if(openIdx>=0){
    fEntry.fichajes[openIdx].salida=endTime;
    fEntry.fichajes[openIdx].nota=(fEntry.fichajes[openIdx].nota?(fEntry.fichajes[openIdx].nota+' | '):'')+'⏱ '+formatTimerFull(totalSecs)+(timerDeduct>0?' (-'+timerDeduct+'min)':'');
  } else {
    fEntry.fichajes.push({_fid:Date.now(),entrada:startTime,salida:endTime,nota:'⏱ '+formatTimerFull(totalSecs)+(timerDeduct>0?' (-'+timerDeduct+'min descanso)':''),editing:false,taskId:''});
  }
  if(!fEntry.horasNormales||fEntry.horasNormales===0){
    fEntry.horasNormales=netHours;
    if(fEntry.precioHoraNormal>0) fEntry.importeNormales=Math.round(netHours*fEntry.precioHoraNormal*100)/100;
  }
  localStorage.removeItem('timerState');
  resetTimer();
  showAlert('✅ '+startTime+' → '+endTime+' | Total: '+formatTimerFull(totalSecs)+' | Neto: '+fmtH(netHours));
  scheduleDraftSave();
  rerender();
}

// MEJORA 3: Notificación olvido fichar (via setInterval, sin override)
function checkFichajeOlvidado(){
  if(S.tab!=='fichar') return;
  const now2=new Date(),hNow=now2.getHours()*60+now2.getMinutes();
  if(hNow<480||hNow>1380) return;
  (fEntry.fichajes||[]).forEach(fj=>{
    if(!fj.entrada||fj.salida) return;
    const [hh,mm]=fj.entrada.split(':').map(Number);
    const mins=hNow-(hh*60+mm);
    if(mins>600&&!document.getElementById('olvido-banner')){
      const b=document.createElement('div');
      b.id='olvido-banner';
      b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9998;background:#f59e0b;color:#000;padding:.55rem .9rem;display:flex;align-items:center;gap:.7rem;font-size:.8rem;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.3)';
      b.innerHTML='⚠️ Llevas '+Math.floor(mins/60)+'h '+Math.round(mins%60)+'m desde la entrada ('+fj.entrada+'). ¿Olvidaste la salida?';
      const bt=document.createElement('button');
      bt.textContent='📍 Salida ahora';
      bt.style.cssText='background:#000;color:#fff;border:none;padding:.3rem .7rem;border-radius:5px;cursor:pointer;font-weight:700;white-space:nowrap;flex-shrink:0';
      bt.onclick=()=>{
        const idx=fEntry.fichajes.findIndex(f=>f.entrada===fj.entrada&&!f.salida);
        if(idx>=0){fEntry.fichajes[idx].salida=nowTime();scheduleDraftSave();rerender();}
        b.remove();
      };
      const bc=document.createElement('button');
      bc.innerHTML='✕';
      bc.style.cssText='background:none;border:none;padding:.2rem .5rem;cursor:pointer;margin-left:auto;font-size:1rem;flex-shrink:0';
      bc.onclick=()=>b.remove();
      b.appendChild(bt);b.appendChild(bc);
      document.body.appendChild(b);
    }
  });
}
setInterval(checkFichajeOlvidado, 60000);

  const hora=nowTime();

    fEntry.fichajes.push({_fid:Date.now(),entrada:hora,salida:'',nota:'',editing:false,taskId:''});
    showAlert('✅ ENTRADA: '+hora);
  } else if(ult.entrada&&!ult.salida){
    fEntry.fichajes[fEntry.fichajes.length-1].salida=hora;
    showAlert('✅ SALIDA: '+hora+' · '+fmtH(calcH(ult.entrada,hora)));
  }
  scheduleDraftSave();rerender();
}

    h('div',{style:{flex:1}},
      h('div',{style:{fontWeight:800,fontSize:'.88rem',color:'var(--ink)'}},activo?'⏱ En jornada · Entrada '+ult.entrada:'▶ Iniciar jornada'),
      h('div',{style:{fontSize:'.71rem',color:'var(--ink2)',marginTop:'.1rem'}},activo?'Llevas '+dur+' · Toca para SALIDA':'Toca para registrar ENTRADA ahora')
    ),
    h('div',{style:{background:activo?'var(--red)':'var(--acc)',color:activo?'#fff':'#000',borderRadius:'var(--r2)',padding:'.3rem .65rem',fontWeight:800,fontSize:'.73rem',flexShrink:0,letterSpacing:'.05em'}},activo?'SALIDA':'ENTRADA')
  );

// MEJORA 5: Mini gráfica semanal
function renderMiniWeekChart(){
  const hoy=today();
  const dObj=new Date(hoy+'T12:00:00');
  const dow=dObj.getDay()===0?7:dObj.getDay();
  const lun=new Date(dObj);lun.setDate(dObj.getDate()-(dow-1));
  const dias=Array.from({length:7},(_,i)=>{
    const dd=new Date(lun);dd.setDate(lun.getDate()+i);
    const fecha=dd.toISOString().slice(0,10);
    const en=S.entries.find(e=>e.fecha===fecha);
    const h2=en?Math.round(((en.horasNormales||0)+(en.horasExtra||0)+(en.horasNocturnas||0)+(en.horasFestivas||0))*10)/10:0;
    return {fecha,h2,isHoy:fecha===hoy,isFut:fecha>hoy,dia:WSHORT[i]};
  });
  const maxH=Math.max(...dias.map(d=>d.h2),8);
  const tot=dias.reduce((s,d)=>s+d.h2,0);
  return h('div',{class:'card',style:{padding:'.5rem .6rem',marginBottom:'.45rem'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.3rem'}},
      h('span',{style:{fontSize:'.63rem',fontWeight:700,color:'var(--ink3)',textTransform:'uppercase',letterSpacing:'.05em'}},'Esta semana'),
      h('span',{style:{fontSize:'.76rem',fontWeight:800,color:'var(--acc)'}},fmtH(tot))
    ),
    h('div',{style:{display:'flex',gap:'3px',alignItems:'flex-end',height:'38px'}},
      ...dias.map(d=>h('div',{
        style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',cursor:d.isFut?'default':'pointer'},
        on:{click:()=>{if(!d.isFut){selDate=d.fecha;S.tab='calendario';rerender();}}}
      },
        h('div',{
          style:{width:'100%',height:d.h2>0?Math.max(32,Math.round((d.h2/maxH)*52))+'px':'14px',
            background:d.isHoy?'var(--acc)':d.isFut?'#333':d.h2>0?'#1a1a1a':'#222',
            borderRadius:'4px 4px 0 0',
            border:d.isHoy?'2px solid var(--acc)':'1px solid #444',
            transition:'height .3s',display:'flex',flexDirection:'column',
            alignItems:'center',justifyContent:'center',overflow:'hidden',gap:'1px'},
          },
          d.h2>0?h('span',{style:{fontSize:'.54rem',fontWeight:800,color:d.isHoy?'#000':'#fff',lineHeight:1.2}},d.h2+'h'):null,
          h('span',{style:{fontSize:'.5rem',fontWeight:500,color:d.isHoy?'#000':'#aaa',lineHeight:1.2}},
            d.fecha.slice(8)+'/'+d.fecha.slice(5,7))
        ),
        h('div',{style:{height:'2px'}})
      ))
    )
  );
}

// MEJORA 7: Búsqueda historial mejorada (sitio, importe, notas fichaje)
function _renderHistorial(){
  const q=(histSearch||'').toLowerCase().trim();
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const filtered=S.entries.filter(en=>{
    if(!q) return true;
    const f=en.fecha||'';
    const parts=f.split('-');
    const mesNombre=parts[1]?meses[parseInt(parts[1])-1]||'':'';
    const fDisplay=parts[2]+'/'+parts[1]+'/'+(parts[0]||'');
    let sitio='';
    try{sitio=(JSON.parse(en.ubicacionEntrada||'{}').label||'').toLowerCase();}catch(e){}
    const imp=((en.importeNormales||0)+(en.importeExtra||0)+(en.dieta||0)+(en.transporte||0)).toFixed(2);
    const notasFich=(en.fichajes||[]).map(fj=>(fj.nota||'').toLowerCase()).join(' ');
    return fDisplay.includes(q)||f.includes(q)||
      (parts[2]||'').includes(q)||(parts[1]||'').includes(q)||(parts[0]||'').includes(q)||
      mesNombre.includes(q)||(en.notas||'').replace(/<[^>]*>/g,'').toLowerCase().includes(q)||
      (wday(en.fecha)||'').toLowerCase().includes(q)||(en.tipoJornada||'').toLowerCase().includes(q)||
      sitio.includes(q)||imp.includes(q)||notasFich.includes(q);
  }).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const container=document.getElementById('historial-list');
  if(!container){rerender();return;}
  while(container.firstChild) container.removeChild(container.firstChild);
  if(filtered.length===0){
    const msg=document.createElement('div');
    msg.style.cssText='padding:1rem;text-align:center;color:var(--ink3);font-size:.85rem';
    msg.textContent='Sin resultados para "'+q+'"';
    container.appendChild(msg);
    return;
  }
  filtered.forEach(en=>{
    const h_=(en.horasNormales||0)+(en.horasExtra||0)+(en.horasNocturnas||0)+(en.horasFestivas||0);
    const fi=(en.fichajes||[]).length;
    const imp=(en.importeNormales||0)+(en.importeExtra||0)+(en.dieta||0)+(en.transporte||0);
    let sitio=''; try{sitio=(JSON.parse(en.ubicacionEntrada||'{}').label||'').slice(0,18);}catch(e){}
    const row=document.createElement('div');
    row.className='sum-row';
    row.style.cssText='cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:.5rem .3rem;border-bottom:1px solid var(--brd)';
    row.onclick=()=>loadHistorial(en);
    const info=document.createElement('div');
    const title=document.createElement('div');
    title.style.cssText='font-weight:700;font-size:.85rem';
    title.textContent=cap(wday(en.fecha))+', '+dlbl(en.fecha);
    const sub=document.createElement('div');
    sub.style.cssText='font-size:.72rem;color:var(--ink2)';
    sub.textContent=fmtH(h_)+' · '+fi+' fichaje'+(fi!==1?'s':'')+(imp>0?' · '+imp.toFixed(2)+'€':'')+(sitio?' · 📍'+sitio:'');
    info.appendChild(title);info.appendChild(sub);
    const btns=document.createElement('div');
    btns.style.cssText='display:flex;gap:.3rem';
    const editBtn=document.createElement('button');
    editBtn.className='btn btn-b btn-sm'; editBtn.textContent='✏️';
    editBtn.onclick=ev=>{ev.stopPropagation();loadHistorial(en);};
    const delBtn=document.createElement('button');
    delBtn.className='btn btn-r btn-sm'; delBtn.textContent='🗑';
    delBtn.onclick=ev=>{ev.stopPropagation();deleteEntry(en.id);};
    btns.appendChild(editBtn);btns.appendChild(delBtn);
    row.appendChild(info);row.appendChild(btns);
    container.appendChild(row);
  });
}
