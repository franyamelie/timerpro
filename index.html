<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <title>MediScan 3D - Pro Metrology & Piping Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        html,body{background:#05101a;min-height:100%;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#e1e7ed;overflow-x:hidden;}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .fade{animation:fadeIn .25s ease both;} @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        .spin{animation:spin .9s linear infinite;} 
        button{transition:all .15s ease;-webkit-appearance:none;border:none;} 
        button:active{transform:scale(.96);opacity:.8;}
        input,select,textarea{background:#0b2535;border:1px solid #1a3a4e;color:#fff;border-radius:6px;padding:6px 10px;font-family:'Space Mono',monospace;font-size:12px;}
        input:focus,select:focus,textarea:focus{outline:1px solid #00e5c4;border-color:#00e5c4;}
        ::-webkit-scrollbar{width:6px;height:6px;} ::-webkit-scrollbar-track{background:#05101a;} ::-webkit-scrollbar-thumb{background:#102e44;border-radius:4px;}
        
        .app-container{max-width:1400px;margin:0 auto;padding:15px;display:flex;flex-direction:column;gap:15px;min-height:100vh;}
        .grid-layout{display:grid;grid-template-columns:1fr;gap:15px;}
        @media(min-width:950px){.grid-layout{grid-template-columns:1.2fr 1fr;}}
        
        .interactive-canvas{position:relative;width:100%;background:#02080f;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;border:1px solid #102e44;user-select:none;}
        .canvas-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
        .node-handle{pointer-events:auto;cursor:move;fill:#fff;stroke-width:2.5;transition:r 0.1s;}
        .node-handle:hover{r:8px;}
        .overlay-ui{position:absolute;bottom:10px;right:10px;background:rgba(5,16,26,0.85);padding:6px;border-radius:6px;border:1px solid #1a3a4e;display:flex;gap:5px;z-index:20;}
        
        .proj-card{background:#0b2535;border:1px solid #1a3a4e;border-radius:8px;padding:15px;display:flex;flex-direction:column;gap:10px;transition:border-color .2s;}
        .proj-card:hover{border-color:#00e5c4;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const {useState,useRef,useEffect,useCallback}=React;

    const GAPI="https://api.groq.com/openai/v1/chat/completions";
    const GMOD="meta-llama/llama-4-scout-17b-16e-instruct";
    
    const getKey=()=>localStorage.getItem("ms3_k")||"";
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
    const uid=()=>`_geo_${Math.random().toString(36).slice(2,9)}`;
    const getToday=()=>new Date().toLocaleDateString('es-ES',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

    const COLS=["#00e5c4","#ff4466","#44aaff","#ffaa22","#aa66ff","#ffffff"];
    const TOOLS=[
      {id:"sel",  icon:"↖", tip:"Mover / Editar"},
      {id:"calib",icon:"⚖", tip:"Calibrar Escala", npts:2},
      {id:"line", icon:"━━", tip:"Cota de Línea", npts:2},
      {id:"arrow",icon:"➔", tip:"Flecha de Nota", npts:2},
      {id:"rect", icon:"▭", tip:"Zona Rectángulo", npts:2},
      {id:"circle",icon:"◯",tip:"Zona Círculo", npts:2},
      {id:"pt",   icon:"⬤", tip:"Marcador Punto", npts:1}
    ];

    const S3=0.001;
    const dirMap={H:[1,0,0],V:[0,1,0],Z:[0,0,1],"-H":[-1,0,0],"-V":[0,-1,0],"-Z":[0,0,-1],X:[1,0,0],Y:[0,1,0],"-X":[-1,0,0],"-Y":[0,-1,0]};

    // Estructurador analítico de puntos en espacio 3D para tuberías
    function getPipeWaypoints(comps){
      const pts=[]; const meta=[]; let pos=new THREE.Vector3(0,0,0); let dir=new THREE.Vector3(1,0,0); pts.push(pos.clone());
      for(const c of (comps||[])){
        if(c.orientation && dirMap[c.orientation]) dir=new THREE.Vector3(...dirMap[c.orientation]);
        const dn=c.dn||100, r=dn*S3*0.5;
        if(["pipe","tube","spool"].includes(c.type)){
          const len=(c.length||1000)*S3; const end=pos.clone().addScaledVector(dir,len);
          meta.push({...c,_r:r,_start:pos.clone(),_end:end.clone(),_type:"pipe"});
          pts.push(end.clone()); pos=end;
        } else if(["elbow","bend"].includes(c.type)){
          let nDir=c.to_orientation&&dirMap[c.to_orientation]?new THREE.Vector3(...dirMap[c.to_orientation]):new THREE.Vector3(0,1,0);
          const bR=Math.max(r*2.5,.04); pos=pos.clone().addScaledVector(dir,bR); pts.push(pos.clone());
          const mid=pos.clone().addScaledVector(dir.clone().add(nDir).normalize(),bR); pts.push(mid.clone());
          pos=pos.clone().addScaledVector(nDir,bR); pts.push(pos.clone()); dir=nDir.clone();
          meta.push({...c,_r:r,_pos:pos.clone(),_type:"elbow"});
        } else if(["valve","flange"].includes(c.type)){
          const vl=c.type==="valve"?Math.max(r*5,.1):r*0.4;
          meta.push({...c,_r:r,_pos:pos.clone(),_dir:dir.clone(),_len:vl,_type:c.type});
          pos=pos.clone().addScaledVector(dir,vl); pts.push(pos.clone());
        }
      }
      return {pts,meta};
    }

    /* ── MOTOR VISTA 2D TIPO AUTOCAD ── */
    function V2DAutoCAD({components, pipeDN}){
      const canvasRef=useRef(null);
      useEffect(()=>{
        const canvas=canvasRef.current; if(!canvas)return;
        const ctx=canvas.getContext("2d"); const W=canvas.width=canvas.parentElement.clientWidth; const H=canvas.height=260;
        ctx.fillStyle="#02080f"; ctx.fillRect(0,0,W,H);
        ctx.strokeStyle="#0d1f30"; ctx.lineWidth=0.5;
        for(let x=0; x<W; x+=20){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
        for(let y=0; y<H; y+=20){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
        ctx.strokeStyle="#1a3a4e"; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(30, H-30); ctx.lineTo(W-30, H-30); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(30, 30); ctx.lineTo(30, H-30); ctx.stroke();

        if(!components||components.length===0) return;
        let cx=80, cy=H/2; ctx.lineWidth=2;
        components.forEach((c, idx)=>{
          ctx.strokeStyle=idx%2===0?"#00ff00":"#00e5c4";
          let len=c.length ? clamp(c.length/15, 40, 150) : 40; let oldX=cx, oldY=cy;
          if(c.orientation==="H"||c.orientation==="X") cx+=len;
          else if(c.orientation==="-H"||c.orientation==="-X") cx-=len;
          else if(c.orientation==="V"||c.orientation==="Y") cy-=len;
          else if(c.orientation==="-V"||c.orientation==="-Y") cy+=len;
          else { cx+=len*0.7; cy-=len*0.4; }
          ctx.beginPath(); ctx.setLineDash([6, 3, 1, 3]); ctx.moveTo(oldX, oldY); ctx.lineTo(cx, cy); ctx.stroke();
          ctx.setLineDash([]); ctx.strokeStyle="#00aaff"; ctx.lineWidth=c.dn ? clamp(c.dn/25, 4, 16) : 6;
          ctx.beginPath(); ctx.moveTo(oldX, oldY); ctx.lineTo(cx, cy); ctx.stroke();
          if(c.type==="valve"){ ctx.fillStyle="#ffaa22"; ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI*2); ctx.fill(); }
          else if(c.type==="flange"){ ctx.fillStyle="#ff4466"; ctx.fillRect(cx-3, cy-7, 6, 14); }
          ctx.fillStyle="#ffffff"; ctx.font="9px 'Space Mono', monospace";
          if(c.length) ctx.fillText(`${c.length}mm`, (oldX+cx)/2, ((oldY+cy)/2)-8);
        });
        ctx.fillStyle="rgba(0, 229, 196, 0.06)"; ctx.fillRect(0, H-22, W, 22);
        ctx.fillStyle="#00e5c4"; ctx.font="9px 'Space Mono', monospace";
        ctx.fillText("VISTA INDUSTRIAL ALINEADA 2D (CAPAS AUTOCAD CO-ORDINATES)", 15, H-8);
      },[components, pipeDN]);
      return <canvas ref={canvasRef} style={{width:"100%", display:"block", borderRadius:"6px", border:"1px solid #102e44"}}/>;
    }

    /* ── MOTOR VISOR 3D TIPO 3DS MAX ── */
    function V3DStudio({components, pipeDN, pipeLabel}){
      const el=useRef(null);
      useEffect(()=>{
        if(!el.current)return; const E=el.current, W=E.clientWidth, H=E.clientHeight||280;
        const rdr=new THREE.WebGLRenderer({antialias:true}); rdr.setSize(W,H);
        rdr.shadowMap.enabled=true; rdr.toneMapping=THREE.ACESFilmicToneMapping; rdr.toneMappingExposure=1.2;
        E.appendChild(rdr.domElement);
        const scene=new THREE.Scene(); scene.background=new THREE.Color(0x11161b); scene.fog=new THREE.Fog(0x11161b,15,35);
        const mPipe=new THREE.MeshStandardMaterial({color:0x50687d, metalness:0.95, roughness:0.18});
        const mFlange=new THREE.MeshStandardMaterial({color:0x7a94a6, metalness:0.9, roughness:0.2});
        const mValve=new THREE.MeshStandardMaterial({color:0xcc3322, metalness:0.5, roughness:0.3});
        const cam=new THREE.PerspectiveCamera(38, W/H, .05, 50); cam.position.set(4, 3.5, 5);
        scene.add(new THREE.AmbientLight(0x223344, 0.9));
        const keyLight=new THREE.DirectionalLight(0xfff5ea, 2.2); keyLight.position.set(8, 12, 8); keyLight.castShadow=true; scene.add(keyLight);
        const floor=new THREE.Mesh(new THREE.PlaneGeometry(40,40), new THREE.MeshStandardMaterial({color:0x0b1015, roughness:0.6}));
        floor.rotation.x=-Math.PI/2; floor.position.y=-0.2; floor.receiveShadow=true; scene.add(floor);
        const grid=new THREE.GridHelper(40, 40, 0x00e5c4, 0x1f2d3a); grid.position.y=-0.19; scene.add(grid);

        const defComps=components&&components.length>0 ? components : [{type:"pipe", dn:100, length:1200, orientation:"H"}];
        const {pts, meta}=getPipeWaypoints(defComps);
        if(pts.length>1){
          const curve=new THREE.CatmullRomCurve3(pts.filter((p,i)=>i===0||p.distanceTo(pts[i-1])>.001), false);
          const baseR=(pipeDN||100)*S3*0.5;
          const tubes=new THREE.TubeGeometry(curve, 64, baseR, 20, false);
          const mt=new THREE.Mesh(tubes, mPipe); mt.castShadow=true; mt.receiveShadow=true; scene.add(mt);
        }
        meta.forEach(s=>{
          if(s._type==="flange"){
            const mf=new THREE.Mesh(new THREE.CylinderGeometry(s._r*1.4, s._r*1.4, s._r*0.3, 20), mFlange); mf.position.copy(s._pos); scene.add(mf);
          } else if(s._type==="valve"){
            const mv=new THREE.Mesh(new THREE.SphereGeometry(s._r*1.4, 16, 16), mValve); mv.position.copy(s._pos); scene.add(mv);
          }
        });
        const box=new THREE.Box3().setFromObject(scene); const center=box.getCenter(new THREE.Vector3());
        cam.lookAt(center);
        const pivot=new THREE.Group(); pivot.position.copy(center);
        scene.children.filter(c=>c!==floor && c!==grid && !c.isLight).forEach(c=>{scene.remove(c); c.position.sub(center); pivot.add(c);});
        scene.add(pivot);

        let id, ang=0;
        const anim=()=>{id=requestAnimationFrame(anim); ang+=0.004; pivot.rotation.y=ang; rdr.render(scene,cam);};
        anim();
        return()=>{ cancelAnimationFrame(id); rdr.dispose(); if(E.contains(rdr.domElement)) E.removeChild(rdr.domElement); };
      },[components, pipeDN]);
      return (
        <div style={{width:"100%", background:"#11161b", borderRadius:"8px", border:"1px solid #1a3a4e", overflow:"hidden"}}>
          <div ref={el} style={{width:"100%", height:"280px"}}/>
          {pipeLabel&&<div style={{padding:"6px 12px", fontSize:"10px", color:"#00e5c4", fontFamily:"'Space Mono',monospace", background:"rgba(0,0,0,0.3)"}}>{pipeLabel}</div>}
        </div>
      );
    }

    /* ── APLICACIÓN PRINCIPAL CON BASE DE DATOS LOCAL ── */
    function App(){
      const containerRef=useRef(null); const uploadRef=useRef(null); const captureRef=useRef(null);
      
      const [scr,setScr]=useState(()=>getKey()?"dashboard":"setup");
      const [keyIn,setKeyIn]=useState(getKey());
      const [projects,setProjects]=useState(()=>{ try{return JSON.parse(localStorage.getItem("ms3_projs"))||[];}catch{return[];} });
      
      const [activeProjId,setActiveProjId]=useState(null);
      const [projName,setProjName]=useState("");
      const [image,setImage]=useState(null);
      const [rot,setRot]=useState(0);
      const [tool,setTool]=useState("sel");
      const [anns,setAnns]=useState([]);
      const [pending,setPending]=useState([]);
      const [selId,setSelId]=useState(null);
      const [scale,setScale]=useState(null);
      const [calibDlg,setCalibDlg]=useState(null);
      const [calibVal,setCalibVal]=useState("");
      const [viewTab,setViewTab]=useState("autocad2d");
      const [piping,setPiping]=useState(null);
      const [objInfo,setObjInfo]=useState(null);

      useEffect(() => { localStorage.setItem("ms3_projs", JSON.stringify(projects)); }, [projects]);

      const saveKey=()=>{ localStorage.setItem("ms3_k",keyIn.trim()); setScr("dashboard"); };

      const createNewProject=img=>{
        const newId=`proj_${Date.now()}`;
        const newProj={
          id:newId, name:`Proyecto Calderería · ${projects.length+1}`, date:getToday(), image:img, rot:0, anns:[], scale:null,
          piping:null, objInfo:null
        };
        setProjects(p=>[newProj,...p]); loadProject(newProj);
      };

      const loadProject=proj=>{
        setActiveProjId(proj.id); setProjName(proj.name); setImage(proj.image); setRot(proj.rot||0); setAnns(proj.anns||[]);
        setScale(proj.scale||null); setPiping(proj.piping||null); setObjInfo(proj.objInfo||null);
        setSelId(null); setPending([]); setTool("sel");
        if(proj.piping) { setScr("editor"); setViewTab("autocad2d"); } 
        else { setScr("loading"); identifyImage(proj.image, proj.id); }
      };

      const updateActiveProjectData=(fields)=>{
        if(!activeProjId)return;
        setProjects(prev=>prev.map(p=>p.id===activeProjId ? {...p, ...fields, date:getToday()} : p));
      };

      const syncAnnsAndScale=(newAnns, newScale)=>{
        setAnns(newAnns); setScale(newScale);
        updateActiveProjectData({anns:newAnns, scale:newScale});
      };

      const deleteProject=(id,e)=>{
        e.stopPropagation(); if(confirm("¿Seguro que deseas eliminar este plano guardado?")) setProjects(p=>p.filter(x=>x.id!==id));
      };

      const identifyImage=async(img, projId)=>{
        const b64=img.split(",")[1];
        const prompt=`Analiza este plano o pieza de calderería. Devuelve únicamente un objeto JSON limpio:
{"type":"piping","name":"Línea de Tubería","dn":100,"components":[{"id":"1","type":"pipe","length":1000,"orientation":"H"},{"id":"2","type":"elbow","to_orientation":"V"},{"id":"3","type":"pipe","length":800,"orientation":"V"}]}`;
        try{
          const res=await fetch(GAPI,{
            method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${getKey()}`},
            body:JSON.stringify({model:GMOD,messages:[{role:"user",content:[{type:"image_url",image_url:{url:`data:image/jpeg;base64,${b64}`}},{type:"text",text:prompt}]}]})
          });
          const d=await res.json(); const info=JSON.parse(d.choices[0].message.content.replace(/```json|```/g,"").trim());
          setPiping({components:info.components, dn:info.dn||100, label:`${info.name} · DN${info.dn}`});
          setObjInfo({name:info.name, desc:"Interpretado por red neuronal e ingeniería inversa."});
          setProjects(prev=>prev.map(p=>p.id===projId?{...p, piping:{components:info.components, dn:info.dn, label:`${info.name} · DN${info.dn}`}, objInfo:{name:info.name, desc:"Interpretado por red neuronal e ingeniería inversa."}}:p));
        }catch(eInput){
          const defP={components:[{type:"flange",dn:80,orientation:"H"},{type:"pipe",dn:80,length:1000,orientation:"H"},{type:"elbow",dn:80,to_orientation:"V"},{type:"pipe",dn:80,length:1200,orientation:"V"}],dn:80,label:"Tramo Estándar Calibrado"};
          setPiping(defP); setObjInfo({name:"Plano Mecánico", desc:"Interpretación por geometría local alternat."});
        } finally { setScr("editor"); }
      };

      const handleCanvasClick=e=>{
        if(tool==="sel")return; const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return;
        let nx=(e.clientX-rect.left)/rect.width, ny=(e.clientY-rect.top)/rect.height;
        nx=clamp(nx,0,1); ny=clamp(ny,0,1);
        const td=TOOLS.find(t=>t.id===tool); if(!td)return;
        const pts=[...pending,{x:nx,y:ny}];

        if(pts.length >= (td.npts||1)){
          const id=uid(); const col=COLS[anns.length%COLS.length];
          if(tool==="calib"){
            setCalibDlg({p1:pts[0],p2:pts[1],id});
            const nA=[...anns,{id, type:tool, label:"Escala de calibración", color:"#00e5c4", points:pts, value:null}];
            syncAnnsAndScale(nA, scale); setSelId(id); setPending([]); return;
          }
          const nA=[...anns,{id, type:tool, label:`Cota Metrológica ${anns.length+1}`, color:col, points:pts, value:null, text:""}];
          syncAnnsAndScale(nA, scale); setSelId(id); setPending([]); setTool("sel");
        } else setPending(pts);
      };

      const dragNode=(e,annId,ptIdx)=>{
        e.preventDefault(); e.stopPropagation(); setSelId(annId);
        const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return;
        const mm=ev=>{
          const cx=ev.clientX??ev.touches?.[0]?.clientX??0, cy=ev.clientY??ev.touches?.[0]?.clientY??0;
          const nx=clamp((cx-rect.left)/rect.width,0,1), ny=clamp((cy-rect.top)/rect.height,0,1);
          const nextA=anns.map(a=>{
            if(a.id!==annId)return a; const p=[...a.points]; p[ptIdx]={x:nx,y:ny}; return {...a,points:p};
          });
          setAnns(nextA);
        };
        const mu=()=>{ window.removeEventListener("mousemove",mm); window.removeEventListener("mouseup",mu); updateActiveProjectData({anns}); };
        window.addEventListener("mousemove",mm); window.addEventListener("mouseup",mu);
      };

      const getMeasureStr=ann=>{
        if(ann.type==="pt") return ann.text||"Marcador";
        if(ann.value!=null) return `${ann.value} mm`; if(!scale) return "Regla s/e";
        const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return "";
        const dx=(ann.points[1].x-ann.points[0].x)*rect.width, dy=(ann.points[1].y-ann.points[0].y)*rect.height;
        return `${(Math.sqrt(dx*dx+dy*dy)/scale.ppu).toFixed(1)} mm`;
      };

      const saveCalibration=()=>{
        const v=parseFloat(calibVal); if(!v||v<=0||!calibDlg)return;
        const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return;
        const dx=(calibDlg.p2.x-calibDlg.p1.x)*rect.width, dy=(calibDlg.p2.y-calibDlg.p1.y)*rect.height;
        const ppu=Math.sqrt(dx*dx+dy*dy)/v; const nScale={ppu, val:v};
        const nA=anns.map(a=>a.id===calibDlg.id?{...a, value:v, label:`⚖ ESCALADO: ${v}mm`}:a);
        setScale(nScale); setAnns(nA); updateActiveProjectData({scale:nScale, anns:nA});
        setCalibDlg(null); setCalibVal("");
      };

      const exportPDF=async()=>{
        const el=captureRef.current; if(!el)return;
        const cv=await html2canvas(el,{useCORS:true, scale:2});
        const doc=new window.jspdf.jsPDF("p","mm","a4"); const w=doc.internal.pageSize.getWidth();
        doc.addImage(cv.toDataURL("image/png"),"PNG",0,0,w,(cv.height*w)/cv.width);
        doc.save(`Ficha_Metrologia_${projName.replace(/\s+/g,'_')}.pdf`);
      };

      return (
        <div className="app-container">
          <header style={{display:"flex", alignItems:"center", borderBottom:"1px solid #102e44", paddingBottom:"12px"}}>
            <h1 style={{fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:"20px", color:"#fff", cursor:"pointer"}} onClick={()=>setScr("dashboard")}>MEDISCAN <span style={{color:"#00e5c4"}}>PRO WORKSTATION</span></h1>
            <div style={{marginLeft:"auto", display:"flex", gap:"8px"}}>
              <button onClick={()=>setScr("setup")} style={{background:"#0b2535", color:"#00e5c4", padding:"6px 12px", borderRadius:"6px", fontSize:"12px", fontFamily:"'Space Mono',monospace"}}>⚙ CREDENCIALES</button>
              {scr==="editor"&&<button onClick={()=>setScr("dashboard")} style={{background:"#ff4466", color:"#fff", padding:"6px 12px", borderRadius:"6px", fontSize:"12px", fontWeight:"bold"}}>SALIR AL MENÚ</button>}
            </div>
          </header>

          {scr==="setup" && <div className="fade" style={{maxWidth:"400px", margin:"50px auto", background:"#0b2535", padding:"25px", borderRadius:"12px", border:"1px solid #1a3a4e"}}>
            <h3 style={{fontFamily:"'Syne',sans-serif", marginBottom:"15px"}}>Fijar Credenciales IA</h3>
            <input type="password" style={{width:"100%", marginBottom:"15px"}} value={keyIn} onChange={e=>setKeyIn(e.target.value)} placeholder="Groq API Key"/>
            <button onClick={saveKey} style={{width:"100%", background:"#00e5c4", color:"#05101a", padding:"10px", borderRadius:"6px", fontWeight:700}}>GUARDAR CONFIGURACIÓN</button>
          </div>}

          {scr==="dashboard" && <div className="fade">
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"20px"}}>
              <div>
                <h2 style={{fontFamily:"'Syne',sans-serif", fontSize:"22px"}}>Estación de Ingeniería & Calderería</h2>
                <p style={{color:"#6b8fa4", fontSize:"12px"}}>Gestiona, edita y cubica tus líneas de tuberías y planos isométricos guardados.</p>
              </div>
              <button onClick={()=>uploadRef.current?.click()} style={{background:"#00e5c4", color:"#05101a", padding:"12px 20px", borderRadius:"6px", fontWeight:700, cursor:"pointer"}}>NUEVO DIGITALIZADO</button>
              <input ref={uploadRef} type="file" accept="image/*" style={{display:"none"} } onChange={e=>{const f=e.target.files?.[0]; if(f){const r=new FileReader(); r.onload=ev=>createNewProject(ev.target.result); r.readAsDataURL(f);}}}/>
            </div>

            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))", gap:"15px"}}>
              {projects.map(p=>(
                <div key={p.id} className="proj-card" style={{cursor:"pointer"}} onClick={()=>loadProject(p)}>
                  <div style={{width:"100%", height:"120px", background:"#02080f", borderRadius:"6px", overflow:"hidden", display:"flex", alignItems:"center", justifyContent:"center"}}>
                    <img src={p.image} style={{width:"100%", height:"100%", objectFit:"cover", transform:`rotate(${p.rot||0}deg)`}}/>
                  </div>
                  <div style={{display:"flex", flexDirection:"column"}}>
                    <input type="text" value={p.name} onClick={e=>e.stopPropagation()} onChange={e=>{const n=e.target.value; setProjects(prev=>prev.map(x=>x.id===p.id?{...x,name:n}:x));}} style={{background:"transparent", border:"none", padding:0, fontSize:"14px", fontWeight:"bold", color:"#fff", marginBottom:"4px"}}/>
                    <span style={{fontSize:"10px", color:"#00e5c4", fontFamily:"'Space Mono',monospace"}}>{p.date}</span>
                  </div>
                  <button onClick={(e)=>deleteProject(p.id,e)} style={{background:"rgba(255,68,102,0.1)", color:"#ff4466", fontSize:"11px", padding:"6px", borderRadius:"4px", marginTop:"5px", textAlign:"center"}}>Eliminar Archivo</button>
                </div>
              ))}
              {projects.length===0 && <div style={{gridColumn:"1/-1", textAlign:"center", padding:"40px", color:"#6b8fa4", border:"1px dashed #1a3a4e", borderRadius:"8px"}}>No hay planos guardados en esta estación. Sube una foto para empezar.</div>}
            </div>
          </div>}

          {scr==="loading" && <div style={{textAlign:"center", padding:"60px"}}>
            <div className="spin" style={{width:"30px", height:"30px", border:"3px solid #102e44", borderTopColor:"#00e5c4", borderRadius:"50%", margin:"0 auto 15px"}}/>
            <p style={{fontFamily:"'Space Mono',monospace", color:"#00e5c4", fontSize:"12px"}}>RESOLVIENDO TRIGONOMETRÍA E ISOMÉTRICAS MEDIANTE IA TRIDIMENSIONAL...</p>
          </div>}

          {scr==="editor" && <div className="fade grid-layout" ref={captureRef} style={{background:"#05101a", padding:"5px"}}>
            {/* COMPONENTE IZQUIERDO: MESA GRÁFICA INTERACTIVA DE DIBUJO */}
            <div style={{display:"flex", flexDirection:"column", gap:"10px"}}>
              <div style={{display:"flex", flexWrap:"wrap", gap:"4px", background:"#030d17", padding:"6px", borderRadius:"8px", border:"1px solid #102e44"}}>
                {TOOLS.map(t=>(
                  <button key={t.id} onClick={()=>{setTool(t.id); setPending([]);}} style={{background:tool===t.id?"#00e5c4":"transparent", color:tool===t.id?"#05101a":"#6b8fa4", padding:"6px 12px", borderRadius:"4px", fontSize:"11px", fontWeight:"bold"}}>
                    {t.icon} {t.tip}
                  </button>
                ))}
                <div style={{width:"1px", background:"#1a3a4e", margin:"0 4px"}}/>
                <button onClick={()=>{const nr=(rot+90)%360; setRot(nr); updateActiveProjectData({rot:nr});}} style={{background:"#112a3a", color:"#fff", padding:"6px 10px", borderRadius:"4px", fontSize:"11px"}}>↻ Rotar 90°</button>
              </div>

              <div className="interactive-canvas" ref={containerRef} onClick={handleCanvasClick}>
                <div style={{transform:`rotate(${rot}deg)`, width:"100%", display:"flex", alignItems:"center", justifyContent:"center", transition:"transform 0.2s"}}>
                  <img src={image} style={{width:"100%", maxHeight:"62vh", objectFit:"contain", display:"block"}} alt="plano"/>
                </div>
                
                <svg className="canvas-svg">
                  {anns.map(a=>{
                    if(!a.points||a.points.length===0)return null;
                    const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return null;
                    const x1=a.points[0].x*rect.width, y1=a.points[0].y*rect.height;
                    const isSel=a.id===selId;
                    
                    return (
                      <g key={a.id} style={{pointerEvents:"auto"}}>
                        {/* PUNTOS / MARCADORES */}
                        {a.type==="pt" && (
                          <g>
                            <circle cx={x1} cy={y1} r={isSel?8:6} fill={a.color} className="node-handle" onMouseDown={e=>dragNode(e,a.id,0)}/>
                            <text x={x1+10} y={y1+4} fill={a.color} style={{fontFamily:"'Space Mono',monospace", fontSize:"11px", fontWeight:"bold", paintOrder:"stroke", stroke:"#000", strokeWidth:2}}>{a.text||"Punto"}</text>
                          </g>
                        )}
                        
                        {/* LÍNEAS / COTAS / CALIBRACIONES */}
                        {(a.type==="line" || a.type==="calib" || a.type==="arrow") && a.points[1] && (
                          <g>
                            <line x1={x1} y1={y1} x2={a.points[1].x*rect.width} y2={a.points[1].y*rect.height} stroke={a.color} strokeWidth={isSel?3:2} strokeDasharray={a.type==="calib"?"4 3":""}/>
                            <circle cx={x1} cy={y1} r="5" className="node-handle" onMouseDown={e=>dragNode(e,a.id,0)}/>
                            <circle cx={a.points[1].x*rect.width} cy={a.points[1].y*rect.height} r="5" className="node-handle" onMouseDown={e=>dragNode(e,a.id,1)}/>
                            <text x={(x1+a.points[1].x*rect.width)/2} y={(y1+a.points[1].y*rect.height)/2-8} fill={a.color} style={{fontFamily:"'Space Mono',monospace", fontSize:"11px", fontWeight:"700", paintOrder:"stroke", stroke:"#000", strokeWidth:3}} textAnchor="middle">
                              {a.type==="arrow" ? a.text||"Nota" : getMeasureStr(a)}
                            </text>
                          </g>
                        )}

                        {/* RECTÁNGULOS DE ÁREA */}
                        {a.type==="rect" && a.points[1] && (
                          <g>
                            <rect x={Math.min(x1,a.points[1].x*rect.width)} y={Math.min(y1,a.points[1].y*rect.height)} width={Math.abs(a.points[1].x*rect.width - x1)} height={Math.abs(a.points[1].y*rect.height - y1)} fill="rgba(0,229,196,0.08)" stroke={a.color} strokeWidth={isSel?2.5:1.5}/>
                            <circle cx={x1} cy={y1} r="5" className="node-handle" onMouseDown={e=>dragNode(e,a.id,0)}/>
                            <circle cx={a.points[1].x*rect.width} cy={a.points[1].y*rect.height} r="5" className="node-handle" onMouseDown={e=>dragNode(e,a.id,1)}/>
                            <text x={Math.min(x1,a.points[1].x*rect.width)+6} y={Math.min(y1,a.points[1].y*rect.height)+15} fill={a.color} style={{fontFamily:"'Space Mono',monospace", fontSize:"10px", fontWeight:"bold"}}>
                              {a.text||"Área Z"} ({getMeasureStr(a)})
                            </text>
                          </g>
                        )}

                        {/* CÍRCULOS PERIMETRALES */}
                        {a.type==="circle" && a.points[1] && (
                          <g>
                            {(() => {
                              const rX=a.points[1].x*rect.width, rY=a.points[1].y*rect.height;
                              const rd=Math.sqrt((rX-x1)**2 + (rY-y1)**2);
                              return (
                                <>
                                  <circle cx={x1} cy={y1} r={rd} fill="rgba(68,170,255,0.05)" stroke={a.color} strokeWidth={isSel?2.5:1.5}/>
                                  <circle cx={x1} cy={y1} r="4" className="node-handle" onMouseDown={e=>dragNode(e,a.id,0)}/>
                                  <circle cx={rX} cy={rY} r="5" className="node-handle" onMouseDown={e=>dragNode(e,a.id,1)}/>
                                  <text x={x1} y={y1-rd-5} fill={a.color} style={{fontFamily:"'Space Mono',monospace", fontSize:"10px", fontWeight:"bold"}} textAnchor="middle">
                                    {a.text||"Ø"} ({getMeasureStr(a)})
                                  </text>
                                </>
                              );
                            })()}
                          </g>
                        )}
                      </g>
                    );
                  })}
                </svg>
              </div>
            </div>

            {/* COMPONENTE DERECHO: EDICIÓN E INGENIERÍA INVERSA 2D/3D */}
            <div style={{display:"flex", flexDirection:"column", gap:"12px"}}>
              <div style={{display:"flex", gap:"4px"}}>
                <button onClick={()=>setViewTab("autocad2d")} style={{flex:1, padding:"10px", background:viewTab==="autocad2d"?"#0b2535":"transparent", color:viewTab==="autocad2d"?"#00e5c4":"#52798f", border:"1px solid #102e44", borderRadius:"6px", fontFamily:"'Space Mono',monospace", fontSize:"11px"}}>PROYECCIÓN 2D AUTOCAD</button>
                <button onClick={()=>setViewTab("3dstudio")} style={{flex:1, padding:"10px", background:viewTab==="3dstudio"?"#0b2535":"transparent", color:viewTab==="3dstudio"?"#00e5c4":"#52798f", border:"1px solid #102e44", borderRadius:"6px", fontFamily:"'Space Mono',monospace", fontSize:"11px"}}>ESTUDIO 3D STUDIO</button>
              </div>

              {calibDlg && <div style={{background:"#0a1f2d", padding:"12px", borderRadius:"8px", border:"1px solid #00e5c4"}} className="fade">
                <div style={{fontSize:"11px", marginBottom:"6px", fontFamily:"'Space Mono',monospace", color:"#00e5c4"}}>MEDIDA FIEL DE CALIBRACIÓN (Cota Real en mm):</div>
                <div style={{display:"flex", gap:"6px"}}>
                  <input type="number" style={{flex:1}} value={calibVal} onChange={e=>setCalibVal(e.target.value)} placeholder="Ej: 500"/>
                  <button onClick={saveCalibration} style={{background:"#00e5c4", color:"#05101a", padding:"6px 14px", borderRadius:"4px", fontWeight:700}}>FIJAR ESCALA</button>
                </div>
              </div>}

              {/* INSPECTOR DE ELEMENTOS SELECCIONADOS */}
              {selId && (() => {
                const selectedAnn = anns.find(a=>a.id===selId);
                if(!selectedAnn) return null;
                return (
                  <div style={{background:"#0a1520", border:"1px solid #1a3a4e", padding:"10px", borderRadius:"6px"}} className="fade">
                    <div style={{fontSize:"10px", color:"#6b8fa4", fontFamily:"'Space Mono',monospace", marginBottom:"4px"}}>PROPIEDADES DEL ELEMENTO SELECCIONADO</div>
                    <div style={{display:"flex", gap:"6px", alignItems:"center"}}>
                      <input type="text" style={{flex:1, fontSize:"11px"}} value={selectedAnn.text||""} placeholder="Introduce nota o tag técnico..." onChange={e=>{
                        const txt=e.target.value;
                        const nA=anns.map(a=>a.id===selId?{...a, text:txt}:a);
                        setAnns(nA); updateActiveProjectData({anns:nA});
                      }}/>
                      <button onClick={()=>{
                        const nA=anns.filter(a=>a.id!==selId); setSelId(null);
                        syncAnnsAndScale(nA, scale);
                      }} style={{background:"#ff4466", color:"#fff", padding:"6px 10px", borderRadius:"4px", fontSize:"11px"}}>Borrar</button>
                    </div>
                  </div>
                );
              })()}

              {viewTab==="autocad2d" && (
                <div className="fade" style={{display:"flex", flexDirection:"column", gap:"12px"}}>
                  <V2DAutoCAD components={piping?.components} pipeDN={piping?.dn}/>
                  <div style={{background:"rgba(11,37,53,0.4)", border:"1px solid #102e44", padding:"12px", borderRadius:"6px"}}>
                    <input type="text" value={projName} onChange={e=>{setProjName(e.target.value); updateActiveProjectData({name:e.target.value});}} style={{background:"transparent", border:"none", borderBottom:"1px solid #1a3a4e", padding:0, fontSize:"14px", fontWeight:"bold", color:"#fff", width:"100%", borderRadius:0, marginBottom:"6px"}}/>
                    <p style={{color:"#6b8fa4", fontSize:"11px", fontFamily:"'Space Mono',monospace"}}>{objInfo?.desc}</p>
                  </div>
                </div>
              )}

              {viewTab==="3dstudio" && (
                <div className="fade">
                  <V3DStudio components={piping?.components} pipeDN={piping?.dn} pipeLabel={piping?.label}/>
                </div>
              )}

              <button onClick={exportPDF} style={{width:"100%", background:"#00e5c4", color:"#05101a", padding:"14px", borderRadius:"6px", fontWeight:800, cursor:"pointer", marginTop:"auto"}}>EXPORTAR DOSSIER TÉCNICO COMPLETO (PDF)</button>
            </div>
          </div>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>
