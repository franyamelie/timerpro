<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TimerPro"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>TimerPro — Control Horario</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--surf:#1a1a1a;--surf2:#222;--surf3:#2a2a2a;
  --ink:#f0f0f0;--ink2:#999;--ink3:#555;
  --acc:#22c55e;--acc2:#16a34a;--acc-lt:rgba(34,197,94,.12);
  --red:#ef4444;--red-lt:rgba(239,68,68,.12);
  --blu:#3b82f6;--blu-lt:rgba(59,130,246,.12);
  --yel:#eab308;--yel-lt:rgba(234,179,8,.12);
  --pur:#a855f7;--pur-lt:rgba(168,85,247,.12);
  --brd:rgba(255,255,255,.08);
  --r:10px;--r2:6px;--sh:0 2px 12px rgba(0,0,0,.4);
  --font:'Inter',system-ui,sans-serif;
}
.light{
  --bg:#f5f5f5;--bg2:#ececec;--bg3:#e2e2e2;--surf:#fff;--surf2:#f8f8f8;--surf3:#eee;
  --ink:#111;--ink2:#555;--ink3:#aaa;--brd:rgba(0,0,0,.1);
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px}
#app{display:flex;flex-direction:column;height:100dvh;max-width:900px;margin:0 auto}
#app-inner{display:flex;flex-direction:column;height:100%;width:100%;overflow:hidden}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:var(--surf);border-bottom:1px solid var(--brd);flex-shrink:0;gap:.5rem}
.nav-brand{font-size:1.1rem;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.nav-brand em{color:var(--acc);font-style:normal}
.nav-clock{font-size:.8rem;color:var(--ink2);font-variant-numeric:tabular-nums;white-space:nowrap}
.nav-btns{display:flex;gap:.4rem}
.nav-btn{background:none;border:none;cursor:pointer;font-size:1.1rem;padding:.2rem .3rem;border-radius:var(--r2);color:var(--ink2)}
.nav-btn:hover{color:var(--ink);background:var(--surf3)}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.sync-dot.ok{background:var(--acc)}.sync-dot.syncing{background:var(--yel);animation:pulse 1s infinite}
.sync-dot.err{background:var(--red)}.sync-dot.off{background:var(--ink3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.user-pill{display:flex;align-items:center;gap:.4rem;background:var(--surf3);border-radius:20px;padding:.2rem .6rem;font-size:.72rem;cursor:pointer}
.user-pill img{width:20px;height:20px;border-radius:50%}

/* TABS */
.tabs{display:flex;overflow-x:auto;background:var(--surf);border-bottom:1px solid var(--brd);flex-shrink:0;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{display:flex;flex-direction:column;align-items:center;gap:.1rem;padding:.5rem .7rem;border:none;background:none;cursor:pointer;color:var(--ink2);font-size:.62rem;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;flex-shrink:0}
.tab .tab-icon{font-size:1.1rem}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.tab:hover:not(.active){color:var(--ink);background:var(--surf2)}

/* MAIN */
main{flex:1;overflow-y:auto;padding:1rem}

/* CARDS & SECTIONS */
.card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:1rem;margin-bottom:.8rem}
.sec-title{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);margin-bottom:.8rem}
.empty{text-align:center;padding:2rem;color:var(--ink3);font-size:.85rem}

/* FIELDS */
.field{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.7rem}
.field label{font-size:.72rem;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--r2);padding:.5rem .7rem;color:var(--ink);font-size:.9rem;font-family:var(--font);width:100%;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--acc)}
.field textarea{resize:vertical;min-height:80px}
.field select option{background:var(--surf2)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.7rem}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem .9rem;border:none;border-radius:var(--r2);cursor:pointer;font-size:.8rem;font-weight:600;font-family:var(--font);transition:all .15s;white-space:nowrap}
.btn-g{background:var(--acc);color:#000}
.btn-g:hover{background:var(--acc2)}
.btn-r{background:var(--red);color:#fff}
.btn-r:hover{background:#dc2626}
.btn-b{background:var(--blu);color:#fff}
.btn-b:hover{background:#2563eb}
.btn-y{background:var(--yel);color:#000}
.btn-y:hover{background:#ca8a04}
.btn-p{background:var(--pur);color:#fff}
.btn-p:hover{background:#9333ea}
.btn-gh{background:var(--surf3);color:var(--ink)}
.btn-gh:hover{background:var(--surf2)}
.btn-sm{padding:.35rem .6rem;font-size:.75rem}
.btn-lg{padding:.7rem 1.2rem;font-size:.9rem}
.btn-full{width:100%;justify-content:center}
.btn-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem}

/* BADGE */
.badge{display:inline-block;padding:.1rem .45rem;border-radius:20px;font-size:.65rem;font-weight:700}
.badge-g{background:var(--acc-lt);color:var(--acc)}
.badge-r{background:var(--red-lt);color:var(--red)}
.badge-b{background:var(--blu-lt);color:var(--blu)}
.badge-y{background:var(--yel-lt);color:var(--yel)}
.badge-p{background:var(--pur-lt);color:var(--pur)}

/* FICHAJE */
.fich-row{display:flex;align-items:center;gap:.5rem;padding:.5rem;background:var(--surf2);border-radius:var(--r2);margin-bottom:.4rem}
.fich-time{font-size:.85rem;font-variant-numeric:tabular-nums;flex:1}
.fich-time input{background:transparent;border:none;color:var(--ink);font-size:.85rem;width:80px;padding:0}
.fich-time input:focus{outline:none;border-bottom:1px solid var(--acc)}

/* TASK CARD */
.task-card{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--r);padding:.8rem;margin-bottom:.6rem}
.task-head{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.task-title{font-weight:700;font-size:.9rem;flex:1}
.task-meta{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.5rem}
.task-meta span{font-size:.72rem;color:var(--ink2)}

/* IMPORTE FIELD */
.imp-wrap{display:flex;gap:.4rem;align-items:center}
.imp-wrap select,.imp-wrap input{flex:1}

/* JOURNEY CARD */
.journey-card{background:var(--surf3);border-radius:var(--r2);padding:.7rem;margin-bottom:.4rem}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dn{text-align:center;font-size:.65rem;color:var(--ink2);font-weight:700;padding:.3rem 0}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--r2);cursor:pointer;font-size:.8rem;position:relative;background:var(--surf2);transition:background .15s}
.cal-day:hover{background:var(--surf3)}
.cal-day.today{background:var(--acc-lt);color:var(--acc);font-weight:700}
.cal-day.selected{background:var(--acc);color:#000;font-weight:700}
.cal-day.has-e::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--acc)}
.cal-day.other-month{opacity:.3}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.cal-nav button{background:none;border:none;cursor:pointer;color:var(--ink);font-size:1.2rem;padding:.3rem}
.cal-nav span{font-weight:700}

/* FIRMA */
.firma-canvas{border:2px dashed var(--brd);border-radius:var(--r);touch-action:none;display:block;background:var(--surf2);cursor:crosshair}

/* ALERT */
.alert-box{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);padding:.6rem 1.2rem;border-radius:20px;font-size:.85rem;font-weight:600;z-index:999;animation:slideUp .2s ease;box-shadow:var(--sh);white-space:nowrap}
.alert-ok{background:var(--acc);color:#000}
.alert-err{background:var(--red);color:#fff}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(1rem)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:var(--surf);border-radius:var(--r) var(--r) 0 0;padding:1.2rem;width:100%;max-width:600px;max-height:90dvh;overflow-y:auto;animation:slideUp .2s ease}
.modal-title{font-size:1rem;font-weight:800;margin-bottom:1rem}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;gap:.8rem;padding:.4rem 0}
.toggle-row span{flex:1;font-size:.85rem}
.toggle{width:40px;height:22px;background:var(--surf3);border-radius:11px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--ink2);transition:all .2s}
.toggle.on{background:var(--acc)}
.toggle.on::after{left:calc(100% - 19px);background:#000}

/* SUMMARY */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--brd)}
.sum-row:last-child{border:none}
.sum-label{font-size:.82rem;color:var(--ink2)}
.sum-val{font-weight:700;font-size:.9rem}
.sum-total{font-size:1rem;font-weight:800;color:var(--acc)}

/* PHOTOS */
.photo-grid{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem}
.photo-thumb{width:70px;height:70px;border-radius:var(--r2);object-fit:cover;border:1px solid var(--brd)}
.photo-del{position:relative;cursor:pointer}
.photo-del::after{content:'✕';position:absolute;top:2px;right:2px;background:rgba(0,0,0,.7);color:#fff;font-size:.55rem;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;line-height:14px;text-align:center}

/* QR */
.qr-wrap{text-align:center;padding:1rem}
.qr-wrap img{max-width:200px;border-radius:var(--r);border:4px solid #fff}

/* SCROLL */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:2px}

/* ENTRADA LOCKED */
.locked-badge{display:inline-flex;align-items:center;gap:.3rem;background:var(--acc-lt);color:var(--acc);padding:.2rem .6rem;border-radius:20px;font-size:.72rem;font-weight:700}

/* SEPARADOR */
.sep{height:1px;background:var(--brd);margin:.8rem 0}

@media(min-width:720px){
  main{padding:1.2rem 1.5rem}
  .grid-2{grid-template-columns:repeat(2,1fr)}
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<body>
<div id="app"></div>
<script>
'use strict';
// ═══════════════════════════════════════════════════════
// TIMERPRO - Control Horario Laboral
// Vanilla JS, sin frameworks, sin compilación
// ═══════════════════════════════════════════════════════

// ── UTILIDADES ──────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
const today = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const nowTime = () => { const d=new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; };
const fmtTime = t => t||'—';
const calcH = (a,b) => { if(!a||!b)return 0; const [ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number); let d=(bh*60+bm)-(ah*60+am); if(d<0)d+=1440; return Math.round(d*100/60)/100; };
const fmtH = h => { if(!h)return '0h'; const hh=Math.floor(h),mm=Math.round((h-hh)*60); return hh>0&&mm>0?`${hh}h ${mm}m`:hh>0?`${hh}h`:`${mm}m`; };
const eur = v => Number(v||0).toFixed(2).replace('.',',')+' €';
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const WDAYS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const WSHORT = ['L','M','X','J','V','S','D'];
const cap = s => s?s.charAt(0).toUpperCase()+s.slice(1):s;
const dlbl = s => { if(!s)return ''; const[y,m,d]=s.split('-'); return `${parseInt(d)} de ${MONTHS[parseInt(m)-1]} de ${y}`; };
const wday = s => { if(!s)return ''; return WDAYS[new Date(s+'T12:00:00').getDay()]; };
// Amount options: 0.50, 1, 1.50, 2 ... 100 (0.50 increments)
const IMPORTE_OPTS = [0.50, ...Array.from({length:100},(_,i)=>i+1)];
const isStdAmount = v => IMPORTE_OPTS.includes(Number(v));

// ── INDEXEDDB ────────────────────────────────────────────
const DB_NAME='TimerProV2',DB_VER=1;
const ST={entries:'entries',tasks:'tasks',sites:'sites',workorders:'workorders',vehicles:'vehicles',settings:'settings',workers:'workers',companies:'companies'};
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      Object.values(ST).forEach(s=>{ if(!d.objectStoreNames.contains(s)) d.createObjectStore(s,{keyPath:'id',autoIncrement:true}); });
    };
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror=()=>rej(r.error);
  });
}
const dbAll=st=>new Promise((res,rej)=>{const t=db.transaction(st,'readonly'),r=t.objectStore(st).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const dbPut=(st,obj)=>new Promise((res,rej)=>{const t=db.transaction(st,'readwrite'),r=t.objectStore(st).put(obj);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const dbDel=(st,id)=>new Promise((res,rej)=>{const t=db.transaction(st,'readwrite'),r=t.objectStore(st).delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbClear=st=>new Promise((res,rej)=>{const t=db.transaction(st,'readwrite'),r=t.objectStore(st).clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});

// ── ESTADO GLOBAL ────────────────────────────────────────
const S = {
  tab:'fichar', dark:true,
  entries:[], tasks:[], sites:[], workorders:[], vehicles:[], settings:{},
  // Jornada activa
  entry:null,
  // Modales
  modal:null,
  // Alerta
  alertMsg:null, alertType:'ok', alertTimer:null,
  // Reloj
  clock:'',
};

// ── DEFAULTS ─────────────────────────────────────────────
const defEntry = () => ({
  fecha:today(), fichajes:[], horasNormales:0, importeNormales:0,
  horasExtra:0, importeExtra:0, horasNocturnas:0, importeNocturnas:0,
  horasFestivas:0, importeFestivas:0, dieta:0, dietasExtra:[], transporte:0,
  otrosConceptos:[], notas:'', journeys:[], ubicacionEntrada:'', ubicacionSalida:'',
  entradaLocked:false
});
const defFichaje = () => ({_fid:Date.now(), entrada:'', salida:'', nota:'', editing:false});
const defTask = f => ({fecha:f||today(), titulo:'', horaInicio:nowTime(), horaFin:'', descripcion:'', siteId:'', workOrderId:'', otNumero:'', usaOT:false, fotos:[]});
const defJourney = () => ({vehicleId:'', tipoManual:'coche', precioManual:0.19, origen:'', destino:'', km:0, horaInicio:nowTime(), horaFin:''});
const defWorker = {nombre:'',apellidos:'',dni:'',cargo:'',departamento:'',email:'',telefono:'',numSS:'',fechaAlta:'',convenio:'',firma:'',foto:''};
const defCompany = {nombre:'',cif:'',direccion:'',ciudad:'',cp:'',telefono:'',email:'',web:'',logo:''};
const defSite = {nombre:'',direccion:'',ciudad:'',telefono:'',notas:''};
const defWO = {codigo:'',descripcion:'',cliente:'',notas:''};
const defVehicle = {nombre:'',tipo:'coche',matricula:'',precioPorKm:0.19,notas:''};

// Formularios
let fEntry = defEntry();
let fTask = defTask();
let fWorker = {...defWorker};
let fCompany = {...defCompany};
let fSite = {...defSite};
let fWO = {...defWO};
let fVehicle = {...defVehicle};
let editSiteId = null, editWOId = null, editVehId = null;
let showSiteF = false, showWOF = false, showVehF = false;
let editingEntry = false;
let filterMonth = '';
let calYear = new Date().getFullYear(), calMonth = new Date().getMonth();
let selDate = today();
let dSearch = '', dFY = '', dFM = '';
let syncMode = 'export';
let dlDialog = null;
let workers = []; // list of saved workers
let companies = []; // list of saved companies
let activeWorkerId = null;
let activeCompanyId = null;
let showWorkerF = false;
let showCompanyF = false;
// Firebase
let fbApp=null, fbAuth=null, fbDb=null, fbUser=null;
let fbConfig=null; // loaded from localStorage
let syncStatus=''; // '', 'syncing', 'ok', 'err'
let syncTimer=null;
let driveUrl='https://script.google.com/macros/s/AKfycbyaHPepTcBvSk-CiEnqvApBNPl3pp1x2iHhN3Zx3qNTc4hGb0FEFOUa9IVN34GG0I1pmQ/exec'; // URL fija - ya configurada
let lastSync='';
let autoSaveTimer=null;
let draftSaveTimer=null;
let confirmDialog=null; // {msg, onOk}

// ── RENDER ENGINE ────────────────────────────────────────
function h(tag, attrs, ...children){
  const el = document.createElement(tag);
  const BOOL=['selected','checked','disabled','multiple','readonly','required','autofocus'];
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='on') Object.entries(v).forEach(([ev,fn])=>el.addEventListener(ev,fn));
    else if(k==='class') el.className=v;
    else if(k==='html') el.innerHTML=v;
    else if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(k==='data') Object.entries(v).forEach(([dk,dv])=>el.dataset[dk]=dv);
    else if(BOOL.includes(k)){ el[k]=(v===true||v===''||v==='true'); }
    else if(v!==false&&v!==null&&v!==undefined) el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c===null||c===undefined||c===false)return;
    el.appendChild(typeof c==='string'||typeof c==='number' ? document.createTextNode(c) : c);
  });
  return el;
}

let renderScheduled = false;
function rerender(){
  if(renderScheduled)return;
  renderScheduled=true;
  requestAnimationFrame(()=>{ renderScheduled=false; renderApp(); });
}

function renderApp(){
  try {
    const app = document.getElementById('app');
    if(!app) return;
    const scrollTop = app.querySelector('main')?.scrollTop||0;
    while(app.firstChild) app.removeChild(app.firstChild);
    try { app.appendChild(renderNav()); } catch(e) { app.appendChild(errEl('nav',e)); }
    try { app.appendChild(renderTabs()); } catch(e) { app.appendChild(errEl('tabs',e)); }
    try { app.appendChild(h('main',{},renderMain())); } catch(e) { app.appendChild(errEl('main:'+S.tab,e)); }
    document.querySelectorAll('.modal-bg,.alert-box').forEach(el=>el.remove());
    if(S.modal){ try{ const m=renderModal(); if(m) document.body.appendChild(m); }catch(e){} }
    if(S.alertMsg){ try{ const a=renderAlert(); if(a) document.body.appendChild(a); }catch(e){} }
    const m = app.querySelector('main');
    if(m) m.scrollTop=scrollTop;
    document.documentElement.classList.toggle('light',!S.dark);
  } catch(e) {
    console.error('renderApp error:',e);
    const app=document.getElementById('app');
    if(app) app.innerHTML='<div style="color:red;padding:20px;font-family:monospace;font-size:12px">Render error: '+e.message+'</div>';
  }
}
function errEl(ctx,e){ return h('div',{style:{color:'red',padding:'8px',fontSize:'12px',fontFamily:'monospace'}},'Error in '+ctx+': '+e.message); }

// ── NAV ──────────────────────────────────────────────────
function renderSyncBar(){
  if(!driveUrl) return h('div',{}); // no Drive configured, show nothing
  const isOk = syncStatus==='ok';
  const isSyncing = syncStatus==='syncing';
  const isErr = syncStatus==='err';
  return h('div',{
    style:{
      display:'flex',alignItems:'center',gap:'.5rem',
      padding:'.4rem .8rem',
      background: isErr?'var(--red-lt)':isSyncing?'var(--yel-lt)':'var(--acc-lt)',
      borderBottom:'1px solid var(--brd)',
      flexShrink:0
    }
  },
    h('span',{style:{fontSize:'.75rem',flex:1,color:isErr?'var(--red)':isSyncing?'var(--yel)':'var(--acc)'}},
      isSyncing ? '🔄 Sincronizando con Drive...' :
      isErr ? '❌ Error al sincronizar con Drive' :
      isOk ? ('✅ Drive sincronizado · '+lastSync) :
      '☁️ Drive conectado'
    ),
    h('button',{

// ── MAIN ─────────────────────────────────────────────────
function renderMain(){
  switch(S.tab){
    case 'fichar':     return renderFichar();
    case 'tareas':     return renderTareas();
    case 'calendario': return renderCalendario();
    case 'sitios':     return renderSitios();
    case 'ordenes':    return renderOrdenes();

    case 'trabajador': return renderTrabajador();

}

function renderJourney(j,i,ctx){
  const vehOpts = [{id:'',nombre:'Manual'},...S.vehicles];
  const selVeh = S.vehicles.find(v=>v.id==j.vehicleId);
  const precio = j.vehicleId&&selVeh ? selVeh.precioPorKm : j.precioManual;
  const coste = (j.km||0)*precio;
  
  return h('div',{class:'journey-card'},
    h('div',{class:'grid-2',style:{marginBottom:'.4rem'}},
      h('div',{class:'field'},
        h('label',{},'VEHÍCULO'),
        h('select',{value:j.vehicleId,on:{change:ev=>{
          if(ctx==='entry')fEntry.journeys[i].vehicleId=ev.target.value;
          else fTask.journeys[i].vehicleId=ev.target.value;
          rerender();
        }}},
          ...vehOpts.map(v=>h('option',{value:v.id,selected:v.id==j.vehicleId?'':null},v.nombre||v.tipo||'Manual'))
        )
      ),
      !j.vehicleId
        ? h('div',{class:'field'},
            h('label',{},'TIPO'),
            h('select',{on:{change:ev=>{if(ctx==='entry')fEntry.journeys[i].tipoManual=ev.target.value;else fTask.journeys[i].tipoManual=ev.target.value;}}},
              ['coche','moto','furgoneta','camión','otro'].map(t=>h('option',{value:t,selected:t===j.tipoManual?'':null},t))
            )
          )
        : h('div',{class:'field'},h('label',{},'MATRÍCULA'),h('div',{style:{padding:'.5rem',color:'var(--ink2)'}},selVeh?.matricula||'—'))
    ),
    h('div',{class:'grid-3',style:{marginBottom:'.4rem'}},
      field('Origen','text',j.origen,v=>{if(ctx==='entry')fEntry.journeys[i].origen=v;else fTask.journeys[i].origen=v;}),
      field('Destino','text',j.destino,v=>{if(ctx==='entry')fEntry.journeys[i].destino=v;else fTask.journeys[i].destino=v;}),
      field('Km','number',j.km,v=>{if(ctx==='entry')fEntry.journeys[i].km=parseFloat(v)||0;else fTask.journeys[i].km=parseFloat(v)||0;rerender();},{min:'0',step:'0.1'})
    ),
    h('div',{class:'grid-2',style:{marginBottom:'.4rem'}},
      field('Hora inicio','time',j.horaInicio,v=>{if(ctx==='entry')fEntry.journeys[i].horaInicio=v;else fTask.journeys[i].horaInicio=v;}),
      field('Hora fin','time',j.horaFin,v=>{if(ctx==='entry')fEntry.journeys[i].horaFin=v;else fTask.journeys[i].horaFin=v;})
    ),
    !j.vehicleId
      ? h('div',{class:'field'},h('label',{},'€/KM'),h('input',{type:'number',min:'0',step:'0.001',value:j.precioManual,on:{input:ev=>{if(ctx==='entry')fEntry.journeys[i].precioManual=parseFloat(ev.target.value)||0;else fTask.journeys[i].precioManual=parseFloat(ev.target.value)||0;}}}))
      : null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'.3rem'}},
      h('span',{class:'badge badge-b'},`Coste: ${eur(coste)}`),
      h('button',{class:'btn btn-r btn-sm',on:{click:()=>{if(ctx==='entry')fEntry.journeys.splice(i,1);else fTask.journeys.splice(i,1);rerender();}}},'✕')
    )
  );
}

// ══════════════════════════════════════════════════════════
function renderCalendario(){
  const year=calYear, month=calMonth;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const offset=(firstDay+6)%7; // Monday first
  const cells=[];
  for(let i=0;i<offset;i++)cells.push({d:null});
  for(let d=1;d<=daysInMonth;d++)cells.push({d,curr:true});
  
  return h('div',{},
    h('div',{class:'card'},
      h('div',{class:'cal-nav'},
        h('button',{on:{click:()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--;}rerender();}}},'\u25c4'),
        h('span',{},`${MONTHS[month].toUpperCase()} ${year}`),
        h('button',{on:{click:()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++;}rerender();}}},'\u25ba')
      ),
      h('div',{class:'cal-grid'},
        ...WSHORT.map(d=>h('div',{class:'cal-dn'},d)),
        ...cells.map(cell=>{
          if(!cell.d)return h('div',{class:'cal-day other-month'});
          const ds=`${year}-${pad(month+1)}-${pad(cell.d)}`;
          const hasEntry=S.entries.some(e=>e.fecha===ds);
          const hasTasks=S.tasks.some(t=>t.fecha===ds);
          const isToday=ds===today();
          const isSel=ds===selDate;
          let cls='cal-day';
          if(isSel)cls+=' selected';
          else if(isToday)cls+=' today';
          if(hasEntry||hasTasks)cls+=' has-e';
          return h('div',{class:cls,on:{click:()=>{selDate=ds;rerender();}}},cell.d);
        })
      )
    ),
    // Detalle del día seleccionado
    selDate?renderDayDetail(selDate):null
  );
}

function renderResumen(){
  const entries = filterMonth ? S.entries.filter(e=>e.fecha.startsWith(filterMonth)) : S.entries;
  const tasks = filterMonth ? S.tasks.filter(t=>t.fecha.startsWith(filterMonth)) : S.tasks;
  
  const totals = entries.reduce((a,e)=>({
    n: a.n+1,
    hn: a.hn+(+e.horasNormales||0),
    he: a.he+(+e.horasExtra||0),
    hnoc: a.hnoc+(+e.horasNocturnas||0),
    hf: a.hf+(+e.horasFestivas||0),
    in: a.in+(+e.importeNormales||0),
    ie: a.ie+(+e.importeExtra||0),
    inoc: a.inoc+(+e.importeNocturnas||0),
    if_: a.if_+(+e.importeFestivas||0),
    diet: a.diet+(+e.dieta||0)+((e.dietasExtra||[]).reduce((x,d)=>x+(+d.importe||0),0)),
    transp: a.transp+(+e.transporte||0),
    otros: a.otros+((e.otrosConceptos||[]).reduce((x,c)=>x+(+c.importe||0),0)),
  }),{n:0,hn:0,he:0,hnoc:0,hf:0,in:0,ie:0,inoc:0,if_:0,diet:0,transp:0,otros:0});
  
  const totalH = totals.hn+totals.he+totals.hnoc+totals.hf;
  const totalImp = totals.in+totals.ie+totals.inoc+totals.if_;
  const totalViajes = entries.reduce((a,e)=>{
    return a+((e.journeys||[]).reduce((b,j)=>{
      const v=S.vehicles.find(x=>x.id==j.vehicleId);
      return b+(j.km||0)*(v?+v.precioPorKm:+j.precioManual||0);
    },0));
  },0);
  const totalOther = totals.diet+totals.transp+totals.otros+totalViajes;
  const grandTotal = totalImp+totalOther;
  
  return h('div',{},
    h('div',{class:'card'},
      h('div',{class:'field'},
        h('label',{},'FILTRAR MES'),
        h('input',{type:'month',value:filterMonth,on:{change:ev=>{filterMonth=ev.target.value;rerender();}}})
      )
    ),
    h('div',{class:'card'},
      h('div',{class:'sec-title'},'HORAS'),
      sumRow('Normales',fmtH(totals.hn)),
      sumRow('Extra',fmtH(totals.he)),
      sumRow('Nocturnas',fmtH(totals.hnoc)),
      sumRow('Festivas',fmtH(totals.hf)),
      sumRow('TOTAL HORAS',fmtH(totalH),true)
    ),
    h('div',{class:'card'},
      h('div',{class:'sec-title'},'IMPORTES'),
      sumRow('Normales',eur(totals.in)),
      sumRow('Extra',eur(totals.ie)),
      sumRow('Nocturnas',eur(totals.inoc)),
      sumRow('Festivas',eur(totals.if_)),
      sumRow('Subtotal horas',eur(totalImp),true)
    ),
    h('div',{class:'card'},
      h('div',{class:'sec-title'},'OTROS CONCEPTOS'),
      sumRow('Dietas',eur(totals.diet)),
      sumRow('Transporte',eur(totals.transp)),
      sumRow('Viajes',eur(totalViajes)),
      sumRow('Otros',eur(totals.otros)),
      sumRow('Subtotal otros',eur(totalOther),true)
    ),
    h('div',{class:'card'},
      sumRow('TOTAL GENERAL',eur(grandTotal),true),
      h('div',{style:{marginTop:'.5rem',fontSize:'.8rem',color:'var(--ink2)'}},
        `${totals.n} jornadas · ${tasks.length} tareas`
      )
    ),
    h('div',{class:'btn-row'},
      h('button',{class:'btn btn-r btn-lg btn-full',on:{click:()=>openModal('export')}},'📤 Exportar Informe')
    )
  );
}

function sumRow(label, val, total=false){
  return h('div',{class:'sum-row'},
    h('div',{class:'sum-label'},label),
    h('div',{class:total?'sum-total':'sum-val'},val)
  );
}

function renderFirmaCanvas(){
  const canvas = h('canvas',{
    id:'firma-canvas',class:'firma-canvas',
    width:300,height:150,
    style:{width:'100%',maxWidth:'350px',height:'120px'}
  });
  setTimeout(()=>{
    const c=document.getElementById('firma-canvas');
    if(!c)return;
    const ctx=c.getContext('2d');
    ctx.strokeStyle='var(--ink)';ctx.lineWidth=2;ctx.lineCap='round';
    let drawing=false,lx=0,ly=0;
    function getPos(e){
      const r=c.getBoundingClientRect();
      const sx=c.width/r.width,sy=c.height/r.height;
      if(e.touches){return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};}
      return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};
    }
    c.addEventListener('mousedown',e=>{drawing=true;const p=getPos(e);lx=p.x;ly=p.y;});
    c.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=getPos(e);lx=p.x;ly=p.y;},{passive:false});
    function draw(e){
      if(!drawing)return;
      if(e.cancelable)e.preventDefault();
      const p=getPos(e);
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();
      lx=p.x;ly=p.y;
    }
    c.addEventListener('mousemove',draw);
    c.addEventListener('touchmove',draw,{passive:false});
    c.addEventListener('mouseup',()=>drawing=false);
    c.addEventListener('touchend',()=>drawing=false);
  },50);
  return canvas;
}

function field(label, type, value, onChange, attrs={}, placeholder=''){
  // For date/time/select: use change (triggers rerender); for text: use blur to avoid rerender while typing
  const isText = (type==='text'||type==='email'||type==='tel'||type==='number');
  const evts = isText
    ? {blur:e=>{onChange(e.target.value);scheduleDraftSave();}, change:e=>{onChange(e.target.value);scheduleDraftSave();}}
    : {change:e=>{onChange(e.target.value);rerender();scheduleDraftSave();}};
  const el = h('div',{class:'field'},
    h('label',{},label),
    h('input',Object.assign({type,value:value||'',placeholder,on:evts},attrs))
  );
  return el;
}

function locLabel(loc){
  if(!loc) return '';
  try{ const d=JSON.parse(loc); return d.label||d.address||''; }
  catch(e){ return loc; }
}

function textToLoc(text){
  if(!text) return '';
  // Check if it looks like coordinates
  const coordMatch = text.match(/^(-?\d+\.\d+),\s*(-?\d+\.\d+)$/);
  if(coordMatch){
    const lat=coordMatch[1], lng=coordMatch[2];
    return JSON.stringify({lat,lng,url:'https://www.google.com/maps?q='+lat+','+lng,label:lat+', '+lng});
  }
  // Plain address text
  const encoded=encodeURIComponent(text);
  return JSON.stringify({address:text,url:'https://www.google.com/maps/search/'+encoded,label:text});
}

// Auto-save current entry draft to IndexedDB every 10 seconds
function scheduleDraftSave(){
  if(draftSaveTimer) clearTimeout(draftSaveTimer);
  draftSaveTimer = setTimeout(saveDraft, 2000);
}

async function saveDraft(){
  if(!fEntry.fecha) return;
  try{
    // Save as draft (with _draft flag so we know it's not finalized)
    const draft={...fEntry, _draft:true, _savedAt:new Date().toISOString()};
    // Check if entry already exists
    const existing = S.entries.find(e=>e.fecha===fEntry.fecha && !e._draft);
    if(existing){
      // Update existing entry automatically
      draft.id = existing.id;
      draft._draft = false;
      await dbPut(ST.entries, draft);
      S.entries = S.entries.map(e=>e.id===existing.id ? draft : e);
    } else if(fEntry.id){
      // Has ID, update it
      await dbPut(ST.entries, draft);
      S.entries = S.entries.map(e=>e.id===fEntry.id ? draft : e);
    } else {
      // Save as new draft entry
      const existing_draft = S.entries.find(e=>e.fecha===fEntry.fecha && e._draft);
      if(existing_draft){
        draft.id = existing_draft.id;
        await dbPut(ST.entries, draft);
        S.entries = S.entries.map(e=>e.id===existing_draft.id ? draft : e);
      } else {
        const id = await dbPut(ST.entries, draft);
        fEntry.id = id;
        S.entries.push({...draft, id});
      }
    }
    localStorage.setItem('lastSave', new Date().toISOString());
  }catch(e){ console.warn('Draft save failed:', e); }
}

function gpsDisplay(loc){
  if(!loc) return h('div',{style:{fontSize:'.75rem',color:'var(--ink3)'}},'No registrada');
  try{
    const d=JSON.parse(loc);
    return h('div',{style:{fontSize:'.75rem'}},
      h('a',{href:d.url,target:'_blank',rel:'noopener',style:{color:'var(--acc)',textDecoration:'none'}},
        '🗺 '+d.label
      )
    );
  }catch(e){
    // Legacy format (plain string coords)
    const parts=loc.split(',').map(s=>s.trim());
    if(parts.length===2){
      const url=`https://www.google.com/maps?q=${parts[0]},${parts[1]}`;
      return h('div',{style:{fontSize:'.75rem'}},
        h('a',{href:url,target:'_blank',rel:'noopener',style:{color:'var(--acc)',textDecoration:'none'}},
          '🗺 '+loc
        )
      );
    }
    return h('div',{style:{fontSize:'.75rem',color:'var(--ink2)'}},loc);
  }
}

async function captureGPS(tipo){
  if(!navigator.geolocation){
    showAlert('GPS no disponible. Escribe la dirección manualmente.','err');
    return;
  }
  showAlert('Obteniendo GPS…');
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const lat=pos.coords.latitude.toFixed(6);
      const lng=pos.coords.longitude.toFixed(6);
      const loc=JSON.stringify({lat,lng,url:'https://www.google.com/maps?q='+lat+','+lng,label:lat+', '+lng});
      if(tipo==='entrada')fEntry.ubicacionEntrada=loc;
      else fEntry.ubicacionSalida=loc;
      showAlert('✓ GPS capturado');
      rerender();
    },
    err=>{
      const tip = err.code===1
        ? 'Permiso denegado. Escribe la dirección manualmente en el campo de texto.'
        : 'No se pudo obtener GPS. Escribe la dirección manualmente.';
      showAlert(tip,'err');
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:30000}
  );
}

    await Promise.all(Object.values(ST).map(s=>dbClear(s)));
    for(const e of(data.entries||[]))await dbPut(ST.entries,e);
    for(const t of(data.tasks||[]))await dbPut(ST.tasks,t);
    for(const s of(data.sites||[]))await dbPut(ST.sites,s);
    for(const w of(data.workorders||[]))await dbPut(ST.workorders,w);
    for(const v of(data.vehicles||[]))await dbPut(ST.vehicles,v);

// ── Micro QR generator (pure JS) ──────────────────────────
function drawQR(canvasId, text){
  const c=document.getElementById(canvasId);
  if(!c)return;
  // Use Google Charts API as primary (requires internet)
  const url='https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl='+encodeURIComponent(text.slice(0,500));
  const img=new Image();
  img.onload=()=>{
    const size=200;
    c.width=size;c.height=size;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#fff';ctx.fillRect(0,0,size,size);
    ctx.drawImage(img,0,0,size,size);
  };
  img.onerror=()=>{
    // Fallback: show text to copy
    c.width=200;c.height=200;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#f5f5f5';ctx.fillRect(0,0,200,200);
    ctx.fillStyle='#333';ctx.font='12px monospace';
    ctx.textAlign='center';
    ctx.fillText('Comparte el JSON',100,90);
    ctx.fillText('para sincronizar',100,110);
    const btn=document.createElement('button');
    btn.textContent='📤 Compartir datos';
    btn.className='btn btn-b btn-sm';
    btn.style.marginTop='8px';
    btn.onclick=()=>exportJSON();
    const cont=document.getElementById('qr-container');
    if(cont)cont.appendChild(btn);
  };
  img.src=url;
}

function saveFirebaseConfig(){
  const apiKey=document.getElementById('fb-apiKey')?.value.trim();
  const authDomain=document.getElementById('fb-authDomain')?.value.trim();
  const projectId=document.getElementById('fb-projectId')?.value.trim();
  if(!apiKey||!authDomain||!projectId){showAlert('Completa todos los campos','err');return;}

  localStorage.setItem('fbConfig',JSON.stringify(fbConfig));
  S.modal=null; rerender();

async function initFirebase(){
  if(!fbConfig)return;
  if(fbApp){return;} // already initialized
  try{
    fbApp=firebase.initializeApp(fbConfig);
    fbAuth=firebase.auth();
    fbDb=firebase.firestore();
    // Listen for auth state
    fbAuth.onAuthStateChanged(user=>{
      fbUser=user;
      if(user){ fbSyncFromCloud().catch(()=>{}); }
      rerender();
    });
  }catch(e){
    showAlert('Error iniciando Firebase: '+e.message,'err');
    throw e;
  }
}

async function fbSignIn(){
  if(!fbAuth)return;
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    await fbAuth.signInWithPopup(provider);
    showAlert('Sesión iniciada con Google ✓');
  }catch(e){
    if(e.code==='auth/popup-blocked'){
      // Try redirect on mobile
      try{ await fbAuth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()); }
      catch(e2){ showAlert('Error login: '+e2.message,'err'); }
    } else { showAlert('Error: '+e.message,'err'); }
  }
}

async function fbSignOut(){

async function fbSyncToCloud(){
  if(!fbUser||!fbDb)return;
  const uid=fbUser.uid;
  const ref=fbDb.collection('timerpro').doc(uid);
  const data={
    entries:S.entries, tasks:S.tasks, sites:S.sites,
    workorders:S.workorders, vehicles:S.vehicles,
    worker:fWorker, company:fCompany,
    updatedAt:new Date().toISOString()
  };
  // Firestore has 1MB limit per doc — chunk if needed
  await ref.set(data);
}

async function fbSyncFromCloud(){
  if(!fbUser||!fbDb)return;
  syncStatus='syncing'; rerender();
  try{
    const uid=fbUser.uid;
    const doc=await fbDb.collection('timerpro').doc(uid).get();
    if(doc.exists){
      const d=doc.data();
      // Import to IndexedDB
      await Promise.all(Object.values(ST).map(s=>dbClear(s)));
      for(const e of(d.entries||[]))await dbPut(ST.entries,e);
      for(const t of(d.tasks||[]))await dbPut(ST.tasks,t);
      for(const s of(d.sites||[]))await dbPut(ST.sites,s);
      for(const w of(d.workorders||[]))await dbPut(ST.workorders,w);
      for(const v of(d.vehicles||[]))await dbPut(ST.vehicles,v);
      if(d.worker)fWorker={...defWorker,...d.worker};
      if(d.company)fCompany={...defCompany,...d.company};
      await loadData();
      syncStatus='ok';
      showAlert('Datos cargados desde la nube ✓');
      rerender();
    } else {
      // First time: push local data
      await fbSyncToCloud();
      syncStatus='ok'; rerender();
    }
  }catch(e){
    syncStatus='err'; rerender();
    throw e;
  }
}

// Silent auto-load on startup (doesn't ask confirmation)
async function driveAutoLoad(force){
  if(!driveUrl)return;
  const cbName='driveAutoLoad_'+Date.now();
  const script=document.createElement('script');
  let done=false;
  window[cbName]=async function(result){
    done=true;
    delete window[cbName];
    script.remove();
    if(!result||!result.ok||!result.data||!result.data.entries)return;
    const d=result.data;
    // Only load if Drive has newer data (unless forced)
    if(!force){
      const driveTime=new Date(d.exportedAt||0).getTime();
      const localTime=new Date(localStorage.getItem('lastSave')||0).getTime();
      if(driveTime<=localTime && d.entries.length<=S.entries.length)return;
    }
    // Import silently
    try{
      await Promise.all(Object.values(ST).map(s=>dbClear(s)));
      for(const e of(d.entries||[]))await dbPut(ST.entries,e);
      for(const t of(d.tasks||[]))await dbPut(ST.tasks,t);
      for(const s of(d.sites||[]))await dbPut(ST.sites,s);
      for(const w of(d.workorders||[]))await dbPut(ST.workorders,w);
      for(const v of(d.vehicles||[]))await dbPut(ST.vehicles,v);
      for(const w of(d.workers||[]))await dbPut(ST.workers,w);
      for(const c of(d.companies||[]))await dbPut(ST.companies,c);
      if(d.worker)fWorker={...defWorker,...d.worker};
      if(d.company)fCompany={...defCompany,...d.company};
      activeWorkerId=d.activeWorkerId||null;
      activeCompanyId=d.activeCompanyId||null;
      await loadData();
      syncStatus='ok';
      lastSync=new Date().toLocaleTimeString('es-ES');
      localStorage.setItem('lastSync',lastSync);
      // Reset active entry to show fresh data
      if(!editingEntry) fEntry=defEntry();
      showAlert('☁️ Datos actualizados desde Drive ('+S.entries.length+' jornadas, '+S.tasks.length+' tareas)');
      rerender();
    }catch(e){ console.error('Import error:',e); showAlert('Error importando: '+e.message,'err'); }
  };
  setTimeout(()=>{ if(!done){ delete window[cbName]; script.remove(); }},10000);
  script.src=driveUrl+'?action=load&callback='+cbName+'&t='+Date.now();
  document.body.appendChild(script);
}

function jsonpGet(params, callback, timeout){
  const cbName='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
  const s=document.createElement('script');
  let done=false;
  window[cbName]=function(res){ done=true; delete window[cbName]; s.remove(); callback(null,res); };
  setTimeout(()=>{ if(!done){ delete window[cbName]; s.remove(); callback('timeout'); } }, timeout||15000);
  s.src=driveUrl+'?callback='+cbName+'&t='+Date.now()+'&'+params;
  document.body.appendChild(s);
}

function driveSync(){
  if(!driveUrl) return;
  const data = buildSyncData();
  if(!data.entries.length && !data.tasks.length){ showAlert('Sin datos que guardar','err'); return; }
  syncStatus='syncing'; rerender();

  // Step 1: Send metadata first (tiny payload)
  const meta={
    version:2,
    exportedAt:data.exportedAt,
    entryCount:data.entries.length,
    taskCount:data.tasks.length,
    worker:data.worker,
    company:data.company,
    sites:data.sites,
    workorders:data.workorders,
    vehicles:data.vehicles,
    workers:data.workers,
    companies:data.companies,
    activeWorkerId:data.activeWorkerId,
    activeCompanyId:data.activeCompanyId
  };

  // Send meta + entries in one go, but minified
  const mini=JSON.stringify(data); // keep all values including zeros and empty strings

  console.log('Data size:',mini.length,'chars');

  // Always use chunked save to handle large data reliably
  // Step 1: save meta (structure without entries)
  const metaMini=JSON.stringify(meta);
  showAlert('Guardando en Drive... ('+data.entries.length+' jornadas)');
  
  jsonpGet('action=save_meta&d='+encodeURIComponent(metaMini), (err,res)=>{
    if(err||!res||!res.ok){ 
      syncStatus='err'; 
      showAlert('❌ Error guardando estructura: '+(err||res&&res.error),'err'); 
      rerender(); return; 
    }
    
    // Step 2: send entries one by one
    let idx=0;
    function sendNext(){
      if(idx>=data.entries.length){
        // Step 3: commit
        jsonpGet('action=commit&total='+data.entries.length, (err2,res2)=>{
          if(!err2&&res2&&res2.ok){
            syncStatus='ok';
            lastSync=new Date().toLocaleTimeString('es-ES');
            localStorage.setItem('lastSync',lastSync);
            showAlert('✅ Drive: '+data.entries.length+' jornadas guardadas completas');
          } else {
            syncStatus='err';
            showAlert('❌ Error al confirmar guardado','err');
          }
          rerender();
        });
        return;
      }
      const entry=data.entries[idx];
      const entryStr=JSON.stringify(entry);
      const encoded=encodeURIComponent(entryStr);
      
      // If single entry is too large, split its journeys
      if(encoded.length > 1500){
        // Send entry without journeys first, then journeys separately
        const entryNoJourneys={...entry, journeys:[]};
        jsonpGet('action=save_entry&idx='+idx+'&d='+encodeURIComponent(JSON.stringify(entryNoJourneys)), (e2,r2)=>{
          if(e2||!r2||!r2.ok){ syncStatus='err'; showAlert('❌ Error entrada '+idx,'err'); rerender(); return; }
          // Send journeys
          const journeysStr=JSON.stringify({idx, journeys: entry.journeys||[]});
          jsonpGet('action=save_journeys&d='+encodeURIComponent(journeysStr), (e3,r3)=>{
            if(e3||!r3||!r3.ok){ syncStatus='err'; showAlert('❌ Error viajes '+idx,'err'); rerender(); return; }
            idx++; sendNext();
          },10000);
        },10000);
      } else {
        jsonpGet('action=save_entry&idx='+idx+'&d='+encoded, (err2,res2)=>{
          if(err2||!res2||!res2.ok){ syncStatus='err'; showAlert('❌ Error entrada '+idx,'err'); rerender(); return; }
          idx++; sendNext();
        },10000);
      }
    }
    sendNext();
  });
}


function buildSyncData(){
  return {
    version:2,
    exportedAt:new Date().toISOString(),
    entries:S.entries,
    tasks:S.tasks.map(t=>({...t,fotos:[]})),
    sites:S.sites,
    workorders:S.workorders,
    vehicles:S.vehicles,
    workers:workers.map(w=>({...w,foto:'',firma:''})),
    companies:companies.map(c=>({...c,logo:''})),
    activeWorkerId, activeCompanyId,
    worker:{...fWorker,foto:'',firma:''},
    company:{...fCompany,logo:''}
  };
}

function driveSync(){
  if(!driveUrl) return;
  const data = buildSyncData();
  if(data.entries.length===0 && data.tasks.length===0){
    showAlert('Sin datos que guardar','err');
    return;
  }
  syncStatus='syncing'; rerender();

  // Minimize data - remove zero/empty values to reduce size
  const mini = JSON.stringify(data, (k,v)=>{
    if(v===0||v===''||v===null||v===false) return undefined;
    if(Array.isArray(v)&&v.length===0) return undefined;
    return v;
  });

  console.log('Sync data size:', mini.length, 'chars');

  // Send via JSONP GET (proven to work - same mechanism as load)
  const cbName = 'save_'+Date.now();
  const script = document.createElement('script');
  let done = false;

  window[cbName] = function(res){
    done=true; delete window[cbName]; script.remove();
    if(res && res.ok){
      syncStatus='ok';
      lastSync=new Date().toLocaleTimeString('es-ES');
      localStorage.setItem('lastSync',lastSync);
      showAlert('✅ Drive guardado: '+data.entries.length+' jornadas');
    } else {
      syncStatus='err';
      showAlert('❌ Error Drive: '+(res&&res.error||'sin respuesta'),'err');
    }
    rerender();
  };

  setTimeout(()=>{
    if(!done){
      delete window[cbName]; script.remove();
      syncStatus='err';
      showAlert('⚠️ Sin respuesta. Comprueba que el script está actualizado a v5.','err');
      rerender();
    }
  },20000);

  const encoded = encodeURIComponent(mini);
  script.src = driveUrl+'?action=save&callback='+cbName+'&d='+encoded+'&t='+Date.now();
  document.body.appendChild(script);
}


function _doLoad(force, verifyMode){
  if(!driveUrl) return;
  syncStatus='syncing'; rerender();
  const cbName='load_'+Date.now();
  const script=document.createElement('script');
  let done=false;

  window[cbName]=async function(result){
    done=true; delete window[cbName]; script.remove();
    if(!result||!result.ok){
      syncStatus='err';
      showAlert('Error cargando Drive: '+(result&&result.error||'sin datos'),'err');
      rerender(); return;
    }
    const d=result.data;
    if(!d||!d.entries||d.entries.length===0){
      syncStatus='ok';
      showAlert('Drive vacío — guarda algo primero desde el PC','err');
      rerender(); return;
    }

    // If both local and Drive have data, always ask
    const localCount = S.entries.length;
    const driveCount = (d.entries||[]).length;

    if(localCount > 0 && driveCount > 0 && !verifyMode){
      S._pendingDriveData = d;
      S.modal = 'merge';
      syncStatus='ok';
      rerender();
      return;
    }

    // Otherwise load directly
    await importDriveData(d, verifyMode);
  };

  setTimeout(()=>{
    if(!done){
      delete window[cbName]; script.remove();
      syncStatus='err';
      showAlert('Sin respuesta de Drive. Comprueba conexión.','err');
      rerender();
    }
  },20000);

  script.src=driveUrl+'?action=load&callback='+cbName+'&t='+Date.now();
  document.body.appendChild(script);
}

async function importDriveData(d, verifyMode){
  try{
    await Promise.all(Object.values(ST).map(s=>dbClear(s)));
    for(const e of(d.entries||[]))  await dbPut(ST.entries,e);
    for(const t of(d.tasks||[]))    await dbPut(ST.tasks,t);
    for(const s of(d.sites||[]))    await dbPut(ST.sites,s);
    for(const w of(d.workorders||[]))await dbPut(ST.workorders,w);
    for(const v of(d.vehicles||[])) await dbPut(ST.vehicles,v);
    for(const w of(d.workers||[]))  await dbPut(ST.workers,w);
    for(const c of(d.companies||[]))await dbPut(ST.companies,c);
    if(d.worker)  fWorker={...defWorker,...d.worker};
    if(d.company) fCompany={...defCompany,...d.company};
    activeWorkerId=d.activeWorkerId||null;
    activeCompanyId=d.activeCompanyId||null;
    await loadData();
    syncStatus='ok';
    lastSync=new Date().toLocaleTimeString('es-ES');
    localStorage.setItem('lastSync',lastSync);
    if(!editingEntry) fEntry=defEntry();
    if(verifyMode){
      showAlert('✅ Drive OK: '+S.entries.length+' jornadas guardadas correctamente');
    } else {
      showAlert('✅ Cargado: '+S.entries.length+' jornadas, '+S.tasks.length+' tareas');
    }
    rerender();
  }catch(e){
    syncStatus='err';
    showAlert('Error importando: '+e.message,'err');
    rerender();
  }
}

async function mergeDriveData(d){
  // Merge: keep local entries that don't exist in Drive, add Drive entries
  try{
    const localEntries = [...S.entries];
    const driveEntries = d.entries||[];

    // Merge by fecha: Drive wins for same date, keep local if not in Drive
    const merged = [];
    const driveDates = new Set(driveEntries.map(e=>e.fecha));

    // Add all Drive entries
    driveEntries.forEach(e=>merged.push(e));

    // Add local entries not in Drive
    localEntries.forEach(e=>{
      if(!driveDates.has(e.fecha)){
        merged.push(e);
      }
    });

    // Sort by date
    merged.sort((a,b)=>a.fecha.localeCompare(b.fecha));

    // Save merged data
    const mergedData = {...d, entries: merged};
    await importDriveData(mergedData, false);
    showAlert('✅ Fusionado: '+merged.length+' jornadas totales');

    // Upload merged data back to Drive
    setTimeout(()=>driveSync(), 2000);
  }catch(e){
    showAlert('Error fusionando: '+e.message,'err');
  }
}

// ── CARGA INICIAL ─────────────────────────────────────────
async function loadData(){
  [S.entries,S.tasks,S.sites,S.workorders,S.vehicles,workers,companies]=await Promise.all([
    dbAll(ST.entries),dbAll(ST.tasks),dbAll(ST.sites),dbAll(ST.workorders),dbAll(ST.vehicles),
    dbAll(ST.workers),dbAll(ST.companies)
  ]);
  // Load active worker/company
  const settings=(await dbAll(ST.settings))[0]||{};
  if(settings.activeWorkerId) activeWorkerId=settings.activeWorkerId;
  if(settings.activeCompanyId) activeCompanyId=settings.activeCompanyId;
  // Legacy single worker/company migration
  if(settings.worker && workers.length===0){
    const id=await dbPut(ST.workers,settings.worker);
    workers=[{...settings.worker,id}];
    activeWorkerId=id;
  }
  if(settings.company && companies.length===0){
    const id=await dbPut(ST.companies,settings.company);
    companies=[{...settings.company,id}];
    activeCompanyId=id;
  }
  // Set active forms
  const aw=workers.find(w=>w.id===activeWorkerId)||workers[0];
  const ac=companies.find(c=>c.id===activeCompanyId)||companies[0];
  if(aw) fWorker={...defWorker,...aw};
  if(ac) fCompany={...defCompany,...ac};
}

function startClock(){
  function tick(){
    const d=new Date();
    const t=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    S.clock=t;
    // Only update clock element, not full rerender
    const el=document.querySelector('.nav-clock');
    if(el) el.textContent=t;
  }
  tick();setInterval(tick,1000);
}
