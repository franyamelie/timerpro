<script>


'use strict';
// ═══════════════════════════════════════════════════════
// TIMERPRO - Control Horario Laboral
// Vanilla JS, sin frameworks, sin compilación
// ═══════════════════════════════════════════════════════

// ── UTILIDADES ──────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
const today = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const firstDayOfMonth = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-01`; };
const nowTime = () => { const d=new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; };
const fmtTime = t => t||'—';
const calcH = (a,b) => { if(!a||!b)return 0; const [ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number); let d=(bh*60+bm)-(ah*60+am); if(d<0)d+=1440; return Math.round(d*100/60)/100; };
const fmtH = h => { if(!h)return '0h'; const hh=Math.floor(h),mm=Math.round((h-hh)*60); return hh>0&&mm>0?`${hh}h ${mm}m`:hh>0?`${hh}h`:`${mm}m`; };
const eur = v => Number(v||0).toFixed(2).replace('.',',')+' €';
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const WDAYS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const WSHORT = ['L','M','X','J','V','S','D'];
const cap = s => s?s.charAt(0).toUpperCase()+s.slice(1):s;
const dlbl = s => { if(!s)return ''; const[y,m,d]=s.split('-'); return `${parseInt(d)} de ${MONTHS[parseInt(m)-1]} de ${y}`; };
const wday = s => { if(!s)return ''; return WDAYS[new Date(s+'T12:00:00').getDay()]; };
// Amount options: 0.50, 1, 1.50, 2 ... 100 (0.50 increments)
const IMPORTE_OPTS = [0.50, ...Array.from({length:100},(_,i)=>i+1)];
const isStdAmount = v => IMPORTE_OPTS.includes(Number(v));

// ── INDEXEDDB ────────────────────────────────────────────
const DB_NAME='TimerProV2',DB_VER=2;
const ST={entries:'entries',tasks:'tasks',sites:'sites',workorders:'workorders',vehicles:'vehicles',settings:'settings',workers:'workers',companies:'companies',snapshots:'snapshots'};
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      // SAFE: only ADD new stores, never delete or modify existing ones
      Object.values(ST).forEach(s=>{
        try{
          if(!d.objectStoreNames.contains(s)){
            d.createObjectStore(s,{keyPath:'id',autoIncrement:true});
          }
        }catch(err){ console.warn('Store already exists:',s); }
      });
    };
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror=()=>rej(r.error);
  });
}
const dbAll=st=>new Promise((res,rej)=>{const t=db.transaction(st,'readonly'),r=t.objectStore(st).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const dbPut=(st,obj)=>new Promise((res,rej)=>{const t=db.transaction(st,'readwrite'),r=t.objectStore(st).put(obj);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const dbDel=(st,id)=>new Promise((res,rej)=>{const t=db.transaction(st,'readwrite'),r=t.objectStore(st).delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const dbClear=st=>new Promise((res,rej)=>{const t=db.transaction(st,'readwrite'),r=t.objectStore(st).clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});

// ── ESTADO GLOBAL ────────────────────────────────────────
const S = {
  tab:'fichar', dark:true,
  entries:[], tasks:[], sites:[], workorders:[], vehicles:[], settings:{},
  // Jornada activa
  entry:null,
  // Modales
  modal:null,
  // Alerta
  alertMsg:null, alertType:'ok', alertTimer:null,
  // Reloj
  clock:'',
};

// ── DEFAULTS ─────────────────────────────────────────────
const defEntry = () => ({
  fecha:today(), fichajes:[], horasNormales:0, precioHoraNormal:0, importeNormales:0,
  horasExtra:0, precioHoraExtra:0, importeExtra:0, horasNocturnas:0, precioHoraNocturna:0, importeNocturnas:0,
  horasFestivas:0, precioHoraFestiva:0, importeFestivas:0, dieta:0, dietasExtra:[], transporte:0,
  otrosConceptos:[], notas:'', journeys:[], ubicacionEntrada:'', ubicacionSalida:'',
  entradaLocked:false, fotosGastos:[]
});
const defFichaje = () => ({_fid:Date.now(), entrada:'', salida:'', nota:'', editing:false, taskId:'', timerRunning:false, timerStart:null});
const defTask = f => ({fecha:f||today(), titulo:'', horaInicio:nowTime(), horaFin:'', descripcion:'', siteId:'', workOrderId:'', otNumero:'', usaOT:false, fotos:[]});
const defJourney = () => ({vehicleId:'', tipoManual:'coche', precioManual:0.19, origen:'', destino:'', km:0, horaInicio:nowTime(), horaFin:''});
const defWorker = {nombre:'',apellidos:'',dni:'',cargo:'',departamento:'',email:'',telefono:'',numSS:'',fechaAlta:'',convenio:'',firma:'',foto:''};
const defCompany = {nombre:'',cif:'',direccion:'',ciudad:'',cp:'',telefono:'',email:'',web:'',logo:''};
const defSite = {nombre:'',direccion:'',ciudad:'',telefono:'',notas:'',lat:'',lng:'',acc:0};
const defWO = {codigo:'',descripcion:'',cliente:'',notas:''};
const defVehicle = {nombre:'',tipo:'coche',matricula:'',precioPorKm:0.19,notas:''};

// Formularios
let fEntry = defEntry();
let _skipDomCapture = false; // prevent DOM contamination when switching days
let fTask = defTask();

// ── PERSISTENT FORM STATE ──────────────────────────
// Save/restore entire fEntry to localStorage so data
// survives tab switches, rerenders, and sync operations
function persistEntry(){
  try{ localStorage.setItem('_fEntry', JSON.stringify(fEntry)); }catch(e){}
}
function restoreEntry(){
  try{
    const saved = localStorage.getItem('_fEntry');
    if(!saved) return;
    const e = JSON.parse(saved);
    if(e && e.fecha && e.fecha === fEntry.fecha){
      // Save what must NEVER be overwritten by localStorage
      const fichajes     = fEntry.fichajes;
      const notas        = fEntry.notas;
      const dietasExtra  = fEntry.dietasExtra;
      const otrosConceptos = fEntry.otrosConceptos;
      const journeys     = fEntry.journeys;
      // Restore only simple scalar fields (horas, precios, dieta, etc.)
      fEntry = {...fEntry, ...e};
      // Always restore from memory — these are maintained by event handlers
      fEntry.fichajes      = fichajes;
      fEntry.notas         = notas;
      fEntry.dietasExtra   = dietasExtra;
      fEntry.otrosConceptos= otrosConceptos;
      fEntry.journeys      = journeys;
    }
  }catch(e){}
}

// ── RENDER ENGINE ────────────────────────────────────────
function h(tag, attrs, ...children){
  const el = document.createElement(tag);
  const BOOL=['selected','checked','disabled','multiple','readonly','required','autofocus','spellcheck'];
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='on') Object.entries(v).forEach(([ev,fn])=>el.addEventListener(ev,fn));
    else if(k==='class') el.className=v;
    else if(k==='html') el.innerHTML=v;
    else if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(k==='data') Object.entries(v).forEach(([dk,dv])=>el.dataset[dk]=dv);
    else if(k==='spellcheck'){ el.spellcheck=(v===true||v===''||v==='true'); el.setAttribute('spellcheck',v?'true':'false'); }
    else if(BOOL.includes(k)){ el[k]=(v===true||v===''||v==='true'); }
    else if(k==='value'&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA')){
      el.setAttribute('value',v); // set default
      el.value=v; // also set current value property
    }
    else if(v!==false&&v!==null&&v!==undefined) el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c===null||c===undefined||c===false)return;
    if(el.tagName==='TEXTAREA'&&(typeof c==='string'||typeof c==='number')){
      el.value=String(c);
    } else {
      el.appendChild(typeof c==='string'||typeof c==='number' ? document.createTextNode(c) : c);
    }
  });
  return el;
}

let renderScheduled = false;

// Set innerHTML for all contenteditable fieldArea divs after render
let _fieldAreaData = {};
function registerFieldArea(id, html){
  _fieldAreaData[id] = html;
}
function initFieldAreas(){
  requestAnimationFrame(()=>{
    Object.entries(_fieldAreaData).forEach(([id,html])=>{
      const el=document.getElementById(id);
      if(!el || document.activeElement===el) return;
      if(el.tagName==='TEXTAREA'){
        if(el.value!==html) el.value=html||'';
      } else if(el.contentEditable==='true'){
        if(el.innerHTML!==html) el.innerHTML=html||'';
      }
    });
    _fieldAreaData={};
  });
}


// Attach direct DOM event listeners to fichaje inputs after each render
// This is more reliable than virtual DOM events for critical form state
function attachFichajeListeners(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('.fich-row').forEach((row,i)=>{
      if(!fEntry.fichajes[i]) return;
      const times=row.querySelectorAll('input[type="text"]'); // fichaje inputs are type=text
      if(times[0]){
        times[0].oninput=ev=>{ if(fEntry.fichajes[i]&&ev.target.value) fEntry.fichajes[i].entrada=ev.target.value; };
        times[0].onblur=ev=>{ if(fEntry.fichajes[i]&&ev.target.value){ fEntry.fichajes[i].entrada=ev.target.value; scheduleDraftSave(); } };
      }
      if(times[1]){
        times[1].oninput=ev=>{ if(fEntry.fichajes[i]&&ev.target.value) fEntry.fichajes[i].salida=ev.target.value; };
        times[1].onblur=ev=>{ if(fEntry.fichajes[i]&&ev.target.value){ fEntry.fichajes[i].salida=ev.target.value; scheduleDraftSave(); } };
      }
      // Textarea for nota
      const nota=row.querySelector('textarea');
      if(nota){
        nota.oninput=ev=>{ if(fEntry.fichajes[i]) fEntry.fichajes[i].nota=ev.target.value; };
        nota.onblur=ev=>{ if(fEntry.fichajes[i]){ fEntry.fichajes[i].nota=ev.target.value; scheduleDraftSave(); } };
      }
    });
    // Set spellcheck attribute explicitly on all textareas and contenteditable
    document.querySelectorAll('textarea,div[contenteditable]').forEach(el=>{
      el.setAttribute('spellcheck','true');
      el.setAttribute('lang','es');
    });
  });
}

function rerenderSetNotas(){
  requestAnimationFrame(()=>{
    const el=document.getElementById('notas-editor');
    if(el && el.contentEditable==='true' && document.activeElement!==el){
      // Read from localStorage first (most up to date), then fEntry
      // Use fEntry.notas as single source of truth (avoids contamination from localStorage)
      const val = fEntry.notas || '';
      if(el.innerHTML!==val) el.innerHTML=val;
    }
  });
}
function rerender(){
  if(renderScheduled)return;
  renderScheduled=true;
  requestAnimationFrame(()=>{ renderScheduled=false; renderApp(); });
}


// Capture ALL current DOM input values into fEntry before each render
// This prevents data loss when theme changes, tab switches, or auto-rerenders happen
function captureFormState(){
  if(_skipDomCapture) return; // switching days — don't read stale DOM
  try{

    // Read notas FIRST before persisting (fix: was saving stale data)
    const notasElFirst=document.getElementById('notas-editor');
    if(notasElFirst && notasElFirst.innerHTML.trim()){
      fEntry.notas=notasElFirst.innerHTML;
      localStorage.setItem('notas_'+fEntry.fecha, notasElFirst.innerHTML);
    }
    persistEntry(); // save to localStorage immediately
    const fichRows = document.querySelectorAll('.fich-row');
    const activeEl = document.activeElement;
    fichRows.forEach((row,i)=>{
      if(!fEntry.fichajes[i]) return;
      // Read text inputs in order: first=entrada, second=salida
      const textInputs=Array.from(row.querySelectorAll('input[type="text"]'));
      if(textInputs[0]&&textInputs[0].value) fEntry.fichajes[i].entrada=textInputs[0].value;
      if(textInputs[1]&&textInputs[1].value) fEntry.fichajes[i].salida=textInputs[1].value;
      // Read nota from textarea only
      const notaEl=row.querySelector('textarea');
      if(notaEl) fEntry.fichajes[i].nota=notaEl.value||fEntry.fichajes[i].nota||'';
    });
    const notasEl=document.getElementById('notas-editor');
    if(notasEl && notasEl.innerHTML.trim()){
      fEntry.notas=notasEl.innerHTML;
      localStorage.setItem('notas_'+fEntry.fecha, notasEl.innerHTML);
    }
    // Note: don't read from localStorage notas_fecha - fEntry.notas is source of truth
    // Capture numeric fields
    ['horasNormales','precioHoraNormal','horasExtra','precioHoraExtra',
     'horasNocturnas','precioHoraNocturna','horasFestivas','precioHoraFestiva',
     'dieta','transporte'].forEach(f=>{
      const el=document.querySelector('[data-field="'+f+'"]');
      if(el&&el.value!=='') fEntry[f]=parseFloat(el.value)||0;
    });
  }catch(e){}
}

        h('div',{class:'sec-title',style:{margin:0,flex:1}},'Historial de Jornadas'),
        h('input',{type:'search',placeholder:'Buscar...',value:histSearch,
          style:{fontSize:'.78rem',padding:'.3rem .6rem',borderRadius:'var(--r2)',border:'1px solid var(--brd)',background:'var(--surf2)',color:'var(--ink)',width:'120px'},
          on:{input:ev=>{histSearch=ev.target.value;rerender();}}})
      ),
      S.entries.length===0
        ? h('div',{class:'empty'},'Sin jornadas guardadas')
        : h('div',{},
            ...S.entries.filter(en=>{
              if(!histSearch)return true;
              const q=histSearch.toLowerCase();
              return en.fecha?.includes(q)||en.notas?.toLowerCase().includes(q)||
                wday(en.fecha)?.toLowerCase().includes(q);
            }).slice().reverse().slice(0,30).map(en=>
              h('div',{class:'sum-row',style:{cursor:'pointer'},on:{click:()=>loadHistorial(en)}},
                h('div',{},
                  h('div',{style:{fontWeight:700,fontSize:'.85rem'}},`${cap(wday(en.fecha))}, ${dlbl(en.fecha)}`),
                  h('div',{style:{fontSize:'.72rem',color:'var(--ink2)'}},
                    `${fmtH((en.horasNormales||0)+(en.horasExtra||0)+(en.horasNocturnas||0)+(en.horasFestivas||0))} · ${(en.fichajes||[]).length} fichajes`
                  )
                ),
                h('div',{style:{display:'flex',gap:'.3rem'}},
                  h('button',{class:'btn btn-b btn-sm',title:'Editar jornada',on:{click:ev=>{ev.stopPropagation();loadHistorial(en);}}},'✏️'),
                  h('button',{class:'btn btn-g btn-sm',title:'Guardar jornada actual en este día',on:{click:ev=>{
                    ev.stopPropagation();
                    if(fEntry.fecha !== en.fecha){
                      showAlert('Carga primero esta jornada con ✏️ antes de guardar','err');
                      return;
                    }
                    if(!confirm('¿Guardar la jornada del '+en.fecha+'?')) return;
                    // Read DOM first THEN snapshot (fichajes + notas need DOM read first)
                    captureFormState();
                    const notasEl=document.getElementById('notas-editor');
                    if(notasEl&&notasEl.innerHTML.trim()) fEntry.notas=notasEl.innerHTML;
                    // Read inputs directly before snapshot
                    document.querySelectorAll('.fich-row').forEach((row,i)=>{
                      if(!fEntry.fichajes[i]) return;
                      const ti=Array.from(row.querySelectorAll('input[type="text"]'));
                      if(ti[0]&&ti[0].value) fEntry.fichajes[i].entrada=ti[0].value;
                      if(ti[1]&&ti[1].value) fEntry.fichajes[i].salida=ti[1].value;
                      const nota=row.querySelector('textarea');
                      if(nota) fEntry.fichajes[i].nota=nota.value||fEntry.fichajes[i].nota||'';
                    });
                    const saved={...fEntry,fecha:en.fecha,id:en.id};
                    dbPut(ST.entries,{...saved,_draft:false}).then(()=>{
                      S.entries=S.entries.map(e=>e.id===en.id?{...saved}:e);
                      showAlert('Jornada guardada ✓');
                      rerender();
                    });
                  }}},'💾'),
                  h('button',{class:'btn btn-r btn-sm',title:'Eliminar jornada',on:{click:ev=>{
                    ev.stopPropagation();
                    if(!confirm('¿Eliminar la jornada del '+en.fecha+'? Esta acción no se puede deshacer.')) return;
                    deleteEntry(en.id);
                  }}},'🗑')
                )
              )
            )
          )
    )
  );
}

function renderFichaje(fj,i){
  const ftimer = fichajeTimers[fj._fid]||{running:false,elapsed:0};
  if(ftimer.running && ftimer.start) ftimer.elapsed=Math.floor((Date.now()-ftimer.start)/1000);
  const taskOpts=[{id:'',titulo:'Sin tarea'},...S.tasks];

  const timeInput=(field,fidPart)=>h('div',{style:{display:'flex',alignItems:'center',gap:'.3rem'}},
    h('input',{
      type:'text',
      id:'fich-'+fidPart+'-'+fj._fid,
      value:fj[field]||'',
      placeholder:'--:--',
      maxlength:'5',
      style:{
        background:'var(--surf2)',border:'1.5px solid var(--brd)',
        borderRadius:'var(--r2)',padding:'.35rem .5rem',
        color:'var(--ink)',fontSize:'.9rem',width:'80px',
        cursor:'text',fontFamily:'inherit',textAlign:'center'
      },
      on:{
        input:ev=>{ if(ev.target.value) fEntry.fichajes[i][field]=ev.target.value; },
        blur:ev=>{ if(ev.target.value) fEntry.fichajes[i][field]=ev.target.value; scheduleDraftSave(); },
        change:ev=>{ if(ev.target.value) fEntry.fichajes[i][field]=ev.target.value; scheduleDraftSave(); }
      }
    }),
    // "Ahora" button - sets current time
    h('button',{
      class:'btn btn-b',
      style:{padding:'.3rem .6rem',fontSize:'1.2rem',flexShrink:0,minWidth:'44px'},
      title:'Abrir reloj para seleccionar hora',
      on:{click:()=>{
        showClockPicker(fEntry.fichajes[i][field]||'', v=>{
          fEntry.fichajes[i][field]=v;
          const el=document.getElementById('fich-'+fidPart+'-'+fj._fid);
          if(el) el.value=v;
          scheduleDraftSave();
          rerender();
        });
      }}
    },'🕐')
  );

  return h('div',{class:'fich-row',style:{flexDirection:'column',alignItems:'stretch',padding:'.6rem',gap:'.4rem'}},
    // Row 1: numero + entrada + salida + duracion + timer + borrar
    h('div',{style:{display:'flex',alignItems:'center',gap:'.4rem',flexWrap:'wrap'}},
      h('span',{style:{fontSize:'.75rem',color:'var(--ink2)',minWidth:'16px',fontWeight:700}},i+1+'.'),
      h('div',{style:{display:'flex',alignItems:'center',gap:'.3rem',flex:1,flexWrap:'wrap'}},
        timeInput('entrada','ent'),
        h('span',{style:{color:'var(--ink3)'}},'→'),
        timeInput('salida','sal'),
        fj.entrada&&fj.salida
          ? h('span',{class:'badge badge-g',style:{flexShrink:0}},fmtH(calcH(fj.entrada,fj.salida)))
          : null
      ),
      // Live timer button
      h('button',{
        class:'btn btn-sm '+(ftimer.running?'btn-y':'btn-gh'),
        style:{flexShrink:0,padding:'.25rem .4rem',fontSize:'.7rem'},
        title:ftimer.running?'Pausar':'Iniciar timer',
        on:{click:()=>{
          if(!fichajeTimers[fj._fid]) fichajeTimers[fj._fid]={running:false,elapsed:0,start:null};
          const ft=fichajeTimers[fj._fid];
          if(ft.running){
            ft.running=false; ft.elapsed=Math.floor((Date.now()-ft.start)/1000);
            fEntry.fichajes[i].salida=nowTime();
            scheduleDraftSave();
          } else {
            ft.running=true; ft.start=Date.now()-ft.elapsed*1000;
            if(!fEntry.fichajes[i].entrada) fEntry.fichajes[i].entrada=nowTime();
          }
          rerender();
        }}
      },ftimer.running?'⏸':'▶'),
      // Delete button
      h('button',{class:'btn btn-r btn-sm',style:{flexShrink:0},
        on:{click:()=>{
          fEntry.fichajes=[...fEntry.fichajes.slice(0,i),...fEntry.fichajes.slice(i+1)];
          delete fichajeTimers[fj._fid];
          scheduleDraftSave(); rerender();
        }}},'✕')
    ),
    // Row 2: nota + tarea asociada
    h('div',{style:{display:'flex',gap:'.4rem',alignItems:'center'}},
      h('textarea',{
        spellcheck:true,lang:'es',rows:1,
        placeholder:'Nota del fichaje...',
        style:{flex:1,background:'var(--surf2)',border:'1px solid var(--brd)',
               borderRadius:'var(--r2)',padding:'.3rem .5rem',color:'var(--ink)',
               fontSize:'.8rem',resize:'vertical',fontFamily:'inherit',
               minHeight:'30px',maxHeight:'80px'},
        on:{
          input:ev=>{fEntry.fichajes[i].nota=ev.target.value;},
          blur:ev=>{fEntry.fichajes[i].nota=ev.target.value;scheduleDraftSave();}
        }
      },fj.nota||''),
      h('select',{
        style:{background:'var(--surf2)',border:'1px solid var(--brd)',borderRadius:'var(--r2)',
               padding:'.3rem .4rem',color:'var(--ink)',fontSize:'.75rem',maxWidth:'130px'},

      },
        ...taskOpts.map(t=>h('option',{value:t.id||'',selected:(t.id||'')===(fj.taskId||'')?true:false},
          t.id?(t.titulo||'Tarea').slice(0,20)+(t.otNumero?' ['+t.otNumero+']':''):'Sin tarea'
        ))
      )
    ),
    ftimer.running
      ? h('div',{id:'fichaje-timer-'+fj._fid,style:{fontSize:'.72rem',color:'var(--acc)',fontWeight:700}},
          '⏱ En curso: '+formatTimer(ftimer.elapsed))
      : null
  );
}

function renderWeekView(){
  const now = new Date(selDate+'T12:00:00');
  const dow = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dow===0?6:dow-1));
  const days = Array.from({length:7},(_,i)=>{
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    return d.toISOString().slice(0,10);
  });
  return h('div',{},
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px',marginBottom:'.5rem'}},
      ...days.map(ds=>{
        const entry=S.entries.find(e=>e.fecha===ds);
        const tasks=S.tasks.filter(t=>t.fecha===ds);
        const isToday=ds===today();
        const isSel=ds===selDate;
        return h('div',{
          style:{
            background:isSel?'var(--acc)':isToday?'var(--acc-lt)':'var(--surf2)',
            color:isSel?'#000':'var(--ink)',
            borderRadius:'var(--r2)',padding:'.5rem .3rem',
            cursor:'pointer',minHeight:'80px',fontSize:'.75rem',
            border:'1px solid '+(isSel?'var(--acc)':'var(--brd)')
          },
          on:{
  click:()=>{selDate=ds;rerender();},
  dblclick:()=>goToDay(ds)
}
        },
          h('div',{style:{fontWeight:700,fontSize:'.8rem',marginBottom:'.2rem'}},
            WSHORT[days.indexOf(ds)]+' '+parseInt(ds.slice(8))
          ),
          entry?h('div',{style:{background:'var(--acc)',color:'#000',borderRadius:'4px',padding:'1px 3px',marginBottom:'2px',fontSize:'.65rem'}},
            fmtH((entry.horasNormales||0)+(entry.horasExtra||0)+(entry.horasNocturnas||0)+(entry.horasFestivas||0))
          ):null,
          tasks.length>0?h('div',{style:{background:'var(--blu-lt)',color:'var(--blu)',borderRadius:'4px',padding:'1px 3px',fontSize:'.65rem'}},
            tasks.length+' tarea'+(tasks.length>1?'s':'')
          ):null
        );
      })
    )
  );
}

function renderCalendario(){
  const year=calYear, month=calMonth;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const offset=(firstDay+6)%7; // Monday first
  const cells=[];
  for(let i=0;i<offset;i++)cells.push({d:null});
  for(let d=1;d<=daysInMonth;d++)cells.push({d,curr:true});
  
  return h('div',{},
    h('div',{class:'card'},
      h('div',{class:'cal-nav'},
        h('button',{on:{click:()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--;}rerender();}}},'◄'),
        h('span',{},MONTHS[month].toUpperCase()+' '+year),
        h('button',{on:{click:()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++;}rerender();}}},'►'),
        h('button',{
          class:'btn btn-gh btn-sm',
          style:{fontSize:'.7rem',padding:'.2rem .5rem'},
          on:{click:()=>{calView=calView==='month'?'week':'month';rerender();}}
        },calView==='month'?'Semana':'Mes')
      ),
      calView==='week' ? renderWeekView() :
      h('div',{class:'cal-grid'},
        ...WSHORT.map(d=>h('div',{class:'cal-dn'},d)),
        ...cells.map(cell=>{
          if(!cell.d)return h('div',{class:'cal-day other-month'});
          const ds=`${year}-${pad(month+1)}-${pad(cell.d)}`;
          const hasEntry=S.entries.some(e=>e.fecha===ds);
          const hasTasks=S.tasks.some(t=>t.fecha===ds);
          const isToday=ds===today();
          const isSel=ds===selDate;
          let cls='cal-day';
          const isWorked = hasEntry;
          const isHol = isHolidayES(ds);
          const isVac = isVacacion(ds);
          const dow = new Date(ds+'T12:00:00').getDay(); // 0=Sun,6=Sat
          const isWeekend = dow===0||dow===6;
          if(isSel) cls+=' selected';
          else if(isToday) cls+=' today';
          // Weekends and holidays in red UNLESS worked
          if((isWeekend||isHol) && !isWorked) cls+=' weekend-rest';
          // Add ALL applicable classes
          if(isWorked) cls+=' worked';
          if(isHol) cls+=' holiday';

function goToDay(ds){
  // Save current day before switching
  try{
    const notasEl=document.getElementById('notas-editor');
    if(notasEl && fEntry.fecha && notasEl.innerHTML.trim()){
      fEntry.notas=notasEl.innerHTML;
      localStorage.setItem('notas_'+fEntry.fecha, notasEl.innerHTML);
      persistEntry();
    }
  }catch(e){}
  pauseAndSaveTimerForDay(); // save current day's timer
  localStorage.removeItem('_fEntry');
  _skipDomCapture=true;
  // Navigate to Fichar tab for specific date
  const existing=S.entries.find(e=>e.fecha===ds);
  if(existing){
    fEntry={...existing, fichajes:[...(existing.fichajes||[]).map(f=>({...f}))], dietasExtra:[...(existing.dietasExtra||[])], otrosConceptos:[...(existing.otrosConceptos||[])], journeys:[...(existing.journeys||[])]};
    // notas come from DB entry
    editingEntry=true;
  } else {
    fEntry={...defEntry(), fecha:ds};
    editingEntry=false;
  }
  selDate=null;
  S.tab='fichar';
  restoreTimerForDay(ds); // restore this day's timer if it has one
  rerender();
  requestAnimationFrame(()=>{ _skipDomCapture=false; });
  window.scrollTo(0,0);
}

async function searchSiteAddress(){
  const input=document.getElementById('site-search-input');
  const q=input?.value?.trim();
  if(!q){ showAlert('Escribe una direccion para buscar','err'); return; }
  const container=document.getElementById('site-search-results');
  if(container) container.innerHTML='<div style="padding:.5rem;font-size:.75rem;color:var(--ink2)">Buscando...</div>';
  try{
    const res=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q)+'&limit=4&addressdetails=1');
    const data=await res.json();
    if(!container) return;
    if(!data.length){ container.innerHTML='<div style="padding:.5rem;font-size:.75rem;color:var(--red)">Sin resultados</div>'; return; }
    container.innerHTML='';
    data.forEach(r=>{
      const btn=document.createElement('div');
      btn.style.cssText='padding:.4rem .6rem;cursor:pointer;font-size:.78rem;border-bottom:1px solid var(--brd);color:var(--ink);background:var(--surf2)';
      btn.textContent=r.display_name;
      btn.onmouseenter=()=>btn.style.background='var(--surf3)';
      btn.onmouseleave=()=>btn.style.background='var(--surf2)';
      btn.onclick=()=>{
        fSite.lat=parseFloat(r.lat).toFixed(6);
        fSite.lng=parseFloat(r.lon).toFixed(6);
        fSite.direccion=r.display_name.split(',').slice(0,2).join(',').trim();
        if(!fSite.ciudad) fSite.ciudad=r.address?.city||r.address?.town||r.address?.village||'';
        if(!fSite.nombre) fSite.nombre=fSite.direccion;
        container.innerHTML='';
        rerender();
      };
      container.appendChild(btn);
    });
  }catch(e){ if(container) container.innerHTML='<div style="padding:.5rem;font-size:.75rem;color:var(--red)">Error buscando</div>'; }
}

function openSiteSelector(tipo){
  S.siteSelector = S.siteSelector===tipo ? null : tipo;

function captureSiteGPS(){
  if(!navigator.geolocation){ showAlert('GPS no disponible','err'); return; }
  showAlert('Obteniendo ubicacion...');
  navigator.geolocation.getCurrentPosition(pos=>{
    fSite.lat=pos.coords.latitude.toFixed(6);
    fSite.lng=pos.coords.longitude.toFixed(6);
    fSite.acc=Math.round(pos.coords.accuracy);
    if(!fSite.direccion) fSite.direccion=fSite.lat+', '+fSite.lng;
    showAlert('GPS capturado (+-'+fSite.acc+'m)');
    rerender();
  },err=>{showAlert('Error GPS: '+err.message,'err');},{enableHighAccuracy:true,timeout:15000});
}

function filterEntries(){
  return S.entries.filter(e=>{
    if(filterFrom && e.fecha < filterFrom) return false;
    if(filterTo && e.fecha > filterTo) return false;
    if(!filterFrom && !filterTo && filterMonth && !e.fecha.startsWith(filterMonth)) return false;
    return true;
  });
}
function filterTasks(){
  return S.tasks.filter(t=>{
    if(filterFrom && t.fecha < filterFrom) return false;
    if(filterTo && t.fecha > filterTo) return false;
    if(!filterFrom && !filterTo && filterMonth && !t.fecha.startsWith(filterMonth)) return false;
    return true;
  });
}

function renderResumen(){
  // Date range
  const from = S.resFrom||firstDayOfMonth();
  const to   = S.resTo  ||today();
  const entries = S.entries
    .filter(e=>e.fecha>=from && e.fecha<=to && e.horasNormales+e.horasExtra+e.horasNocturnas+e.horasFestivas>0)
    .sort((a,b)=>a.fecha.localeCompare(b.fecha));

  // Totals
  const tot = entries.reduce((acc,e)=>({
    hn: acc.hn+(e.horasNormales||0),
    he: acc.he+(e.horasExtra||0),
    hnoc: acc.hnoc+(e.horasNocturnas||0),
    hfes: acc.hfes+(e.horasFestivas||0),
    in: acc.in+(e.importeNormales||0),
    ie: acc.ie+(e.importeExtra||0),
    inoc: acc.inoc+(e.importeNocturnas||0),
    ifes: acc.ifes+(e.importeFestivas||0),
    diet: acc.diet+(e.dieta||0)+(e.dietasExtra||[]).reduce((s,d)=>s+(d.importe||0),0),
    transp: acc.transp+(e.transporte||0),
    otros: acc.otros+(e.otrosConceptos||[]).reduce((s,o)=>s+(o.importe||0),0),
    km: acc.km+(e.journeys||[]).reduce((s,j)=>s+(j.km||0),0),
    viajes: acc.viajes+(e.journeys||[]).reduce((s,j)=>s+(j.km||0)*(j.precioManual||0.19),0),
    dias: acc.dias+1
  }),{hn:0,he:0,hnoc:0,hfes:0,in:0,ie:0,inoc:0,ifes:0,diet:0,transp:0,otros:0,km:0,viajes:0,dias:0});

  const totalH = tot.hn+tot.he+tot.hnoc+tot.hfes;
  const totalI = tot.in+tot.ie+tot.inoc+tot.ifes+tot.diet+tot.transp+tot.otros+tot.viajes;

  // Weekly breakdown
  function getWeekKey(fecha){
    const d=new Date(fecha+'T00:00:00');
    const day=d.getDay()===0?7:d.getDay();
    const mon=new Date(d); mon.setDate(d.getDate()-(day-1));
    return mon.toISOString().slice(0,10);
  }
  const weeks={};
  entries.forEach(e=>{
    const wk=getWeekKey(e.fecha);
    if(!weeks[wk]) weeks[wk]={h:0,i:0,dias:0,label:''};
    weeks[wk].h+=(e.horasNormales||0)+(e.horasExtra||0)+(e.horasNocturnas||0)+(e.horasFestivas||0);
    weeks[wk].i+=(e.importeNormales||0)+(e.importeExtra||0)+(e.importeNocturnas||0)+(e.importeFestivas||0)+(e.dieta||0)+(e.transporte||0)+(e.journeys||[]).reduce((s,j)=>s+(j.km||0)*(j.precioManual||0.19),0);
    weeks[wk].dias++;
    const end2=new Date(wk+'T00:00:00'); end2.setDate(end2.getDate()+6);
    weeks[wk].label='Sem '+wk.slice(8,10)+'/'+wk.slice(5,7);
  });

function renderFirmaCanvas(){
  const canvas = h('canvas',{
    id:'firma-canvas',class:'firma-canvas',
    width:300,height:150,
    style:{width:'100%',maxWidth:'350px',height:'120px'}
  });
  setTimeout(()=>{
    const c=document.getElementById('firma-canvas');
    if(!c)return;
    const ctx=c.getContext('2d');
    ctx.strokeStyle='var(--ink)';ctx.lineWidth=2;ctx.lineCap='round';
    let drawing=false,lx=0,ly=0;
    function getPos(e){
      const r=c.getBoundingClientRect();
      const sx=c.width/r.width,sy=c.height/r.height;
      if(e.touches){return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};}
      return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};
    }
    c.addEventListener('mousedown',e=>{drawing=true;const p=getPos(e);lx=p.x;ly=p.y;});
    c.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=getPos(e);lx=p.x;ly=p.y;},{passive:false});
    function draw(e){
      if(!drawing)return;
      if(e.cancelable)e.preventDefault();
      const p=getPos(e);
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();
      lx=p.x;ly=p.y;
    }
    c.addEventListener('mousemove',draw);
    c.addEventListener('touchmove',draw,{passive:false});
    c.addEventListener('mouseup',()=>drawing=false);
    c.addEventListener('touchend',()=>drawing=false);
  },50);
  return canvas;
}

function renderModalResumenDia(){

  const impDietas = (e.dieta||0)+(e.dietasExtra||[]).reduce((s,d)=>s+(d.importe||0),0);
  const impTransp = e.transporte||0;
  const impOtros = (e.otrosConceptos||[]).reduce((s,o)=>s+(o.importe||0),0);
  const impViajes = (e.journeys||[]).reduce((s,j)=>s+(j.km||0)*(j.vehicleId?
    (S.vehicles.find(v=>v.id==j.vehicleId)?.precioPorKm||0):j.precioManual||0),0);
  const totalI = impHoras+impDietas+impTransp+impOtros+impViajes;

          (e.horasExtra||0)>0?row('Extra ('+e.horasExtra+'h × '+eur(e.precioHoraExtra||0)+')',eur((e.horasExtra||0)*(e.precioHoraExtra||0)),'var(--acc)'):null,
          (e.horasNocturnas||0)>0?row('Nocturnas ('+e.horasNocturnas+'h × '+eur(e.precioHoraNocturna||0)+')',eur((e.horasNocturnas||0)*(e.precioHoraNocturna||0))):null,

async function sendIAMsgPage(){
  const inp=document.getElementById('ia-input-page');
  if(!inp||!inp.value.trim()) return;
  const userMsg=inp.value.trim();
  inp.value='';
  if(!S.iaMsgs) S.iaMsgs=[];
  S.iaMsgs.push({role:'user',content:userMsg});
  rerender();
  setTimeout(()=>{const el=document.getElementById('ia-msgs-page');if(el)el.scrollTop=el.scrollHeight;},50);
  await sendIAMsg._core(userMsg);
}


sendIAMsg._core = async function(userMsg){
  if(!S.iaMsgs) S.iaMsgs=[];
  const entries=S.entries.slice(-30);
  const totalH=entries.reduce((s,e)=>s+(e.horasNormales||0)+(e.horasExtra||0)+(e.horasNocturnas||0)+(e.horasFestivas||0),0);
  const totalI=entries.reduce((s,e)=>s+(e.importeNormales||0)+(e.importeExtra||0)+(e.importeNocturnas||0)+(e.importeFestivas||0)+(e.dieta||0)+(e.transporte||0),0);
  const context='Eres un asistente de TimerPro, app de control horario. Datos: '
    +S.entries.length+' jornadas totales, '
    +totalH.toFixed(1)+'h en ultimas 30 jornadas, '
    +totalI.toFixed(2)+' euros total. '
    +'Tareas: '+S.tasks.length+'. '
    +'Responde en espanol de forma concisa y util.';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        system:context,messages:S.iaMsgs.map(m=>({role:m.role,content:m.content}))})
    });
    const data=await res.json();
    S.iaMsgs.push({role:'assistant',content:data.content?.[0]?.text||'Sin respuesta'});
  }catch(e){
    S.iaMsgs.push({role:'assistant',content:'Error: '+e.message});
  }
  rerender();
  setTimeout(()=>{
    const el=document.getElementById('ia-msgs')||document.getElementById('ia-msgs-page');
    if(el) el.scrollTop=el.scrollHeight;
  },100);
};

async function sendIAMsg(){
  const inp = document.getElementById('ia-input');
  if(!inp||!inp.value.trim()) return;
  const userMsg = inp.value.trim();
  inp.value='';
  if(!S.iaMsgs) S.iaMsgs=[];
  S.iaMsgs.push({role:'user',content:userMsg});
  rerender();

  // Build context from user data
  const entries = S.entries.slice(-30); // last 30 entries
  const totalH = entries.reduce((s,e)=>s+(e.horasNormales||0)+(e.horasExtra||0)+(e.horasNocturnas||0)+(e.horasFestivas||0),0);
  const totalI = entries.reduce((s,e)=>s+(e.importeNormales||0)+(e.importeExtra||0)+(e.importeNocturnas||0)+(e.importeFestivas||0)+(e.dieta||0)+(e.transporte||0),0);
  const context = 'Eres un asistente de TimerPro, app de control horario. Datos del usuario: '
    +'Jornadas: '+S.entries.length
    +', Ultimas 30: '+totalH.toFixed(1)+'h, '+totalI.toFixed(2)+'eur total'
    +', Tareas: '+S.tasks.length
    +'. Responde en espanol, conciso y util.';

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:500,
        system:context,
        messages:S.iaMsgs.map(m=>({role:m.role,content:m.content}))
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Sin respuesta';
    S.iaMsgs.push({role:'assistant',content:reply});
  }catch(e){
    S.iaMsgs.push({role:'assistant',content:'Error conectando con IA: '+e.message});
  }
  rerender();
  setTimeout(()=>{
    const msgs=document.getElementById('ia-msgs');
    if(msgs) msgs.scrollTop=msgs.scrollHeight;
  },100);
}

function field(label, type, value, onChange, attrs={}, placeholder=''){
  // For date/time/select: use change (triggers rerender); for text: use blur to avoid rerender while typing
  const isText = (type==='text'||type==='email'||type==='tel'||type==='number');
  const evts = isText
    ? {
        input:e=>onChange(e.target.value),  // capture every keystroke
        blur:e=>{onChange(e.target.value);scheduleDraftSave();},
        change:e=>{onChange(e.target.value);scheduleDraftSave();}
      }
    : {change:e=>{onChange(e.target.value);rerender();scheduleDraftSave();}};
  const el = h('div',{class:'field'},
    h('label',{},label),
    h('input',Object.assign({type,value:value||'',placeholder,on:evts},attrs))
  );
  return el;
}

function locLabel(loc){
  if(!loc) return '';
  try{ const d=JSON.parse(loc); return d.label||d.address||''; }
  catch(e){ return loc; }
}

function textToLoc(text){
  if(!text) return '';
  // Check if it looks like coordinates
  const coordMatch = text.match(/^(-?\d+\.\d+),\s*(-?\d+\.\d+)$/);
  if(coordMatch){
    const lat=coordMatch[1], lng=coordMatch[2];
    return JSON.stringify({lat,lng,url:'https://www.google.com/maps?q='+lat+','+lng,label:lat+', '+lng});
  }
  // Plain address text
  const encoded=encodeURIComponent(text);
  return JSON.stringify({address:text,url:'https://www.google.com/maps/search/'+encoded,label:text});
}

// Auto-save current entry draft to IndexedDB every 10 seconds
function scheduleDraftSave(){
  if(draftSaveTimer) clearTimeout(draftSaveTimer);
  draftSaveTimer = setTimeout(()=>{
    const notasEl=document.getElementById('notas-editor');
    if(notasEl && notasEl.innerHTML.trim()){
      fEntry.notas=notasEl.innerHTML;
      localStorage.setItem('notas_'+fEntry.fecha, notasEl.innerHTML);
    }
    // Note: don't read from localStorage notas_fecha - fEntry.notas is source of truth
    saveDraft();
  }, 1500);
}

let _draftSaving=false;
// Read all fichaje text inputs from DOM into fEntry (shared helper)
function captureFichajeFromDOM(){
  (fEntry.fichajes||[]).forEach((fj,i)=>{
    const eEl=document.getElementById('fich-ent-'+fj._fid);
    const sEl=document.getElementById('fich-sal-'+fj._fid);

      if(sel) fEntry.fichajes[i].taskId=sel.value||fEntry.fichajes[i].taskId||'';

async function saveDraft(){
  // Capture all DOM values before saving draft
  const notasEl=document.getElementById('notas-editor');
  if(notasEl && notasEl.innerHTML.trim()) fEntry.notas=notasEl.innerHTML;
  // fEntry.fichajes maintained by input handlers
  if(!fEntry.fecha||_draftSaving) return;
  _draftSaving=true;
  try{
    const draft={...fEntry,_draft:true,_savedAt:new Date().toISOString()};
    // Find existing entries for this date
    const allForDate=S.entries.filter(e=>e.fecha===fEntry.fecha);
    const finalized=allForDate.find(e=>!e._draft && e.id===fEntry.id); // only match same id
    const draftEntry=allForDate.find(e=>e._draft);
    // Remove duplicate entries for same date (keep newest)
    if(allForDate.length>1){
      const keep=finalized||draftEntry;
      for(const e of allForDate){
        if(e!==keep && e.id && e.id!==fEntry.id){
          await dbDelete(ST.entries,e.id);
          S.entries=S.entries.filter(x=>x.id!==e.id);
        }
      }
    }
    if(fEntry.id){
      // Only update if entry is a draft - never overwrite finalized with draft
      const existingEntry=S.entries.find(e=>e.id===fEntry.id);
      if(existingEntry && !existingEntry._draft){
        // Entry is finalized - skip draft save to avoid corruption
      } else {
        await dbPut(ST.entries,draft);
        S.entries=S.entries.map(e=>e.id===fEntry.id?{...draft}:e);
        if(!S.entries.find(e=>e.id===fEntry.id)) S.entries.push({...draft});
      }
    } else if(finalized){
      // Don't overwrite a finalized entry with a draft
      fEntry.id=finalized.id;
    } else if(draftEntry){
      draft.id=draftEntry.id;
      fEntry.id=draftEntry.id;
      await dbPut(ST.entries,draft);
      S.entries=S.entries.map(e=>e.id===draftEntry.id?{...draft}:e);
    } else {
      const id=await dbPut(ST.entries,draft);
      fEntry.id=id;
      S.entries.push({...draft,id});
    }
    localStorage.setItem('lastSave',new Date().toISOString());
  }catch(e){console.warn('Draft save:',e);}
  finally{_draftSaving=false;}
}

function latLngToTile(lat, lng, z){
  const x = Math.floor((lng + 180) / 360 * Math.pow(2, z));
  const latRad = lat * Math.PI / 180;
  const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1/Math.cos(latRad)) / Math.PI) / 2 * Math.pow(2, z));
  return {x, y, z};
}

async function saveAsTemplate(){
  if(!fEntry.horasNormales&&!fEntry.horasExtra&&!fEntry.dieta){

  }
  const name=prompt('Nombre de la plantilla:');

  const tmpl={
    name,
    horasNormales:fEntry.horasNormales,precioHoraNormal:fEntry.precioHoraNormal,importeNormales:fEntry.importeNormales,
    horasExtra:fEntry.horasExtra,precioHoraExtra:fEntry.precioHoraExtra,importeExtra:fEntry.importeExtra,

function gpsDisplay(loc){
  if(!loc) return h('div',{style:{fontSize:'.75rem',color:'var(--ink3)'}},'No registrada');
  try{
    const d=JSON.parse(loc);
    const lat=parseFloat(d.lat),lng=parseFloat(d.lng);
    if(!lat||!lng) throw new Error('no coords');
    const mapImgUrl = d.mapImg || ('https://staticmap.openstreetmap.de/staticmap.php?center='+lat+','+lng+'&zoom=16&size=300x130&markers='+lat+','+lng+',red-pushpin');
    return h('div',{style:{marginTop:'.4rem'}},
      h('a',{href:d.url,target:'_blank',rel:'noopener',style:{display:'block',textDecoration:'none'}},
        h('div',{style:{position:'relative',borderRadius:'var(--r)',overflow:'hidden',border:'2px solid var(--acc)',maxWidth:'300px',cursor:'pointer',boxShadow:'var(--sh)',height:'130px',backgroundColor:'#e8f4f8'}},
          h('img',{src:mapImgUrl,style:{width:'100%',height:'100%',objectFit:'cover'},
            onerror:"this.style.display='none';this.nextSibling.style.display='flex'"}),
          h('div',{style:{display:'none',position:'absolute',inset:0,alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'.3rem',color:'var(--ink2)',fontSize:'.75rem'}},
            h('span',{style:{fontSize:'1.5rem'}},'🗺️'),
            h('span',{},'Ver en Google Maps')
          ),
          h('div',{style:{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-100%)',fontSize:'2rem',lineHeight:1,filter:'drop-shadow(0 2px 4px rgba(0,0,0,.5))'}},"\u{1F4CD}"),
          h('div',{style:{position:'absolute',bottom:'0',left:'0',right:'0',background:'rgba(0,0,0,.75)',color:'#fff',padding:'.35rem .6rem',fontSize:'.72rem',display:'flex',alignItems:'center',gap:'.4rem'}},
            h('div',{style:{flex:1}},
              h('div',{style:{fontWeight:700,fontSize:'.78rem'}},d.acc?'\u00b1'+d.acc+'m de precision':'Ubicacion GPS'),
              h('div',{style:{opacity:.8,fontSize:'.68rem'}},d.label)
            ),
            h('div',{style:{background:'var(--acc)',color:'#000',padding:'.2rem .5rem',borderRadius:'20px',fontSize:'.68rem',fontWeight:700}},'Maps \u2192')
          )
        )
      )
    );
  }catch(e){
    let label=loc,url='';
    try{const d=JSON.parse(loc);label=d.label||d.address||loc;url=d.url||'';}catch(ex){
      const parts=loc.split(',').map(s=>s.trim());
      if(parts.length===2)url='https://www.google.com/maps?q='+parts[0]+','+parts[1];
    }
    if(url)return h('a',{href:url,target:'_blank',rel:'noopener',style:{fontSize:'.8rem',color:'var(--acc)',textDecoration:'none'}},label);
    return h('div',{style:{fontSize:'.75rem',color:'var(--ink2)'}},label);
  }
}

async function captureGPS(tipo){
  if(!navigator.geolocation){
    showAlert('GPS no disponible. Escribe la dirección manualmente.','err');
    return;
  }
  showAlert('📍 Obteniendo ubicación…');
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const lat=pos.coords.latitude.toFixed(6);
      const lng=pos.coords.longitude.toFixed(6);
      const acc=Math.round(pos.coords.accuracy);
      // Static map preview using OpenStreetMap (free, no API key)
      const mapImg='https://staticmap.openstreetmap.de/staticmap.php?center='+lat+','+lng+'&zoom=16&size=300x150&markers='+lat+','+lng+',red-pushpin';
      const mapsUrl='https://www.google.com/maps?q='+lat+','+lng;
      const loc=JSON.stringify({lat,lng,url:mapsUrl,label:lat+', '+lng,acc});
      if(tipo==='entrada')fEntry.ubicacionEntrada=loc;
      else fEntry.ubicacionSalida=loc;
      showAlert('✅ Ubicación capturada (±'+acc+'m)');
      rerender();
    },
    err=>{
      const msgs={1:'Permiso denegado. Actívalo en Ajustes del navegador.',2:'GPS no disponible.',3:'Tiempo agotado.'};
      showAlert(msgs[err.code]||'Error GPS','err');
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}

let _isSaving = false;
async function saveEntry(){
  if(!fEntry.fecha){showAlert('Selecciona una fecha','err');return;}
  if(_isSaving) return;
  _isSaving = true;
  // Read notas from contenteditable div (not textarea)
  const notasEl = document.getElementById('notas-editor');
  if(notasEl && notasEl.innerHTML.trim()) fEntry.notas=notasEl.innerHTML;
  // Also capture all form inputs before saving
  captureFormState();
  // Extra safety: read any focused contenteditable
  if(document.activeElement && document.activeElement.contentEditable==='true'){
    if(document.activeElement.id==='notas-editor') fEntry.notas=document.activeElement.innerHTML;
  }
  try{
    // Check for duplicate date
    const existing = S.entries.find(e=>e.fecha===fEntry.fecha && e.id!==fEntry.id && !e._draft);
    if(existing){
      if(!confirm('Ya existe una jornada para el '+fEntry.fecha+'. ¿Sobreescribir con los datos actuales?')) return;
      // Merge: delete old, save new with old id
      fEntry.id = existing.id;
      editingEntry = true;
    }
    // Delete any draft entries for this date before saving final
    const draftsForDate = S.entries.filter(e=>e.fecha===fEntry.fecha && e._draft && e.id!==fEntry.id);
    for(const d of draftsForDate){
      try{ await dbDel(ST.entries, d.id); }catch(e){}
    }
    S.entries = S.entries.filter(e=>!(e.fecha===fEntry.fecha && e._draft && e.id!==fEntry.id));

    // BULLETPROOF: read ALL fichaje times directly from DOM right before saving
    // Read ALL fichaje inputs directly before saving
    document.querySelectorAll('.fich-row').forEach((row,i)=>{
      if(!fEntry.fichajes[i]) return;
      const ti=Array.from(row.querySelectorAll('input[type="text"]'));
      if(ti[0]&&ti[0].value) fEntry.fichajes[i].entrada=ti[0].value;
      if(ti[1]&&ti[1].value) fEntry.fichajes[i].salida=ti[1].value;
      const nota=row.querySelector('textarea');
      if(nota) fEntry.fichajes[i].nota=nota.value||fEntry.fichajes[i].nota||'';
    });
    console.log('SAVE fichajes:', JSON.stringify((fEntry.fichajes||[]).map(f=>({e:f.entrada,s:f.salida}))));
    if(editingEntry&&fEntry.id){
      await dbPut(ST.entries,{...fEntry,_draft:false});
      S.entries=S.entries.map(e=>e.id===fEntry.id?{...fEntry,_draft:false}:e);
    } else {
      const id=await dbPut(ST.entries,{...fEntry,_draft:false});
      fEntry.id=id;
      S.entries.push({...fEntry,id,_draft:false});
    }
    editingEntry=false;
    localStorage.removeItem('_fEntry');
    // Clear notas localStorage key for this date to avoid future contamination
    localStorage.removeItem('notas_'+fEntry.fecha);
    fEntry=defEntry();
    localStorage.setItem('lastSave',new Date().toISOString());
    saveLocalBackup();
    showAlert('Jornada guardada ✓');
    _isSaving = false;
    rerender();
  }catch(e){ _isSaving = false; showAlert(e.message,'err');}
}

// Clean up any existing duplicates
async function deduplicateEntries(){
  const seen={};
  const toDelete=[];
  S.entries.sort((a,b)=>b.id-a.id); // keep newest
  S.entries.forEach(e=>{
    if(seen[e.fecha]) toDelete.push(e.id);
    else seen[e.fecha]=true;
  });
  for(const id of toDelete){
    await dbDelete(ST.entries,id);
    S.entries=S.entries.filter(e=>e.id!==id);
  }
  if(toDelete.length) showAlert('Se eliminaron '+toDelete.length+' jornadas duplicadas');
}

function pauseAndSaveTimerForDay(){
  // Called when switching away from current day
  // Saves timer state tied to current day's fecha
  if(timerRunning){
    timerElapsed = Math.floor((Date.now()-timerStart)/1000);
    clearInterval(timerInterval);
    timerInterval=null;
    timerRunning=false;
    localStorage.setItem('timerState', JSON.stringify({
      running:false, start:timerStart, fecha:fEntry.fecha||today(),
      elapsed:timerElapsed, deduct:timerDeduct
    }));
  }
}

function restoreTimerForDay(fecha){
  // Restore timer state for the new day
  timerRunning=false;
  timerStart=null;
  timerElapsed=0;
  timerDeduct=30;
  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  try{
    const saved=localStorage.getItem('timerState');
    if(!saved) return;
    const ts=JSON.parse(saved);
    if(ts.fecha !== fecha) return; // timer belongs to a different day
    timerStart=ts.start;
    timerElapsed=ts.elapsed||Math.floor((Date.now()-ts.start)/1000);
    timerDeduct=ts.deduct||30;
    if(ts.running){
      timerRunning=true;
      timerStart=Date.now()-timerElapsed*1000;
      timerInterval=setInterval(()=>{ timerElapsed=Math.floor((Date.now()-timerStart)/1000); updateTitle(); },1000);
    }
  }catch(e){}
}

function loadHistorial(entry){
  // Save current day's notas before switching
  try{
    const notasEl=document.getElementById('notas-editor');
    if(notasEl && fEntry.fecha && notasEl.innerHTML.trim()){
      fEntry.notas=notasEl.innerHTML;
      localStorage.setItem('notas_'+fEntry.fecha, notasEl.innerHTML);
      persistEntry();
    }
  }catch(e){}
  pauseAndSaveTimerForDay(); // save current day's timer before switching
  // Clear stale _fEntry so restoreEntry can't merge old day's data
  localStorage.removeItem('_fEntry');
  // Load the new day — flag tells captureFormState to NOT read old DOM
  _skipDomCapture=true;
  fEntry={...entry,fichajes:[...(entry.fichajes||[])],dietasExtra:[...(entry.dietasExtra||[])],otrosConceptos:[...(entry.otrosConceptos||[])],journeys:[...(entry.journeys||[])]};
  // notas come from the DB entry — don't override with localStorage
  editingEntry=true;
  S.tab='fichar';
  restoreTimerForDay(entry.fecha); // restore this day's timer if it has one
  rerender();
  requestAnimationFrame(()=>{ _skipDomCapture=false; });
}

// Schedule auto-sync to Drive after local save
function renderCharts(){
  if(S.tab!=='resumen') return;
  setTimeout(()=>{
    const canvas1=document.getElementById('chart-horas');
    const canvas2=document.getElementById('chart-import');
    if(!canvas1||!canvas2) return;
    // Force layout recalc
    canvas1.style.width='100%'; canvas2.style.width='100%';

    // Group entries by month
    const byMonth={};
    filterEntries().forEach(e=>{
      const m=e.fecha.slice(0,7);
      if(!byMonth[m])byMonth[m]={hn:0,he:0,hnoc:0,hf:0,imp:0};
      byMonth[m].hn+=(+e.horasNormales||0);
      byMonth[m].he+=(+e.horasExtra||0);
      byMonth[m].hnoc+=(+e.horasNocturnas||0);
      byMonth[m].hf+=(+e.horasFestivas||0);
      byMonth[m].imp+=(+e.importeNormales||0)+(+e.importeExtra||0)+(+e.importeNocturnas||0)+(+e.importeFestivas||0)+(+e.dieta||0)+(+e.transporte||0);
    });

    const months=Object.keys(byMonth).sort().slice(-12);
    if(!months.length) return;

    const labels=months.map(m=>MONTHS[parseInt(m.slice(5))-1].slice(0,3)+' '+m.slice(2,4));
    const isDark=S.dark;
    const textColor=isDark?'#999':'#555';
    const gridColor=isDark?'rgba(255,255,255,.08)':'rgba(0,0,0,.08)';

    function drawBarChart(canvas, datasets, title){
      const ctx=canvas.getContext('2d');
      const dpr=window.devicePixelRatio||1;
      const W=canvas.offsetWidth||canvas.parentElement?.offsetWidth||600;
      const H=200;
      canvas.width=W*dpr; canvas.height=H*dpr;
      ctx.scale(dpr,dpr);
      ctx.clearRect(0,0,W,H);

      const PAD={t:24,r:10,b:30,l:45};
      const cW=W-PAD.l-PAD.r;
      const cH=H-PAD.t-PAD.b;

      // Title
      ctx.fillStyle=textColor;ctx.font='bold 10px sans-serif';
      ctx.textAlign='center';ctx.fillText(title,W/2,14);

      // Max value
      const allVals=datasets.flatMap(d=>d.data);
      const maxVal=Math.max(...allVals,1);

      // Grid lines
      for(let i=0;i<=4;i++){
        const yy=PAD.t+cH-(i/4)*cH;
        ctx.strokeStyle=gridColor;ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(PAD.l,yy);ctx.lineTo(W-PAD.r,yy);ctx.stroke();
        ctx.fillStyle=textColor;ctx.font='9px sans-serif';ctx.textAlign='right';
        ctx.fillText(Math.round(maxVal*i/4),PAD.l-4,yy+3);
      }

      const groupW=cW/months.length;
      const barW=Math.min(groupW/(datasets.length+1),20);

      months.forEach((m,mi)=>{
        // X label
        ctx.fillStyle=textColor;ctx.font='9px sans-serif';ctx.textAlign='center';
        ctx.fillText(labels[mi],PAD.l+mi*groupW+groupW/2,H-8);

        datasets.forEach((ds,di)=>{
          const val=ds.data[mi]||0;
          const barH=(val/maxVal)*cH;
          const x=PAD.l+mi*groupW+(di-(datasets.length-1)/2)*barW+groupW/2-barW/2;
          const y=PAD.t+cH-barH;
          ctx.fillStyle=ds.color;
          ctx.beginPath();
          ctx.roundRect?ctx.roundRect(x,y,barW,barH,2):ctx.rect(x,y,barW,barH);
          ctx.fill();
        });
      });

      // Legend
      let lx=PAD.l;
      datasets.forEach(ds=>{
        ctx.fillStyle=ds.color;ctx.fillRect(lx,H-PAD.b+6,10,6);
        ctx.fillStyle=textColor;ctx.font='8px sans-serif';ctx.textAlign='left';
        ctx.fillText(ds.label,lx+12,H-PAD.b+13);
        lx+=ctx.measureText(ds.label).width+24;
      });
    }

    drawBarChart(canvas1,[
      {label:'Normales',data:months.map(m=>byMonth[m].hn),color:'#22c55e'},
      {label:'Extra',data:months.map(m=>byMonth[m].he),color:'#3b82f6'},
      {label:'Nocturnas',data:months.map(m=>byMonth[m].hnoc),color:'#a855f7'},
      {label:'Festivas',data:months.map(m=>byMonth[m].hf),color:'#f59e0b'}
    ],'Horas por mes');

    drawBarChart(canvas2,[
      {label:'Importe total',data:months.map(m=>byMonth[m].imp),color:'#22c55e'}
    ],'Importes por mes (€)');
  },300);
}

async function importJSON(file){
  if(!file)return;
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(!confirm('¿Importar datos? Se reemplazarán los actuales.'))return;
    await Promise.all(Object.values(ST).filter(s=>s!=='snapshots').map(s=>dbClear(s)));
    for(const e of(data.entries||[]))await dbPut(ST.entries,e);
    for(const t of(data.tasks||[]))await dbPut(ST.tasks,t);
    for(const s of(data.sites||[]))await dbPut(ST.sites,s);
    for(const w of(data.workorders||[]))await dbPut(ST.workorders,w);
    for(const v of(data.vehicles||[]))await dbPut(ST.vehicles,v);
    for(const s of(data.settings||[]))await dbPut(ST.settings,s);
    // Import workers and companies - strip photos (too large for sync)
    for(const w of(data.workers||[]))await dbPut(ST.workers,{...w,foto:'',firma:''});
    for(const c of(data.companies||[]))await dbPut(ST.companies,{...c,logo:''});
    // Set active worker/company
    if(data.activeWorkerId) activeWorkerId=data.activeWorkerId;
    if(data.activeCompanyId) activeCompanyId=data.activeCompanyId;
    // Also handle single worker/company format
    if(data.worker && data.worker.nombre) fWorker={...defWorker,...data.worker};
    if(data.company && data.company.nombre) fCompany={...defCompany,...data.company};
    // Save active IDs to settings
    const settings=(await dbAll(ST.settings))[0]||{};
    await dbPut(ST.settings,{...settings,id:1,activeWorkerId,activeCompanyId});
    await loadData();
    saveLocalBackup();
    showAlert('Datos importados: '+( data.entries||[]).length+' jornadas, '+(data.workers||[]).length+' trabajadores');
    rerender();
  }catch(e){showAlert('Error al importar: '+e.message,'err');}
}

function drawQR(canvasId, text){

  if(!c)return;
  // Use Google Charts API as primary (requires internet)
  const url='https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl='+encodeURIComponent(text.slice(0,500));
  const img=new Image();
  img.onload=()=>{
    const size=200;
    c.width=size;c.height=size;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#fff';ctx.fillRect(0,0,size,size);
    ctx.drawImage(img,0,0,size,size);
  };
  img.onerror=()=>{
    // Fallback: show text to copy
    c.width=200;c.height=200;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#f5f5f5';ctx.fillRect(0,0,200,200);
    ctx.fillStyle='#333';ctx.font='12px monospace';

    if(cont)cont.appendChild(btn);
  };

}

async function importFromTemplate(file){
  if(!file)return;
  if(!window.XLSX){showAlert('Cargando libreria...','err');return;}

  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

    // Find header row (contains 'Fecha')
    let headerIdx=-1;
    for(let i=0;i<rows.length;i++){
      if(rows[i].some(c=>String(c).toLowerCase().includes('fecha'))){
        headerIdx=i; break;
      }
    }
    if(headerIdx<0){showAlert('No se encontro la fila de encabezados','err');return;}

    const headers=rows[headerIdx].map(h=>String(h).toLowerCase().trim());
    const dataRows=rows.slice(headerIdx+1).filter(r=>r[0]&&String(r[0]).match(/\d{4}-\d{2}-\d{2}/));

    if(dataRows.length===0){showAlert('No se encontraron filas con datos validos','err');return;}

    const col=name=>headers.findIndex(h=>h.includes(name));
    const cFecha=col('fecha'), cEnt=col('entrada'), cSal=col('salida');
    const cHN=col('normales'), cPN=col('precio/h normal')||col('precio normal');
    const cHE=col('extra'), cPE=col('precio/h extra')||col('precio extra');
    const cHNoc=col('nocturnas'), cPNoc=col('precio/h noct')||col('precio noct');
    const cHF=col('festivas'), cPF=col('precio/h fest')||col('precio fest');
    const cDieta=col('dieta'), cTransp=col('transporte'), cNota=col('nota');

    let imported=0, skipped=0;
    for(const row of dataRows){
      const fecha=String(row[cFecha]||'').trim();
      if(!fecha.match(/\d{4}-\d{2}-\d{2}/)){skipped++;continue;}

      // Skip example rows
      const nota=cNota>=0?String(row[cNota]||''):'';
      if(nota.toLowerCase().includes('ejemplo')){skipped++;continue;}

      const hN=parseFloat(row[cHN])||0;
      const pN=parseFloat(row[cPN])||0;
      const hE=parseFloat(row[cHE])||0;
      const pE=parseFloat(row[cPE])||0;
      const hNoc=parseFloat(row[cHNoc])||0;
      const pNoc=parseFloat(row[cPNoc])||0;
      const hF=parseFloat(row[cHF])||0;
      const pF=parseFloat(row[cPF])||0;

      const entry={
        ...defEntry(),
        fecha,
        fichajes: (cEnt>=0&&row[cEnt])?[{_fid:Date.now()+imported,entrada:String(row[cEnt]),salida:cSal>=0?String(row[cSal]):'',nota:'',editing:false}]:[],
        horasNormales:hN, precioHoraNormal:pN, importeNormales:Math.round(hN*pN*100)/100,
        horasExtra:hE, precioHoraExtra:pE, importeExtra:Math.round(hE*pE*100)/100,
        horasNocturnas:hNoc, precioHoraNocturna:pNoc, importeNocturnas:Math.round(hNoc*pNoc*100)/100,
        horasFestivas:hF, precioHoraFestiva:pF, importeFestivas:Math.round(hF*pF*100)/100,
        dieta:cDieta>=0?parseFloat(row[cDieta])||0:0,
        transporte:cTransp>=0?parseFloat(row[cTransp])||0:0,
        notas:nota,
        _savedAt:new Date().toISOString()
      };

      // Check if entry for this date already exists
      const existing=S.entries.find(e=>e.fecha===fecha);
      if(existing){
        entry.id=existing.id;
        await dbPut(ST.entries,entry);
        S.entries=S.entries.map(e=>e.id===existing.id?{...entry,id:existing.id}:e);
      } else {
        const id=await dbPut(ST.entries,entry);
        S.entries.push({...entry,id});
      }
      imported++;
    }

    showAlert('Importadas '+imported+' jornadas'+(skipped>0?' ('+skipped+' omitidas)':''));
    rerender();
    // auto-sync disabled
  }catch(e){
    showAlert('Error importando: '+e.message,'err');
    console.error(e);
  }
}
