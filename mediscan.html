<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <title>MediScan 3D - Studio Metrology Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        html,body{background:#1a1a1a;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#d1d1d1;}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .fade{animation:fadeUp .25s ease both;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        .spin{animation:spin .9s linear infinite;}
        button{transition:all .1s;border:none;cursor:pointer;}
        button:active{transform:scale(.97);opacity:.8;}
        input,select,textarea{background:#2b2b2b;border:1px solid #3d3d3d;color:#fff;border-radius:4px;padding:6px 10px;font-family:'Space Mono',monospace;font-size:12px;}
        input:focus,select:focus{outline:1px solid #ff9d00;}
        ::-webkit-scrollbar{width:6px;height:6px;} ::-webkit-scrollbar-track{background:#141414;} ::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:3px;}
        
        .app-container{max-width:1300px;margin:0 auto;padding:15px;display:flex;flex-direction:column;gap:12px;min-height:100vh;}
        .grid-layout{display:grid;grid-template-columns:1fr;gap:15px;}
        @media(min-width:992px){.grid-layout{grid-template-columns:1.3fr 1fr;}}
        .interactive-canvas{position:relative;width:100%;background:#111;border-radius:6px;border:1px solid #333;overflow:hidden;display:flex;align-items:center;justify-content:center;}
        .canvas-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
        .node-handle{pointer-events:auto;cursor:move;fill:#fff;stroke-width:2;stroke:#000;}
        .studio-panel{background:#242424;border:1px solid #333;border-radius:6px;padding:12px;}
        .studio-btn{background:#333;color:#e0e0e0;padding:6px 12px;border-radius:4px;font-size:11px;font-family:'Space Mono',monospace;}
        .studio-btn.active{background:#ff9d00;color:#000;font-weight:bold;}
        .action-bar{display:flex;gap:6px;background:#222;padding:6px;border-radius:4px;flex-wrap:wrap;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const {useState,useRef,useEffect,useCallback}=React;

    const GAPI="https://api.groq.com/openai/v1/chat/completions";
    const GMOD="meta-llama/llama-4-scout-17b-16e-instruct";
    const getKey=()=>localStorage.getItem("ms3_k")||"";
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
    const uid=()=>`_${Math.random().toString(36).slice(2,9)}`;
    const COLS=["#ff9d00","#00ffcc","#ff4466","#44aaff","#aa66ff","#55ff55"];
    
    const TOOLS=[
      {id:"sel",icon:"↖",tip:"Mover/Editar",npts:0},
      {id:"pt", icon:"⬤",tip:"Punto AI",npts:1},
      {id:"line",icon:"━━",tip:"Línea",npts:2},
      {id:"dist",icon:"📏",tip:"Distancia Desde/Hasta",npts:2},
      {id:"rect",icon:"▭",tip:"Rectángulo",npts:2},
      {id:"circ",icon:"◯",tip:"Círculo",npts:2},
      {id:"calib",icon:"⚖",tip:"Calibrar Base",npts:2},
    ];

    const UNIT_FACTORS = { mm: 1, cm: 10, m: 1000, in: 25.4 };

    /* ── MOTOR 3D REFORZADO ── */
    function Studio3DView({components, manualDim, shapeType}){
      const el=useRef(null);
      useEffect(()=>{
        if(!el.current)return;
        const E=el.current, W=E.clientWidth, H=E.clientHeight||320;
        const scene=new THREE.Scene(); scene.background=new THREE.Color(0x282828);
        const cam=new THREE.PerspectiveCamera(45, W/H, 0.1, 100); cam.position.set(3, 2.5, 3); cam.lookAt(0,0,0);
        const rdr=new THREE.WebGLRenderer({antialias:true}); rdr.setSize(W,H); E.appendChild(rdr.domElement);

        const grid=new THREE.GridHelper(20, 20, 0xff9d00, 0x444444); grid.position.y=-0.5; scene.add(grid);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dl=new THREE.DirectionalLight(0xffffff, 0.8); dl.position.set(5,8,5); scene.add(dl);

        const group=new THREE.Group(); scene.add(group);
        const faceMat=new THREE.MeshStandardMaterial({color:0x3a4f5c, roughness:0.4, flatShading:true, transparent:true, opacity:0.8});
        const wireMat=new THREE.LineBasicMaterial({color:0x00ffcc});

        if(components && components.length > 0){
          let currPos=new THREE.Vector3(0,0,0);
          components.forEach(c => {
            const length=(c.length||1000)*0.001; const radius=((c.dn||150)*0.5)*0.001;
            let lx=0, ly=0, lz=0;
            if(c.orientation==="X") lx=length; else if(c.orientation==="Y") ly=length; else lz=length;
            const geo=new THREE.CylinderGeometry(radius, radius, length, 12);
            geo.rotateZ(lx ? -Math.PI/2 : 0); geo.rotateX(lz ? Math.PI/2 : 0);
            const m=new THREE.Mesh(geo, faceMat); m.position.set(currPos.x + lx/2, currPos.y + ly/2, currPos.z + lz/2);
            const w=new THREE.LineSegments(new THREE.EdgesGeometry(geo), wireMat); w.position.copy(m.position);
            group.add(m); group.add(w); currPos.add(new THREE.Vector3(lx, ly, lz));
          });
        } else {
          const mw=(manualDim?.w||100)*0.005, mh=(manualDim?.h||100)*0.005, md=(manualDim?.d||100)*0.005;
          let geo=shapeType==="cylinder"?new THREE.CylinderGeometry(mw,mw,mh,16):shapeType==="sphere"?new THREE.SphereGeometry(mw,16,16):new THREE.BoxGeometry(mw,mh,md);
          const m=new THREE.Mesh(geo, faceMat); const w=new THREE.LineSegments(new THREE.EdgesGeometry(geo), wireMat);
          group.add(m); group.add(w);
        }

        const box=new THREE.Box3().setFromObject(group); const center=box.getCenter(new THREE.Vector3());
        group.children.forEach(c => c.position.sub(center));

        let drag=false, lx=0, ly=0, ry=0, rx=0;
        const px=e=>e.clientX??e.touches?.[0]?.clientX??0, py=e=>e.clientY??e.touches?.[0]?.clientY??0;
        const dn=e=>{drag=true; lx=px(e); ly=py(e);};
        const mv=e=>{if(!drag)return; ry+=(px(e)-lx)*0.01; rx+=(py(e)-ly)*0.01; lx=px(e); ly=py(e);};
        const up=()=>drag=false;
        E.addEventListener("mousedown",dn); E.addEventListener("touchstart",dn,{passive:true});
        window.addEventListener("mousemove",mv); window.addEventListener("touchmove",mv,{passive:true});
        window.addEventListener("mouseup",up); window.addEventListener("touchend",up);

        let id; const anim=()=>{id=requestAnimationFrame(anim); if(!drag) ry+=0.003; group.rotation.set(rx,ry,0); rdr.render(scene,cam);};
        anim();
        return()=>{ cancelAnimationFrame(id); rdr.dispose(); if(E.contains(rdr.domElement)) E.removeChild(rdr.domElement); };
      },[components, manualDim, shapeType]);
      return <div ref={el} style={{width:"100%",height:"320px",cursor:"grab",borderRadius:"4px",border:"1px solid #444"}}/>;
    }

    /* ── APLICACIÓN PRINCIPAL CON MEMORIA Y PASOS (UNDO) ── */
    function App(){
      const containerRef=useRef(null); const captureRef=useRef(null);
      const videoRef=useRef(null); const uploadRef=useRef(null);

      const [scr,setScr]=useState(()=>getKey()?"home":"setup");
      const [keyIn,setKeyIn]=useState(getKey());
      const [projects,setProjects]=useState(()=>JSON.parse(localStorage.getItem("ms3_projs")||"[]"));
      const [projName,setProjName]=useState("");
      
      const [image,setImage]=useState(null);
      const [rotation,setRotation]=useState(0);
      const [camMode,setCamMode]=useState("off");
      const [piping,setPiping]=useState(null);
      
      const [anns,setAnns]=useState([]);
      const [history,setHistory]=useState([]); // Almacén de pasos previos (Atrás)
      const [tool,setTool]=useState("sel");
      const [pending,setPending]=useState([]);
      const [scale,setScale]=useState(null);
      
      const [calibDlg,setCalibDlg]=useState(null);
      const [forcedDistDlg,setForcedDistDlg]=useState(null);
      const [inputVal,setInputVal] = useState("");
      const [globalUnit, setGlobalUnit] = useState("mm");

      const [manualDim,setManualDim]=useState({w:100,h:100,d:100});
      const [shapeType,setShapeType]=useState("box");
      const [viewTab,setViewTab]=useState("anno");

      useEffect(()=>{ localStorage.setItem("ms3_projs", JSON.stringify(projects)); },[projects]);

      const handleKeySave=()=>{ localStorage.setItem("ms3_k",keyIn.trim()); setScr("home"); };
      
      // FUNCIÓN CRUCIAL: GUARDAR PASO ANTES DE MODIFICAR (HACER ATRÁS)
      const pushHistory = (currentAnns) => {
        setHistory(prev => [...prev, JSON.stringify(currentAnns)]);
      };

      const handleUndo = () => {
        if (history.length === 0) { alert("No hay más acciones para revertir."); return; }
        const prevSteps = [...history];
        const lastStep = JSON.parse(prevSteps.pop());
        setHistory(prevSteps);
        setAnns(lastStep);
      };

      const startLive=async()=>{
        setCamMode("starting");
        try{
          const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280}}});
          if(videoRef.current) videoRef.current.srcObject=s; setCamMode("live");
        }catch(e){ setCamMode("off"); alert("Cámara no compatible."); }
      };

      const captureLive=()=>{
        const v=videoRef.current; if(!v)return;
        const c=document.createElement("canvas"); c.width=v.videoWidth; c.height=v.videoHeight;
        c.getContext("2d").drawImage(v,0,0); startProject(c.toDataURL("image/jpeg",0.9));
        v.srcObject?.getTracks().forEach(t=>t.stop()); setCamMode("off");
      };

      const startProject=img=>{
        setImage(img); setAnns([]); setScale(null); setPending([]); setTool("sel"); setRotation(0); setPiping(null); setHistory([]);
        setScr("loading"); identify(img);
      };

      // DETECCIÓN POR IA REFORZADA (PROPORCIONA CORDENADAS EDITABLES)
      const identify=async(img)=>{
        const b64=img.split(",")[1];
        const prompt=`Analiza esta imagen industrial de caldereria/piping. 
Detecta los puntos calientes o elementos críticos de medición. Devuelve EXCLUSIVAMENTE un objeto JSON con este formato:
{"type":"piping","name":"Plano Detectado","components":[{"id":"1","type":"pipe","orientation":"X","length":1200}],"ai_markers":[{"label":"DIAMETRO_C_1","type":"circ","p1":{"x":0.3,"y":0.4},"p2":{"x":0.35,"y":0.45}},{"label":"TRAMO_A","type":"line","p1":{"x":0.1,"y":0.2},"p2":{"x":0.6,"y":0.2}}]}
No formatees con markdown. Proporciona solo la cadena limpia JSON.`;

        try{
          const res=await fetch(GAPI,{
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":`Bearer ${getKey()}`},
            body:JSON.stringify({model:GMOD,messages:[{role:"user",content:[{type:"image_url",image_url:{url:`data:image/jpeg;base64,${b64}`}},{type:"text",text:prompt}]}]})
          });
          const data=await res.json();
          const info=JSON.parse(data.choices[0].message.content.replace(/```json|```/g,"").trim());
          
          if(info.ai_markers){
            const generated = info.ai_markers.map((m, idx) => ({
              id: uid(),
              type: m.type || "line",
              label: m.label,
              color: COLS[idx % COLS.length],
              points: m.p2 ? [m.p1, m.p2] : [m.p1],
              unit: "mm",
              forcedValue: null
            }));
            setAnns(generated);
          }
          if(info.type==="piping") { setPiping(info); setViewTab("pipe3d"); }
        }catch(e){
          console.error("AI parse fail, fallback active", e);
        }finally{ setScr("annotate"); }
      };

      // MANIPULACIÓN DEL LIENZO DE ANOTACIONES INTERACTIVO
      const handleCvClick=useCallback(e=>{
        if(tool==="sel")return;
        const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return;
        let nx=(e.clientX-rect.left)/rect.width, ny=(e.clientY-rect.top)/rect.height;
        nx=clamp(nx,0.01,0.99); ny=clamp(ny,0.01,0.99);

        const td=TOOLS.find(t=>t.id===tool); if(!td)return;
        const pts=[...pending,{x:nx,y:ny}];

        if(pts.length >= td.npts){
          pushHistory(anns);
          const color=COLS[anns.length % COLS.length]; const id=uid();
          
          if(tool==="calib"){
            setCalibDlg({p1:pts[0],p2:pts[1]});
          } else if(tool==="dist") {
            setForcedDistDlg({id, points:pts, color});
          } else {
            setAnns(p=>[...p,{id,type:tool,label:`${tool.toUpperCase()}_${anns.length+1}`,color,points:pts,unit:globalUnit,forcedValue:null}]);
          }
          setPending([]); setTool("sel");
        } else setPending(pts);
      },[tool,pending,anns,globalUnit]);

      const startDrag=useCallback((e,annId,pi)=>{
        e.preventDefault(); e.stopPropagation();
        pushHistory(anns);
        const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return;
        const mv=ev=>{
          const cx=ev.clientX??ev.touches?.[0]?.clientX??0, cy=ev.clientY??ev.touches?.[0]?.clientY??0;
          let nx=(cx-rect.left)/rect.width, ny=(cy-rect.top)/rect.height;
          setAnns(p=>p.map(a=>{
            if(a.id!==annId)return a; const pp=[...a.points];
            pp[pi]={x:clamp(nx,0.01,0.99),y:clamp(ny,0.01,0.99)}; return {...a,points:pp};
          }));
        };
        const up=()=>{window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up);};
        window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
      },[anns]);

      // CALCULO MÉTRICO INDEPENDIENTE SEGÚN LA UNIDAD DE CADA ELEMENTO
      const getMeasure=ann=>{
        if(ann.forcedValue != null) return `${ann.forcedValue} ${ann.unit}`;
        if(!scale || ann.points.length < 2) return "Sin escala";
        
        const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return "";
        const dx=(ann.points[1].x-ann.points[0].x)*rect.width, dy=(ann.points[1].y-ann.points[0].y)*rect.height;
        const pixelsDist=Math.sqrt(dx*dx+dy*dy);
        
        // Medida en mm base primero
        const baseMM = pixelsDist / scale.ppu;
        // Transformación a la unidad específica de esta etiqueta
        const finalValue = baseMM / (UNIT_FACTORS[ann.unit] || 1);
        return `${finalValue.toFixed(1)} ${ann.unit}`;
      };

      const saveCalib=()=>{
        const v=parseFloat(inputVal); if(!v||v<=0||!calibDlg)return;
        const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return;
        const dx=(calibDlg.p2.x-calibDlg.p1.x)*rect.width, dy=(calibDlg.p2.y-calibDlg.p1.y)*rect.height;
        const px=Math.sqrt(dx*dx+dy*dy);
        
        const valueInMM = v * (UNIT_FACTORS[globalUnit] || 1);
        setScale({ppu: px/valueInMM, unit:"mm"});
        setCalibDlg(null); setInputVal("");
      };

      const saveForcedDistance=()=>{
        const v=parseFloat(inputVal); if(!v||v<=0||!forcedDistDlg)return;
        pushHistory(anns);
        setAnns(p=>[...p,{
          id: forcedDistDlg.id,
          type: "line",
          label: `DIST_ASIGNADA`,
          color: forcedDistDlg.color,
          points: forcedDistDlg.points,
          unit: globalUnit,
          forcedValue: v
        }]);
        setForcedDistDlg(null); setInputVal("");
      };

      const changeItemUnit=(id, targetUnit)=>{
        pushHistory(anns);
        setAnns(p=>p.map(a=>a.id===id?{...a,unit:targetUnit}:a));
      };

      const removeAnn=(id)=>{
        pushHistory(anns);
        setAnns(p=>p.filter(a=>a.id!==id));
      };

      const saveProject=()=>{
        if(!projName.trim()){ alert("Nombre requerido"); return; }
        setProjects(p=>[{id:uid(),name:projName,date:new Date().toLocaleDateString(),image,anns,scale,piping},...p]);
        alert("Guardado.");
      };

      const shareMedia=(t)=>{ alert(`Enviando por ${t}...`); };

      return (
        <div className="app-container">
          <header style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #333",paddingBottom:"10px"}}>
            <h1 style={{fontFamily:"'Syne',sans-serif",color:"#ff9d00",fontSize:"18px"}}>MEDISCAN 3D <span style={{color:"#fff",fontSize:"11px"}}>Control Absoluto</span></h1>
            <div style={{display:"flex",gap:"6px"}}>
              <button className="studio-btn" style={{background:"#dd4b39", fontWeight:"bold"}} onClick={handleUndo}>↩ ATRÁS (DESHACER)</button>
              <button className="studio-btn" onClick={()=>setScr("home")}>INICIO</button>
            </div>
          </header>

          {scr==="setup" && <div className="studio-panel" style={{maxWidth:"400px",margin:"40px auto"}}>
            <input type="password" style={{width:"100%",marginBottom:"10px"} } value={keyIn} onChange={e=>setKeyIn(e.target.value)} placeholder="Groq API Key..."/>
            <button className="studio-btn active" style={{width:"100%"}} onClick={handleKeySave}>INGRESAR</button>
          </div>}

          {scr==="home" && <div className="fade grid-layout">
            <div className="studio-panel" style={{textAlign:"center",padding:"30px"}}>
              <button className="studio-btn active" style={{padding:"12px",marginBottom:"10px"}} onClick={startLive}>ABRIR CÁMERA DE INSPECCIÓN</button>
              {camMode==="live" && (
                <div>
                  <video ref={videoRef} autoPlay playsInline style={{width:"100%",background:"#000",borderRadius:"4px"}}/>
                  <button className="studio-btn active" onClick={captureLive} style={{marginTop:"5px"}}>CAPTURAR FOTO</button>
                </div>
              )}
              <div style={{margin:"10px 0",fontSize:"11px"}}>O SELECCIONAR LOCAL</div>
              <button className="studio-btn" onClick={()=>uploadRef.current?.click()}>BUSCAR IMAGEN</button>
              <input ref={uploadRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0]; if(f){const r=new FileReader(); r.onload=ev=>startProject(ev.target.result); r.readAsDataURL(f);}}}/>
            </div>
            <div className="studio-panel">
              <h3 style={{color:"#ff9d00",marginBottom:"8px"}}>Historial</h3>
              {projects.map(p=><div key={p.id} onClick={()=>{setImage(p.image);setAnns(p.anns);setScale(p.scale);setProjName(p.name);setScr("annotate");}} style={{background:"#111",padding:"8px",marginBottom:"4px",cursor:"pointer"}}>{p.name} ({p.date})</div>)}
            </div>
          </div>}

          {scr==="loading" && <div style={{textAlign:"center",padding:"6px"}}>Procesando matriz espacial del plano...</div>}

          {scr==="annotate" && <div className="fade grid-layout" ref={captureRef}>
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              <div className="action-bar">
                {TOOLS.map(t=>(
                  <button key={t.id} className={`studio-btn ${tool===t.id?'active':''}`} onClick={()=>setTool(t.id)}>
                    {t.icon} {t.tip}
                  </button>
                ))}
                <button className="studio-btn" onClick={()=>setRotation(r=>(r+90)%360)}>↻ ROTAR</button>
                <select value={globalUnit} onChange={e=>setGlobalUnit(e.target.value)} style={{marginLeft:"auto"}}>
                  <option value="mm">mm</option> <option value="cm">cm</option> <option value="m">m</option> <option value="in">pulgadas (in)</option>
                </select>
              </div>

              <div className="interactive-canvas" ref={containerRef} onClick={handleCvClick}>
                <img src={image} style={{width:"100%",maxHeight:"60vh",objectFit:"contain",transform:`rotate(${rotation}deg)`}} alt="Plano"/>
                <svg className="canvas-svg">
                  {anns.map(a=>{
                    if(!a.points || a.points.length<1)return null;
                    const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return null;
                    const p1x=a.points[0].x*rect.width, p1y=a.points[0].y*rect.height;
                    const p2x=a.points[1]?(a.points[1].x*rect.width):p1x;
                    const p2y=a.points[1]?(a.points[1].y*rect.height):p1y;

                    return (
                      <g key={a.id}>
                        {a.type==="pt" && (
                          <>
                            <circle cx={p1x} cy={p1y} r="8" fill={a.color} className="node-handle" onMouseDown={e=>startDrag(e,a.id,0)}/>
                            <text x={p1x+12} y={p1y+4} fill="#fff" style={{fontSize:"11px",fontFamily:"'Space Mono'",background:"#000"}}>{a.label}</text>
                          </>
                        )}
                        {(a.type==="line" || a.type==="calib") && a.points[1] && (
                          <>
                            <line x1={p1x} y1={p1y} x2={p2x} y2={p2y} stroke={a.color} strokeWidth="2.5"/>
                            <circle cx={p1x} cy={p1y} r="6" fill="#fff" className="node-handle" onMouseDown={e=>startDrag(e,a.id,0)}/>
                            <circle cx={p2x} cy={p2y} r="6" fill="#fff" className="node-handle" onMouseDown={e=>startDrag(e,a.id,1)}/>
                            <text x={(p1x+p2x)/2} y={(p1y+p2y)/2-8} fill="#fff" style={{fontFamily:"'Space Mono'",fontSize:"11px",fontWeight:"bold",textAnchor:"middle"}}>{getMeasure(a)}</text>
                          </>
                        )}
                        {a.type==="rect" && a.points[1] && (
                          <rect x={Math.min(p1x,p2x)} y={Math.min(p1y,p2y)} width={Math.abs(p1x-p2x)} height={Math.abs(p1y-p2y)} fill="none" stroke={a.color} strokeWidth="2"/>
                        )}
                        {a.type==="circ" && a.points[1] && (
                          <circle cx={p1x} cy={p1y} r={Math.sqrt((p2x-p1x)**2+(p2y-p1y)**2)} fill="none" stroke={a.color} strokeWidth="2"/>
                        )}
                      </g>
                    );
                  })}
                </svg>
              </div>
            </div>

            {/* CONTROLES LATERALES EDITABLES */}
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              <div style={{display:"flex",gap:"4px"}}>
                <button className={`studio-btn ${viewTab==='anno'?'active':''}`} style={{flex:1}} onClick={()=>setViewTab("anno")}>COTAS E INTERPRETACIÓN</button>
                <button className={`studio-btn ${viewTab==='pipe3d'?'active':''}`} style={{flex:1}} onClick={()=>setViewTab("pipe3d")}>VENTANA DE RENDER 3D</button>
              </div>

              {calibDlg && <div className="studio-panel" style={{border:"1px solid #ff9d00"}}>
                <p style={{fontSize:"11px",marginBottom:"4px"}}>Valor de Calibración real:</p>
                <input type="number" value={inputVal} onChange={e=>setInputVal(e.target.value)} placeholder="Ej. 150"/>
                <button className="studio-btn active" onClick={saveCalib} style={{marginTop:"4px"}}>Asignar Base</button>
              </div>}

              {forcedDistDlg && <div className="studio-panel" style={{border:"1px solid #00ffcc"}}>
                <p style={{fontSize:"11px",marginBottom:"4px"}}>Asignar Medida Desde/Hasta:</p>
                <input type="number" value={inputVal} onChange={e=>setInputVal(e.target.value)} placeholder="Magnitud exacta..."/>
                <button className="studio-btn active" onClick={saveForcedDistance} style={{marginTop:"4px"}}>Fijar Distancia</button>
              </div>}

              {viewTab==="anno" && <div className="studio-panel" style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                <input type="text" value={projName} onChange={e=>setProjName(e.target.value)} placeholder="Nombre del Plano Industrial..."/>
                <button className="studio-btn active" onClick={saveProject}>COMPROMETER CAMBIOS</button>
                
                <div style={{maxHeight:"260px",overflowY:"auto",display:"flex",flexDirection:"column",gap:"6px",marginTop:"10px"}}>
                  {anns.map(a=>(
                    <div key={a.id} style={{background:"#1c1c1c",padding:"6px",borderRadius:"4px",display:"flex",flexDirection:"column",gap:"4px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <input type="text" value={a.label} onChange={e=>{const val=e.target.value; setAnns(p=>p.map(x=>x.id===a.id?{...x,label:val}:x))}} style={{background:"transparent",border:"none",color:"#fff",fontSize:"11px",fontWeight:"bold"}}/>
                        <button style={{color:"#ff4466",background:"transparent",fontSize:"10px"}} onClick={()=>removeAnn(a.id)}>❌ Borrar</button>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{color:"#00ffcc",fontFamily:"'Space Mono'",fontSize:"12px"}}>{getMeasure(a)}</span>
                        <select value={a.unit} onChange={e=>changeItemUnit(a.id, e.target.value)} style={{fontSize:"10px",padding:"2px"}}>
                          <option value="mm">mm</option>
                          <option value="cm">cm</option>
                          <option value="m">m</option>
                          <option value="in">in</option>
                        </select>
                      </div>
                    </div>
                  ))}
                </div>
              </div>}

              {viewTab==="pipe3d" && <div className="studio-panel">
                <Studio3DView components={piping?.components} manualDim={manualDim} shapeType={shapeType}/>
              </div>}
            </div>
          </div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>
</body>
</html>
