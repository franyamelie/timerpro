<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MediScan Pro - Metrología 3D Completa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: sans-serif; }
        .app { display: flex; height: 100vh; }
        .canvas-container { flex: 1; position: relative; background: #000; cursor: crosshair; overflow: hidden; }
        .sidebar { width: 320px; background: #1a1a1a; padding: 20px; border-left: 2px solid #333; display: flex; flex-direction: column; gap: 15px; }
        .tool-bar { padding: 15px; background: #222; display: flex; gap: 10px; border-bottom: 2px solid #333; align-items: center; }
        button { padding: 10px 15px; cursor: pointer; border: none; background: #444; color: white; border-radius: 4px; font-weight: bold; }
        button.active { background: #ff9d00; color: #000; }
        svg { width: 100%; height: 100%; }
        .handle { fill: #ff9d00; stroke: #fff; stroke-width: 2; cursor: move; }
        .element-card { background: #2a2a2a; padding: 12px; border-radius: 6px; border-left: 5px solid #ff9d00; }
        .export-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; }
        h3 { margin-top: 0; color: #ff9d00; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const {useState, useRef} = React;

    function App() {
        const [tool, setTool] = useState("line");
        const [elements, setElements] = useState([]);
        const [drawing, setDrawing] = useState(null);
        const [image, setImage] = useState(null);
        const svgRef = useRef(null);

        const getPos = (e) => {
            const rect = svgRef.current.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        };

        const handleMouseDown = (e) => {
            const pos = getPos(e);
            setDrawing({ id: Date.now(), type: tool, p1: pos, p2: pos, val: 0, unit: 'mm' });
        };

        const handleMouseMove = (e) => {
            if (!drawing) return;
            setDrawing(prev => ({ ...prev, p2: getPos(e) }));
        };

        const handleMouseUp = () => {
            if (!drawing) return;
            setElements([...elements, drawing]);
            setDrawing(null);
        };

        const updateElement = (id, updates) => {
            setElements(prev => prev.map(el => el.id === id ? { ...el, ...updates } : el));
        };

        const handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (file) setImage(URL.createObjectURL(file));
        };

        return (
            <div className="app">
                <div className="canvas-container">
                    <div className="tool-bar">
                        <button onClick={() => document.getElementById('fileInput').click()}>📁 Cargar Plano</button>
                        <input type="file" id="fileInput" hidden onChange={handleImageUpload} />
                        {["line", "rect", "circ"].map(t => (
                            <button key={t} className={tool === t ? "active" : ""} onClick={() => setTool(t)}>{t.toUpperCase()}</button>
                        ))}
                    </div>
                    <svg ref={svgRef} onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp}>
                        {image && <image href={image} width="100%" height="100%" preserveAspectRatio="none" />}
                        {elements.map(el => <RenderElement key={el.id} el={el} onDrag={(p1, p2) => updateElement(el.id, {p1, p2})} />)}
                        {drawing && <RenderElement el={drawing} />}
                    </svg>
                </div>
                
                <div className="sidebar">
                    <h3>Panel de Cotas</h3>
                    {elements.map(el => (
                        <div key={el.id} className="element-card">
                            <strong>{el.type.toUpperCase()}</strong>
                            <div style={{display:'flex', gap:'5px', marginTop:'5px'}}>
                                <input type="number" placeholder="Valor" style={{width:'80px'}} onChange={(e) => updateElement(el.id, {val: e.target.value})} />
                                <select onChange={(e) => updateElement(el.id, {unit: e.target.value})}>
                                    <option value="mm">mm</option><option value="cm">cm</option><option value="m">m</option>
                                </select>
                            </div>
                        </div>
                    ))}
                    
                    <div className="export-grid">
                        <button onClick={() => alert("Email enviado")}>📧 Email</button>
                        <button onClick={() => alert("WhatsApp abierto")}>💬 WhatsApp</button>
                        <button onClick={() => alert("PDF generado")}>📄 PDF</button>
                        <button onClick={() => alert("Imagen guardada")}>🖼 Imagen</button>
                    </div>
                </div>
            </div>
        );
    }

    function RenderElement({ el, onDrag }) {
        const handleDrag = (idx, e) => {
            e.stopPropagation();
            const move = (ev) => {
                const rect = ev.target.closest('svg').getBoundingClientRect();
                const pos = { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
                if (idx === 1) onDrag(pos, el.p2); else onDrag(el.p1, pos);
            };
            const up = () => { window.removeEventListener("mousemove", move); };
            window.addEventListener("mousemove", move);
            window.addEventListener("mouseup", up, { once: true });
        };

        const r = Math.sqrt((el.p2.x - el.p1.x)**2 + (el.p2.y - el.p1.y)**2);

        return (
            <g>
                {el.type === "circ" && <circle cx={el.p1.x} cy={el.p1.y} r={r} fill="none" stroke="#ff9d00" strokeWidth="2" />}
                {el.type === "rect" && <rect x={Math.min(el.p1.x, el.p2.x)} y={Math.min(el.p1.y, el.p2.y)} width={Math.abs(el.p2.x - el.p1.x)} height={Math.abs(el.p2.y - el.p1.y)} fill="none" stroke="#ff9d00" strokeWidth="2" />}
                {el.type === "line" && <line x1={el.p1.x} y1={el.p1.y} x2={el.p2.x} y2={el.p2.y} stroke="#ff9d00" strokeWidth="2" />}
                <circle cx={el.p1.x} cy={el.p1.y} r="6" className="handle" onMouseDown={(e) => handleDrag(1, e)} />
                <circle cx={el.p2.x} cy={el.p2.y} r="6" className="handle" onMouseDown={(e) => handleDrag(2, e)} />
            </g>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
