/* ═══ REAL SEGMENTATION (camino 2): MobileSAM mask → polygon ═══
   Converts a binary/probability mask (flat typed array, row-major, w*h) into a
   closed polygon by ray-casting from the mask's centroid at fixed angle steps.
   This is deliberately simpler/more robust than full boundary tracing (Moore-neighbor):
   no risk of infinite loops, no special-casing for holes or multi-blob masks -
   just bounded, deterministic execution, since this code cannot be live-tested
   in a real browser before shipping. Trade-off: deep concavities (U-shapes) are
   smoothed over, but the vast majority of real segmented objects (trees, rocks,
   vehicles, people) are reasonably star-convex from their centroid. */
function samMaskToPolygon(maskData,w,h,numAngles,threshold){
  numAngles=numAngles||40;threshold=threshold||0.5;
  let sumX=0,sumY=0,count=0;
  const isFg=(x,y)=>{
    if(x<0||y<0||x>=w||y>=h)return false;
    return maskData[y*w+x]>threshold;
  };
  for(let y=0;y<h;y+=2)for(let x=0;x<w;x+=2){if(isFg(x,y)){sumX+=x;sumY+=y;count++;}}
  if(count<8)return null;
  const cx=sumX/count,cy=sumY/count;
  const maxDist=Math.sqrt(w*w+h*h);
  const pts=[];
  for(let i=0;i<numAngles;i++){
    const ang=(i/numAngles)*Math.PI*2;
    const dx=Math.cos(ang),dy=Math.sin(ang);
    let lastFg=0,gap=0;
    for(let r=1;r<maxDist;r+=2){
      const px=Math.round(cx+dx*r),py=Math.round(cy+dy*r);
      if(isFg(px,py)){lastFg=r;gap=0;}
      else if(lastFg>0){gap+=2;if(gap>10)break;}
    }
    if(lastFg>0)pts.push([cx+dx*lastFg,cy+dy*lastFg]);
  }
  return pts.length>=8?pts:null;
}

const annInSeg=(a,seg)=>{
  if(!a||!seg)return false;

};

/* OPEN_ENDED: SOLO herramientas de número de puntos VARIABLE/ilimitado, donde
   el usuario decide cuándo terminar con doble-toque (Polilínea y Área). El
   Lazo tiene su propio listener nativo aparte. TODAS las demás herramientas
   (Línea, Cota, Distancia, Inclinación, Ángulo, Radio, Flechas, Espesor,
   Chaflán, Arco, Deflexión...) tienen número de puntos EXACTO y se completan
   solas en cuanto se toca el último punto necesario — sin doble-toque, sin
   esperas, cada toque se registra al instante. */
const OPEN_ENDED=["poly","area"];
/* ══ VIEW 2D ══ */
function View2D({anns,objName,sc,segs,img,segSel,scope}){
  const ref=useRef(null);
  const draw=useCallback((imgEl)=>{
    const cv=ref.current;if(!cv)return;
    const ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
    /* scope="measured" (por defecto si no se especifica): solo piezas con medida real,
       para que la imagen no se llene de globos de piezas sin medir. scope="all": todas. */
    const vSegs=((segSel&&segSel.size>0)?(segs||[]).filter(s=>segSel.has(s.id)):(segs||[]))
      .filter(seg=>scope==="all"||anns.some(a=>a.value!=null&&annInSeg(a,seg)));
    ctx.clearRect(0,0,W,H);
    /* White paper background */
    ctx.fillStyle="#ffffff";ctx.fillRect(0,0,W,H);
    /* Light grid */
    ctx.strokeStyle="#eef2fb";ctx.lineWidth=.5;
    for(let x=0;x<W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    const mg=44,bH=58,titleH=14;
    const dW=W-mg*2,dH=H-mg-bH-titleH-8;
    const imgH=Math.floor(dH*0.55),dimH=dH-imgH-8;

    /* ── TITLE BLOCK ── */
    ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1.2;ctx.strokeRect(mg,2,dW,titleH);
    ctx.fillStyle="rgba(210,228,255,.5)";ctx.fillRect(mg,2,dW,titleH);
    ctx.fillStyle="#1a3a8a";ctx.font="bold 8px 'Inter',sans-serif";ctx.textAlign="center";
    ctx.fillText("CROQUIS TÉCNICO  ·  "+(objName||"Objeto"),W/2,10);
    ctx.fillStyle="#8899aa";ctx.font="6px 'Inter',sans-serif";ctx.textAlign="right";
    ctx.fillText("MediScan 3D Pro",W-mg-2,10);

    /* ── REAL IMAGE EMBEDDED (left ~58% of drawing area) ── */
    const imgW=Math.floor(dW*0.58),imgX=mg,imgY=mg+titleH+4;
    if(imgEl){
      /* Image frame */
      ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1.5;ctx.strokeRect(imgX,imgY,imgW,imgH);
      /* Clip to frame */
      ctx.save();ctx.rect(imgX,imgY,imgW,imgH);ctx.clip();
      const aspect=imgEl.naturalWidth/imgEl.naturalHeight||1;
      let dw=imgW,dh=imgH;
      if(dw/dh>aspect){dw=dh*aspect;}else{dh=dw/aspect;}
      ctx.drawImage(imgEl,imgX+(imgW-dw)/2,imgY+(imgH-dh)/2,dw,dh);
      ctx.restore();
      /* Semi-transparent overlay for annotations (más clara para que la foto se vea bien) */
      ctx.fillStyle="rgba(0,0,0,0.06)";ctx.fillRect(imgX,imgY,imgW,imgH);
      /* Draw segment overlays on image — si tiene polígono preciso, usarlo */
      if(vSegs&&vSegs.length){
        vSegs.forEach((seg,i)=>{
          const sx=imgX+seg.x1*imgW,sy=imgY+seg.y1*imgH;
          const sw2=(seg.x2-seg.x1)*imgW,sh2=(seg.y2-seg.y1)*imgH;
          const col=seg.color||"#0055cc";
          ctx.save();
          if(seg.polygon&&seg.polygon.length>=3){
            /* Contorno preciso: dibujar el polígono real en vez del rectángulo */
            ctx.beginPath();
            seg.polygon.forEach(([px,py],j)=>{
              const cx2=imgX+px*imgW,cy2=imgY+py*imgH;
              j===0?ctx.moveTo(cx2,cy2):ctx.lineTo(cx2,cy2);
            });
            ctx.closePath();
            ctx.fillStyle=col+"38";ctx.fill();
            ctx.strokeStyle=col;ctx.lineWidth=2;ctx.setLineDash([6,3]);ctx.stroke();ctx.setLineDash([]);
          }else{
            ctx.fillStyle=col+"28";ctx.fillRect(sx,sy,sw2,sh2);
            ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.setLineDash([5,3]);ctx.strokeRect(sx,sy,sw2,sh2);ctx.setLineDash([]);
          }
          ctx.restore();
          /* Balloon */
          ctx.beginPath();ctx.arc(sx+12,sy+12,9,0,Math.PI*2);
          ctx.fillStyle=col;ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=1;ctx.stroke();
          ctx.fillStyle="#fff";ctx.font="bold 8px 'Inter',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(i+1,sx+12,sy+12);ctx.textBaseline="alphabetic";
          /* Part label */
          ctx.fillStyle="rgba(0,0,0,0.72)";
          const lbl=(seg.name||"Parte "+(i+1)).slice(0,16);
          const lw=ctx.measureText(lbl).width+6;
          ctx.fillRect(sx+sw2/2-lw/2,sy+sh2-16,lw,13);
          ctx.fillStyle="#fff";ctx.font="bold 6.5px 'Inter',sans-serif";ctx.textAlign="center";
          ctx.fillText(lbl,sx+sw2/2,sy+sh2-6);
        });
      }
      /* Draw annotation points on image (formas de 2+ puntos) */
      anns.filter(a=>a.points&&a.points.length>=2).forEach(a=>{
        const[p1,p2]=a.points;
        const ax1=imgX+p1.x*imgW,ay1=imgY+p1.y*imgH,ax2=imgX+p2.x*imgW,ay2=imgY+p2.y*imgH;
        ctx.strokeStyle="#ff4400";ctx.lineWidth=1.5;ctx.setLineDash([3,2]);
        ctx.beginPath();ctx.moveTo(ax1,ay1);ctx.lineTo(ax2,ay2);ctx.stroke();ctx.setLineDash([]);
        ctx.beginPath();ctx.arc(ax1,ay1,3,0,Math.PI*2);ctx.fillStyle="#ff4400";ctx.fill();
        ctx.beginPath();ctx.arc(ax2,ay2,3,0,Math.PI*2);ctx.fill();
        if(a.value!=null){
          const lbl=`${a.title||a.type}: ${a.value}${a.unit}`;
          const mx=(ax1+ax2)/2,my=(ay1+ay2)/2;
          ctx.font="bold 6.5px 'Inter',sans-serif";
          const tw=ctx.measureText(lbl).width+6;
          ctx.fillStyle="rgba(255,50,0,.85)";ctx.fillRect(mx-tw/2,my-10,tw,13);
          ctx.fillStyle="#fff";ctx.textAlign="center";ctx.fillText(lbl,mx,my);
        }
      });
      /* Draw single-point measurements too (marcadores: pin, punto, estrella, diana,
         tolerancia, coordenada, nota, rugosidad) — antes no se dibujaban en absoluto. */
      anns.filter(a=>a.points&&a.points.length===1&&a.value!=null).forEach(a=>{
        const ax=imgX+a.points[0].x*imgW,ay=imgY+a.points[0].y*imgH;
        ctx.beginPath();ctx.arc(ax,ay,3.2,0,Math.PI*2);ctx.fillStyle=a.color||"#ff4400";ctx.fill();
        ctx.strokeStyle="#fff";ctx.lineWidth=1;ctx.stroke();
        const lbl=`${a.title||a.type}: ${a.value}${a.unit}`;
        ctx.font="bold 6.5px 'Inter',sans-serif";
        const tw=ctx.measureText(lbl).width+6;
        ctx.fillStyle="rgba(0,0,0,.78)";ctx.fillRect(ax-tw/2,ay-17,tw,13);
        ctx.fillStyle="#fff";ctx.textAlign="center";ctx.fillText(lbl,ax,ay-8);
      });
      ctx.fillStyle="#7788aa";ctx.font="bold 7px 'Inter',sans-serif";ctx.textAlign="left";ctx.textBaseline="alphabetic";
      ctx.fillText("IMAGEN REAL + ANOTACIONES",imgX,imgY-3);
    } else {
      ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.strokeRect(imgX,imgY,imgW,imgH);ctx.setLineDash([]);
      ctx.fillStyle="#aab8cc";ctx.font="bold 9px 'Inter',sans-serif";ctx.textAlign="center";
      ctx.fillText("Sin imagen",imgX+imgW/2,imgY+imgH/2);
    }

    /* ── ORTHOGRAPHIC DRAWING VIEWS (right side) ── */
    const ortX=mg+imgW+10,ortW=dW-imgW-10;
    const gd=ax=>{const a=anns.find(a=>a.axis===ax&&a.value!=null);return a?{mm:(parseFloat(a.value)||0)*({mm:1,cm:10,m:1000,"in":25.4,ft:304.8}[a.unit]||10),lbl:`${a.value}${a.unit}`}:null;};
    const wd=gd("width"),hd=gd("height"),dd=gd("depth");

    const dimLine=(x1,y1,x2,y2,label,side,off)=>{
      const s=side||1,o=off||16;
      const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
      const nx=(-dy/len)*s*o,ny=(dx/len)*s*o;
      ctx.strokeStyle="#cc2200";ctx.lineWidth=.7;ctx.setLineDash([2,2]);
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x1+nx,y1+ny);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2+nx,y2+ny);ctx.stroke();
      ctx.setLineDash([]);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x1+nx,y1+ny);ctx.lineTo(x2+nx,y2+ny);ctx.stroke();
      const ang=Math.atan2(y2-y1,x2-x1);
      const arw=(ax,ay,a2)=>{ctx.save();ctx.translate(ax,ay);ctx.rotate(a2);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-6,2);ctx.lineTo(-6,-2);ctx.closePath();ctx.fillStyle="#cc2200";ctx.fill();ctx.restore();};
      arw(x1+nx,y1+ny,ang+Math.PI);arw(x2+nx,y2+ny,ang);
      ctx.save();ctx.translate((x1+x2)/2+nx,(y1+y2)/2+ny);
      ctx.font="bold 7px 'Inter',sans-serif";
      const tw=ctx.measureText(label).width+6;
      ctx.fillStyle="rgba(255,255,255,.92)";ctx.fillRect(-tw/2,-6,tw,12);
      ctx.fillStyle="#cc2200";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(label,0,0);ctx.restore();
      ctx.textBaseline="alphabetic";
    };

    if(wd||hd){
      const vW=wd?wd.mm:80,vH=hd?hd.mm:80;
      const sc2=Math.min((ortW-8)*.85/vW,(imgH-20)*.75/vH);
      const rW=vW*sc2,rH=vH*sc2,rX=ortX+(ortW-rW)/2,rY=imgY+14;
      ctx.fillStyle="#1a3a8a";ctx.font="bold 7px 'Inter',sans-serif";ctx.textAlign="center";ctx.fillText("ALZADO",rX+rW/2,rY-4);
      ctx.fillStyle="rgba(200,220,255,.45)";ctx.fillRect(rX,rY,rW,rH);
      ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1.8;ctx.setLineDash([]);ctx.strokeRect(rX,rY,rW,rH);
      ctx.strokeStyle="#0077bb";ctx.lineWidth=.5;ctx.setLineDash([6,3]);
      ctx.beginPath();ctx.moveTo(rX+rW/2,rY-4);ctx.lineTo(rX+rW/2,rY+rH+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(rX-4,rY+rH/2);ctx.lineTo(rX+rW+4,rY+rH/2);ctx.stroke();
      ctx.setLineDash([]);
      if(wd)dimLine(rX,rY+rH,rX+rW,rY+rH,wd.lbl,1,16);
      if(hd)dimLine(rX,rY,rX,rY+rH,hd.lbl,-1,18);
      if(dd){
        const lX=rX,lY=rY+rH+32,lW=dd.mm*sc2,lH=rH;
        ctx.fillStyle="#1a3a8a";ctx.font="bold 7px 'Inter',sans-serif";ctx.textAlign="center";ctx.fillText("PERFIL",lX+lW/2,lY-4);
        ctx.fillStyle="rgba(200,220,255,.3)";ctx.fillRect(lX,lY,lW,lH);
        ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1.2;ctx.strokeRect(lX,lY,lW,lH);
        dimLine(lX,lY+lH,lX+lW,lY+lH,dd.lbl,1,14);
      }
    } else {
      /* ── VISTAS ORTOGONALES: ALZADO / PLANTA / PERFIL ──
         Se generan siempre, con foto de la zona como vista frontal y
         esquemas derivados para planta y perfil. */
      const vSegsOrt=(vSegs&&vSegs.length>0)?vSegs.slice(0,1):[{x1:0,y1:0,x2:1,y2:1,name:objName||"Vista",color:"#1a5a9a"}];
      const seg0=vSegsOrt[0];
      const segAR=Math.abs((seg0.x2-seg0.x1)/((seg0.y2-seg0.y1)||.01));
      const pw=ortW-8; /* ancho disponible en el panel ortogonal */
      const alzW=Math.floor(pw*.65),alzH=Math.floor(alzW/Math.max(segAR,.4));
      const planH=Math.floor(alzH*.35),perfW=pw-alzW-4;
      const oX=ortX+4,oY=imgY+18;

      /* Etiqueta del panel */
      ctx.fillStyle="#1a3a8a";ctx.font="bold 6.5px 'Inter',sans-serif";ctx.textAlign="center";
      ctx.fillText("VISTAS ORTOGONALES",ortX+ortW/2,imgY+9);

      /* ── ALZADO (vista frontal) — foto real de la zona con contorno preciso ── */
      ctx.fillStyle="#7788aa";ctx.font="bold 6px 'Inter',sans-serif";ctx.textAlign="center";
      ctx.fillText("ALZADO",oX+alzW/2,oY-2);
      if(imgEl){
        try{
          const sx=Math.round(imgEl.naturalWidth*Math.min(seg0.x1,seg0.x2));
          const sy=Math.round(imgEl.naturalHeight*Math.min(seg0.y1,seg0.y2));
          const sw2=Math.round(imgEl.naturalWidth*Math.abs(seg0.x2-seg0.x1));
          const sh2=Math.round(imgEl.naturalHeight*Math.abs(seg0.y2-seg0.y1));
          if(sw2>0&&sh2>0){
            ctx.save();
            /* Si hay polígono preciso, clipear con su forma real */
            if(seg0.polygon&&seg0.polygon.length>=3){
              ctx.beginPath();
              seg0.polygon.forEach(([px,py],j)=>{
                const cx2=oX+px*alzW,cy2=oY+py*alzH;
                j===0?ctx.moveTo(cx2,cy2):ctx.lineTo(cx2,cy2);
              });
              ctx.closePath();ctx.clip();
            }else{
              ctx.beginPath();ctx.rect(oX,oY,alzW,alzH);ctx.clip();
            }
            const ar2=sw2/sh2;let dw2=alzW,dh2=alzH;
            if(dw2/dh2>ar2){dw2=dh2*ar2;}else{dh2=dw2/ar2;}
            ctx.drawImage(imgEl,sx,sy,sw2,sh2,oX+(alzW-dw2)/2,oY+(alzH-dh2)/2,dw2,dh2);
            ctx.restore();
          }
        }catch(e){}
      }
      /* Marco del alzado — polígono o rectángulo */
      if(seg0.polygon&&seg0.polygon.length>=3){
        ctx.beginPath();
        seg0.polygon.forEach(([px,py],j)=>{
          const cx2=oX+px*alzW,cy2=oY+py*alzH;
          j===0?ctx.moveTo(cx2,cy2):ctx.lineTo(cx2,cy2);
        });
        ctx.closePath();
        ctx.strokeStyle="#1a3a8a";ctx.lineWidth=2;ctx.setLineDash([]);ctx.stroke();
      }else{
        ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1.5;ctx.setLineDash([]);
        ctx.strokeRect(oX,oY,alzW,alzH);
      }
      /* Líneas de centrado */
      ctx.strokeStyle="rgba(0,100,200,.3)";ctx.lineWidth=0.5;ctx.setLineDash([4,2]);
      ctx.beginPath();ctx.moveTo(oX+alzW/2,oY);ctx.lineTo(oX+alzW/2,oY+alzH);ctx.stroke();
      ctx.beginPath();ctx.moveTo(oX,oY+alzH/2);ctx.lineTo(oX+alzW,oY+alzH/2);ctx.stroke();
      ctx.setLineDash([]);

      /* ── PLANTA (vista superior — debajo del alzado) ── */
      const plY=oY+alzH+10;
      ctx.fillStyle="#7788aa";ctx.font="bold 6px 'Inter',sans-serif";ctx.textAlign="center";
      ctx.fillText("PLANTA",oX+alzW/2,plY-2);
      ctx.fillStyle="rgba(200,230,255,.25)";ctx.fillRect(oX,plY,alzW,planH);
      ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1.2;ctx.strokeRect(oX,plY,alzW,planH);
      /* Representación esquemática de planta */
      const pInset=alzW*.1;
      ctx.fillStyle="rgba(100,160,255,.2)";ctx.fillRect(oX+pInset,plY+4,alzW-pInset*2,planH-8);
      ctx.strokeStyle="rgba(0,80,180,.6)";ctx.lineWidth=1;ctx.setLineDash([3,2]);
      ctx.strokeRect(oX+pInset,plY+4,alzW-pInset*2,planH-8);ctx.setLineDash([]);
      /* Líneas de profundidad en la planta */
      [.25,.5,.75].forEach(t=>{
        ctx.beginPath();ctx.strokeStyle="rgba(0,80,180,.25)";ctx.lineWidth=0.5;
        ctx.moveTo(oX+alzW*t,plY);ctx.lineTo(oX+alzW*t,plY+planH);ctx.stroke();
      });

      /* ── PERFIL (vista lateral — a la derecha del alzado) ── */
      const pX=oX+alzW+4;
      ctx.fillStyle="#7788aa";ctx.font="bold 6px 'Inter',sans-serif";ctx.textAlign="center";
      ctx.fillText("PERFIL",pX+perfW/2,oY-2);
      ctx.fillStyle="rgba(200,230,255,.25)";ctx.fillRect(pX,oY,perfW,alzH);
      ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1.5;ctx.strokeRect(pX,oY,perfW,alzH);
      /* Líneas de centrado del perfil */
      ctx.strokeStyle="rgba(0,100,200,.3)";ctx.lineWidth=0.5;ctx.setLineDash([4,2]);
      ctx.beginPath();ctx.moveTo(pX,oY+alzH/2);ctx.lineTo(pX+perfW,oY+alzH/2);ctx.stroke();
      ctx.setLineDash([]);
      /* Silueta simplificada del perfil */
      const pInset2=perfW*.12;
      ctx.fillStyle="rgba(100,160,255,.2)";ctx.fillRect(pX+pInset2,oY+8,perfW-pInset2*2,alzH-16);
      ctx.strokeStyle="rgba(0,80,180,.5)";ctx.lineWidth=1;
      ctx.strokeRect(pX+pInset2,oY+8,perfW-pInset2*2,alzH-16);

      /* ── Anotaciones de medidas sobre las vistas ── */
      const measWithAxis=anns.filter(a=>a.value!=null&&a.axis&&a.axis!=="other");
      measWithAxis.forEach(a=>{
        const lbl=`${a.value}${a.unit}`;
        ctx.fillStyle="#cc2200";ctx.font="bold 6px 'Inter',sans-serif";ctx.textAlign="center";
        if(a.axis==="width"){
          const y=oY+alzH+3;
          ctx.beginPath();ctx.strokeStyle="#cc2200";ctx.lineWidth=0.8;
          ctx.moveTo(oX+4,y+8);ctx.lineTo(oX+alzW-4,y+8);ctx.stroke();
          const tw=ctx.measureText(lbl).width+4;
          ctx.fillStyle="rgba(255,255,255,.9)";ctx.fillRect(oX+alzW/2-tw/2,y+2,tw,10);
          ctx.fillStyle="#cc2200";ctx.fillText(lbl,oX+alzW/2,y+9);
        } else if(a.axis==="height"){
          const x=oX-2;
          ctx.beginPath();ctx.strokeStyle="#cc2200";ctx.lineWidth=0.8;
          ctx.moveTo(x-7,oY+4);ctx.lineTo(x-7,oY+alzH-4);ctx.stroke();
          ctx.save();ctx.translate(x-12,oY+alzH/2);ctx.rotate(-Math.PI/2);
          const tw=ctx.measureText(lbl).width+4;
          ctx.fillStyle="rgba(255,255,255,.9)";ctx.fillRect(-tw/2,-5,tw,10);
          ctx.fillStyle="#cc2200";ctx.fillText(lbl,0,3);ctx.restore();
        }
      });

      /* Si no hay partes, mostrar también la foto completa como alzado */
      if(!vSegs||vSegs.length===0){
        ctx.fillStyle="#1a3a8a";ctx.font="6.5px 'Inter',sans-serif";ctx.textAlign="center";
        ctx.fillText("(sin zonas detectadas)",ortX+ortW/2,oY+alzH+planH+22);
      }
    }

    /* ── DIMENSION SUMMARY TABLE (below image) — con icono de cada herramienta ── */
    const sumY=imgY+imgH+4;
    const measWithVal=anns.filter(a=>a.value!=null);
    if(measWithVal.length){
      ctx.fillStyle="#1a3a8a";ctx.font="bold 7px 'Inter',sans-serif";ctx.textAlign="left";
      ctx.fillText("MEDIDAS:",imgX,sumY+8);
      measWithVal.slice(0,6).forEach((a,i)=>{
        const col2=i%2===0?"rgba(210,228,255,.3)":"transparent";
        ctx.fillStyle=col2;ctx.fillRect(imgX+i<3?0:imgW/2+4,sumY+10+(i%3)*12,imgW/2-4,11);
        const ic=a.icon||TOOLS.find(t=>t.id===a.type)?.icon||"●";
        ctx.fillStyle="#333";ctx.font="6.5px 'Inter',sans-serif";ctx.textAlign="left";
        ctx.fillText(`${ic} ${a.title||a.type}: ${a.value}${a.unit}`,imgX+(i>=3?imgW/2+6:2),sumY+18+(i%3)*12);
      });
    }

    /* ── PARTS LIST TABLE (bottom) ── */
    const tY=H-bH+2;
    ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1;ctx.setLineDash([]);ctx.strokeRect(mg,tY,dW,bH-4);
    ctx.fillStyle="rgba(210,228,255,.5)";ctx.fillRect(mg,tY,dW,14);
    ctx.fillStyle="#1a3a8a";ctx.font="bold 7px 'Inter',sans-serif";ctx.textAlign="left";
    ctx.fillText("LISTA DE PARTES",mg+4,tY+9);
    const colW=dW/Math.min((vSegs||[]).length||1,3);
    (vSegs||[]).slice(0,6).forEach((seg,i)=>{
      const c=Math.floor(i/2),r=i%2;
      ctx.fillStyle=r===0?"rgba(210,228,255,.15)":"transparent";
      ctx.fillRect(mg+c*colW,tY+14+r*12,colW,12);
      ctx.fillStyle=seg.color||"#1a3a8a";ctx.font="bold 6px 'Inter',sans-serif";ctx.textAlign="left";
      ctx.fillText(`${i+1}. ${(seg.name||"Parte "+(i+1)).slice(0,20)}`,mg+c*colW+4,tY+22+r*12);
    });
  },[anns,objName,segs,img,segSel,scope]);

  useEffect(()=>{
    if(img){
      const el=new Image();el.crossOrigin="anonymous";
      el.onload=()=>draw(el);
      el.onerror=()=>draw(null);
      el.src=img;
    } else {draw(null);}
  },[draw,img]);

  return <canvas ref={ref} width={2800} height={1800} style={{width:"100%",display:"block",background:"#ffffff",imageRendering:"crisp-edges"}}/>;
}

/* ══ V3D ══ */
function V3D({anns,shape}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    const E=ref.current,W=E.clientWidth||320,H=250;
    const gd=ax=>{const a=anns.find(a=>a.axis===ax&&a.value!=null);return a?Math.max(toMM(a.value,a.unit),1):100;};
    const rw=gd("width"),rh=gd("height"),rd=gd("depth");
    const mx=Math.max(rw,rh,rd,1),sc=1.8/mx,sw=rw*sc,sh=rh*sc,sd=rd*sc;
    const scene=new THREE.Scene();scene.background=new THREE.Color(0x0e1525);
    const cam=new THREE.PerspectiveCamera(42,W/H,.05,200);
    cam.position.set(sw*2.4+.3,sh*1.8+.2,sd*2.4+.3);cam.lookAt(0,0,0);
    const rdr=new THREE.WebGLRenderer({antialias:true});rdr.setSize(W,H);rdr.setPixelRatio(Math.min(devicePixelRatio,2));
    rdr.shadowMap.enabled=true;rdr.shadowMap.type=THREE.PCFSoftShadowMap;rdr.outputEncoding=THREE.sRGBEncoding;rdr.toneMapping=THREE.ACESFilmicToneMapping;rdr.toneMappingExposure=1.1;
    E.appendChild(rdr.domElement);
    const piv=new THREE.Group();scene.add(piv);
    const fM=c=>new THREE.MeshStandardMaterial({color:c||0x1144bb,metalness:.42,roughness:.5,transparent:true,opacity:.83,side:THREE.DoubleSide});
    const eM=()=>new THREE.LineBasicMaterial({color:0x00e5c4});
    const bx=(bw,bh,bd,x=0,y=0,z=0,c)=>{const g=new THREE.BoxGeometry(bw,bh,bd);const m=new THREE.Mesh(g,fM(c));m.position.set(x,y,z);m.castShadow=true;piv.add(m);const l=new THREE.LineSegments(new THREE.EdgesGeometry(g),eM());l.position.set(x,y,z);piv.add(l);};
    const cy=(r,ch)=>{const g=new THREE.CylinderGeometry(r,r,ch,32);const m=new THREE.Mesh(g,fM());m.castShadow=true;piv.add(m);piv.add(new THREE.LineSegments(new THREE.EdgesGeometry(g),eM()));};
    const s=shape||"box";
    if(s==="table"){const th=Math.max(sh*.08,.04),lw=Math.max(Math.min(sw,sd)*.07,.03),lh=sh-th;bx(sw,th,sd,0,sh/2-th/2,0,0x1144cc);[[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([a,b])=>bx(lw,lh,lw,a*(sw/2-lw/2)*.85,-sh/2+lh/2,b*(sd/2-lw/2)*.85,0x0a2266));}
    else if(s==="chair"){const th=.04,lw=.05,sy2=sh*.45,bkh=sh-sy2;bx(sw,th,sd,0,-sh/2+sy2,0);bx(sw,bkh,th,0,-sh/2+sy2+bkh/2+th/2,-sd/2+th/2);[[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([a,b])=>bx(lw,sy2,lw,a*(sw/2-lw/2)*.8,-sh/2+sy2/2,b*(sd/2-lw/2)*.8));}
    else if(["cylinder","bottle","vase","cup","glass","tube","pipe"].includes(s))cy(Math.min(sw,sd)/2,sh);
    else if(["sphere","ball"].includes(s)){const r=Math.min(sw,sh,sd)/2;const m=new THREE.Mesh(new THREE.SphereGeometry(r,28,28),fM());m.castShadow=true;piv.add(m);}
    else if(s==="cone"){const g=new THREE.ConeGeometry(Math.min(sw,sd)/2,sh,24);const m=new THREE.Mesh(g,fM());m.castShadow=true;piv.add(m);piv.add(new THREE.LineSegments(new THREE.EdgesGeometry(g),eM()));}
    else if(s==="torus"){const r1=Math.min(sw,sd)/2*.7,r2=r1*.28;const g=new THREE.TorusGeometry(r1,r2,16,48);const m=new THREE.Mesh(g,fM());m.castShadow=true;piv.add(m);piv.add(new THREE.LineSegments(new THREE.EdgesGeometry(g),eM()));}
    else if(s==="L_shape"){bx(sw,sh*.12,sd,0,-sh/2+sh*.06,0,0x1144cc);bx(sw*.12,sh,sd,(-sw/2+sw*.06),0,0,0x1144cc);}
    else if(s==="T_shape"){bx(sw,sh*.12,sd,0,sh/2-sh*.06,0,0x1144cc);bx(sw*.12,sh,sd,0,0,0,0x1144cc);}
    else if(s==="hemisphere"){const r=Math.min(sw,sh,sd)/2;const g=new THREE.SphereGeometry(r,24,24,0,Math.PI*2,0,Math.PI/2);const m=new THREE.Mesh(g,fM());m.castShadow=true;piv.add(m);}
    else bx(sw,sh,sd);

function V3DPipe({components,dn}){

    const addF=(pos,dir,r)=>{const g=new THREE.CylinderGeometry(r*1.7,r*1.7,r*.22,16);const m=new THREE.Mesh(g,mF);m.position.copy(pos);const f=pos.clone().sub(dir.clone().multiplyScalar(.1));or(m,f,pos.clone().add(dir.clone().multiplyScalar(.1)));m.castShadow=true;piv.add(m);};
    const addV=(pos,dir,r,vt)=>{const vl=r*5;const vb=new THREE.Mesh(new THREE.CylinderGeometry(r*1.3,r*1.3,vl,14),mV);vb.position.copy(pos.clone().addScaledVector(dir,vl/2));const f=pos.clone().sub(dir.clone().multiplyScalar(.1));or(vb,f,pos.clone().add(dir.clone().multiplyScalar(vl)));vb.castShadow=true;piv.add(vb);addF(pos,dir,r);addF(pos.clone().addScaledVector(dir,vl),dir,r);const perp=new THREE.Vector3(0,1,0);if(Math.abs(dir.dot(perp))>.9)perp.set(0,0,1);const sPos=pos.clone().addScaledVector(dir,vl*.5).addScaledVector(perp,r*1.8);if(vt==="ball"||vt==="ball_valve"){const sp=new THREE.Mesh(new THREE.SphereGeometry(r*.9,12,12),mV);sp.position.copy(pos.clone().addScaledVector(dir,vl*.5));sp.castShadow=true;piv.add(sp);}const mhw=new THREE.Mesh(new THREE.TorusGeometry(r*1.1,r*.12,8,16),mH);mhw.position.copy(sPos);piv.add(mhw);};
    const dm2={H:[1,0,0],V:[0,1,0],Z:[0,0,1],"-H":[-1,0,0],"-V":[0,-1,0],"-Z":[0,0,-1],X:[1,0,0],Y:[0,1,0]};
    const comps=components&&components.length>0?components:[{type:"flange",dn:dn||100},{type:"pipe",dn:dn||100,length:2000,orientation:"H"},{type:"elbow",dn:dn||100,to_orientation:"V"},{type:"pipe",dn:dn||100,length:1500},{type:"valve",dn:dn||100,valve_type:"gate"},{type:"pipe",dn:dn||100,length:800},{type:"flange",dn:dn||100},{type:"elbow",dn:dn||100,to_orientation:"-H"},{type:"pipe",dn:dn||100,length:1800,orientation:"-H"},{type:"flange",dn:dn||100}];

    }

    if(dd2.length>1){const bDN=(comps.find(c=>c.dn)||{dn:dn||100}).dn;const bR=bDN*S*.5;const curve=new THREE.CatmullRomCurve3(dd2,false,"catmullrom",.4);const pts=curve.getPoints(Math.max(dd2.length*8,60));for(let i=0;i<pts.length-1;i++)addT(pts[i],pts[i+1],bR);}

    const box=new THREE.Box3().setFromObject(piv);const center=box.getCenter(new THREE.Vector3());const sz=box.getSize(new THREE.Vector3()).length();
    piv.position.copy(center.negate());cam.position.set(sz*.7,sz*.55,sz*.9);cam.lookAt(0,0,0);
    let drag=false,lx=0,ly=0,ry=0,rx=.15;const px=e=>e.clientX??e.touches?.[0]?.clientX??0,py=e=>e.clientY??e.touches?.[0]?.clientY??0;
    const dn2=e=>{drag=true;lx=px(e);ly=py(e);};const mv=e=>{if(!drag)return;ry+=(px(e)-lx)*.009;rx=clamp(rx+(py(e)-ly)*.009,-.8,.8);lx=px(e);ly=py(e);};const up=()=>drag=false;
    rdr.domElement.addEventListener("mousedown",dn2);rdr.domElement.addEventListener("touchstart",dn2,{passive:true});window.addEventListener("mousemove",mv);window.addEventListener("touchmove",mv,{passive:true});window.addEventListener("mouseup",up);window.addEventListener("touchend",up);
    rdr.domElement.style.cursor="grab";
    let id;const anim=()=>{id=requestAnimationFrame(anim);if(!drag)ry+=.005;piv.rotation.set(rx,ry,0);rdr.render(scene,cam);};anim();
    return()=>{cancelAnimationFrame(id);window.removeEventListener("mousemove",mv);window.removeEventListener("touchmove",mv);window.removeEventListener("mouseup",up);window.removeEventListener("touchend",up);rdr.dispose();if(E.contains(rdr.domElement))E.removeChild(rdr.domElement);};
  },[components,dn]);
  return <div ref={ref} style={{width:"100%",height:"270px"}}/>;

/* ══ MULTI-PART 3D: shows one 3D card per measured part ══ */
/* ══ Part3D with auto-crop from main image ══ */
function Part3DWithCrop({anns,shape,color,seg}){
  const[texImg,setTexImg]=React.useState(null);
  React.useEffect(()=>{
    if(!seg||!seg.x1&&seg.x1!==0)return;
    /* Try to get the main image from the app */
    const mainImg=document.querySelector(".app-scroll img, img[draggable='false']");
    if(!mainImg||!mainImg.complete||!mainImg.naturalWidth)return;
    try{
      const c2=document.createElement("canvas");
      c2.width=Math.max(Math.round(mainImg.naturalWidth*(seg.x2-seg.x1)),10);
      c2.height=Math.max(Math.round(mainImg.naturalHeight*(seg.y2-seg.y1)),10);
      const ctx=c2.getContext("2d");
      ctx.drawImage(mainImg,mainImg.naturalWidth*seg.x1,mainImg.naturalHeight*seg.y1,c2.width,c2.height,0,0,c2.width,c2.height);
      setTexImg(c2.toDataURL("image/jpeg",.9));
    }catch(e){}
  },[seg]);
  const sw=(seg?.x2||1)-(seg?.x1||0);const sh=(seg?.y2||1)-(seg?.y1||0);
  return<Part3D anns={anns} shape={shape} color={color} segW={sw*400} segH={sh*400} texImg={texImg}/>;
}

function MultiPart3D({anns,segs,objShape,img,segSel,scope}){
  const[crops,setCrops]=React.useState({});
  React.useEffect(()=>{
    if(!img||!segs?.length)return;
    const el=new Image();el.crossOrigin="anonymous";
    el.onload=()=>{
      const nc={};
      segs.forEach(seg=>{
        try{
          const x1=Math.min(seg.x1,seg.x2),y1=Math.min(seg.y1,seg.y2);
          const x2=Math.max(seg.x1,seg.x2),y2=Math.max(seg.y1,seg.y2);
          const w=Math.round(el.width*(x2-x1)),h=Math.round(el.height*(y2-y1));
          if(w<4||h<4)return;
          const c=document.createElement("canvas");c.width=w;c.height=h;
          c.getContext("2d").drawImage(el,el.width*x1,el.height*y1,w,h,0,0,w,h);
          nc[seg.id]={url:c.toDataURL("image/jpeg",.92),w,h};
        }catch(e){}
      });
      setCrops(nc);
    };
    el.src=img;
  },[img,segs]);

  const parts=React.useMemo(()=>{
    if(segs&&segs.length>0){
      const mapped=segs.map(seg=>{
        const related=anns.filter(a=>a.value!=null&&annInSeg(a,seg));
        return{...seg,anns:related};
      });
      const filtered=mapped.filter(p=>scope==="all"||p.anns.length>0);
      /* Si "solo lo medido" resulta vacío (medidas en imagen principal sin zona asignada),
         mostramos todas las medidas agrupadas bajo "Objeto completo" para no dejar pantalla vacía */
      if(filtered.length===0&&scope==="measured"){
        const withVal=anns.filter(a=>a.value!=null);
        if(withVal.length)return[{id:"_all",name:"Objeto completo",color:"#ff9500",anns:withVal}];
      }
      return filtered;
    }
    const withVal=anns.filter(a=>a.value!=null);
    if(!withVal.length)return[];
    return[{id:"1",name:"Objeto completo",color:"#ff9500",anns:withVal}];
  },[anns,segs,scope]);

  if(!parts.length)return<div style={{padding:"24px 16px",textAlign:"center",lineHeight:2}}>
    <div style={{fontSize:"40px",marginBottom:"8px"}}>🎮</div>
    <div style={{fontSize:"12px",fontWeight:700,color:"var(--txt)",marginBottom:"6px"}}>
      {segs&&segs.length>0?"Zonas sin medidas todavía":"Sin zonas detectadas"}
    </div>
    <div style={{fontSize:"9px",color:"var(--txt2)",lineHeight:1.8,marginBottom:"14px"}}>
      {segs&&segs.length>0
        ?<>Tienes <b>{segs.length}</b> zona(s). Para verlas en 3D selecciona <b>"Todo"</b> cuando abras la vista 3D, o mide algo dentro de una zona y selecciona "Solo lo medido".</>
        :<>Detecta objetos con <b>IA Precisa</b> o añade partes manualmente con <b>+ Añadir Parte</b>. Cada parte aparecerá como un modelo 3D interactivo.</>}
    </div>
    {segs&&segs.length>0&&<button onClick={()=>{/* forzar scope=all */}}
      style={{padding:"10px 20px",background:"linear-gradient(135deg,#ff7700,#ffaa00)",color:"#fff",border:"none",borderRadius:"9px",fontSize:"11px",fontWeight:700,cursor:"pointer"}}
      onClick={()=>{/* el scope lo controla el modal anterior */}}>
      ← Vuelve atrás y elige "Todo"
    </button>}
  </div>;

  return<div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
    {(segSel&&segSel.size>0?parts.filter(p=>segSel.has(p.id)):parts).slice(0,4).map(part=>{
      const crop=crops[part.id];
      return<div key={part.id} style={{borderRadius:"10px",overflow:"hidden",border:`1px solid ${part.color||"#ff9500"}40`}}>
        <div style={{padding:"6px 10px",background:`${part.color||"#ff9500"}22`,display:"flex",alignItems:"center",gap:"7px",borderBottom:`1px solid ${part.color||"#ff9500"}30`}}>
          <div style={{width:"10px",height:"10px",borderRadius:"2px",background:part.color||"#ff9500"}}/>
          <span style={{fontSize:"9px",fontWeight:700,color:part.color||"#ff9500"}}>{part.id}. {part.name}</span>
          {part.anns.length>0&&<span style={{fontSize:"8px",color:"#556677",marginLeft:"auto"}}>{part.anns.map(a=>`${a.title||a.type}: ${a.value}${a.unit}`).join(" · ")}</span>}
        </div>
        <Part3D anns={part.anns} shape={objShape} color={part.color}
          segW={crop?.w} segH={crop?.h} texImg={crop?.url}/>
      </div>;
    })}
  </div>;
}

/* ══ SINGLE PART 3D - Wireframe + image texture (3ds Max style) ══ */
function Part3D({anns,shape,color,segW,segH,texImg}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    const E=ref.current,W=E.clientWidth||300,H=220;
    const gd=ax=>{const a=anns.find(a=>a.axis===ax&&a.value!=null);return a?Math.max((parseFloat(a.value)||1)*({"mm":1,"cm":10,"m":1000,"in":25.4,"ft":304.8}[a.unit]||10),1):null;};
    const annW=gd("width"),annH=gd("height"),annD=gd("depth");
    const pixW=segW||200,pixH=segH||200,ratio=pixW/pixH;
    let sw=annW?annW*0.002:2*Math.min(ratio,4);
    let sh=annH?annH*0.002:2/Math.max(ratio,0.25);
    let sd=annD?annD*0.002:Math.min(sw,sh)*0.35;
    const mx=Math.max(sw,sh,sd,0.1),sc=2.2/mx;sw*=sc;sh*=sc;sd*=sc;

    /* Escena robusta — sin ShadowMaterial ni FogExp2 que pueden fallar */
    const scene=new THREE.Scene();
    scene.background=new THREE.Color(0x0d1520);

    /* Cámara 3/4 isométrica para máximo volumen visible */
    const cam=new THREE.PerspectiveCamera(38,W/H,0.05,100);
    cam.position.set(sw*1.6,sh*1.4,sd*3.5+2);cam.lookAt(0,0,0);

    const rdr=new THREE.WebGLRenderer({antialias:true,alpha:false});
    rdr.setSize(W,H);
    rdr.setPixelRatio(Math.min(devicePixelRatio,1.5));
    /* Sin sombras — evita el bug de pantalla negra en GPUs con poca VRAM */
    rdr.shadowMap.enabled=false;
    try{rdr.toneMapping=THREE.ACESFilmicToneMapping;rdr.toneMappingExposure=1.2;}catch(e){}
    E.appendChild(rdr.domElement);

    const piv=new THREE.Group();scene.add(piv);
    const colNum=parseInt((color||"#00ccff").replace("#",""),16)||0x00ccff;
    const depth=Math.max(sd,0.3);

    /* Cuadrícula de suelo simple (sin sombras) */
    const grid=new THREE.GridHelper(10,20,0x1a3355,0x0d1a2a);
    grid.position.y=-sh/2-0.01;scene.add(grid);

    const wireMat=new THREE.LineBasicMaterial({color:colNum,transparent:true,opacity:0.9});

    if(texImg&&segW&&segH){
      const r2=segW/segH;
      sw=2.4*Math.min(r2,3);sh=2.4/Math.max(r2,0.33);sd=Math.min(sw,sh)*0.35;
      const mx2=Math.max(sw,sh,0.1),sc2=2.5/mx2;sw*=sc2;sh*=sc2;sd*=sc2;
      const depth2=Math.max(sd,0.3);
      const imgEl=new Image();
      imgEl.onload=()=>{
        try{
          const tex=new THREE.Texture(imgEl);tex.needsUpdate=true;
          const faceGeo=new THREE.PlaneGeometry(sw,sh);
          const faceMat=new THREE.MeshStandardMaterial({map:tex,roughness:0.4,metalness:0.05,side:THREE.FrontSide});
          const face=new THREE.Mesh(faceGeo,faceMat);face.position.z=depth2/2+0.002;piv.add(face);
          const boxGeo=new THREE.BoxGeometry(sw,sh,depth2);
          const sideMat=new THREE.MeshStandardMaterial({color:colNum,transparent:true,opacity:0.4,roughness:0.6});
          piv.add(new THREE.Mesh(boxGeo,sideMat));
          piv.add(new THREE.LineSegments(new THREE.EdgesGeometry(boxGeo),wireMat));
        }catch(e){
          const bg=new THREE.BoxGeometry(sw,sh,depth2);
          piv.add(new THREE.Mesh(bg,new THREE.MeshStandardMaterial({color:colNum,transparent:true,opacity:0.3})));
          piv.add(new THREE.LineSegments(new THREE.EdgesGeometry(bg),wireMat));
        }
        rdr.render(scene,cam);
      };
      imgEl.onerror=()=>{
        const bg=new THREE.BoxGeometry(sw,sh,depth2);
        piv.add(new THREE.Mesh(bg,new THREE.MeshStandardMaterial({color:colNum,transparent:true,opacity:0.3})));
        piv.add(new THREE.LineSegments(new THREE.EdgesGeometry(bg),wireMat));
        rdr.render(scene,cam);
      };
      imgEl.src=texImg;
    }else{
      const isCyl=["cylinder","tube","pipe"].includes(shape);
      if(isCyl){
        const geo=new THREE.CylinderGeometry(Math.min(sw,sh)/2.2,Math.min(sw,sh)/2.2,sh,48);
        piv.add(new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:colNum,metalness:0.4,roughness:0.5,transparent:true,opacity:0.45})));
        piv.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),wireMat));
      }else{
        const boxGeo=new THREE.BoxGeometry(sw,sh,depth);
        piv.add(new THREE.Mesh(boxGeo,new THREE.MeshStandardMaterial({color:colNum,metalness:0.25,roughness:0.55,transparent:true,opacity:0.38})));
        piv.add(new THREE.LineSegments(new THREE.EdgesGeometry(boxGeo),wireMat));
      }
    }

    /* Iluminación robusta — sin sombras */
    scene.add(new THREE.AmbientLight(0x506070,0.9));
    const key=new THREE.DirectionalLight(0xfff8ee,2.5);key.position.set(5,8,7);scene.add(key);
    const fill=new THREE.DirectionalLight(0x8090ff,0.8);fill.position.set(-5,2,-4);scene.add(fill);
    const rim=new THREE.DirectionalLight(0xff9944,0.5);rim.position.set(0,-3,5);scene.add(rim);
    scene.add(new THREE.HemisphereLight(0x304466,0x111122,0.5));

    let rx=0.2,ry=0.5,drag=false,lx=0,ly=0;
    const dn=e=>{drag=true;const s=e.touches?.[0]||e;lx=s.clientX;ly=s.clientY;};
    const mv=e=>{if(!drag)return;const s=e.touches?.[0]||e;
      ry+=(s.clientX-lx)*0.014;rx+=(s.clientY-ly)*0.011;
      rx=Math.max(-1.2,Math.min(1.2,rx));lx=s.clientX;ly=s.clientY;};
    const up=()=>{drag=false;};
    rdr.domElement.addEventListener("mousedown",dn);rdr.domElement.addEventListener("touchstart",dn,{passive:true});
    window.addEventListener("mousemove",mv);window.addEventListener("touchmove",mv,{passive:true});
    window.addEventListener("mouseup",up);window.addEventListener("touchend",up);
    let id;const anim=()=>{id=requestAnimationFrame(anim);if(!drag)ry+=0.006;piv.rotation.y=ry;piv.rotation.x=rx;rdr.render(scene,cam);};
    anim();
    return()=>{cancelAnimationFrame(id);window.removeEventListener("mousemove",mv);window.removeEventListener("touchmove",mv);window.removeEventListener("mouseup",up);window.removeEventListener("touchend",up);try{rdr.dispose();}catch(e){}if(E.contains(rdr.domElement))E.removeChild(rdr.domElement);};
  },[anns,shape,color,segW,segH,texImg]);
  return<div ref={ref} style={{width:"100%",height:"220px",cursor:"grab",borderRadius:"8px",overflow:"hidden",background:"#0d1520"}}/>;
}

  const delA=useCallback(id=>{setHist(h=>[...h.slice(-30),JSON.parse(JSON.stringify(anns))]);setRedo([]);setAnns(p=>p.filter(a=>a.id!==id));if(selId===id)setSelId(null);},[anns,selId]);
  const undo=useCallback(()=>{setHist(h=>{if(!h.length)return h;setRedo(r=>[...r,anns]);setAnns(h[h.length-1]);setSelId(null);return h.slice(0,-1);});},[anns]);
  const redoFn=useCallback(()=>{setRedo(r=>{if(!r.length)return r;setHist(h=>[...h,anns]);setAnns(r[r.length-1]);setSelId(null);return r.slice(0,-1);});},[anns]);

  /* ═══ SISTEMA DE PESTAÑAS — recortes editables sin límite, cada uno con su propio
     historial de deshacer/rehacer, navegables sin perder información ═══ */

  /* Guarda en editZones el estado actual de la pestaña activa (fcAnns/fcHist/fcRedo/fcZoom)
     antes de cambiar de pestaña o cerrar, para no perder nada al navegar */
  const snapshotActiveZone=useCallback(()=>{
    if(!activeZoneId)return;
    setEditZones(zs=>zs.map(z=>z.id===activeZoneId?{...z,fcAnns,fcHist,fcRedo,fcZoom,
      dirty:fcAnns.some(a=>a.value!=null)}:z));
  },[activeZoneId,fcAnns,fcHist,fcRedo,fcZoom]);

  /* Abre una zona en una pestaña nueva, o salta a ella si ya estaba abierta — sin límite de pestañas */
  const openZone=useCallback((seg,croppedImg)=>{
    snapshotActiveZone();
    fcClickLockRef.current=false;
    setEditZones(zs=>{
      const existing=zs.find(z=>z.seg.id===seg.id);
      if(existing){
        setActiveZoneId(existing.id);
        setFcAnns(existing.fcAnns||[]);setFcHist(existing.fcHist||[]);setFcRedo(existing.fcRedo||[]);setFcZoom(existing.fcZoom||1);
        setEditZone({seg:existing.seg,croppedImg:existing.croppedImg});
        return zs;
      }
      const id=uid();
      setActiveZoneId(id);
      setFcAnns([]);setFcHist([]);setFcRedo([]);setFcZoom(1);
      setEditZone({seg,croppedImg});
      return[...zs,{id,seg,croppedImg,fcAnns:[],fcHist:[],fcRedo:[],fcZoom:1,dirty:false}];
    });
  },[snapshotActiveZone]);

  /* Recorta directamente un segmento YA seleccionado (por IA o manualmente) y lo
     abre como pestaña — sin volver a pedir selección punto a punto. Usado por el
     botón "✂ Recortar" cuando ya hay una zona detectada activa (selSeg). */
  const extractSegToZone=useCallback(seg=>{
    if(!img||!seg)return;
    const im=new Image();im.crossOrigin="anonymous";
    im.onload=()=>{
      const c2=document.createElement("canvas");
      c2.width=Math.round(im.width*(seg.x2-seg.x1));
      c2.height=Math.round(im.height*(seg.y2-seg.y1));
      const ctx2=c2.getContext("2d");
      if(seg.polygon?.length>=3){
        /* Recorta siguiendo el contorno exacto detectado por IA, no solo el rectángulo */
        ctx2.beginPath();
        seg.polygon.forEach((pt,i)=>{
          const px=Array.isArray(pt)?pt[0]:pt.x,py=Array.isArray(pt)?pt[1]:pt.y;
          const rx=(px-seg.x1)/(seg.x2-seg.x1)*c2.width,ry=(py-seg.y1)/(seg.y2-seg.y1)*c2.height;
          i===0?ctx2.moveTo(rx,ry):ctx2.lineTo(rx,ry);
        });
        ctx2.closePath();ctx2.clip();
      }
      ctx2.drawImage(im,im.width*seg.x1,im.height*seg.y1,c2.width,c2.height,0,0,c2.width,c2.height);
      openZone(seg,c2.toDataURL("image/jpeg",.92));
      setSelSeg(null);
    };
    im.src=img;
  },[img,openZone]);

  /* Cambia a otra pestaña ya abierta, guardando antes el estado de la actual */
  const switchZone=useCallback(zoneId=>{
    snapshotActiveZone();
    fcClickLockRef.current=false;
    const z=editZones.find(z=>z.id===zoneId);if(!z)return;
    setActiveZoneId(z.id);
    setFcAnns(z.fcAnns||[]);setFcHist(z.fcHist||[]);setFcRedo(z.fcRedo||[]);setFcZoom(z.fcZoom||1);
    setEditZone({seg:z.seg,croppedImg:z.croppedImg});
  },[editZones,snapshotActiveZone]);

  /* Cierra una pestaña concreta (sin afectar a las demás). Si tiene cambios sin guardar
     (dirty), primero pregunta. Si era la activa, salta a la siguiente disponible o a Principal. */
  const closeZone=useCallback((zoneId,force)=>{
    const z=editZones.find(z=>z.id===zoneId);if(!z)return;
    const isDirty=zoneId===activeZoneId?fcAnns.some(a=>a.value!=null):z.dirty;
    if(isDirty&&!force){setPendingNav({type:"close",zoneId});return;}
    const rest=editZones.filter(z=>z.id!==zoneId);
    setEditZones(rest);
    if(zoneId===activeZoneId){
      if(rest.length){
        const nz=rest[rest.length-1];
        setActiveZoneId(nz.id);
        setFcAnns(nz.fcAnns||[]);setFcHist(nz.fcHist||[]);setFcRedo(nz.fcRedo||[]);setFcZoom(nz.fcZoom||1);
        setEditZone({seg:nz.seg,croppedImg:nz.croppedImg});
      }else{
        setActiveZoneId(null);setEditZone(null);setFcAnns([]);setFcHist([]);setFcRedo([]);
      }
    }
  },[editZones,activeZoneId,fcAnns]);

  /* Vuelve a la imagen principal SIN cerrar ninguna pestaña — quedan abiertas de fondo */
  const goToMainKeepingZones=useCallback(()=>{
    snapshotActiveZone();
    setEditZone(null);
  },[snapshotActiveZone]);

  /* Deshacer / Rehacer dentro de la pestaña activa (independiente de las demás pestañas) */
  const fcUndo=useCallback(()=>{
    setFcHist(h=>{
      if(!h.length)return h;
      setFcRedo(r=>[...r,fcAnns]);
      setFcAnns(h[h.length-1]);
      return h.slice(0,-1);
    });
  },[fcAnns]);
  const fcRedoFn=useCallback(()=>{
    setFcRedo(r=>{
      if(!r.length)return r;
      setFcHist(h=>[...h,fcAnns]);
      setFcAnns(r[r.length-1]);
      return r.slice(0,-1);
    });
  },[fcAnns]);
  /* Registra un cambio en fcAnns guardando snapshot para poder deshacer, y vacía el rehacer */
  const fcPush=useCallback(updater=>{
    setFcHist(h=>[...h.slice(-30),JSON.parse(JSON.stringify(fcAnns))]);
    setFcRedo([]);
    setFcAnns(updater);
  },[fcAnns]);

  /* "Aplicar a las demás ventanas": copia una anotación (misma posición relativa,
     mismo tipo y medida) a otras pestañas abiertas. allOrPick: true=todas, array de ids=selección */
  const applyAnnToZones=useCallback((ann,targetIds)=>{
    setEditZones(zs=>zs.map(z=>{
      if(!targetIds.includes(z.id))return z;
      const copy={...ann,id:uid()};
      if(z.id===activeZoneId){
        setFcHist(h=>[...h.slice(-30),JSON.parse(JSON.stringify(fcAnns))]);setFcRedo([]);
        setFcAnns(p=>[...p,copy]);
        return{...z,fcAnns:[...(z.fcAnns||[]),copy]};
      }
      return{...z,fcAnns:[...(z.fcAnns||[]),copy],fcHist:[...(z.fcHist||[]),JSON.parse(JSON.stringify(z.fcAnns||[]))],fcRedo:[],dirty:true};
    }));
  },[activeZoneId,fcAnns]);

  /* position helper */
  const getP=useCallback((e,el)=>{
    const r=(el||imgRef.current)?.getBoundingClientRect();if(!r)return{x:.5,y:.5};
    const s=e.touches?.[0]||e.changedTouches?.[0]||e;
    return{x:cl((s.clientX-r.left)/r.width,.01,.99),y:cl((s.clientY-r.top)/r.height,.01,.99)};
  },[]);

  /* ═══ LASSO: bulletproof native listener (bypasses React synthetic event edge cases) ═══ */
  const lassoPendRef=useRef([]);
  const lassoLastTapRef=useRef(0); // para detectar doble-toque manualmente (más fiable que dblclick nativo en táctil)
  useEffect(()=>{lassoPendRef.current=pend;},[pend]);
  useEffect(()=>{
    if(tool!=="lasso")return;
    const el=imgRef.current;if(!el)return;
    const closeLasso=(pts)=>{
      if(pts.length<2)return;
      const x1=Math.min(...pts.map(q=>q.x)),y1=Math.min(...pts.map(q=>q.y));
      const x2=Math.max(...pts.map(q=>q.x)),y2=Math.max(...pts.map(q=>q.y));
      const newSeg={id:uid(),name:"Selección "+new Date().toLocaleTimeString("es-ES"),
        x1,y1,x2,y2,color:COLS[colI%COLS.length],polygon:pts.map(q=>[q.x,q.y]),isLasso:true};
      /* Se guarda YA como pieza visible — nunca desaparece, aunque luego canceles el menú */
      setSegs(s=>[...s,newSeg]);setShowSegs(true);setSelSeg(newSeg.id);setColI(c=>c+1);
      setCropM({id:newSeg.id,type:"lasso",isLasso:true,points:[...pts],polygon:pts.map(q=>[q.x,q.y]),x1,y1,x2,y2,fromSeg:newSeg.id});
      setPend([]);setPrev(null);setTool("sel");
    };
    const handleClick=(ev)=>{
      ev.preventDefault();ev.stopPropagation();
      const r=el.getBoundingClientRect();
      const cx=ev.clientX??ev.changedTouches?.[0]?.clientX;
      const cy=ev.clientY??ev.changedTouches?.[0]?.clientY;
      if(cx==null||cy==null)return;
      const p={x:cl((cx-r.left)/r.width,.01,.99),y:cl((cy-r.top)/r.height,.01,.99)};
      const cur=lassoPendRef.current;
      /* Doble-toque manual: si llega un toque a <400ms del anterior, se interpreta
         como "doble clic" y cierra el lazo aquí mismo, sin depender del evento
         dblclick nativo del navegador (poco fiable en pantallas táctiles). */
      const now=Date.now();
      if(now-lassoLastTapRef.current<400&&cur.length>=2){
        lassoLastTapRef.current=0;
        closeLasso(cur);
        return;
      }
      lassoLastTapRef.current=now;
      if(cur.length>=2){
        const fp=cur[0];
        const dist=Math.sqrt(Math.pow((p.x-fp.x)*100,2)+Math.pow((p.y-fp.y)*100,2));
        if(dist<5){closeLasso(cur);return;}
      }
      const next=[...cur,p];
      lassoPendRef.current=next;
      setPend(next);
    };
    const handleDblClick=(ev)=>{
      ev.preventDefault();ev.stopPropagation();
      closeLasso(lassoPendRef.current);
    };
    const handleMove=(ev)=>{
      const cur=lassoPendRef.current;if(!cur.length)return;
      const r=el.getBoundingClientRect();
      const cx=ev.clientX??ev.touches?.[0]?.clientX;
      const cy=ev.clientY??ev.touches?.[0]?.clientY;
      if(cx==null||cy==null)return;
      const p={x:cl((cx-r.left)/r.width,.01,.99),y:cl((cy-r.top)/r.height,.01,.99)};
      setPrev({type:"lasso",points:[cur[cur.length-1],p]});
    };
    el.addEventListener("click",handleClick,true);
    el.addEventListener("dblclick",handleDblClick,true);
    el.addEventListener("mousemove",handleMove);
    return()=>{
      el.removeEventListener("click",handleClick,true);
      el.removeEventListener("dblclick",handleDblClick,true);
      el.removeEventListener("mousemove",handleMove);
    };
  },[tool]);

  /* ═══ UNIVERSAL: double-click finishes ANY open-ended measuring tool ═══
     Single click adds a point+line; double-click deactivates and asks what to do. */
  const pendRef=useRef([]);
  const openEndedLastTapRef=useRef(0); // doble-toque manual, igual de fiable que en el lazo
  useEffect(()=>{pendRef.current=pend;},[pend]);
  useEffect(()=>{
    if(!OPEN_ENDED.includes(tool))return;
    const el=imgRef.current;if(!el)return;
    const td=TOOLS.find(t=>t.id===tool);
    const finish=(pts)=>{
      if(!td||pts.length<1)return;
      const col=COLS[colI%COLS.length];
      const a={id:uid(),type:tool,icon:td?.icon||"●",title:"",value:null,unit:"cm",axis:"",
               color:col,points:[...pts],lineStyle:lSt,arrowHead:aHd};
      setPend([]);setPrev(null);
      /* Open the "what do you want to do?" menu immediately - asks for unit/value */
      setMeasM(a);setMIn({t:"",v:"",u:"cm",ax:""});
    };
    const handleDblClick=(ev)=>{
      if(pendRef.current.length<1)return;
      ev.preventDefault();ev.stopPropagation();
      finish(pendRef.current);
    };
    /* Detección manual en fase de captura: si el toque llega <400ms tras el anterior,
       se trata como "doble toque" y cierra aquí mismo, bloqueando que React añada
       además un punto nuevo por el mismo gesto (preventDefault+stopPropagation ANTES
       de que llegue el onClick de React). */
    const handleTapCheck=(ev)=>{
      const now=Date.now();
      if(now-openEndedLastTapRef.current<400&&pendRef.current.length>=1){
        openEndedLastTapRef.current=0;
        ev.preventDefault();ev.stopPropagation();
        finish(pendRef.current);
        return;
      }
      openEndedLastTapRef.current=now;
    };
    el.addEventListener("click",handleTapCheck,true);
    el.addEventListener("dblclick",handleDblClick,true);
    return()=>{el.removeEventListener("click",handleTapCheck,true);el.removeEventListener("dblclick",handleDblClick,true);};
  },[tool,colI,lSt,aHd]);

  /* create annotation after drawing */
  const mkAnn=useCallback((type,pts)=>{
    const td=TOOLS.find(t=>t.id===type),col=COLS[colI%COLS.length];
    const a={id:uid(),type,icon:td?.icon||"●",title:"",value:null,unit:"cm",axis:"",color:col,points:pts,lineStyle:lSt,arrowHead:aHd,
             partId:activePart?.id,partName:activePart?.name};
    if(type==="calib"){setCalibM(a);setMIn({t:"Escala",v:"",u:"cm",ax:""});addA(a);}
    else if(type==="crop"){setCropM({p1:pts[0],p2:pts[1]});}
    else if(type==="lasso"){setCropM({...a,isLasso:true});}
    else if(type==="rect"||type==="circ"){
      /* Rectángulo/Círculo se comportan como cualquier otra zona: ofrecen
         medir/contornear/pasar a 2D-3D/seguir, igual que lazo y recorte. */
      addA(a);
      const[p1,p2]=pts;
      let x1=Math.min(p1.x,p2.x),y1=Math.min(p1.y,p2.y),x2=Math.max(p1.x,p2.x),y2=Math.max(p1.y,p2.y);
      if(type==="circ"){
        const r=Math.sqrt(Math.pow((p2.x-p1.x),2)+Math.pow((p2.y-p1.y),2));
        x1=cl(p1.x-r,0,1);y1=cl(p1.y-r,0,1);x2=cl(p1.x+r,0,1);y2=cl(p1.y+r,0,1);
      }
      setCropM({id:a.id,type,isLasso:false,fromShape:true,x1,y1,x2,y2});
    }
    else{
      /* Add annotation AND immediately open the measure modal — every fixed-point
         tool (Línea, Cota, Distancia, Inclinación, Ángulo, Radio, Flechas,
         Espesor, Chaflán, Arco, Deflexión...) asks for value/unit right away */
      addA(a);
      setMeasM({...a,_existing:true});setMIn({t:"",v:"",u:"cm",ax:""});
    }
    setColI(c=>c+1);
  },[colI,lSt,aHd,addA,activePart]);

  /* 🔗 UNIR — conecta con una polilínea, en el orden en que se marcaron, los
     puntos/medidas elegidos con ☑ Seleccionar (multiSel). Usa el primer punto
     de cada anotación seleccionada como vértice. */
  const doJoinPts=useCallback(()=>{
    if(multiSel.length<2){
      setAiMsg("🔗 Selecciona al menos 2 puntos o medidas con ☑ Seleccionar antes de pulsar Unir.");
      return;
    }
    const pts=multiSel.map(id=>anns.find(x=>x.id===id)?.points?.[0]).filter(Boolean);
    if(pts.length<2){setAiMsg("⚠️ No se pudieron unir esos puntos — vuelve a intentarlo.");return;}
    const col=COLS[colI%COLS.length];
    const a={id:uid(),type:"poly",icon:"↬",title:"",value:null,unit:"cm",axis:"",color:col,points:pts,lineStyle:lSt,arrowHead:aHd,
             partId:activePart?.id,partName:activePart?.name};
    addA(a);setColI(c=>c+1);
    setMultiSel([]);setTool("sel");setSelId(a.id);
    setMeasM({...a,_existing:true});setMIn({t:"",v:"",u:"cm",ax:""});
    setAiMsg(`🔗 Unidos ${pts.length} puntos con una polilínea nueva.`);
  },[multiSel,anns,colI,lSt,aHd,addA,activePart]);

  /* Misma función 🔗 Unir pero dentro de una pestaña de zona recortada (fcAnns) */
  const doJoinPtsFc=useCallback(()=>{
    if(multiSel.length<2){
      setAiMsg("🔗 Selecciona al menos 2 puntos o medidas con ☑ Seleccionar antes de pulsar Unir.");
      return;
    }
    const pts=multiSel.map(id=>fcAnns.find(x=>x.id===id)?.points?.[0]).filter(Boolean);
    if(pts.length<2){setAiMsg("⚠️ No se pudieron unir esos puntos — vuelve a intentarlo.");return;}
    const col=COLS[colI%COLS.length];
    const a={id:uid(),type:"poly",icon:"↬",color:col,points:pts,value:null,unit:"cm",title:"",axis:"",_fc:true};
    fcPush(prev=>[...prev,a]);setColI(c=>c+1);
    setMultiSel([]);setTool("sel");
    setMeasM({...a,_existing:true,_fc:true});setMIn({t:"",v:"",u:"cm",ax:""});
    setAiMsg(`🔗 Unidos ${pts.length} puntos con una polilínea nueva.`);
  },[multiSel,fcAnns,colI,fcPush]);

  /* DRAWING - React synthetic events on image div */
  /* Double-click anywhere when lasso active → close polygon */
  /* ═══ Camino 2: SAM real en el navegador (MobileSAM vía onnxruntime-web) ═══
     Modelos verificados de un proyecto open-source funcional (akbartus/MobileSAM-in-the-Browser):
     decoder servido desde raw.githubusercontent.com (confirmado accesible), encoder desde el
     enlace oficial documentado en su README (HuggingFace). No puedo probar esto en un navegador
     real desde aquí, así que si algo falla, el mensaje de estado mostrará el error exacto. */
  const SAM_ENC_URL="https://huggingface.co/spaces/Akbartus/projects/resolve/main/mobilesam.encoder.onnx";
  const SAM_DEC_URL="https://raw.githubusercontent.com/akbartus/MobileSAM-in-the-Browser/main/models/mobilesam.decoder.quant.onnx";

  const samEnsureModels=useCallback(async()=>{
    if(samDecSession.current&&samEncSession.current)return true;
    if(typeof ort==="undefined"){setSamStatus("⚠️ No se pudo cargar onnxruntime-web (revisa tu conexión)");return false;}
    try{
      setSamStatus("loading-models");
      ort.env.wasm.numThreads=1;
      if(!samDecSession.current)samDecSession.current=await ort.InferenceSession.create(SAM_DEC_URL);
      if(!samEncSession.current)samEncSession.current=await ort.InferenceSession.create(SAM_ENC_URL);
      return true;
    }catch(e){
      setSamStatus(`⚠️ Error cargando el modelo IA Precisa: ${e.message||e}`);
      return false;
    }
  },[]);

  const samEncodeImage=useCallback(async()=>{
    if(!img)return false;
    if(samImgKey.current===img&&samEmbeddings.current)return true; // ya codificada
    const ok=await samEnsureModels();if(!ok)return false;
    try{
      setSamStatus("encoding");
      const el=new Image();el.crossOrigin="anonymous";
      await new Promise((res,rej)=>{el.onload=res;el.onerror=rej;el.src=img;});
      const iw=el.naturalWidth,ih=el.naturalHeight;
      let rw,rh;
      if(iw>=ih){rw=1024;rh=Math.max(1,Math.round(1024*ih/iw));}
      else{rh=1024;rw=Math.max(1,Math.round(1024*iw/ih));}
      const chwTensor=await ort.Tensor.fromImage(el,{resizedWidth:rw,resizedHeight:rh});
      /* chwTensor: Float32Array CHW, valores 0-1. El encoder espera HWC, 0-255 */
      const chw=chwTensor.data,plane=rw*rh;
      const hwc=new Float32Array(plane*3);
      for(let c=0;c<3;c++)for(let i=0;i<plane;i++)hwc[i*3+c]=chw[c*plane+i]*255;
      const inputTensor=new ort.Tensor(hwc,[rh,rw,3]);
      const out=await samEncSession.current.run({input_image:inputTensor});
      samEmbeddings.current=out.image_embeddings;
      samDims.current={w:rw,h:rh};
      samImgKey.current=img;
      setSamStatus("ready");
      return true;
    }catch(e){
      setSamStatus(`⚠️ Error procesando la imagen para IA Precisa: ${e.message||e}`);
      return false;
    }
  },[img,samEnsureModels]);

  const samClickAt=useCallback(async(normX,normY)=>{
    const ok=await samEncodeImage();if(!ok)return;
    try{
      setSamStatus("encoding");
      const{w:rw,h:rh}=samDims.current;
      const px=normX*rw,py=normY*rh;
      const pointCoords=new ort.Tensor(new Float32Array([px,py,0,0]),[1,2,2]);
      const pointLabels=new ort.Tensor(new Float32Array([1,-1]),[1,2]);
      const maskInput=new ort.Tensor(new Float32Array(256*256),[1,1,256,256]);
      const hasMask=new ort.Tensor(new Float32Array([0]),[1]);
      const origSize=new ort.Tensor(new Float32Array([rh,rw]),[2]);
      const feeds={image_embeddings:samEmbeddings.current,point_coords:pointCoords,
        point_labels:pointLabels,mask_input:maskInput,has_mask_input:hasMask,orig_im_size:origSize};
      const res=await samDecSession.current.run(feeds);
      const maskT=res.masks;
      const[,,mh,mw]=maskT.dims.length===4?maskT.dims:[1,1,rh,rw];
      const poly=samMaskToPolygon(maskT.data,mw,mh,40,0.0); // logits: umbral en 0
      if(!poly){setSamStatus("⚠️ No se detectó ninguna forma clara en ese punto. Prueba otro punto.");return;}
      const normPoly=poly.map(([x,y])=>[cl(x/mw,0,1),cl(y/mh,0,1)]);
      const xs=normPoly.map(p=>p[0]),ys=normPoly.map(p=>p[1]);
      const newSeg={id:uid(),name:"Precisa "+new Date().toLocaleTimeString("es-ES"),
        x1:Math.min(...xs),y1:Math.min(...ys),x2:Math.max(...xs),y2:Math.max(...ys),
        color:COLS[colI%COLS.length],polygon:normPoly};
      setSegs(s=>[...s,newSeg]);setSelSeg(newSeg.id);setShowSegs(true);setColI(c=>c+1);
      setSamStatus("ready");
      setAiMsg(`🎯 Contorno preciso añadido (${normPoly.length} puntos reales, generado en tu navegador)`);
      setPostActM(newSeg);
    }catch(e){
      setSamStatus(`⚠️ Error generando el contorno: ${e.message||e}`);
    }
  },[samEncodeImage,colI]);

  const onImgClick=useCallback(e=>{
    if(iconTapRef.current)return;
    /* ── MODO COLOCAR MEDIDA DE LADOS — toca la imagen para fijar la posición ── */
    if(pendLados){

    if(!img||segLoad||!GK())return;setSegLoad(true);
    const b64=img.split(",")[1];
    const pr=`Eres un sistema de segmentación de imágenes tipo SAM (Segment Anything). Identifica cada OBJETO INDIVIDUAL separado y diferenciable en la imagen — no zonas amplias ni agrupaciones. Por ejemplo, si hay 3 árboles, identifica los 3 árboles por separado (no "vegetación" como un solo bloque). Otros ejemplos de objetos individuales: una montaña concreta, una roca concreta, el cuerpo de agua (lago/río), un edificio, una persona, un vehículo, una nube grande, el cielo. Hasta 8 objetos máximo, priorizando los más grandes y reconocibles. MENOS objetos pero con contornos PRECISOS es mejor que muchos objetos imprecisos.

Para cada objeto:
- nombre muy específico en español (ej: "Pino izquierda", "Pico nevado central", "Roca junto al agua", NO "árboles" en plural ni "paisaje")
- x1,y1,x2,y2: bounding box normalizado 0-1 ajustado MUY ajustado al objeto, sin margen sobrante
- polygon: 8-14 puntos [[x,y],...] entre 0-1 siguiendo el contorno real y orgánico del objeto, pegado a su silueta exacta como un lazo poligonal de Photoshop dibujado a mano alrededor del borde. Ejemplo: para una jirafa, los puntos siguen el cuello, la cabeza, las patas — no un óvalo ni una caja. Para un árbol: la copa irregular, el tronco estrecho. PROHIBIDO usar formas regulares simétricas (octágono, rombo, rectángulo) — el polígono debe verse irregular y orgánico, igual que el objeto real. Es OBLIGATORIO incluir polygon en CADA objeto, nunca lo omitas.
- hint: qué medir en este objeto
- color: hex único y vivo, diferente para cada objeto

{"segments":[{"id":"1","name":"Árbol grande derecha","x1":0.6,"y1":0.1,"x2":0.9,"y2":0.9,"polygon":[[0.75,0.1],[0.85,0.2],[0.9,0.35],[0.85,0.5],[0.9,0.65],[0.8,0.8],[0.7,0.8],[0.65,0.65],[0.6,0.5],[0.65,0.35],[0.6,0.2]],"hint":"altura y anchura copa","color":"#00cc44"}]}`;
    try{
      const res=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${GK()}`},body:JSON.stringify({model:MDL,max_tokens:4096,messages:[{role:"user",content:[{type:"image_url",image_url:{url:`data:image/jpeg;base64,${b64}`}},{type:"text",text:pr}]}]})});
      const data=await res.json();const txt=data.choices?.[0]?.message?.content||"{}";
      let info;
      try{info=JSON.parse(txt.replace(/```json|```/g,"").trim());}
      catch(parseErr){
        /* Try to salvage truncated JSON by closing open brackets */
        let fixed=txt.replace(/```json|```/g,"").trim();
        const lastComplete=fixed.lastIndexOf("}");
        if(lastComplete>0){
          fixed=fixed.slice(0,lastComplete+1);
          const openBrackets=(fixed.match(/\[/g)||[]).length-(fixed.match(/\]/g)||[]).length;
          const openBraces=(fixed.match(/\{/g)||[]).length-(fixed.match(/\}/g)||[]).length;
          fixed+="]".repeat(Math.max(0,openBrackets))+"}".repeat(Math.max(0,openBraces));
          try{info=JSON.parse(fixed);}catch(e2){info=null;}
        }
      }
      if(info?.segments?.length){
        setSegs(info.segments);setShowSegs(true);
        const withPoly=info.segments.filter(s=>s.polygon?.length>=4).length;
        const names=info.segments.map(s=>s.name).slice(0,5).join(", ");
        setAiMsg(`✅ ${info.segments.length} objetos: ${names}${info.segments.length>5?"...":""} (${withPoly} con contorno real, ${info.segments.length-withPoly} aproximados)`);
        /* Proactive interaction: AI speaks in the chat about what it found */

        setChatUnread(true);
      }else{
        setAiMsg("⚠️ La IA no pudo detectar contornos esta vez. Pulsa Detectar contornos de nuevo.");
      }
    }catch(err){setAiMsg("⚠️ Error de conexión con la IA.");}finally{setSegLoad(false);}
  };

  /* SVG ICON BADGE — "modo iconos": ya NO se muestra el valor de la medida
     sobre la foto, solo un icono pequeño del tipo de herramienta + un número
     correlativo POR TIPO (ej. 4 ángulos medidos = ∠1 ∠2 ∠3 ∠4), para que la
     imagen no se sature aunque haya muchas medidas de tipos distintos a la
     vez. El valor completo SIGUE mostrándose siempre en las vistas 2D y 3D.
     TOQUE: 1er toque sobre un icono = lo selecciona (anillo blanco). 2º toque
     sobre el MISMO icono ya seleccionado = "hace su función" (abre el panel
     de info con detalle + Aquí/2D/3D). Con la herramienta ☑ Seleccionar
     activa, cada toque entra/sale de la multi-selección (anillo verde) en
     vez de abrir nada — para luego pulsar 🔗 Unir y conectarlos con líneas. */
  const Pill=({mx,my,a})=>{
    if(!a)return null;
    const col=a.color||"#ff9500";
    const ord=typeOrd(anns,a);
    const ic=(TOOLS.find(t=>t.id===a.type)?.icon)||"●";
    const x=parseFloat(mx),y=parseFloat(my);
    /* Tamaño real de icono: r=2% = ~18px en imagen de 900px. Sin halos gigantes. */
    const r=2.1, fs=ic.length>1?"1.6%":"2.2%";
    const inMulti=multiSel.includes(a.id);
    const isSelected=selId===a.id;
    const tap=e=>{
      e.stopPropagation();
      iconTapRef.current=true;
      setTimeout(()=>{iconTapRef.current=false;},300);
      if(tool==="selpts"){
        setMultiSel(prev=>prev.includes(a.id)?prev.filter(id=>id!==a.id):[...prev,a.id]);
        return;
      }
      /* Un solo toque abre el popover directamente — más intuitivo */
      setSelId(a.id);
      setIconInfoM({ann:a,ordinal:ord,fc:false});
    };
    return(<g onClick={tap} onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>{iconTapRef.current=true;setTimeout(()=>{iconTapRef.current=false;},300);e.stopPropagation();}} style={{cursor:"pointer"}}>
      {/* Círculo principal compacto — fondo blanco semitransparente, borde del color */}
      <circle cx={`${x}%`} cy={`${y}%`} r={`${r}%`} fill="rgba(255,255,255,0.82)" stroke={col}
        strokeWidth={isSelected?"1.4":"1.0"}
        style={{filter:"drop-shadow(0 1px 4px rgba(0,0,0,.45))"}}/>
      {/* Anillo fino de selección/multiselección — solo cuando está activo */}
      {(inMulti||isSelected)&&<circle cx={`${x}%`} cy={`${y}%`} r={`${r+0.9}%`} fill="none"
        stroke={inMulti?"#00cc66":col} strokeWidth="0.7" strokeDasharray={inMulti?"none":"3,2"}/>}
      {/* Icono */}
      <text x={`${x}%`} y={`${y}%`} fill={col} fontSize={fs}
        fontFamily="Inter,sans-serif" fontWeight="900" textAnchor="middle" dominantBaseline="central">{ic}</text>
      {/* Número de orden — pastilla pequeña pegada al icono */}
      <circle cx={`${x+1.6}%`} cy={`${y-1.6}%`} r="1%" fill={inMulti?"#00cc66":col} stroke="#fff" strokeWidth="0.3"/>
      <text x={`${x+1.6}%`} y={`${y-1.6}%`} fill="#fff" fontSize="1.1%"

    </g>);
