      </div>
      {fcAnns.filter(a=>a.value!=null).map(a=><div key={a.id} style={{display:"flex",gap:"6px",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #1a1a1a"}}>

        {editZones.length>1&&<button onClick={()=>setApplyAllM(a)} title="Aplicar esta medida a otras pestañas abiertas" style={{background:"rgba(0,180,255,.1)",border:"1px solid rgba(0,180,255,.25)",color:"#00bbff",borderRadius:"5px",padding:"2px 6px",fontSize:"8px",fontWeight:700}}>⇉</button>}

    </div>}

    {/* ACTION BUTTONS */}

          const el=document.getElementById("fc-img-container");if(!el)return;

            const url=cv.toDataURL("image/png");
            if(navigator.share&&navigator.canShare){try{const b=await(await fetch(url)).blob();const f=new File([b],`${editZone.seg.name}.png`,{type:"image/png"});if(navigator.canShare({files:[f]})){await navigator.share({title:editZone.seg.name,files:[f]});return;}}catch{}}
            const a=document.createElement("a");a.href=url;a.download=`${editZone.seg.name}.png`;document.body.appendChild(a);a.click();document.body.removeChild(a);
          }catch(e){alert("Error: "+e.message);}
        }} style={{flex:1,padding:"9px 4px",background:"rgba(0,150,255,.12)",border:"1px solid rgba(0,150,255,.25)",color:"#00b4ff",borderRadius:"8px",fontSize:"9px",fontWeight:700}}>📥 PNG</button>
        <button onClick={async()=>{
          const el=document.getElementById("fc-img-container");if(!el||!window.jspdf)return;

            const{jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:cv.width>cv.height?"landscape":"portrait",unit:"mm",format:"a4"});
            const W=pdf.internal.pageSize.getWidth(),H=Math.min((cv.height/cv.width)*W,pdf.internal.pageSize.getHeight()-25);
            pdf.setFillColor(255,255,255);pdf.rect(0,0,W+10,H+30,"F");
            pdf.addImage(cv.toDataURL("image/jpeg",.95),"JPEG",5,20,W-10,H-10);

        <button onClick={async()=>{

    </div>

</div>}

{viewConfirm&&<div data-modal="viewconfirm" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:"var(--bg2)",border:"2px solid #00bbff",borderRadius:"18px 18px 0 0",padding:"20px 18px",zIndex:600,animation:"slideUp .22s ease",backdropFilter:"blur(24px)"}}>

    <button onClick={()=>{setViewConfirm(null);setTool("sel");setPend([]);setPrev(null);setScopeAsk(viewConfirm);}} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#ff7700,#ffaa00)",color:"#fff",border:"none",borderRadius:"9px",fontSize:"12px",fontWeight:800,textAlign:"left"}}>
      ✓ Ir a {viewConfirm==="2d"?"Vista 2D":"Vista 3D"}
      <div style={{fontSize:"8px",marginTop:"3px",opacity:.7}}>Las medidas ya guardadas se usarán para generar el croquis</div>
    </button>
  </div>
</div>}

{/* ══ ¿TODO o SOLO LO MEDIDO? — se pregunta SIEMPRE al entrar en 2D o 3D ══ */}
{scopeAsk&&<div data-modal="scopeask" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"520px",background:"var(--bg2)",border:"2px solid #0099ff",borderRadius:"18px 18px 0 0",padding:"20px 18px",zIndex:600,animation:"slideUp .22s ease",boxShadow:"0 -6px 32px rgba(0,0,0,.2)"}}>
  <button onClick={()=>setScopeAsk(null)} style={{position:"absolute",top:"12px",right:"14px",background:"rgba(255,50,50,.15)",border:"1px solid rgba(255,50,50,.3)",color:"#ff3366",borderRadius:"50%",width:"28px",height:"28px",fontSize:"15px",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
  <div style={{fontSize:"14px",fontWeight:800,color:"#0077cc",marginBottom:"4px"}}>{scopeAsk==="2d"?"📐 Plano 2D":"🎮 Vista 3D"}</div>
  <div style={{fontSize:"9px",color:"var(--txt2)",marginBottom:"16px",lineHeight:1.8}}>
    ¿Qué quieres visualizar?{"\n"}
    <b>Recomendado si no has medido todavía:</b> elige <b>Todo</b> para ver todas las zonas detectadas.
  </div>
  <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
    <button onClick={()=>{setViewScope("all");setSheet(scopeAsk);setScopeAsk(null);}}
      style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,#0055cc,#0099ff)",color:"#fff",border:"none",borderRadius:"10px",fontSize:"13px",fontWeight:800,textAlign:"left",boxShadow:"0 3px 12px rgba(0,100,255,.3)"}}>
      🗂 Todo — ver todas las zonas y piezas
      <div style={{fontSize:"9px",marginTop:"4px",opacity:.85}}>Muestra todos los objetos detectados aunque no tengan medida todavía</div>
    </button>
    <button onClick={()=>{setViewScope("measured");setSheet(scopeAsk);setScopeAsk(null);}}
      style={{width:"100%",padding:"14px",background:"var(--bg3)",border:"1px solid var(--border)",color:"var(--txt)",borderRadius:"10px",fontSize:"12px",fontWeight:700,textAlign:"left"}}>
      🎯 Solo lo medido
      <div style={{fontSize:"9px",marginTop:"4px",color:"var(--txt2)"}}>Únicamente objetos con al menos una medida confirmada</div>
    </button>
  </div>
</div>}

{/* CROP MODAL */}
{cropM&&<div data-modal="crop" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:"var(--bg2)",border:"2px solid #ff9500",borderRadius:"18px 18px 0 0",padding:"20px 18px",zIndex:500,animation:"slideUp .22s ease",backdropFilter:"blur(24px)"}}>
  <button onClick={()=>setCropM(null)} style={{position:"absolute",top:"12px",right:"14px",background:"rgba(255,50,50,.15)",border:"1px solid rgba(255,50,50,.3)",color:"#ff3366",borderRadius:"50%",width:"28px",height:"28px",fontSize:"15px",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
  <div style={{fontSize:"13px",fontWeight:800,color:cropM?.isLasso?"#cc44ff":"#ff9500",marginBottom:"6px"}}>{cropM?.isLasso?"⬡ LAZO POLIGONAL CERRADO":"✂ ZONA SELECCIONADA"}</div>
  <div style={{fontSize:"9px",color:"var(--txt2)",marginBottom:"14px",lineHeight:1.8}}>Elige qué hacer con esta zona:</div>
  <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
    <button onClick={()=>{
      if(!cropM||!img)return;
      /* Support BOTH formats: rectangular crop (p1/p2) AND lasso (x1,y1,x2,y2,polygon) */
      const x1=cropM.p1?Math.min(cropM.p1.x,cropM.p2.x):cropM.x1;
      const y1=cropM.p1?Math.min(cropM.p1.y,cropM.p2.y):cropM.y1;
      const x2=cropM.p1?Math.max(cropM.p1.x,cropM.p2.x):cropM.x2;
      const y2=cropM.p1?Math.max(cropM.p1.y,cropM.p2.y):cropM.y2;
      const im=new Image();im.crossOrigin="anonymous";
      im.onload=()=>{
        const cW=Math.round(im.width*(x2-x1)),cH=Math.round(im.height*(y2-y1));
        const c2=document.createElement("canvas");c2.width=cW;c2.height=cH;
        const ctx2=c2.getContext("2d");
        if(cropM.polygon&&cropM.polygon.length>=3){
          /* Clip to the exact lasso polygon shape */
          ctx2.beginPath();
          cropM.polygon.forEach(([px,py],i)=>{
            const rx=(px-x1)/(x2-x1)*cW,ry=(py-y1)/(y2-y1)*cH;
            i===0?ctx2.moveTo(rx,ry):ctx2.lineTo(rx,ry);
          });
          ctx2.closePath();ctx2.clip();
        }
        ctx2.drawImage(im,im.width*x1,im.height*y1,cW,cH,0,0,cW,cH);
        /* Si ya existe la pieza (se guardó al cerrar el lazo), la reutilizamos en vez de duplicarla */
        const fakeSeg=cropM.fromSeg?segs.find(s=>s.id===cropM.fromSeg)||{id:uid(),name:"Zona "+new Date().toLocaleTimeString("es-ES"),x1,y1,x2,y2,color:"#ff9500",polygon:cropM.polygon}
          :{id:uid(),name:(cropM.isLasso?"Lazo ":"Zona ")+new Date().toLocaleTimeString("es-ES"),x1,y1,x2,y2,color:cropM.isLasso?"#cc44ff":"#ff9500",polygon:cropM.polygon};
        if(!cropM.fromSeg)setSegs(s=>[...s,fakeSeg]);
        openZone(fakeSeg,c2.toDataURL("image/jpeg",.95));
        setCropM(null);
        askAIAboutPiece(c2.toDataURL("image/jpeg",.85),fakeSeg.name);
      };im.src=img;
    }} style={{width:"100%",padding:"13px",background:cropM?.isLasso?"linear-gradient(135deg,#aa00ff,#ff00aa)":"linear-gradient(135deg,#ff6600,#ffaa00)",color:cropM?.isLasso?"#fff":"#000",border:"none",borderRadius:"9px",fontSize:"12px",fontWeight:800,textAlign:"left"}}>
      {cropM?.isLasso?"⬡ EXTRAER FORMA":"✂ EXTRAER"} → Panel flotante con herramientas → 2D y 3D
      <div style={{fontSize:"8px",marginTop:"3px",opacity:.7}}>{cropM?.isLasso?"Recorta siguiendo exactamente el contorno dibujado":"Mide la zona extraída"} · Se guarda en 2D y 3D</div>
    </button>
    <button onClick={applyCrop} style={{width:"100%",padding:"11px",background:"rgba(255,150,0,.08)",border:"1px solid rgba(255,150,0,.3)",color:"#ff9500",borderRadius:"9px",fontSize:"10px",fontWeight:700}}>
      ✂ Recortar imagen principal (elimina el resto)
    </button>
    <div style={{display:"flex",gap:"7px"}}>
      <button onClick={()=>{setCropM(null);setTool(cropM?.isLasso?"lasso":"crop");}} style={{flex:1,padding:"11px",background:"rgba(0,180,255,.08)",border:"1px solid rgba(0,180,255,.3)",color:"#00bbff",borderRadius:"9px",fontSize:"10px",fontWeight:700}}>
        ↩ Seguir seleccionando
      </button>
      <button onClick={()=>{setCropM(null);setTool("sel");setScopeAsk("2d");}} style={{flex:1,padding:"11px",background:"rgba(0,200,100,.08)",border:"1px solid rgba(0,200,100,.3)",color:"#00dd77",borderRadius:"9px",fontSize:"9px",fontWeight:700,lineHeight:1.3}}>
        📐 Ver TODAS las zonas en 2D/3D{segs?.length>0?` (${segs.length})`:""}
      </button>
    </div>
    {segs?.length>1&&<div style={{fontSize:"8px",color:"var(--txt2)",textAlign:"center",marginTop:"-3px"}}>Incluye las {segs.length} zonas recortadas hasta ahora, no solo esta</div>}
    <button onClick={()=>setCropM(null)} style={{width:"100%",padding:"10px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",color:"var(--txt2)",borderRadius:"9px",fontSize:"10px"}}>Cerrar este menú (la selección queda guardada)</button>
  </div>
</div>}

</div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>


</body></html>
