<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <title>MediScan 3D - Studio Metrology Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        html,body{background:#1a1a1a;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#d1d1d1;}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .fade{animation:fadeUp .25s ease both;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        .spin{animation:spin .9s linear infinite;}
        button{transition:all .1s;border:none;cursor:pointer;}
        button:active{transform:scale(.97);opacity:.8;}
        input,select,textarea{background:#2b2b2b;border:1px solid #3d3d3d;color:#fff;border-radius:4px;padding:6px 10px;font-family:'Space Mono',monospace;font-size:12px;}
        input:focus,select:focus{outline:1px solid #ff9d00;}
        ::-webkit-scrollbar{width:6px;height:6px;} ::-webkit-scrollbar-track{background:#141414;} ::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:3px;}
        
        /* Layout Layout 3D Studio Style */
        .app-container{max-width:1300px;margin:0 auto;padding:15px;display:flex;flex-direction:column;gap:12px;min-height:100vh;}
        .grid-layout{display:grid;grid-template-columns:1fr;gap:15px;}
        @media(min-width:992px){.grid-layout{grid-template-columns:1.3fr 1fr;}}
        .interactive-canvas{position:relative;width:100%;background:#111;border-radius:6px;border:1px solid #333;overflow:hidden;display:flex;align-items:center;justify-content:center;}
        .canvas-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
        .node-handle{pointer-events:auto;cursor:move;fill:#fff;stroke-width:1.5;}
        .studio-panel{background:#242424;border:1px solid #333;border-radius:6px;padding:12px;}
        .studio-btn{background:#333;color:#e0e0e0;padding:6px 12px;border-radius:4px;font-size:11px;font-family:'Space Mono',monospace;}
        .studio-btn.active{background:#ff9d00;color:#000;font-weight:bold;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const {useState,useRef,useEffect,useCallback}=React;

    const GAPI="https://api.groq.com/openai/v1/chat/completions";
    const GMOD="meta-llama/llama-4-scout-17b-16e-instruct";
    const getKey=()=>localStorage.getItem("ms3_k")||"";
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
    const uid=()=>`_${Math.random().toString(36).slice(2,9)}`;
    const COLS=["#ff9d00","#00ffcc","#ff4466","#44aaff","#aa66ff","#55ff55"];
    
    const TOOLS=[
      {id:"sel",icon:"↖",tip:"Mover",npts:0},
      {id:"pt", icon:"⬤",tip:"Punto",npts:1},
      {id:"line",icon:"━━",tip:"Línea",npts:2},
      {id:"arrow",icon:"→",tip:"Flecha",npts:2},
      {id:"rect",icon:"▭",tip:"Rectángulo",npts:2},
      {id:"circ",icon:"◯",tip:"Círculo",npts:2},
      {id:"calib",icon:"⚖",tip:"Calibrar",npts:2},
    ];

    /* ── MOTOR DE CÁLCULO TRIDIMENSIONAL (3D STUDIO WIREFRAME EDITION) ── */
    function Studio3DView({components, manualDim, shapeType}){
      const el=useRef(null);
      useEffect(()=>{
        if(!el.current)return;
        const E=el.current, W=E.clientWidth, H=E.clientHeight||320;
        const scene=new THREE.Scene();
        scene.background=new THREE.Color(0x282828); // Gris clásico de viewports 3D Studio

        const cam=new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
        cam.position.set(3, 2.5, 3); cam.lookAt(0,0,0);

        const rdr=new THREE.WebGLRenderer({antialias:true});
        rdr.setSize(W,H); E.appendChild(rdr.domElement);

        // Grid e Iluminación de ingeniería
        const grid=new THREE.GridHelper(20, 20, 0xff9d00, 0x444444);
        grid.position.y=-0.5; scene.add(grid);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dl=new THREE.DirectionalLight(0xffffff, 0.8); dl.position.set(5,8,5); scene.add(dl);

        const group=new THREE.Group();
        scene.add(group);

        // Estilos de alambre / caras tipo modelador antiguo
        const faceMat=new THREE.MeshStandardMaterial({color:0x3a4f5c, roughness:0.4, metalness:0.2, flatShading:true, transparent:true, opacity:0.75});
        const wireMat=new THREE.LineBasicMaterial({color:0x00ffcc, linewidth:1});

        const buildMesh=(geo)=>{
          const mesh=new THREE.Mesh(geo, faceMat);
          const wire=new THREE.LineSegments(new THREE.EdgesGeometry(geo), wireMat);
          group.add(mesh); group.add(wire);
        };

        // Renderizado según flujo (Plano detectado por IA vs Objeto Manual)
        if(components && components.length > 0){
          // Tubería Isométrica Automatizada
          let currPos=new THREE.Vector3(0,0,0);
          components.forEach(c => {
            const length=(c.length||1000)*0.001;
            const radius=((c.dn||150)*0.5)*0.001;
            let lenX=0, lenY=0, lenZ=0;
            
            if(c.orientation==="H" || c.orientation==="X") lenX=length;
            else if(c.orientation==="V" || c.orientation==="Y") lenY=length;
            else lenZ=length;

            const geo=new THREE.CylinderGeometry(radius, radius, length, 12);
            geo.rotateZ(lenX ? -Math.PI/2 : 0);
            geo.rotateX(lenZ ? Math.PI/2 : 0);
            
            const mesh=new THREE.Mesh(geo, faceMat);
            mesh.position.set(currPos.x + lenX/2, currPos.y + lenY/2, currPos.z + lenZ/2);
            const wire=new THREE.LineSegments(new THREE.EdgesGeometry(geo), wireMat);
            wire.position.copy(mesh.position);
            
            group.add(mesh); group.add(wire);
            currPos.add(new THREE.Vector3(lenX, lenY, lenZ));
          });
        } else {
          // Dimensiones Manuales introducidas por el operador
          const mw=(manualDim?.w||100)*0.005, mh=(manualDim?.h||100)*0.005, md=(manualDim?.d||100)*0.005;
          let geo;
          if(shapeType==="cylinder") geo=new THREE.CylinderGeometry(mw, mw, mh, 16);
          else if(shapeType==="sphere") geo=new THREE.SphereGeometry(mw, 16, 16);
          else geo=new THREE.BoxGeometry(mw, mh, md);
          buildMesh(geo);
        }

        // Centrado de cámara automático
        const box=new THREE.Box3().setFromObject(group);
        const center=box.getCenter(new THREE.Vector3());
        group.children.forEach(c => c.position.sub(center));

        // Controles de Rotación orbital táctil/mouse
        let drag=false, lx=0, ly=0, ry=0, rx=0;
        const px=e=>e.clientX??e.touches?.[0]?.clientX??0, py=e=>e.clientY??e.touches?.[0]?.clientY??0;
        const dn=e=>{drag=true; lx=px(e); ly=py(e);};
        const mv=e=>{if(!drag)return; ry+=(px(e)-lx)*0.01; rx+=(py(e)-ly)*0.01; lx=px(e); ly=py(e);};
        const up=()=>drag=false;

        E.addEventListener("mousedown",dn); E.addEventListener("touchstart",dn,{passive:true});
        window.addEventListener("mousemove",mv); window.addEventListener("touchmove",mv,{passive:true});
        window.addEventListener("mouseup",up); window.addEventListener("touchend",up);

        let id;
        const anim=()=>{id=requestAnimationFrame(anim); if(!drag) ry+=0.003; group.rotation.set(rx,ry,0); rdr.render(scene,cam);};
        anim();

        return()=>{
          cancelAnimationFrame(id); rdr.dispose();
          if(E.contains(rdr.domElement)) E.removeChild(rdr.domElement);
        };
      },[components, manualDim, shapeType]);

      return <div ref={el} style={{width:"100%",height:"320px",cursor:"grab",borderRadius:"4px",border:"1px solid #444"}}/>;
    }

    /* ── ENTORNO DE TRABAJO GENERAL ── */
    function App(){
      const containerRef=useRef(null);
      const captureRef=useRef(null);
      const videoRef=useRef(null);
      const uploadRef=useRef(null);

      const [scr,setScr]=useState(()=>getKey()?"home":"setup");
      const [keyIn,setKeyIn]=useState(getKey());
      const [projects,setProjects]=useState(()=>JSON.parse(localStorage.getItem("ms3_projs")||"[]"));
      const [projName,setProjName]=useState("");
      
      const [image,setImage]=useState(null);
      const [rotation,setRotation]=useState(0);
      const [camMode,setCamMode]=useState("off");
      const [objInfo,setObjInfo]=useState(null);
      const [piping,setPiping]=useState(null);
      
      const [anns,setAnns]=useState([]);
      const [tool,setTool]=useState("sel");
      const [pending,setPending]=useState([]);
      const [selId,setSelId]=useState(null);
      const [colorIdx,setColorIdx]=useState(0);
      const [scale,setScale]=useState(null);
      
      const [calibDlg,setCalibDlg]=useState(null);
      const [calibVal,setCalibVal]=useState("");
      const [calibUnit,setCalibUnit]=useState("mm");
      
      const [manualDim,setManualDim]=useState({w:100,h:100,d:100});
      const [shapeType,setShapeType]=useState("box");
      const [viewTab,setViewTab]=useState("anno");

      useEffect(()=>{
        localStorage.setItem("ms3_projs", JSON.stringify(projects));
      },[projects]);

      const handleKeySave=()=>{ localStorage.setItem("ms3_k",keyIn.trim()); setScr("home"); };

      const startLive=async()=>{
        setCamMode("starting");
        try{
          const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280}}});
          if(videoRef.current) videoRef.current.srcObject=s;
          setCamMode("live");
        }catch(e){ setCamMode("off"); alert("Cámara no disponible."); }
      };

      const captureLive=()=>{
        const v=videoRef.current; if(!v)return;
        const c=document.createElement("canvas"); c.width=v.videoWidth; c.height=v.videoHeight;
        c.getContext("2d").drawImage(v,0,0);
        startProject(c.toDataURL("image/jpeg",0.9));
        v.srcObject?.getTracks().forEach(t=>t.stop()); setCamMode("off");
      };

      const startProject=img=>{
        setImage(img); setAnns([]); setScale(null); setSelId(null); setPending([]); setTool("sel"); setRotation(0); setPiping(null);
        setScr("loading"); identify(img);
      };

      // IDENTIFICADOR DE PLANOS DE CALDERERÍA / TUBERÍAS ASISTIDO POR IA VISUAL
      const identify=async(img)=>{
        const b64=img.split(",")[1];
        const prompt=`Analiza este plano/foto de caldereria o metrologia.
Si es un plano isometrico, diagrama de tuberias o piping, devuelve estricta y únicamente este formato JSON:
{"type":"piping","name":"Isométrico Industrial","dn":150,"components":[{"id":"1","type":"pipe","orientation":"X","length":2500},{"id":"2","type":"elbow","to_orientation":"Y"},{"id":"3","type":"pipe","orientation":"Y","length":1800}],"notes":"Plano de tuberias detectado"}

Si es un objeto fisico, pieza o solido mecanico:
{"type":"object","name":"Pieza Volumetrica","shape":"cylinder","notes":"Reconociendo cuerpo solido plano"}
No agregues formato markdown ni bloques de texto. Devuelve el string limpio JSON.`;

        try{
          const res=await fetch(GAPI,{
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":`Bearer ${getKey()}`},
            body:JSON.stringify({model:GMOD,messages:[{role:"user",content:[{type:"image_url",image_url:{url:`data:image/jpeg;base64,${b64}`}},{type:"text",text:prompt}]}]})
          });
          const data=await res.json();
          const info=JSON.parse(data.choices[0].message.content.replace(/```json|```/g,"").trim());
          if(info.type==="piping"){
            setPiping(info); setViewTab("pipe3d");
          }
          setObjInfo(info);
        }catch(e){
          setObjInfo({name:"Captura Manual",notes:"Operación fuera de línea activa."});
        }finally{ setScr("annotate"); }
      };

      // CONTROL DE LIENZO DE ANOTACIONES 2D A ESCALA REAL
      const handleCvClick=useCallback(e=>{
        if(tool==="sel")return;
        const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return;
        let nx=(e.clientX-rect.left)/rect.width, ny=(e.clientY-rect.top)/rect.height;
        nx=clamp(nx,0.01,0.99); ny=clamp(ny,0.01,0.99);

        const td=TOOLS.find(t=>t.id===tool); if(!td)return;
        const pts=[...pending,{x:nx,y:ny}];

        if(pts.length >= td.npts){
          const color=COLS[colorIdx%COLS.length]; const id=uid();
          if(tool==="calib"){
            setCalibDlg({p1:pts[0],p2:pts[1]});
            setAnns(p=>[...p,{id,type:"calib",label:"⚖ Calibración Base",color,points:pts,value:null,unit:calibUnit}]);
          } else {
            let txtLabel=tool.toUpperCase();
            setAnns(p=>[...p,{id,type:tool,label:`${txtLabel} ${anns.length+1}`,color,points:pts,value:null,unit:calibUnit}]);
          }
          setPending([]); setTool("sel"); setColorIdx(c=>c+1);
        } else setPending(pts);
      },[tool,pending,colorIdx,anns,calibUnit]);

      const startDrag=useCallback((e,annId,pi)=>{
        e.preventDefault(); e.stopPropagation(); setSelId(annId);
        const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return;
        const mv=ev=>{
          const cx=ev.clientX??ev.touches?.[0]?.clientX??0, cy=ev.clientY??ev.touches?.[0]?.clientY??0;
          let nx=(cx-rect.left)/rect.width, ny=(cy-rect.top)/rect.height;
          setAnns(p=>p.map(a=>{
            if(a.id!==annId)return a;
            const pp=[...a.points]; pp[pi]={x:clamp(nx,0.01,0.99),y:clamp(ny,0.01,0.99)};
            return {...a,points:pp};
          }));
        };
        const up=()=>{window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up);};
        window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
      },[]);

      const getMeasure=ann=>{
        if(ann.value!=null)return `${ann.value} ${ann.unit}`;
        if(!scale || ann.points.length<2)return "Sin calibrar";
        const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return "";
        const dx=(ann.points[1].x-ann.points[0].x)*rect.width, dy=(ann.points[1].y-ann.points[0].y)*rect.height;
        const dist=Math.sqrt(dx*dx+dy*dy)/scale.ppu;
        return `${dist.toFixed(1)} ${scale.unit}`;
      };

      const confirmCalib=()=>{
        const v=parseFloat(calibVal); if(!v||v<=0||!calibDlg)return;
        const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return;
        const dx=(calibDlg.p2.x-calibDlg.p1.x)*rect.width, dy=(calibDlg.p2.y-calibDlg.p1.y)*rect.height;
        const px=Math.sqrt(dx*dx+dy*dy);
        setScale({ppu:px/v,unit:calibUnit});
        setAnns(p=>p.map(a=>a.type==="calib"?{...a,value:v,unit:calibUnit,label:`⚖ Base: ${v}${calibUnit}`}:a));
        setCalibDlg(null); setCalibVal("");
      };

      // GUARDADO INTERNO DE PROYECTOS Y RECARGA
      const saveProject=()=>{
        if(!projName.trim()){ alert("Asigna un nombre al proyecto"); return; }
        const newProj={id:uid(),name:projName,date:new Date().toLocaleDateString(),image,anns,scale,piping,objInfo};
        setProjects(p=>[newProj,...p.filter(x=>x.name!==projName)]);
        alert("Proyecto almacenado con éxito.");
      };

      const loadProject=(p)=>{
        setImage(p.image); setAnns(p.anns); setScale(p.scale); setPiping(p.piping); setObjInfo(p.objInfo);
        setProjName(p.name); setScr("annotate");
      };

      // CANALES DE EXPORTACIÓN DIRECTA
      const shareMedia=(type)=>{
        alert(`Preparando archivo metrológico para enviar vía ${type.toUpperCase()}...`);
        if(type==='whatsapp') window.open(`https://api.whatsapp.com/send?text=Envio%20Reporte%20Metrologico%20MediScan3D`, '_blank');
        else window.location.href=`mailto:?subject=Reporte MediScan 3D&body=Adjunto datos del plano analizado.`;
      };

      const downloadPNG=async()=>{
        const cv=await html2canvas(captureRef.current);
        const a=document.createElement("a"); a.href=cv.toDataURL("image/png"); a.download=`M3D_${Date.now()}.png`; a.click();
      };

      const downloadPDF=async()=>{
        const cv=await html2canvas(captureRef.current,{scale:2});
        const pdf=new window.jspdf.jsPDF("p","mm","a4");
        pdf.addImage(cv.toDataURL("image/png"),"PNG",0,0,pdf.internal.pageSize.getWidth(),(cv.height*pdf.internal.pageSize.getWidth())/cv.width);
        pdf.save(`Reporte_Caldereria_${Date.now()}.pdf`);
      };

      return (
        <div className="app-container">
          <header style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #333",paddingBottom:"10px"}}>
            <h1 style={{fontFamily:"'Syne',sans-serif",color:"#ff9d00",fontSize:"18px"}}>MEDISCAN 3D <span style={{color:"#fff",fontSize:"11px",fontFamily:"'Space Mono'"}}>v2.0 Studio Engine</span></h1>
            <div style={{display:"flex",gap:"6px"}}>
              <button className="studio-btn" onClick={()=>setScr("setup")}>⚙ CONFIG</button>
              {scr==="annotate" && <button className="studio-btn" style={{background:"#444"}} onClick={()=>setScr("home")}>INICIO</button>}
            </div>
          </header>

          {/* SETUP: CLAVE DE ACCESO */}
          {scr==="setup" && <div className="fade studio-panel" style={{maxWidth:"400px",margin:"40px auto",width:"100%"}}>
            <h3 style={{marginBottom:"10px",color:"#ff9d00"}}>Motor Token Acceso</h3>
            <input type="password" style={{width:"100%",marginBottom:"10px"}} value={keyIn} onChange={e=>setKeyIn(e.target.value)} placeholder="Groq API Key..."/>
            <button className="studio-btn active" style={{width:"100%"}} onClick={handleKeySave}>CONECTAR ENTORNO</button>
          </div>}

          {/* SCREEN: HOME Y HISTORIAL DE PROYECTOS */}
          {scr==="home" && <div className="fade grid-layout">
            <div className="studio-panel" style={{textAlign:"center",padding:"40px 10px"}}>
              <h2 style={{color:"#fff",marginBottom:"20px"}}>Entrada de Inspección Metrológica</h2>
              <div style={{maxWidth:"280px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"12px"}}>
                {camMode==="off"?(
                  <button className="studio-btn active" style={{padding:"14px"}} onClick={startLive}>ACTIVAR MÓDULO CÁMARA</button>
                ):(
                  <div>
                    <video ref={videoRef} autoPlay playsInline style={{width:"100%",background:"#000",borderRadius:"4px"}}/>
                    <div style={{display:"flex",gap:"4px",marginTop:"6px"}}>
                      <button className="studio-btn active" style={{flex:1}} onClick={captureLive}>CAPTURAR</button>
                      <button className="studio-btn" style={{background:"#f44"}} onClick={()=>{videoRef.current.srcObject?.getTracks().forEach(t=>t.stop());setCamMode("off")}}>APAGAR</button>
                    </div>
                  </div>
                )}
                <div style={{fontSize:"11px",color:"#666"}}>— EXAMINAR DISPOSITIVO —</div>
                <button className="studio-btn" onClick={()=>uploadRef.current?.click()}>CARGAR DESDE ARCHIVO</button>
                <input ref={uploadRef} type="file" accept="image/*" style={{display:"none"} } onChange={e=>{const f=e.target.files[0]; if(f){const r=new FileReader(); r.onload=ev=>startProject(ev.target.result); r.readAsDataURL(f);}}}/>
              </div>
            </div>

            <div className="studio-panel">
              <h3 style={{color:"#ff9d00",marginBottom:"10px"}}>💾 Registro de Proyectos Guardados</h3>
              <div style={{display:"flex",flexDirection:"column",gap:"8px",maxHeight:"300px",overflowY:"auto"}}>
                {projects.length===0 ? <p style={{fontSize:"11px",color:"#666"}}>No hay planos registrados.</p> : 
                  projects.map(p=>(
                    <div key={p.id} onClick={()=>loadProject(p)} style={{background:"#2e2e2e",padding:"10px",borderRadius:"4px",cursor:"pointer",display:"flex",justifyContent:"space-between",border:"1px solid #3d3d3d"}}>
                      <span style={{fontWeight:"bold",color:"#fff"}}>{p.name}</span>
                      <span style={{fontSize:"11px",color:"#ff9d00"}}>{p.date}</span>
                    </div>
                  ))
                }
              </div>
            </div>
          </div>}

          {/* SCREEN: PROCESAMIENTO INTELIGENTE */}
          {scr==="loading" && <div style={{textAlign:"center",padding:"100px 20px"}}>
            <div className="spin" style={{width:"24px",height:"24px",border:"2px solid #333",borderTopColor:"#ff9d00",borderRadius:"50%",margin:"0 auto 12px"}}/>
            <p style={{fontFamily:"'Space Mono'",fontSize:"12px",color:"#ff9d00"}}>INTERPRETANDO PLANO DE CALDERERÍA ESCALA INTERNA...</p>
          </div>}

          {/* ENTORNO AVANZADO DE DISEÑO Y ANOTACIONES */}
          {scr==="annotate" && <div className="fade grid-layout" ref={captureRef}>
            {/* PANEL IZQUIERDO: AREA DE DIBUJO 2D */}
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              <div style={{display:"flex",gap:"4px",background:"#222",padding:"4px",borderRadius:"4px",overflowX:"auto"}}>
                {TOOLS.map(t=>(
                  <button key={t.id} className={`studio-btn ${tool===t.id?'active':''}`} onClick={()=>{setTool(t.id);setPending([]);}}>
                    {t.icon} {t.tip}
                  </button>
                ))}
                {/* ROTACIÓN 90 GRADOS */}
                <button className="studio-btn" style={{marginLeft:"auto",background:"#444"}} onClick={()=>setRotation(r=>(r+90)%360)}>↻ ROTAR (90°)</button>
              </div>

              <div className="interactive-canvas" ref={containerRef} onClick={handleCvClick}>
                <img src={image} style={{width:"100%",maxHeight:"60vh",objectFit:"contain",transform:`rotate(${rotation}deg)`}} alt="Plano"/>
                <svg className="canvas-svg">
                  {anns.map(a=>{
                    if(!a.points || a.points.length<1)return null;
                    const rect=containerRef.current?.getBoundingClientRect(); if(!rect)return null;
                    const p1x=a.points[0].x*rect.width, p1y=a.points[0].y*rect.height;
                    const p2x=a.points[1]?(a.points[1].x*rect.width):p1x;
                    const p2y=a.points[1]?(a.points[1].y*rect.height):p1y;

                    return (
                      <g key={a.id}>
                        {a.type==="pt" && (
                          <>
                            <circle cx={p1x} cy={p1y} r="7" fill={a.color} className="node-handle" onMouseDown={e=>startDrag(e,a.id,0)}/>
                            <text x={p1x+10} y={p1y-4} fill="#fff" style={{fontSize:"11px",fontWeight:"bold",fontFamily:"'Space Mono'"}}>{a.label}</text>
                          </>
                        )}
                        {(a.type==="line" || a.type==="calib" || a.type==="arrow") && a.points[1] && (
                          <>
                            <line x1={p1x} y1={p1y} x2={p2x} y2={p2y} stroke={a.color} strokeWidth="2"/>
                            <circle cx={p1x} cy={p1y} r="5" fill="#fff" className="node-handle" onMouseDown={e=>startDrag(e,a.id,0)}/>
                            <circle cx={p2x} cy={p2y} r="5" fill="#fff" className="node-handle" onMouseDown={e=>startDrag(e,a.id,1)}/>
                            <text x={(p1x+p2x)/2} y={(p1y+p2y)/2-6} fill={a.color} style={{fontFamily:"'Space Mono'",fontSize:"11px",fontWeight:"bold"}} textAnchor="middle">{getMeasure(a)}</text>
                          </>
                        )}
                        {a.type==="rect" && a.points[1] && (
                          <rect x={Math.min(p1x,p2x)} y={Math.min(p1y,p2y)} width={Math.abs(p1x-p2x)} height={Math.abs(p1y-p2y)} fill="none" stroke={a.color} strokeWidth="2"/>
                        )}
                        {a.type==="circ" && a.points[1] && (
                          <circle cx={p1x} cy={p1y} r={Math.sqrt((p2x-p1x)**2+(p2y-p1y)**2)} fill="none" stroke={a.color} strokeWidth="2"/>
                        )}
                      </g>
                    );
                  })}
                </svg>
              </div>
            </div>

            {/* PANEL DERECHO: INTERFAZ DE CONTROL 3D STUDIO */}
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              <div style={{display:"flex",gap:"4px"}}>
                <button className={`studio-btn ${viewTab==='anno'?'active':''}`} style={{flex:1}} onClick={()=>setViewTab("anno")}>PROPIEDADES 2D</button>
                <button className={`studio-btn ${viewTab==='pipe3d'?'active':''}`} style={{flex:1}} onClick={()=>setViewTab("pipe3d")}>VIEWPORT 3D</button>
              </div>

              {viewTab==="anno" && <div className="studio-panel" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                <input type="text" style={{width:"100%"}} value={projName} onChange={e=>setProjName(e.target.value)} placeholder="Nombre del Plano Industrial..."/>
                <button className="studio-btn active" onClick={saveProject}>💾 COMPROMETER Y GUARDAR PROYECTO</button>
                <hr style={{borderColor:"#333"}}/>
                
                {calibDlg && <div style={{background:"#33250b",padding:"10px",borderRadius:"4px",border:"1px solid #ff9d00"}}>
                  <label style={{fontSize:"11px",color:"#ff9d00",display:"block",marginBottom:"4px"}}>Dimensión real conocida:</label>
                  <div style={{display:"flex",gap:"4px"}}>
                    <input type="number" value={calibVal} onChange={e=>setCalibVal(e.target.value)} style={{flex:1}} placeholder="Ej: 300"/>
                    <select value={calibUnit} onChange={e=>setCalibUnit(e.target.value)}>
                      <option value="mm">mm</option>
                      <option value="cm">cm</option>
                      <option value="in">in</option>
                    </select>
                    <button className="studio-btn active" onClick={confirmCalib}>CALIBRAR</button>
                  </div>
                </div>}

                <div style={{maxHeight:"180px",overflowY:"auto",display:"flex",flexDirection:"column",gap:"4px"}}>
                  {anns.map(a=>(
                    <div key={a.id} style={{display:"flex",justifyContent:"space-between",background:"#1e1e1e",padding:"6px",fontSize:"11px",borderRadius:"4px"}}>
                      <input type="text" value={a.label} onChange={e=>{const val=e.target.value; setAnns(p=>p.map(x=>x.id===a.id?{...x,label:val}:x))}} style={{background:"transparent",border:"none",padding:0,color:"#fff",width:"110px"}}/>
                      <span style={{color:"#ff9d00",fontWeight:"bold"}}>{getMeasure(a)}</span>
                    </div>
                  ))}
                </div>
              </div>}

              {viewTab==="pipe3d" && <div className="studio-panel" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                {/* Entradas Manuales Modificables del Operador */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"4px"}}>
                  <div><label style={{fontSize:"9px"}}>Ancho/R (mm)</label><input type="number" style={{width:"100%"}} value={manualDim.w} onChange={e=>setManualDim({...manualDim,w:parseFloat(e.target.value)||0})}/></div>
                  <div><label style={{fontSize:"9px"}}>Alto (mm)</label><input type="number" style={{width:"100%"}} value={manualDim.h} onChange={e=>setManualDim({...manualDim,h:parseFloat(e.target.value)||0})}/></div>
                  <div><label style={{fontSize:"9px"}}>Prof (mm)</label><input type="number" style={{width:"100%"}} value={manualDim.d} onChange={e=>setManualDim({...manualDim,d:parseFloat(e.target.value)||0})}/></div>
                </div>
                <select style={{width:"100%"}} value={shapeType} onChange={e=>setShapeType(e.target.value)}>
                  <option value="box">Cubo Estructural</option>
                  <option value="cylinder">Cilindro / Caño</option>
                  <option value="sphere">Esfera / Depósito</option>
                </select>

                <Studio3DView components={piping?.components} manualDim={manualDim} shapeType={shapeType}/>
              </div>}

              {/* BARRA DE EXPORTACIONES REQUERIDAS */}
              <div className="studio-panel" style={{background:"#1e1e1e"}}>
                <div style={{fontSize:"10px",color:"#777",marginBottom:"6px",fontFamily:"'Space Mono'"}}>MÓDULO DE EXPORTACIÓN EXTERNA</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px",marginBottom:"4px"}}>
                  <button className="studio-btn" onClick={downloadPNG}>💥 PNG</button>
                  <button className="studio-btn" onClick={downloadPDF}>📄 PDF</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px"}}>
                  <button className="studio-btn" style={{background:"#25D366",color:"#000",fontWeight:"bold"}} onClick={()=>shareMedia('whatsapp')}>💬 WhatsApp</button>
                  <button className="studio-btn" style={{background:"#444"}} onClick={()=>shareMedia('email')}>✉ Correo</button>
                </div>
              </div>
            </div>
          </div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>
</body>
</html>
