<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>MediScan Pro - Metrología 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:#0a0a0a;color:#fff;font-family:sans-serif;}
        .app{max-width:1000px;margin:0 auto;padding:20px;}
        .canvas-area{position:relative;background:#000;border:2px solid #333;height:500px;cursor:crosshair;overflow:hidden;}
        svg{position:absolute;top:0;left:0;width:100%;height:100%;}
        .tool-bar{display:flex;gap:10px;padding:10px;background:#222;}
        button{padding:10px;cursor:pointer;}
        button.active{background:#ff9d00;}
        .handle{fill:#fff;stroke:#ff9d00;stroke-width:2;cursor:pointer;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const {useState, useRef} = React;

    function App() {
        const [tool, setTool] = useState("line");
        const [elements, setElements] = useState([]);
        const [drawing, setDrawing] = useState(null);
        const svgRef = useRef(null);

        const getPos = (e) => {
            const rect = svgRef.current.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        };

        const handleMouseDown = (e) => {
            const pos = getPos(e);
            setDrawing({ id: Date.now(), type: tool, p1: pos, p2: pos });
        };

        const handleMouseMove = (e) => {
            if (!drawing) return;
            setDrawing(prev => ({ ...prev, p2: getPos(e) }));
        };

        const handleMouseUp = () => {
            if (!drawing) return;
            setElements([...elements, drawing]);
            setDrawing(null);
        };

        const updateElement = (id, p1, p2) => {
            setElements(prev => prev.map(el => el.id === id ? { ...el, p1, p2 } : el));
        };

        return (
            <div className="app">
                <div className="tool-bar">
                    {["line", "rect", "circ"].map(t => (
                        <button key={t} className={tool === t ? "active" : ""} onClick={() => setTool(t)}>{t.toUpperCase()}</button>
                    ))}
                </div>
                <div className="canvas-area" onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp}>
                    <svg ref={svgRef}>
                        {elements.map(el => (
                            <RenderElement key={el.id} el={el} onDrag={(p1, p2) => updateElement(el.id, p1, p2)} />
                        ))}
                        {drawing && <RenderElement el={drawing} />}
                    </svg>
                </div>
            </div>
        );
    }

    function RenderElement({ el, onDrag }) {
        const handleDrag = (idx, e) => {
            if (!onDrag) return;
            e.stopPropagation();
            const move = (ev) => {
                const rect = ev.target.closest('svg').getBoundingClientRect();
                const newPos = { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
                if (idx === 1) onDrag(newPos, el.p2);
                else onDrag(el.p1, newPos);
            };
            const up = () => window.removeEventListener("mousemove", move);
            window.addEventListener("mousemove", move);
            window.addEventListener("mouseup", up, { once: true });
        };

        if (el.type === "circ") {
            const r = Math.sqrt((el.p2.x - el.p1.x)**2 + (el.p2.y - el.p1.y)**2);
            return (
                <g>
                    <circle cx={el.p1.x} cy={el.p1.y} r={r} fill="none" stroke="white" strokeWidth="2" />
                    <circle cx={el.p1.x} cy={el.p1.y} r="5" className="handle" onMouseDown={(e) => handleDrag(1, e)} />
                    <circle cx={el.p2.x} cy={el.p2.y} r="5" className="handle" onMouseDown={(e) => handleDrag(2, e)} />
                </g>
            );
        }
        if (el.type === "rect") {
            const w = Math.abs(el.p2.x - el.p1.x);
            const h = Math.abs(el.p2.y - el.p1.y);
            return (
                <g>
                    <rect x={Math.min(el.p1.x, el.p2.x)} y={Math.min(el.p1.y, el.p2.y)} width={w} height={h} fill="none" stroke="white" strokeWidth="2" />
                    <circle cx={el.p1.x} cy={el.p1.y} r="5" className="handle" onMouseDown={(e) => handleDrag(1, e)} />
                    <circle cx={el.p2.x} cy={el.p2.y} r="5" className="handle" onMouseDown={(e) => handleDrag(2, e)} />
                </g>
            );
        }
        return (
            <g>
                <line x1={el.p1.x} y1={el.p1.y} x2={el.p2.x} y2={el.p2.y} stroke="white" strokeWidth="2" />
                <circle cx={el.p1.x} cy={el.p1.y} r="5" className="handle" onMouseDown={(e) => handleDrag(1, e)} />
                <circle cx={el.p2.x} cy={el.p2.y} r="5" className="handle" onMouseDown={(e) => handleDrag(2, e)} />
            </g>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
