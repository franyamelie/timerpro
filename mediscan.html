<script type="text/babel" data-presets="react">
const {useState,useRef,useEffect,useCallback,useMemo}=React;
const GK=()=>localStorage.getItem("ms3_k")||"";
const API="https://api.groq.com/openai/v1/chat/completions";
const MDL="meta-llama/llama-4-scout-17b-16e-instruct";
const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
const uid=()=>`_${Math.random().toString(36).slice(2,9)}`;
const COLS=["#ff9500","#ff3366","#00e676","#ff9500","#cc44ff","#ffdd00","#ff6622","#00ffcc","#ff44aa","#44ffbb","#ff8844","#44aaff"];
const UF={mm:1,cm:10,m:1000,"in":25.4,ft:304.8};
const toMM=(v,u)=>(parseFloat(v)||0)*(UF[u]||10);
const fmtV=(v,u)=>{if(v==null)return"—";const r={mm:[1,0],cm:[.1,1],m:[.001,3],"in":[.0394,2],ft:[.00328,3]}[u]||[.1,1];return`${(v*r[0]).toFixed(r[1])} ${u}`;};
const MRK=["pin","dot","star","tgt"];
/* Industrial knowledge base embedded in prompts */
const IND_KB=`Base de conocimiento industrial: tuberías (DN15-DN600, acero carbono/inox/PVC), bridas (PN10-PN100), válvulas (compuerta/bola/mariposa/retención/globo), bombas centrífugas/alternativas, reductores (planetarios/tornillo sin fin/helicoidales), motores eléctricos (IE1-IE4), intercambiadores de calor (carcasa-tubos/placas), recipientes a presión, tornillería métrica (M3-M100), rodamientos (SKF/FAG), juntas y sellos, instrumentación (manómetros/caudalímetros/termómetros), estructuras metálicas (HEB/IPE/UPN), depósitos y tanques. Tolerancias ISO, normas DIN/EN/ASME.`;
const TOOLS=[
  {id:"sel",icon:"✥",label:"Mover",npts:0,cat:"nav"},
  {id:"dot",icon:"⬤",label:"Punto",npts:1,cat:"mrk"},
  {id:"pin",icon:"📍",label:"Pin",npts:1,cat:"mrk"},
  {id:"star",icon:"✦",label:"Estrella",npts:1,cat:"mrk"},
  {id:"tgt",icon:"⊕",label:"Diana",npts:1,cat:"mrk"},
  {id:"line",icon:"─",label:"Línea",npts:2,cat:"lin"},
  {id:"dim",icon:"↹",label:"Cota",npts:2,cat:"lin"},
  {id:"dist",icon:"⟷",label:"Distancia",npts:2,cat:"lin"},
  {id:"incl",icon:"∢",label:"Inclinación",npts:2,cat:"med"},
  {id:"ang",icon:"∠",label:"Ángulo",npts:3,cat:"med"},
  {id:"rad",icon:"⌀",label:"Radio/Ø",npts:2,cat:"med"},
  {id:"arr1",icon:"➜",label:"Flecha",npts:2,cat:"arr"},
  {id:"arr2",icon:"⇛",label:"Gruesa",npts:2,cat:"arr"},
  {id:"rect",icon:"▬",label:"Rectángulo",npts:2,cat:"shp"},
  {id:"circ",icon:"◉",label:"Círculo",npts:2,cat:"shp"},
  {id:"calib",icon:"⚖",label:"Calibrar",npts:2,cat:"spc"},
  {id:"crop",icon:"✂",label:"Recortar",npts:2,cat:"spc"},
  {id:"poly",icon:"↬",label:"Polilínea",npts:99,cat:"med"},
  {id:"wall",icon:"▦",label:"Espesor",npts:3,cat:"med"},
  {id:"tol",icon:"±",label:"Tolerancia",npts:1,cat:"med"},
  {id:"cham",icon:"⌐",label:"Chaflán",npts:3,cat:"med"},
  {id:"area",icon:"▣",label:"Área",npts:4,cat:"med"},
  {id:"arc",icon:"⌒",label:"Arco",npts:3,cat:"med"},
  {id:"coord",icon:"⊹",label:"Coordenada",npts:1,cat:"med"},
  {id:"note",icon:"✏",label:"Nota",npts:1,cat:"spc"},
  {id:"lasso",icon:"⬡",label:"Lazo",npts:99,cat:"spc"},
  {id:"defl",icon:"⌇",label:"Deflexión",npts:3,cat:"med"},
  {id:"rough",icon:"Ra",label:"Rugosidad",npts:1,cat:"spc"},
];
const CATS={nav:"Nav",mrk:"Marcadores",lin:"Líneas",med:"Medición",arr:"Flechas",shp:"Formas",spc:"Especial"};
const DRAG=["rect","circ","crop"];
const MULTI_PTS=["poly","area","defl"];
/* ══ VIEW 2D ══ */
function View2D({anns,objName,sc,segs,img}){
  const ref=useRef(null);
  const draw=useCallback((imgEl)=>{
    const cv=ref.current;if(!cv)return;
    const ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
    ctx.clearRect(0,0,W,H);
    /* White paper background */
    ctx.fillStyle="#ffffff";ctx.fillRect(0,0,W,H);
    /* Light grid */
    ctx.strokeStyle="#eef2fb";ctx.lineWidth=.5;
    for(let x=0;x<W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    const mg=44,bH=58,titleH=14;
    const dW=W-mg*2,dH=H-mg-bH-titleH-8;
    const imgH=Math.floor(dH*0.55),dimH=dH-imgH-8;

    /* ── TITLE BLOCK ── */
    ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1.2;ctx.strokeRect(mg,2,dW,titleH);
    ctx.fillStyle="rgba(210,228,255,.5)";ctx.fillRect(mg,2,dW,titleH);
    ctx.fillStyle="#1a3a8a";ctx.font="bold 8px 'Inter',sans-serif";ctx.textAlign="center";
    ctx.fillText("CROQUIS TÉCNICO  ·  "+(objName||"Objeto"),W/2,10);
    ctx.fillStyle="#8899aa";ctx.font="6px 'Inter',sans-serif";ctx.textAlign="right";
    ctx.fillText("MediScan 3D Pro",W-mg-2,10);

    /* ── REAL IMAGE EMBEDDED (left ~55% of drawing area) ── */
    const imgW=Math.floor(dW*0.54),imgX=mg,imgY=mg+titleH+4;
    if(imgEl){
      /* Image frame */
      ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1.5;ctx.strokeRect(imgX,imgY,imgW,imgH);
      /* Clip to frame */
      ctx.save();ctx.rect(imgX,imgY,imgW,imgH);ctx.clip();
      const aspect=imgEl.naturalWidth/imgEl.naturalHeight||1;
      let dw=imgW,dh=imgH;
      if(dw/dh>aspect){dw=dh*aspect;}else{dh=dw/aspect;}
      ctx.drawImage(imgEl,imgX+(imgW-dw)/2,imgY+(imgH-dh)/2,dw,dh);
      ctx.restore();
      /* Semi-transparent overlay for annotations */
      ctx.fillStyle="rgba(0,0,0,0.12)";ctx.fillRect(imgX,imgY,imgW,imgH);
      /* Draw segment overlays on image */
      if(segs&&segs.length){
        segs.forEach((seg,i)=>{
          const sx=imgX+seg.x1*imgW,sy=imgY+seg.y1*imgH;
          const sw2=(seg.x2-seg.x1)*imgW,sh2=(seg.y2-seg.y1)*imgH;
          const col=seg.color||"#0055cc";
          ctx.fillStyle=col+"28";ctx.fillRect(sx,sy,sw2,sh2);
          ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.setLineDash([5,3]);ctx.strokeRect(sx,sy,sw2,sh2);ctx.setLineDash([]);
          /* Balloon */
          ctx.beginPath();ctx.arc(sx+12,sy+12,9,0,Math.PI*2);
          ctx.fillStyle=col;ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=1;ctx.stroke();
          ctx.fillStyle="#fff";ctx.font="bold 8px 'Inter',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(i+1,sx+12,sy+12);ctx.textBaseline="alphabetic";
          /* Part label */
          ctx.fillStyle="rgba(0,0,0,0.72)";
          const lbl=(seg.name||"Parte "+(i+1)).slice(0,16);
          const lw=ctx.measureText(lbl).width+6;
          ctx.fillRect(sx+sw2/2-lw/2,sy+sh2-16,lw,13);
          ctx.fillStyle="#fff";ctx.font="bold 6.5px 'Inter',sans-serif";ctx.textAlign="center";
          ctx.fillText(lbl,sx+sw2/2,sy+sh2-6);
        });
      }
      /* Draw annotation points on image */
      anns.filter(a=>a.points&&a.points.length>=2).forEach(a=>{
        const[p1,p2]=a.points;
        const ax1=imgX+p1.x*imgW,ay1=imgY+p1.y*imgH,ax2=imgX+p2.x*imgW,ay2=imgY+p2.y*imgH;
        ctx.strokeStyle="#ff4400";ctx.lineWidth=1.5;ctx.setLineDash([3,2]);
        ctx.beginPath();ctx.moveTo(ax1,ay1);ctx.lineTo(ax2,ay2);ctx.stroke();ctx.setLineDash([]);
        ctx.beginPath();ctx.arc(ax1,ay1,3,0,Math.PI*2);ctx.fillStyle="#ff4400";ctx.fill();
        ctx.beginPath();ctx.arc(ax2,ay2,3,0,Math.PI*2);ctx.fill();
        if(a.value!=null){
          const lbl=`${a.title||a.type}: ${a.value}${a.unit}`;
          const mx=(ax1+ax2)/2,my=(ay1+ay2)/2;
          ctx.font="bold 6.5px 'Inter',sans-serif";
          const tw=ctx.measureText(lbl).width+6;
          ctx.fillStyle="rgba(255,50,0,.85)";ctx.fillRect(mx-tw/2,my-10,tw,13);
          ctx.fillStyle="#fff";ctx.textAlign="center";ctx.fillText(lbl,mx,my);
        }
      });
      ctx.fillStyle="#7788aa";ctx.font="bold 7px 'Inter',sans-serif";ctx.textAlign="left";ctx.textBaseline="alphabetic";
      ctx.fillText("IMAGEN REAL + ANOTACIONES",imgX,imgY-3);
    } else {
      ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.strokeRect(imgX,imgY,imgW,imgH);ctx.setLineDash([]);
      ctx.fillStyle="#aab8cc";ctx.font="bold 9px 'Inter',sans-serif";ctx.textAlign="center";
      ctx.fillText("Sin imagen",imgX+imgW/2,imgY+imgH/2);
    }

    /* ── ORTHOGRAPHIC DRAWING VIEWS (right side) ── */
    const ortX=mg+imgW+10,ortW=dW-imgW-10;
    const gd=ax=>{const a=anns.find(a=>a.axis===ax&&a.value!=null);return a?{mm:(parseFloat(a.value)||0)*({mm:1,cm:10,m:1000,"in":25.4,ft:304.8}[a.unit]||10),lbl:`${a.value}${a.unit}`}:null;};
    const wd=gd("width"),hd=gd("height"),dd=gd("depth");

    const dimLine=(x1,y1,x2,y2,label,side,off)=>{
      const s=side||1,o=off||16;
      const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
      const nx=(-dy/len)*s*o,ny=(dx/len)*s*o;
      ctx.strokeStyle="#cc2200";ctx.lineWidth=.7;ctx.setLineDash([2,2]);
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x1+nx,y1+ny);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2+nx,y2+ny);ctx.stroke();
      ctx.setLineDash([]);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x1+nx,y1+ny);ctx.lineTo(x2+nx,y2+ny);ctx.stroke();
      const ang=Math.atan2(y2-y1,x2-x1);
      const arw=(ax,ay,a2)=>{ctx.save();ctx.translate(ax,ay);ctx.rotate(a2);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-6,2);ctx.lineTo(-6,-2);ctx.closePath();ctx.fillStyle="#cc2200";ctx.fill();ctx.restore();};
      arw(x1+nx,y1+ny,ang+Math.PI);arw(x2+nx,y2+ny,ang);
      ctx.save();ctx.translate((x1+x2)/2+nx,(y1+y2)/2+ny);
      ctx.font="bold 7px 'Inter',sans-serif";
      const tw=ctx.measureText(label).width+6;
      ctx.fillStyle="rgba(255,255,255,.92)";ctx.fillRect(-tw/2,-6,tw,12);
      ctx.fillStyle="#cc2200";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(label,0,0);ctx.restore();
      ctx.textBaseline="alphabetic";
    };

    if(wd||hd){
      const vW=wd?wd.mm:80,vH=hd?hd.mm:80;
      const sc2=Math.min((ortW-8)*.85/vW,(imgH-20)*.75/vH);
      const rW=vW*sc2,rH=vH*sc2,rX=ortX+(ortW-rW)/2,rY=imgY+14;
      ctx.fillStyle="#7788aa";ctx.font="bold 7px 'Inter',sans-serif";ctx.textAlign="left";ctx.fillText("FRONTAL",rX,rY-4);
      ctx.fillStyle="rgba(200,220,255,.45)";ctx.fillRect(rX,rY,rW,rH);
      ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1.8;ctx.setLineDash([]);ctx.strokeRect(rX,rY,rW,rH);
      ctx.strokeStyle="#0077bb";ctx.lineWidth=.5;ctx.setLineDash([6,3]);
      ctx.beginPath();ctx.moveTo(rX+rW/2,rY-4);ctx.lineTo(rX+rW/2,rY+rH+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(rX-4,rY+rH/2);ctx.lineTo(rX+rW+4,rY+rH/2);ctx.stroke();
      ctx.setLineDash([]);
      if(wd)dimLine(rX,rY+rH,rX+rW,rY+rH,wd.lbl,1,16);
      if(hd)dimLine(rX,rY,rX,rY+rH,hd.lbl,-1,18);
      if(dd){
        const lX=rX,lY=rY+rH+32,lW=dd.mm*sc2,lH=rH;
        ctx.fillStyle="#7788aa";ctx.font="bold 7px 'Inter',sans-serif";ctx.textAlign="left";ctx.fillText("LATERAL",lX,lY-4);
        ctx.fillStyle="rgba(200,220,255,.3)";ctx.fillRect(lX,lY,lW,lH);
        ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1.2;ctx.strokeRect(lX,lY,lW,lH);
        dimLine(lX,lY+lH,lX+lW,lY+lH,dd.lbl,1,14);
      }
    } else {
      /* No measurements: show parts grid */
      ctx.fillStyle="#7788aa";ctx.font="bold 7px 'Inter',sans-serif";ctx.textAlign="center";ctx.fillText("DETALLE DE PARTES",ortX+ortW/2,imgY+10);
      (segs||[]).slice(0,4).forEach((seg,i)=>{
        const row=Math.floor(i/2),col2=i%2;
        const bx=ortX+col2*(ortW/2)+2,by=imgY+16+row*(imgH/2.2);
        const bw=ortW/2-6,bh=imgH/2.4;
        const c=seg.color||"#1a5a9a";
        ctx.fillStyle=c+"18";ctx.strokeStyle=c;ctx.lineWidth=1;ctx.setLineDash([4,2]);
        ctx.fillRect(bx,by,bw,bh);ctx.strokeRect(bx,by,bw,bh);ctx.setLineDash([]);
        ctx.fillStyle=c;ctx.font="bold 7px 'Inter',sans-serif";ctx.textAlign="center";
        ctx.fillText((seg.name||"Parte "+(i+1)).slice(0,12),bx+bw/2,by+bh/2+2);
        ctx.beginPath();ctx.arc(bx+12,by+12,8,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();
        ctx.fillStyle="#fff";ctx.font="bold 8px 'Inter',sans-serif";ctx.fillText(i+1,bx+12,by+14);
      });
    }

    /* ── DIMENSION SUMMARY TABLE (below image) ── */
    const sumY=imgY+imgH+4;
    const measWithVal=anns.filter(a=>a.value!=null);
    if(measWithVal.length){
      ctx.fillStyle="#1a3a8a";ctx.font="bold 7px 'Inter',sans-serif";ctx.textAlign="left";
      ctx.fillText("MEDIDAS:",imgX,sumY+8);
      measWithVal.slice(0,6).forEach((a,i)=>{
        const col2=i%2===0?"rgba(210,228,255,.3)":"transparent";
        ctx.fillStyle=col2;ctx.fillRect(imgX+i<3?0:imgW/2+4,sumY+10+(i%3)*12,imgW/2-4,11);
        ctx.fillStyle="#333";ctx.font="6.5px 'Inter',sans-serif";ctx.textAlign="left";
        ctx.fillText(`${a.title||a.type}: ${a.value}${a.unit}`,imgX+(i>=3?imgW/2+6:2),sumY+18+(i%3)*12);
      });
    }

    /* ── PARTS LIST TABLE (bottom) ── */
    const tY=H-bH+2;
    ctx.strokeStyle="#1a3a8a";ctx.lineWidth=1;ctx.setLineDash([]);ctx.strokeRect(mg,tY,dW,bH-4);
    ctx.fillStyle="rgba(210,228,255,.5)";ctx.fillRect(mg,tY,dW,14);
    ctx.fillStyle="#1a3a8a";ctx.font="bold 7px 'Inter',sans-serif";ctx.textAlign="left";
    ctx.fillText("LISTA DE PARTES",mg+4,tY+9);
    const colW=dW/Math.min((segs||[]).length||1,3);

/* ══ MULTI-PART 3D: shows one 3D card per measured part ══ */
/* ══ Part3D with auto-crop from main image ══ */
function Part3DWithCrop({anns,shape,color,seg}){
  const[texImg,setTexImg]=React.useState(null);
  React.useEffect(()=>{
    if(!seg||!seg.x1&&seg.x1!==0)return;
    /* Try to get the main image from the app */
    const mainImg=document.querySelector(".app-scroll img, img[draggable='false']");
    if(!mainImg||!mainImg.complete||!mainImg.naturalWidth)return;
    try{
      const c2=document.createElement("canvas");
      c2.width=Math.max(Math.round(mainImg.naturalWidth*(seg.x2-seg.x1)),10);
      c2.height=Math.max(Math.round(mainImg.naturalHeight*(seg.y2-seg.y1)),10);
      const ctx=c2.getContext("2d");
      ctx.drawImage(mainImg,mainImg.naturalWidth*seg.x1,mainImg.naturalHeight*seg.y1,c2.width,c2.height,0,0,c2.width,c2.height);
      setTexImg(c2.toDataURL("image/jpeg",.9));
    }catch(e){}
  },[seg]);
  const sw=(seg?.x2||1)-(seg?.x1||0);const sh=(seg?.y2||1)-(seg?.y1||0);
  return<Part3D anns={anns} shape={shape} color={color} segW={sw*400} segH={sh*400} texImg={texImg}/>;
}

function MultiPart3D({anns,segs,objShape,img}){
  const[crops,setCrops]=React.useState({});
  React.useEffect(()=>{
    if(!img||!segs?.length)return;
    const el=new Image();el.crossOrigin="anonymous";
    el.onload=()=>{
      const nc={};
      segs.forEach(seg=>{
        try{
          const x1=Math.min(seg.x1,seg.x2),y1=Math.min(seg.y1,seg.y2);
          const x2=Math.max(seg.x1,seg.x2),y2=Math.max(seg.y1,seg.y2);
          const w=Math.round(el.width*(x2-x1)),h=Math.round(el.height*(y2-y1));
          if(w<4||h<4)return;
          const c=document.createElement("canvas");c.width=w;c.height=h;
          c.getContext("2d").drawImage(el,el.width*x1,el.height*y1,w,h,0,0,w,h);
          nc[seg.id]={url:c.toDataURL("image/jpeg",.92),w,h};
        }catch(e){}
      });
      setCrops(nc);
    };
    el.src=img;
  },[img,segs]);

  const parts=React.useMemo(()=>{
    if(segs&&segs.length>0){
      return segs.map(seg=>{
        const related=anns.filter(a=>a.value!=null&&(
          (a.title&&seg.name&&a.title.toLowerCase().includes(seg.name.toLowerCase().slice(0,5)))||
          (a.points&&a.points[0]&&Math.abs(a.points[0].x-(seg.x1+seg.x2)/2)<.25&&Math.abs(a.points[0].y-(seg.y1+seg.y2)/2)<.25)
        ));
        return{...seg,anns:related};
      });
    }
    const withVal=anns.filter(a=>a.value!=null);
    if(!withVal.length)return[];
    return[{id:"1",name:"Objeto completo",color:"#ff9500",anns:withVal}];
  },[anns,segs]);

  if(!parts.length)return<div style={{padding:"16px",fontSize:"9px",color:"#444",textAlign:"center",lineHeight:2.2}}>
    <div style={{fontSize:"12px",marginBottom:"6px"}}>🎮</div>
    Detecta partes con IA o añade partes manualmente<br/>
    Cada parte medida aparecerá como un modelo 3D aquí
  </div>;

  return<div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
    {parts.slice(0,8).map(part=>{
      const crop=crops[part.id];
      return<div key={part.id} style={{borderRadius:"10px",overflow:"hidden",border:`1px solid ${part.color||"#ff9500"}40`}}>
        <div style={{padding:"6px 10px",background:`${part.color||"#ff9500"}22`,display:"flex",alignItems:"center",gap:"7px",borderBottom:`1px solid ${part.color||"#ff9500"}30`}}>
          <div style={{width:"10px",height:"10px",borderRadius:"2px",background:part.color||"#ff9500"}}/>
          <span style={{fontSize:"9px",fontWeight:700,color:part.color||"#ff9500"}}>{part.id}. {part.name}</span>
          {part.anns.length>0&&<span style={{fontSize:"8px",color:"#556677",marginLeft:"auto"}}>{part.anns.map(a=>`${a.title||a.type}: ${a.value}${a.unit}`).join(" · ")}</span>}
        </div>
        <Part3D anns={part.anns} shape={objShape} color={part.color}
          segW={crop?.w} segH={crop?.h} texImg={crop?.url}/>
      </div>;
    })}
  </div>;
}

    rdr.toneMapping=THREE.ACESFilmicToneMapping;rdr.toneMappingExposure=1.2;
    E.appendChild(rdr.domElement);
    const piv=new THREE.Group();scene.add(piv);
    const colNum=parseInt((color||"#00ccff").replace("#",""),16)||0x00ccff;
    const isCyl=["cylinder","tube","pipe"].includes(shape);
    /* When we have a texture, use image proportions for geometry */
    if(texImg&&segW&&segH){
      const ratio=segW/segH;
      sw=2.4*Math.min(ratio,3); sh=2.4/Math.max(ratio,0.33); sd=Math.min(sw,sh)*0.22;
      const mx2=Math.max(sw,sh,0.1),sc2=2.5/mx2;sw*=sc2;sh*=sc2;sd*=sc2;
    }
    const depth=Math.max(sd,0.08);
    /* Front face: PlaneGeometry with image texture */
    const faceGeo=new THREE.PlaneGeometry(sw,sh,1,1);
    /* Side box for depth */
    const boxGeo=new THREE.BoxGeometry(sw,sh,depth,4,4,2);
    const wireMat=new THREE.LineBasicMaterial({color:colNum,transparent:true,opacity:0.7});
    const edges=new THREE.LineSegments(new THREE.EdgesGeometry(boxGeo),wireMat);
    if(texImg){
      /* Use direct Image element for data URL compatibility in THREE r128 */
      const imgEl=new Image();
      imgEl.onload=()=>{
        const tex=new THREE.Texture(imgEl);
        tex.needsUpdate=true;
        try{tex.encoding=THREE.sRGBEncoding;}catch(e){}
        const faceMat=new THREE.MeshStandardMaterial({map:tex,metalness:0.05,roughness:0.4,envMapIntensity:0.8,side:THREE.DoubleSide});
        const face=new THREE.Mesh(faceGeo,faceMat);face.position.z=depth/2+0.001;
        const sideMat=new THREE.MeshStandardMaterial({color:colNum,transparent:true,opacity:0.2,metalness:0.2});
        const box=new THREE.Mesh(boxGeo,sideMat);
        piv.add(face);piv.add(box);piv.add(edges);
        rdr.render(scene,cam);
      };
      imgEl.onerror=()=>{
        const mat=new THREE.MeshStandardMaterial({color:colNum,transparent:true,opacity:0.15});
        piv.add(new THREE.Mesh(boxGeo,mat));piv.add(edges);
      };
      imgEl.src=texImg;
    }else if(isCyl){
      const geo=new THREE.CylinderGeometry(Math.min(sw,sh)/2.2,Math.min(sw,sh)/2.2,sh,48);
      const mat=new THREE.MeshStandardMaterial({color:colNum,metalness:0.4,roughness:0.5,transparent:true,opacity:0.35});
      piv.add(new THREE.Mesh(geo,mat));
      piv.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),wireMat));
    }else{
      const geo=new THREE.BoxGeometry(sw,sh,depth,8,8,4);
      const mat=new THREE.MeshStandardMaterial({color:colNum,metalness:0.3,roughness:0.6,transparent:true,opacity:0.25});
      piv.add(new THREE.Mesh(geo,mat));piv.add(edges);
    }
    /* Professional 3-point lighting */
    scene.add(new THREE.AmbientLight(0x334455,0.8));
    const kl=new THREE.DirectionalLight(0xffffff,2.2);kl.position.set(5,8,6);scene.add(kl);
    const fl=new THREE.DirectionalLight(0x8899ff,0.8);fl.position.set(-4,2,-3);scene.add(fl);
    const bl=new THREE.DirectionalLight(0xff9944,0.5);bl.position.set(0,-3,4);scene.add(bl);
    const hl=new THREE.HemisphereLight(0x334466,0x111122,0.6);scene.add(hl);
    /* Ground grid */
    const grid=new THREE.GridHelper(10,20,0x1a3a2a,0x0d1d0d);grid.position.y=-sh/2-0.02;scene.add(grid);
    /* Axis indicator */
    const ax=new THREE.AxesHelper(0.5);ax.position.set(-3.8,-1.5,0);scene.add(ax);
    let rx=texImg?0.05:0.15,ry=texImg?0:0.5,drag=false,lx=0,ly=0;
    const dn=e=>{drag=true;const s=e.touches&&e.touches[0]||e;lx=s.clientX;ly=s.clientY;};
    const mv=e=>{if(!drag)return;const s=e.touches&&e.touches[0]||e;
      ry+=(s.clientX-lx)*0.012;rx+=(s.clientY-ly)*0.010;
      rx=Math.max(-Math.PI/2,Math.min(Math.PI/2,rx));lx=s.clientX;ly=s.clientY;};
    const up=()=>{drag=false;};
    rdr.domElement.addEventListener("mousedown",dn);rdr.domElement.addEventListener("touchstart",dn,{passive:true});
    window.addEventListener("mousemove",mv);window.addEventListener("touchmove",mv,{passive:true});
    window.addEventListener("mouseup",up);window.addEventListener("touchend",up);
    let id;const anim=()=>{id=requestAnimationFrame(anim);if(!drag)ry+=0.005;piv.rotation.y=ry;piv.rotation.x=rx;rdr.render(scene,cam);};anim();
    return()=>{cancelAnimationFrame(id);window.removeEventListener("mousemove",mv);window.removeEventListener("touchmove",mv);window.removeEventListener("mouseup",up);window.removeEventListener("touchend",up);rdr.dispose();if(E.contains(rdr.domElement))E.removeChild(rdr.domElement);};
  },[anns,shape,color,segW,segH,texImg]);
  return<div ref={ref} style={{width:"100%",height:"200px",cursor:"grab",background:"#0a0a14"}}/>;
}

    if(tool!=="lasso")return;
    const el=imgRef.current;if(!el)return;
    const closeLasso=(pts)=>{
      if(pts.length<3)return;
      const x1=Math.min(...pts.map(q=>q.x)),y1=Math.min(...pts.map(q=>q.y));
      const x2=Math.max(...pts.map(q=>q.x)),y2=Math.max(...pts.map(q=>q.y));

    };
    const handleClick=(ev)=>{
      ev.preventDefault();ev.stopPropagation();
      const r=el.getBoundingClientRect();
      const cx=ev.clientX??ev.changedTouches?.[0]?.clientX;
      const cy=ev.clientY??ev.changedTouches?.[0]?.clientY;
      if(cx==null||cy==null)return;
      const p={x:cl((cx-r.left)/r.width,.01,.99),y:cl((cy-r.top)/r.height,.01,.99)};
      const cur=lassoPendRef.current;
      if(cur.length>=3){
        const fp=cur[0];
        const dist=Math.sqrt(Math.pow((p.x-fp.x)*100,2)+Math.pow((p.y-fp.y)*100,2));

      }
      const next=[...cur,p];
      lassoPendRef.current=next;
      setPend(next);
    };
    const handleDblClick=(ev)=>{
      ev.preventDefault();ev.stopPropagation();
      closeLasso(lassoPendRef.current);
    };
    const handleMove=(ev)=>{
      const cur=lassoPendRef.current;if(!cur.length)return;
      const r=el.getBoundingClientRect();
      const cx=ev.clientX??ev.touches?.[0]?.clientX;
      const cy=ev.clientY??ev.touches?.[0]?.clientY;

  /* ══ FcShape: renderiza cada herramienta con su forma real en el panel flotante ══ */
  const FcShape=({a,ip=false})=>{
    if(!a?.points||a.points.length<2)return null;
    const[p1,p2]=a.points,col=a.color||"#ff9500";
    const sw=ip?1.5:2.5;
    const aid=`fc${a.id||"p"}`;
    const typeLabel={line:"Línea",dim:"Cota",dist:"Distancia",arr1:"Flecha",arr2:"Flecha⇒",rect:"Rectángulo",circ:"Círculo"}[a.type]||a.type;
    const badge=ip?"":a.title?(a.value!=null?`${a.title}: ${a.value}${a.unit}`:a.title):(a.value!=null?`${a.value}${a.unit}`:`${typeLabel} — sin medida`);
    const mx=(p1.x+p2.x)*50, my=(p1.y+p2.y)*50;
    const bw=badge?badge.length*1.3+2:0;
    const openM=e=>{if(ip)return;e.stopPropagation();setMeasM({...a,_existing:true,_fc:true});setMIn({t:a.title||"",v:a.value!=null?String(a.value):"",u:a.unit||"cm",ax:a.axis||""});};

    </>:null;

    /* ── RECTÁNGULO ── */
    if(a.type==="rect"){
      const rx=Math.min(p1.x,p2.x)*100,ry=Math.min(p1.y,p2.y)*100;
      const rw=Math.abs(p2.x-p1.x)*100,rh=Math.abs(p2.y-p1.y)*100;
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <rect x={`${rx}%`} y={`${ry}%`} width={`${rw}%`} height={`${rh}%`} stroke={col} strokeWidth={sw} fill={ip?`${col}28`:"rgba(255,150,0,.12)"}/>
        {!ip&&<BadgeEl bx={mx} by={my}/>}
      </g>;
    }
    /* ── CÍRCULO / ELIPSE ── */
    if(a.type==="circ"){
      const r=Math.sqrt(Math.pow((p2.x-p1.x)*100,2)+Math.pow((p2.y-p1.y)*100,2));
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r={`${r}%`} stroke={col} strokeWidth={sw} fill={ip?`${col}14`:"rgba(255,150,0,.07)"}/>
        {!ip&&<BadgeEl bx={p1.x*100} by={p1.y*100}/>}
      </g>;

    if(a.type==="dim"){
      const dx=p2.x*100-p1.x*100, dy=p2.y*100-p1.y*100;

        <line x1={`${p1.x*100-nx}%`} y1={`${p1.y*100-ny}%`} x2={`${p1.x*100+nx}%`} y2={`${p1.y*100+ny}%`} stroke={col} strokeWidth={sw+1}/>
        <line x1={`${p2.x*100-nx}%`} y1={`${p2.y*100-ny}%`} x2={`${p2.x*100+nx}%`} y2={`${p2.y*100+ny}%`} stroke={col} strokeWidth={sw+1}/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke="transparent" strokeWidth="14"/>
        {!ip&&<BadgeEl bx={mx} by={my-5}/>}

        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p1.x*100+4}%`} y2={`${p1.y*100}%`} stroke={col} strokeWidth="1.5"/>
        {!ip&&dispBadge&&<><rect x={`${p1.x*100+3}%`} y={`${p1.y*100-4}%`} width={`${dispBadge.length*1.4+2}%`} height="6%" rx="3%" fill="rgba(0,0,0,.8)"/><text x={`${p1.x*100+3+dispBadge.length*.7}%`} y={`${p1.y*100-1}%`} fill="#fff" fontSize="2.3%" fontFamily="Inter" fontWeight="900" textAnchor="middle" dominantBaseline="middle">{dispBadge}</text></>}
      </g>;
    }
    /* ── ESPESOR PARED ── */
    if(a.type==="wall"&&a.points?.length>=2){
      const dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy)||1;
      const nx=-dy/len*.04,ny=dx/len*.04;
      const disp=ip?"":(badge||"Espesor");
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw}/>
        <line x1={`${(p1.x+nx)*100}%`} y1={`${(p1.y+ny)*100}%`} x2={`${(p2.x+nx)*100}%`} y2={`${(p2.y+ny)*100}%`} stroke={col} strokeWidth={sw} strokeDasharray="5,2"/>
        {!ip&&<BadgeEl bx={(p1.x+p2.x)*50+nx*50} by={(p1.y+p2.y)*50+ny*50-5}/>}
      </g>;
    }
    /* ── POLILÍNEA ── */
    if(a.type==="poly"&&a.points?.length>=2){
      const d="M "+a.points.map(p=>`${p.x*100}% ${p.y*100}%`).join(" L ");
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <path d={d} stroke={col} strokeWidth={sw} fill="none"/>
        {a.points.map((p,i)=><circle key={i} cx={`${p.x*100}%`} cy={`${p.y*100}%`} r="1%" fill={col}/>)}
        {!ip&&<BadgeEl bx={a.points.reduce((s,p)=>s+p.x,0)/a.points.length*100} by={a.points.reduce((s,p)=>s+p.y,0)/a.points.length*100-5}/>}
      </g>;
    }
    /* ── LÍNEA SIMPLE ── */
    return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
      <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw}/>
      <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke="transparent" strokeWidth="14"/>
      <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1%" fill={col} opacity=".7"/>
      <circle cx={`${p2.x*100}%`} cy={`${p2.y*100}%`} r="1%" fill={col} opacity=".7"/>
      {!ip&&<BadgeEl bx={mx} by={my-5}/>}
    </g>;
  };

  return(

          }catch(e){alert("Error: "+e.message);}
        }} style={{flex:1,padding:"9px 4px",background:"rgba(37,211,102,.09)",border:"1px solid rgba(37,211,102,.25)",color:"#25d366",borderRadius:"8px",fontSize:"9px",fontWeight:700}}>💬 WA</button>
        <button onClick={async()=>{
          const el=document.getElementById("fc-img-container");if(!el)return;
          try{const cv=await html2canvas(el,{scale:1.5,useCORS:true,allowTaint:true,logging:false});
            const url=cv.toDataURL("image/png");
            const a=document.createElement("a");a.href=url;a.download=`${editZone.seg.name}.png`;document.body.appendChild(a);a.click();document.body.removeChild(a);
            const body=`Zona: ${editZone.seg.name}\nMedidas:\n${fcAnns.filter(a=>a.value!=null).map(a=>`• ${a.title}: ${a.value} ${a.unit}`).join("\n")}\n\n-- MediScan 3D Pro`;
            setTimeout(()=>{const ma=document.createElement("a");ma.href=`mailto:?subject=${encodeURIComponent("MediScan: "+editZone.seg.name)}&body=${encodeURIComponent(body)}`;ma.target="_blank";document.body.appendChild(ma);ma.click();document.body.removeChild(ma);},800);
          }catch(e){alert("Error: "+e.message);}
        }} style={{flex:1,padding:"9px 4px",background:"rgba(100,150,255,.08)",border:"1px solid rgba(100,150,255,.2)",color:"#88aaff",borderRadius:"8px",fontSize:"9px",fontWeight:700}}>📧 Email</button>
      </div>
      <div style={{display:"flex",gap:"5px",marginTop:"2px"}}>
        <button onClick={async()=>{
          /* Export 3D canvas screenshot */
          const canvas3d=document.querySelector("#fc-3d-area canvas");
          if(!canvas3d){alert("Activa la vista 3D primero");return;}
          try{const url=canvas3d.toDataURL("image/png");
            const a=document.createElement("a");a.href=url;a.download=`${editZone.seg.name}_3D.png`;document.body.appendChild(a);a.click();document.body.removeChild(a);
          }catch(e){alert("Error 3D PNG: "+e.message);}
        }} style={{flex:1,padding:"7px 4px",background:"rgba(100,50,255,.12)",border:"1px solid rgba(100,50,255,.3)",color:"#aa66ff",borderRadius:"8px",fontSize:"9px",fontWeight:700}}>🎮 PNG 3D</button>
        <button onClick={async()=>{
          /* Export 2D drawing */
          const canvas2d=document.querySelector("#fc-2d-area canvas");
          if(!canvas2d){alert("Activa la vista 2D primero");return;}
          try{const url=canvas2d.toDataURL("image/png");
            const a=document.createElement("a");a.href=url;a.download=`${editZone.seg.name}_2D.png`;document.body.appendChild(a);a.click();document.body.removeChild(a);
          }catch(e){alert("Error 2D PNG: "+e.message);}
        }} style={{flex:1,padding:"7px 4px",background:"rgba(0,150,100,.12)",border:"1px solid rgba(0,150,100,.3)",color:"#00cc88",borderRadius:"8px",fontSize:"9px",fontWeight:700}}>📐 PNG 2D</button>
      </div>
      <button onClick={()=>{setEditZone(null);setFcAnns([]);setFcHist([]);}} style={{width:"100%",padding:"8px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.08)",color:"#444",borderRadius:"8px",fontSize:"9px"}}>Cancelar — volver sin guardar</button>
    </div>
  </div>
</div>}



{calibM&&<div data-modal="calib" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:"rgba(6,8,16,.98)",border:"1px solid rgba(255,150,0,.4)",borderRadius:"18px 18px 0 0",padding:"20px 18px",zIndex:editZone?900:500,animation:"slideUp .22s ease",backdropFilter:"blur(24px)"}}>
  <button onClick={()=>setCalibM(null)} style={{position:"absolute",top:"12px",right:"14px",background:"rgba(255,50,50,.15)",border:"1px solid rgba(255,50,50,.3)",color:"#ff3366",borderRadius:"50%",width:"28px",height:"28px",fontSize:"15px",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
  <div style={{fontSize:"13px",fontWeight:800,color:"#ff9500",marginBottom:"5px"}}>⚖ CALIBRAR ESCALA REAL</div>
  <div style={{fontSize:"9px",color:"#2a3a5a",marginBottom:"14px"}}>¿Cuánto mide la línea que has trazado?</div>
  <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"12px"}}>
    <input type="number" min="0" step=".01" placeholder="Valor real" value={mIn.v} onChange={e=>setMIn(s=>({...s,v:e.target.value}))} style={{flex:1,padding:"11px 13px",background:"rgba(0,10,30,.8)",border:"1px solid rgba(255,150,0,.45)",borderRadius:"9px",color:"#ff9500",fontSize:"22px",textAlign:"right"}}/>
    <div style={{display:"flex",gap:"3px"}}>{["mm","cm","m","in","ft"].map(u=><button key={u} onClick={()=>setMIn(s=>({...s,u:u}))} style={{padding:"6px 9px",background:mIn.u===u?"rgba(255,150,0,.22)":"rgba(255,255,255,.04)",color:mIn.u===u?"#ff9500":"#334455",border:`1px solid ${mIn.u===u?"rgba(255,150,0,.45)":"rgba(255,255,255,.07)"}`,borderRadius:"6px",fontSize:"10px",fontWeight:mIn.u===u?700:400}}>{u}</button>)}</div>
  </div>
  <div style={{display:"flex",gap:"8px"}}>
    <button onClick={()=>setCalibM(null)} style={{flex:1,padding:"12px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",color:"#2a3a5a",borderRadius:"9px",fontSize:"10px"}}>Cancelar</button>
    <button onClick={confirmC} style={{flex:2,padding:"12px",background:"linear-gradient(135deg,#cc5500,#ff9500)",color:"#fff",border:"none",borderRadius:"9px",fontSize:"13px",fontWeight:800}}>⚖ CALIBRAR ESCALA</button>
  </div>
</div>}

{/* CROP MODAL */}
{cropM&&<div data-modal="crop" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:"#111",border:"2px solid #ff9500",borderRadius:"18px 18px 0 0",padding:"20px 18px",zIndex:500,animation:"slideUp .22s ease",backdropFilter:"blur(24px)"}}>
  <button onClick={()=>setCropM(null)} style={{position:"absolute",top:"12px",right:"14px",background:"rgba(255,50,50,.15)",border:"1px solid rgba(255,50,50,.3)",color:"#ff3366",borderRadius:"50%",width:"28px",height:"28px",fontSize:"15px",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
  <div style={{fontSize:"13px",fontWeight:800,color:cropM?.isLasso?"#cc44ff":"#ff9500",marginBottom:"6px"}}>{cropM?.isLasso?"⬡ LAZO POLIGONAL CERRADO":"✂ ZONA SELECCIONADA"}</div>
  <div style={{fontSize:"9px",color:"#666",marginBottom:"14px",lineHeight:1.8}}>Elige qué hacer con esta zona:</div>
  <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
    <button onClick={()=>{
      if(!cropM||!img)return;
      /* Support BOTH formats: rectangular crop (p1/p2) AND lasso (x1,y1,x2,y2,polygon) */
      const x1=cropM.p1?Math.min(cropM.p1.x,cropM.p2.x):cropM.x1;
      const y1=cropM.p1?Math.min(cropM.p1.y,cropM.p2.y):cropM.y1;
      const x2=cropM.p1?Math.max(cropM.p1.x,cropM.p2.x):cropM.x2;
      const y2=cropM.p1?Math.max(cropM.p1.y,cropM.p2.y):cropM.y2;
      const im=new Image();im.crossOrigin="anonymous";
      im.onload=()=>{
        const cW=Math.round(im.width*(x2-x1)),cH=Math.round(im.height*(y2-y1));
        const c2=document.createElement("canvas");c2.width=cW;c2.height=cH;
        const ctx2=c2.getContext("2d");
        if(cropM.polygon&&cropM.polygon.length>=3){
          /* Clip to the exact lasso polygon shape */
          ctx2.beginPath();
          cropM.polygon.forEach(([px,py],i)=>{
            const rx=(px-x1)/(x2-x1)*cW,ry=(py-y1)/(y2-y1)*cH;
            i===0?ctx2.moveTo(rx,ry):ctx2.lineTo(rx,ry);
          });
          ctx2.closePath();ctx2.clip();
        }
        ctx2.drawImage(im,im.width*x1,im.height*y1,cW,cH,0,0,cW,cH);
        const fakeSeg={id:uid(),name:(cropM.isLasso?"Lazo ":"Zona ")+new Date().toLocaleTimeString("es-ES"),x1,y1,x2,y2,color:cropM.isLasso?"#cc44ff":"#ff9500",polygon:cropM.polygon};
        setSegs(s=>[...s,fakeSeg]);
        setFcAnns([]);setFcZoom(1);
        setEditZone({seg:fakeSeg,croppedImg:c2.toDataURL("image/jpeg",.95)});
        setCropM(null);
      };im.src=img;
    }} style={{width:"100%",padding:"13px",background:cropM?.isLasso?"linear-gradient(135deg,#aa00ff,#ff00aa)":"linear-gradient(135deg,#ff6600,#ffaa00)",color:cropM?.isLasso?"#fff":"#000",border:"none",borderRadius:"9px",fontSize:"12px",fontWeight:800,textAlign:"left"}}>
      {cropM?.isLasso?"⬡ EXTRAER FORMA":"✂ EXTRAER"} → Panel flotante con herramientas → 2D y 3D
      <div style={{fontSize:"8px",marginTop:"3px",opacity:.7}}>{cropM?.isLasso?"Recorta siguiendo exactamente el contorno dibujado":"Mide la zona extraída"} · Se guarda en 2D y 3D</div>
    </button>
    <button onClick={applyCrop} style={{width:"100%",padding:"11px",background:"rgba(255,150,0,.08)",border:"1px solid rgba(255,150,0,.3)",color:"#ff9500",borderRadius:"9px",fontSize:"10px",fontWeight:700}}>
      ✂ Recortar imagen principal (elimina el resto)
    </button>
    <button onClick={()=>setCropM(null)} style={{width:"100%",padding:"10px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",color:"#444",borderRadius:"9px",fontSize:"10px"}}>Cancelar</button>
  </div>
</div>}

</div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
