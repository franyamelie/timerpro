<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MediScan 3D Pro</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#09090f;height:100%;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ff9500;border-radius:4px}
.scr{overflow-y:auto;scrollbar-width:thin;scrollbar-color:#ff9500 transparent}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes scanBar{0%{top:0%}100%{top:100%}}
@keyframes pop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.fade{animation:fadeIn .2s ease both}
.pop{animation:pop .22s cubic-bezier(.34,1.56,.64,1) both}
.spin{animation:spin .75s linear infinite}
.pulse{animation:pulse 2s ease infinite}
button{-webkit-appearance:none;cursor:pointer;font-family:'Inter',sans-serif;outline:none;border:none;transition:all .1s}
button:active{transform:scale(.9)}
input,select,textarea{font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.nc{touch-action:none;user-select:none;-webkit-user-select:none}
/* Tool button */
.tb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 5px;border-radius:9px;min-width:46px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.07);color:#555;font-size:7px;font-weight:600;cursor:pointer}
.tb span{font-size:17px;line-height:1.1}
.tb.act{background:linear-gradient(135deg,#ff6600,#ffaa00);border-color:#ff9500;color:#000;box-shadow:0 0 16px rgba(255,150,0,.4)}
/* Bottom tabs */
.btab{flex:1;padding:7px 2px;font-size:8px;font-weight:700;background:transparent;border:none;color:#333;border-bottom:2px solid transparent;transition:all .12s}
.btab.on{color:#ff9500;border-bottom-color:#ff9500;background:rgba(255,150,0,.06)}
/* Nav tabs top */
.ntab{padding:5px 9px;border-radius:7px;font-size:8px;font-weight:700;background:transparent;border:1px solid transparent;color:#334;white-space:nowrap}
.ntab.on{background:rgba(255,150,0,.13);color:#ff9500;border-color:rgba(255,150,0,.3)}
/* Sheet modal */
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0c0e1a;border-top:2px solid #ff9500;border-radius:18px 18px 0 0;z-index:600;animation:slideUp .2s ease;max-height:80vh;overflow-y:auto}
/* Table */
.mtb{width:100%;border-collapse:collapse;font-size:9px}
.mtb th{padding:5px 7px;text-align:left;font-size:7px;font-weight:700;color:#336;letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid #141830}
.mtb td{padding:5px 7px;border-bottom:1px solid rgba(255,255,255,.03);color:#99a;vertical-align:middle}
.mtb tr:hover td{background:rgba(255,150,0,.04)}
/* Proj card */
.pc{background:#0e1020;border:1px solid #1a2035;border-radius:11px;padding:10px;cursor:pointer;margin-bottom:7px;transition:border .12s}
.pc:hover{border-color:rgba(255,150,0,.35)}
/* Overlay backdrop */
.bk{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:590;display:flex;align-items:flex-end;justify-content:center}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* ─────────────────────────────────────────────
   MEDISCAN 3D PRO — All 6 features complete
   1. PDF export with image + table
   2. Projects (localStorage persist)
   3. AI identify (Claude API built-in)
   4. 3D model — multiple shapes, real scale, drag rotate
   5. Compare mode — A/B side by side with own annotations
   6. Measure history table — editable, delete, export
   ───────────────────────────────────────────── */

const {useState,useRef,useEffect,useCallback,useMemo} = React;

/* ── CONSTANTS ── */
const UF={mm:1,cm:10,m:1e3,in:25.4,ft:304.8};
const COLS=['#ff9500','#ff3366','#00e676','#cc44ff','#ffdd00','#ff6622','#00ffcc','#ff44aa','#44ffbb','#44aaff','#aaff44','#ff8844'];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const uid=()=>'_'+Math.random().toString(36).slice(2,9);
const fmtV=(v,u)=>{if(v==null)return '—';const r={mm:[1,0],cm:[.1,1],m:[.001,3],in:[.0394,2],ft:[.00328,3]}[u]||[.1,1];return `${(v*r[0]).toFixed(r[1])} ${u}`;};
const toMM=(v,u)=>(parseFloat(v)||0)*(UF[u]||10);
const now=()=>new Date().toLocaleDateString('es-ES');

/* ── STORAGE ── */
const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
};

/* ── IND KB ── */
const IND_KB=`Eres experto en ingeniería industrial. Conoces: tuberías DN15-DN600, bridas PN10-PN100, válvulas (compuerta/bola/mariposa/retención), bombas centrífugas, reductores (sinfín/helicoidal/planetario), motores IE1-IE4, intercambiadores, recipientes a presión, tornillería M3-M100, rodamientos SKF/FAG, instrumentación (manómetros/caudalímetros), estructuras HEB/IPE/UPN. Normas DIN/EN/ASME/ISO.`;

/* ── TOOLS ── */
const TOOLS=[
  {id:'sel',icon:'↖',lbl:'Mover',n:0,cat:'nav'},
  {id:'dot',icon:'⬤',lbl:'Punto',n:1,cat:'mrk'},
  {id:'pin',icon:'📍',lbl:'Pin',n:1,cat:'mrk'},
  {id:'star',icon:'★',lbl:'Estrella',n:1,cat:'mrk'},
  {id:'tgt',icon:'⊕',lbl:'Diana',n:1,cat:'mrk'},
  {id:'line',icon:'━',lbl:'Línea',n:2,cat:'lin'},
  {id:'dim',icon:'⟺',lbl:'Cota',n:2,cat:'lin'},
  {id:'dist',icon:'↔',lbl:'A→B',n:2,cat:'lin'},
  {id:'arr',icon:'→',lbl:'Flecha',n:2,cat:'arr'},
  {id:'rect',icon:'▭',lbl:'Rect.',n:2,cat:'shp'},
  {id:'circ',icon:'◯',lbl:'Círculo',n:2,cat:'shp'},
  {id:'calib',icon:'⚖',lbl:'Calibrar',n:2,cat:'spc'},
  {id:'crop',icon:'✂',lbl:'Recortar',n:2,cat:'spc'},
];
const DRAG=['rect','circ','crop'];
const CATS={nav:'Navegación',mrk:'Marcadores',lin:'Medición',arr:'Flechas',shp:'Formas',spc:'Especial'};

/* ══════════════════════════════════════════
   1.  CANVAS DE ANOTACIONES
══════════════════════════════════════════ */
function AnnotCanvas({img,tool,color,anns,setAnns,calibPx,onCalib,onCrop}){
  const cv=useRef(null);
  const [pts,setPts]=useState([]);
  const [drag,setDrag]=useState(null);
  const [hov,setHov]=useState(null);

  const gp=e=>{
    const r=cv.current.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return {x:(t.clientX-r.left)/r.width, y:(t.clientY-r.top)/r.height};
  };

  /* draw */
  const draw=useCallback(()=>{
    const c=cv.current; if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);
    if(img){
      const im=new Image(); im.crossOrigin='anonymous';
      im.onload=()=>{ctx.drawImage(im,0,0,W,H); overlay(ctx,W,H);};
      im.src=img;
    } else {
      ctx.fillStyle='#090c1a'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#1a2540'; ctx.font="11px Inter"; ctx.textAlign='center';
      ctx.fillText('Carga una imagen',W/2,H/2);
    }
    overlay(ctx,W,H);
  },[img,anns,pts,drag,hov,color,calibPx,tool]);

  const overlay=(ctx,W,H)=>{
    anns.forEach((a,i)=>drawAnn(ctx,a,W,H,hov===i,calibPx));
    if(drag&&DRAG.includes(tool)){
      const p1=drag.s,p2=drag.c||drag.s;
      const x=Math.min(p1.x,p2.x)*W,y=Math.min(p1.y,p2.y)*H;
      const w=Math.abs(p2.x-p1.x)*W,h=Math.abs(p2.y-p1.y)*H;
      ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.setLineDash([5,3]);
      if(tool==='circ'){ctx.beginPath();ctx.ellipse(x+w/2,y+h/2,w/2,h/2,0,0,Math.PI*2);ctx.stroke();}
      else ctx.strokeRect(x,y,w,h);
      ctx.setLineDash([]); ctx.fillStyle=color+'18'; ctx.fillRect(x,y,w,h);
    }
    pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x*W,p.y*H,4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();});
  };

  const drawAnn=(ctx,a,W,H,isHov,cpx)=>{
    const col=a.color||'#ff9500'; ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=isHov?2.2:1.4;
    if(a.type==='dot'){ctx.beginPath();ctx.arc(a.x*W,a.y*H,isHov?6:4,0,Math.PI*2);ctx.fill();}
    else if(a.type==='pin'){ctx.font=`${isHov?22:18}px sans-serif`;ctx.textAlign='center';ctx.fillText('📍',a.x*W,a.y*H);}
    else if(a.type==='star'){ctx.font=`${isHov?22:18}px sans-serif`;ctx.textAlign='center';ctx.fillText('★',a.x*W,a.y*H);}
    else if(a.type==='tgt'){
      const r=isHov?9:7;
      ctx.beginPath();ctx.arc(a.x*W,a.y*H,r,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(a.x*W,a.y*H,r*.35,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.moveTo((a.x-.018)*W,a.y*H);ctx.lineTo((a.x+.018)*W,a.y*H);ctx.stroke();
      ctx.beginPath();ctx.moveTo(a.x*W,(a.y-.022)*H);ctx.lineTo(a.x*W,(a.y+.022)*H);ctx.stroke();
    }
    else if(['line','dim','dist','calib'].includes(a.type)){
      ctx.beginPath();ctx.moveTo(a.x1*W,a.y1*H);ctx.lineTo(a.x2*W,a.y2*H);ctx.stroke();
      if(['dim','dist'].includes(a.type)){
        const ang=Math.atan2((a.y2-a.y1)*H,(a.x2-a.x1)*W);
        [[a.x2*W,a.y2*H,ang+Math.PI],[a.x1*W,a.y1*H,ang]].forEach(([x,y,a])=>{
          ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+Math.cos(a-.35)*10,y+Math.sin(a-.35)*10);
          ctx.lineTo(x+Math.cos(a+.35)*10,y+Math.sin(a+.35)*10);ctx.closePath();ctx.fill();
        });
      }
      const lbl=a.value!=null?`${a.value}${a.unit}`:cpx>0?`~${(Math.hypot((a.x2-a.x1)*W,(a.y2-a.y1)*H)/cpx).toFixed(1)}mm`:null;
      if(lbl){
        const cx=(a.x1+a.x2)/2*W,cy=(a.y1+a.y2)/2*H-8;
        ctx.fillStyle='rgba(0,0,0,.6)'; const tw=ctx.measureText(lbl).width+10;
        ctx.fillRect(cx-tw/2,cy-9,tw,13); ctx.fillStyle=col;
        ctx.font="bold 8px 'JetBrains Mono',monospace"; ctx.textAlign='center'; ctx.fillText(lbl,cx,cy);
      }
    }
    else if(a.type==='arr'){
      ctx.beginPath();ctx.moveTo(a.x1*W,a.y1*H);ctx.lineTo(a.x2*W,a.y2*H);ctx.stroke();
      const ang=Math.atan2((a.y2-a.y1)*H,(a.x2-a.x1)*W);
      ctx.beginPath();ctx.moveTo(a.x2*W,a.y2*H);
      ctx.lineTo(a.x2*W+Math.cos(ang+Math.PI-.35)*13,a.y2*H+Math.sin(ang+Math.PI-.35)*13);
      ctx.lineTo(a.x2*W+Math.cos(ang+Math.PI+.35)*13,a.y2*H+Math.sin(ang+Math.PI+.35)*13);
      ctx.closePath();ctx.fill();
    }
    else if(a.type==='rect'){
      const x=Math.min(a.x1,a.x2)*W,y=Math.min(a.y1,a.y2)*H,w=Math.abs(a.x2-a.x1)*W,h=Math.abs(a.y2-a.y1)*H;
      ctx.fillStyle=col+'22';ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h);
    }
    else if(a.type==='circ'){
      const cx=(a.x1+a.x2)/2*W,cy=(a.y1+a.y2)/2*H,rx=Math.abs(a.x2-a.x1)/2*W,ry=Math.abs(a.y2-a.y1)/2*H;
      ctx.fillStyle=col+'22';ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    }
    /* label */
    if(a.label){
      let lx=a.x!=null?a.x*W:(a.x1+a.x2)/2*W;
      let ly=a.y!=null?a.y*H-14:(a.y1+a.y2)/2*H-14;
      ctx.fillStyle='rgba(0,0,0,.7)'; const tw=ctx.measureText(a.label).width+8;
      ctx.fillRect(lx-tw/2,ly-9,tw,12); ctx.fillStyle=col;
      ctx.font="bold 8px Inter"; ctx.textAlign='center'; ctx.fillText(a.label,lx,ly);
    }
  };

  useEffect(()=>{const iv=setInterval(draw,90);draw();return()=>clearInterval(iv);},[draw]);

  const ptToSeg=(px,py,x1,y1,x2,y2)=>{const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;if(!l2)return Math.hypot(px-x1,py-y1);const t=clamp(((px-x1)*dx+(py-y1)*dy)/l2,0,1);return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));};

  const onDown=e=>{
    e.preventDefault(); const p=gp(e);
    const def=TOOLS.find(t=>t.id===tool); if(!def)return;
    if(def.n===1){setAnns(a=>[...a,{id:uid(),type:tool,x:p.x,y:p.y,color,label:''}]);return;}
    if(DRAG.includes(tool)){setDrag({s:p,c:p});return;}
    if(def.n===2){
      if(pts.length===0){setPts([p]);}
      else{
        const p1=pts[0];
        if(tool==='calib'){onCalib({x1:p1.x,y1:p1.y,x2:p.x,y2:p.y});}
        else setAnns(a=>[...a,{id:uid(),type:tool,x1:p1.x,y1:p1.y,x2:p.x,y2:p.y,color,label:''}]);
        setPts([]);
      }
    }
  };
  const onMove=e=>{
    const p=gp(e);
    if(drag)setDrag(d=>({...d,c:p}));
    const c=cv.current; if(!c)return;
    const W=c.width,H=c.height;
    const fi=anns.findIndex(a=>{
      if(a.x!=null)return Math.hypot((a.x-p.x)*W,(a.y-p.y)*H)<12;
      if(a.x1!=null)return ptToSeg(p.x*W,p.y*H,a.x1*W,a.y1*H,a.x2*W,a.y2*H)<10;
      return false;
    });
    setHov(fi>=0?fi:null);
  };
  const onUp=e=>{
    if(drag){
      const p=gp(e); const p1=drag.s,p2=drag.c||p;
      if(Math.abs(p2.x-p1.x)>.01&&Math.abs(p2.y-p1.y)>.01){
        if(tool==='crop')onCrop({p1,p2});
        else setAnns(a=>[...a,{id:uid(),type:tool,x1:Math.min(p1.x,p2.x),y1:Math.min(p1.y,p2.y),x2:Math.max(p1.x,p2.x),y2:Math.max(p1.y,p2.y),color,label:''}]);
      }
      setDrag(null);
    }
  };

  return <canvas ref={cv} width={640} height={480} className="nc"
    style={{width:'100%',height:'100%',display:'block',cursor:tool==='sel'?'default':'crosshair'}}
    onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp}
    onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}/>;
}

/* ══════════════════════════════════════════
   2.  VISTA 2D — dibujo técnico
══════════════════════════════════════════ */
function View2D({anns,segs,objName}){
  const cv=useRef(null);
  useEffect(()=>{
    const c=cv.current; if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#0c0f1e'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(100,130,200,.07)'; ctx.lineWidth=.5;
    for(let x=0;x<W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    const mg=44,oW=W-mg*2,oH=H-mg*2-50;
    const gd=ax=>{const a=anns.find(a=>a.axis===ax&&a.value!=null);return a?{mm:toMM(a.value,a.unit),lbl:`${a.value}${a.unit}`}:null;};
    const wd=gd('width'),hd=gd('height'),dd=gd('depth');

    const dl=(x1,y1,x2,y2,lbl,off=14)=>{
      const ang=Math.atan2(y2-y1,x2-x1),nx=Math.cos(ang+Math.PI/2)*off,ny=Math.sin(ang+Math.PI/2)*off;
      ctx.strokeStyle='#ff4455'; ctx.lineWidth=.8; ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(x1+nx,y1+ny);ctx.lineTo(x2+nx,y2+ny);ctx.stroke();
      [[x1,y1],[x2,y2]].forEach(([x,y])=>{ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+nx,y+ny);ctx.stroke();});
      const a=[x1+nx,y1+ny],b=[x2+nx,y2+ny];
      const ang2=Math.atan2(b[1]-a[1],b[0]-a[0]);
      [[a,ang2+Math.PI],[b,ang2]].forEach(([pt,aa])=>{
        ctx.beginPath();ctx.moveTo(pt[0],pt[1]);
        ctx.lineTo(pt[0]+Math.cos(aa-.3)*7,pt[1]+Math.sin(aa-.3)*7);
        ctx.lineTo(pt[0]+Math.cos(aa+.3)*7,pt[1]+Math.sin(aa+.3)*7);
        ctx.closePath();ctx.fillStyle='#ff4455';ctx.fill();
      });
      ctx.fillStyle='#ff4455';ctx.font="bold 8px 'JetBrains Mono',monospace";ctx.textAlign='center';
      ctx.fillText(lbl,(x1+x2)/2+nx,(y1+y2)/2+ny-3);
    };

    if(wd||hd){
      const vW=(wd?.mm)||100,vH=(hd?.mm)||100,vD=(dd?.mm)||vW*.6;
      const sc=Math.min(oW*.46/vW,oH*.52/vH)*.85;
      const rW=vW*sc,rH=vH*sc,rX=mg+(oW*.46-rW)/2,rY=mg+18;
      /* FRONTAL */
      ctx.fillStyle='rgba(80,120,255,.06)';ctx.fillRect(rX,rY,rW,rH);
      ctx.strokeStyle='#3366ff';ctx.lineWidth=1.5;ctx.strokeRect(rX,rY,rW,rH);
      ctx.fillStyle='#4466aa';ctx.font="bold 7px Inter";ctx.textAlign='left';ctx.fillText('FRONTAL',rX+2,rY-5);
      segs?.forEach(sg=>{
        const sx=rX+sg.x1*rW,sy=rY+sg.y1*rH,sw=(sg.x2-sg.x1)*rW,sh=(sg.y2-sg.y1)*rH;
        const col=sg.color||'#4466ff';
        ctx.fillStyle=col+'20';ctx.fillRect(sx,sy,sw,sh);
        ctx.strokeStyle=col;ctx.lineWidth=.8;ctx.setLineDash([3,2]);ctx.strokeRect(sx,sy,sw,sh);ctx.setLineDash([]);
        ctx.fillStyle=col;ctx.font="bold 6px Inter";ctx.textAlign='center';ctx.fillText((sg.name||'').slice(0,14),sx+sw/2,sy-3);
      });
      if(wd)dl(rX,rY+rH,rX+rW,rY+rH,wd.lbl,17);
      if(hd)dl(rX,rY,rX,rY+rH,hd.lbl,-25);
      /* LATERAL */
      if(dd){
        const sX=mg+oW*.5+6,sW=vD*sc,sH=vH*sc;
        ctx.fillStyle='rgba(80,120,255,.04)';ctx.fillRect(sX,rY,sW,sH);
        ctx.strokeStyle='#3366ff';ctx.lineWidth=1.2;ctx.strokeRect(sX,rY,sW,sH);
        ctx.fillStyle='#4466aa';ctx.font="bold 7px Inter";ctx.textAlign='left';ctx.fillText('LATERAL',sX+2,rY-5);
        dl(sX,rY+sH,sX+sW,rY+sH,dd.lbl,14);
      }
      /* PLANTA */
      if(wd&&dd){
        const pY=rY+rH+32,pW=vW*sc,pD=vD*sc;
        if(pY+pD<H-8){
          ctx.fillStyle='rgba(80,120,255,.04)';ctx.fillRect(rX,pY,pW,pD);
          ctx.strokeStyle='#3366ff';ctx.lineWidth=1.2;ctx.strokeRect(rX,pY,pW,pD);
          ctx.fillStyle='#4466aa';ctx.font="bold 7px Inter";ctx.textAlign='left';ctx.fillText('PLANTA',rX+2,pY-5);
          dl(rX,pY+pD,rX+pW,pY+pD,wd.lbl,14);
          dl(rX,pY,rX,pY+pD,dd.lbl,-20);
        }
      }
      /* cajetín */
      const tbX=W-mg-128,tbY=H-54,tbW=128,tbH=48;
      ctx.fillStyle='rgba(10,15,40,.9)';ctx.fillRect(tbX,tbY,tbW,tbH);
      ctx.strokeStyle='#3366ff';ctx.lineWidth=1;ctx.strokeRect(tbX,tbY,tbW,tbH);
      ctx.strokeRect(tbX,tbY+16,tbW,0);ctx.strokeRect(tbX,tbY+32,tbW,0);
      ctx.fillStyle='#5577cc';ctx.font="bold 8px Inter";ctx.textAlign='center';
      ctx.fillText((objName||'OBJETO').toUpperCase().slice(0,18),tbX+tbW/2,tbY+12);
      ctx.fillStyle='#3355aa';ctx.font="7px Inter";
      ctx.fillText(new Date().toLocaleDateString('es-ES'),tbX+tbW/2,tbY+25);
      ctx.fillText('MEDISCAN 3D PRO',tbX+tbW/2,tbY+42);
    } else if(segs?.length){
      ctx.fillStyle='#4466aa';ctx.font="bold 7px Inter";ctx.textAlign='center';
      ctx.fillText('VISTA AUTOMÁTICA — '+(objName||'').toUpperCase(),W/2,mg-14);
      segs.forEach(sg=>{
        const col=sg.color||'#4466ff';
        const sx=mg+sg.x1*oW,sy=mg+sg.y1*oH,sw=(sg.x2-sg.x1)*oW,sh=(sg.y2-sg.y1)*oH;
        ctx.fillStyle=col+'25';ctx.fillRect(sx,sy,sw,sh);
        ctx.strokeStyle=col;ctx.lineWidth=1.2;ctx.setLineDash([4,2]);ctx.strokeRect(sx,sy,sw,sh);ctx.setLineDash([]);
        ctx.fillStyle=col;ctx.font="bold 6px Inter";ctx.textAlign='center';ctx.fillText((sg.name||'').slice(0,18),sx+sw/2,sy-3);
      });
    } else {
      ctx.fillStyle='#1a2540';ctx.font="10px Inter";ctx.textAlign='center';
      ctx.fillText('Sin datos de medición',W/2,H/2-8);
      ctx.fillStyle='#111d30';ctx.font="8px Inter";ctx.fillText('Añade anotaciones con ejes o identifica con IA',W/2,H/2+10);
    }
  },[anns,segs,objName]);
  return <canvas ref={cv} width={360} height={270} style={{width:'100%',height:'100%',display:'block'}}/>;
}

/* ══════════════════════════════════════════
   3. VISTA 3D — Three.js con múltiples formas
══════════════════════════════════════════ */
function View3D({anns,segs,shape}){
  const el=useRef(null);
  useEffect(()=>{
    if(!el.current||!window.THREE)return;
    const THREE=window.THREE, E=el.current;
    const W=E.clientWidth||320,H=E.clientHeight||230;
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
    renderer.setSize(W,H); renderer.shadowMap.enabled=true;
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setClearColor(0x09090f,1);
    E.innerHTML=''; E.appendChild(renderer.domElement);

    const scene=new THREE.Scene();
    scene.fog=new THREE.FogExp2(0x09090f,.04);
    const camera=new THREE.PerspectiveCamera(44,W/H,.05,200);

    const gd=ax=>{const a=anns.find(a=>a.axis===ax&&a.value!=null);return a?Math.max(toMM(a.value,a.unit),1):100;};
    const rW=gd('width'),rH=gd('height'),rD=gd('depth');
    const mx=Math.max(rW,rH,rD,1),sc=2.2/mx;
    const sW=rW*sc,sH=rH*sc,sD=rD*sc;

    camera.position.set(sW*2.2+.5,sH*1.8+.3,sD*2.2+.5);
    camera.lookAt(0,sH*.3,0);

    /* Lights */
    scene.add(new THREE.AmbientLight(0x344060,.9));
    const kl=new THREE.DirectionalLight(0xfff8f0,2.2);
    kl.position.set(6,12,5);kl.castShadow=true;kl.shadow.mapSize.set(1024,1024);scene.add(kl);
    scene.add(Object.assign(new THREE.DirectionalLight(0x4466cc,.5),{position:{x:-5,y:4,z:-8}}));

    /* Floor */
    const fl=new THREE.Mesh(new THREE.PlaneGeometry(16,16),new THREE.MeshStandardMaterial({color:0x080c18,roughness:.95}));
    fl.rotation.x=-Math.PI/2;fl.position.y=-sH/2-.02;fl.receiveShadow=true;scene.add(fl);
    scene.add(new THREE.GridHelper(16,16,0x1a2540,0x0f1628));

    const mat=(col=0x1a44aa,op=.88)=>new THREE.MeshStandardMaterial({color:col,metalness:.45,roughness:.45,transparent:op<1,opacity:op,side:THREE.DoubleSide});
    const edg=col=>new THREE.LineBasicMaterial({color:col||0x00ddcc});
    const addEdge=(geo,col,px=0,py=0,pz=0)=>{const l=new THREE.LineSegments(new THREE.EdgesGeometry(geo),edg(col));l.position.set(px,py,pz);scene.add(l);};
    const box=(w,h,d,x=0,y=0,z=0,col=0x1a44aa)=>{
      const g=new THREE.BoxGeometry(w,h,d);
      const m=new THREE.Mesh(g,mat(col));m.position.set(x,y,z);m.castShadow=true;scene.add(m);
      addEdge(g,0x00ddcc,x,y,z);
    };
    const cyl=(r,h,col=0x1a44aa)=>{const g=new THREE.CylinderGeometry(r,r,h,36);const m=new THREE.Mesh(g,mat(col));m.castShadow=true;scene.add(m);addEdge(g,0x00ddcc);};

    /* corners dots */
    const dg=new THREE.SphereGeometry(.04,8,8);
    const dm=new THREE.MeshBasicMaterial({color:0x00e5c4});
    [-1,1].forEach(a=>[-1,1].forEach(b=>[-1,1].forEach(c=>{const d=new THREE.Mesh(dg,dm);d.position.set(a*sW/2,b*sH/2,c*sD/2);scene.add(d);})));

    /* Shape switch — same as original */
    const sh=shape||'box';
    if(sh==='table'){
      const th=Math.max(sH*.09,.04),lw=Math.max(Math.min(sW,sD)*.08,.03),lh=sH-th;
      box(sW,th,sD,0,sH/2-th/2,0,0x1a44cc);
      [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([a,b])=>box(lw,lh,lw,a*(sW/2-lw/2)*.85,-sH/2+lh/2,b*(sD/2-lw/2)*.85,0x0a2266));
    } else if(sh==='cylinder'||sh==='pipe'||sh==='tube'){
      cyl(Math.min(sW,sD)/2,sH);
    } else if(sh==='sphere'||sh==='ball'){
      const r=Math.min(sW,sH,sD)/2;
      const m=new THREE.Mesh(new THREE.SphereGeometry(r,32,32),mat());m.castShadow=true;scene.add(m);
    } else if(sh==='cone'){
      const g=new THREE.ConeGeometry(Math.min(sW,sD)/2,sH,28);
      const m=new THREE.Mesh(g,mat());m.castShadow=true;scene.add(m);addEdge(g,0x00ddcc);
    } else if(sh==='chair'){
      const th=.04,lw=.05,sy2=sH*.45,bkh=sH-sy2;
      box(sW,th,sD,0,-sH/2+sy2,0);
      box(sW,bkh,th,0,-sH/2+sy2+bkh/2+th/2,-sD/2+th/2);
      [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([a,b])=>box(lw,sy2,lw,a*(sW/2-lw/2)*.8,-sH/2+sy2/2,b*(sD/2-lw/2)*.8));
    } else if(segs?.length&&!anns.find(a=>a.axis==='width'&&a.value)){
      /* AI segments → part boxes */
      segs.forEach((sg,i)=>{
        const sw2=(sg.x2-sg.x1)*2,sh2=(sg.y2-sg.y1)*2;
        const g=new THREE.BoxGeometry(Math.max(sw2,.15),Math.max(sh2,.15),sD*.4);
        const col=new THREE.Color(sg.color||COLS[i%COLS.length]);
        const m=new THREE.Mesh(g,mat(col.getHex(),.8));m.castShadow=true;
        m.position.set((sg.x1+sg.x2)*1-2,(sg.y1+sg.y2)*1-2,0);scene.add(m);
        addEdge(g,col.getHex(),m.position.x,m.position.y,0);
      });
    } else {
      box(sW,sH,sD);
    }

    /* Drag rotate */
    let drag=false,lx=0,ly=0,ry=.5,rx=.2,zoom=1;
    const px=e=>e.touches?e.touches[0].clientX:e.clientX;
    const py2=e=>e.touches?e.touches[0].clientY:e.clientY;
    const dn=e=>{drag=true;lx=px(e);ly=py2(e);};
    const mv=e=>{if(!drag)return;ry+=(px(e)-lx)*.012;rx=clamp(rx+(py2(e)-ly)*.012,-.8,.8);lx=px(e);ly=py2(e);};
    const up=()=>drag=false;
    const wh=e=>{zoom=clamp(zoom+e.deltaY*.001,.25,3);};
    renderer.domElement.addEventListener('mousedown',dn);
    renderer.domElement.addEventListener('touchstart',dn,{passive:true});
    window.addEventListener('mousemove',mv); window.addEventListener('touchmove',mv,{passive:true});
    window.addEventListener('mouseup',up); window.addEventListener('touchend',up);
    renderer.domElement.addEventListener('wheel',wh,{passive:true});

    let rafId;
    const anim=()=>{
      rafId=requestAnimationFrame(anim);
      if(!drag)ry+=.005;
      camera.position.set(Math.sin(ry)*(sW*2.2+.5)*zoom,(sH*1.8+.3)+rx*2,Math.cos(ry)*(sD*2.2+.5)*zoom);
      camera.lookAt(0,sH*.3,0);
      renderer.render(scene,camera);
    };
    anim();
    return()=>{
      cancelAnimationFrame(rafId); renderer.dispose();
      renderer.domElement.removeEventListener('mousedown',dn);
      renderer.domElement.removeEventListener('touchstart',dn);
      window.removeEventListener('mousemove',mv); window.removeEventListener('touchmove',mv);
      window.removeEventListener('mouseup',up); window.removeEventListener('touchend',up);
    };
  },[anns,segs,shape]);
  return <div ref={el} style={{width:'100%',height:'100%',borderRadius:8,overflow:'hidden',touchAction:'none'}}/>;
}

/* ══════════════════════════════════════════

function CompareView({imgA,imgB,annsA,annsB,calibA,calibB,onLoadA,onLoadB}){
  const faRef=useRef(null); const fbRef=useRef(null);
  const [split,setSplit]=useState(50); const [dragging,setDragging]=useState(false);
  const onDivDown=e=>{e.preventDefault();setDragging(true);};
  useEffect(()=>{
    if(!dragging)return;
    const mv=e=>{
      const x=e.touches?e.touches[0].clientX:e.clientX;
      const wrap=document.getElementById('cmpwrap');
      if(!wrap)return;
      const r=wrap.getBoundingClientRect();
      setSplit(clamp(((x-r.left)/r.width)*100,15,85));
    };
    const up=()=>setDragging(false);
    window.addEventListener('mousemove',mv); window.addEventListener('touchmove',mv,{passive:true});
    window.addEventListener('mouseup',up); window.addEventListener('touchend',up);
    return()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('touchmove',mv);window.removeEventListener('mouseup',up);window.removeEventListener('touchend',up);};

  const statPanel=(img,anns,calibPx,label,col,onLoad,fRef)=><div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <div style={{display:'flex',alignItems:'center',gap:5,padding:'4px 8px',background:'rgba(0,0,0,.4)',borderBottom:'1px solid #111'}}>

      {img?<img src={img} style={{width:'100%',height:'100%',objectFit:'contain'}}/>
        :<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',flexDirection:'column',gap:8,color:'#334'}}>
          <div style={{fontSize:28}}>📷</div><div style={{fontSize:9}}>Sin imagen</div>
          <button onClick={()=>fRef.current?.click()} style={{padding:'6px 14px',background:'linear-gradient(135deg,#ff6600,#ffaa00)',color:'#000',border:'none',borderRadius:7,fontSize:10,fontWeight:800}}>Cargar</button>
        </div>}
    </div>
  </div>;

  return <div id="cmpwrap" style={{display:'flex',height:'100%',userSelect:'none'}}>
    {statPanel(imgA,annsA,calibA,'A','#ff9500',onLoadA,faRef)}
    <div onMouseDown={onDivDown} onTouchStart={onDivDown}
      style={{width:5,background:'linear-gradient(180deg,#ff6600,#ffaa00)',cursor:'ew-resize',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:2}}>
      <div style={{width:18,height:18,background:'#ff9500',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:900,color:'#000'}}>⇔</div>
    </div>
    {statPanel(imgB,annsB,calibB,'B','#44aaff',onLoadB,fbRef)}
  </div>;
}

/* ══════════════════════════════════════════
   5. TABLA DE MEDIDAS — editable
══════════════════════════════════════════ */
function MeasureTable({anns,calibPx,unit,onEdit,onDel,W=640,H=480}){
  const rows=useMemo(()=>anns.map((a,i)=>{
    let distMM=null;
    if(calibPx>0&&a.x1!=null)distMM=Math.hypot((a.x2-a.x1)*W,(a.y2-a.y1)*H)/calibPx;
    if(a.value!=null)distMM=toMM(a.value,a.unit||'mm');
    return {...a,i,distMM};
  }),[anns,calibPx,W,H]);
  if(!rows.length)return <div style={{padding:18,textAlign:'center',color:'#1a2030',fontSize:10}}>Sin medidas todavía.</div>;
  return <table className="mtb">
    <thead><tr><th>#</th><th>Tipo</th><th>Etiqueta</th><th>Valor</th><th>Real ({unit||'mm'})</th><th></th></tr></thead>
    <tbody>{rows.map(r=><tr key={r.id}>
      <td style={{color:'#ff9500',fontFamily:'JetBrains Mono',fontWeight:700}}>{r.i+1}</td>
      <td><span style={{background:'rgba(255,150,0,.1)',color:'#ff9500',padding:'1px 5px',borderRadius:4,fontSize:7,fontWeight:700}}>{r.type}</span></td>
      <td style={{maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.label||<span style={{color:'#223'}}>—</span>}</td>
      <td style={{fontFamily:'JetBrains Mono',fontSize:9,color:'#ffcc66'}}>{r.value!=null?`${r.value}${r.unit||'mm'}`:'—'}</td>
      <td style={{fontFamily:'JetBrains Mono',fontSize:9,color:'#6688aa'}}>{r.distMM!=null?fmtV(r.distMM,unit||'mm'):'—'}</td>
      <td>
        <button onClick={()=>onEdit(r.i)} style={{background:'rgba(100,150,255,.1)',border:'1px solid rgba(100,150,255,.2)',color:'#88aaff',borderRadius:4,padding:'2px 5px',fontSize:8}}>✏</button>
        {' '}
        <button onClick={()=>onDel(r.i)} style={{background:'rgba(255,50,50,.1)',border:'1px solid rgba(255,50,50,.2)',color:'#ff4466',borderRadius:4,padding:'2px 5px',fontSize:8}}>✕</button>
      </td>
    </tr>)}</tbody>
  </table>;
}

async function doExportPDF({img,anns,segs,objName,calibPx,unit}){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,mg=14;
  /* Header bar */
  doc.setFillColor(9,9,20); doc.rect(0,0,W,24,'F');
  doc.setTextColor(255,150,0); doc.setFontSize(15); doc.setFont('helvetica','bold');
  doc.text('MediScan 3D Pro',mg,15);
  doc.setTextColor(100,120,180); doc.setFontSize(7.5); doc.setFont('helvetica','normal');
  doc.text(`Generado: ${new Date().toLocaleString('es-ES')}`,W-mg,15,{align:'right'});
  doc.setTextColor(70,90,140);
  doc.text(`Objeto: ${objName||'—'} · Unidad: ${unit||'mm'} · Cal: ${calibPx>0?calibPx.toFixed(2)+'px/mm':'sin calibrar'}`,mg,21);
  let y=30;
  /* Image */
  if(img){
    try{
      const c=document.createElement('canvas'); c.width=640;c.height=480;
      const ctx=c.getContext('2d'),im=new Image(); im.crossOrigin='anonymous';
      await new Promise(r=>{im.onload=r;im.onerror=r;im.src=img;});
      ctx.drawImage(im,0,0,640,480);
      const iW=W-mg*2, iH=iW*.75;
      doc.addImage(c.toDataURL('image/jpeg',.88),'JPEG',mg,y,iW,iH); y+=iH+5;
    }catch(e){y+=3;}
  }
  /* Measurements */
  if(anns.length){
    if(y>240){doc.addPage();y=20;}
    doc.setTextColor(255,150,0);doc.setFontSize(9);doc.setFont('helvetica','bold');
    doc.text('TABLA DE MEDIDAS',mg,y);y+=4;
    const cols=[14,22,60,38,38,20];
    const heads=['#','Tipo','Etiqueta','Valor','Calc. ('+(unit||'mm')+')'];
    doc.setFillColor(15,18,40);doc.rect(mg,y,W-mg*2,6,'F');
    doc.setTextColor(80,110,190);doc.setFontSize(6.5);doc.setFont('helvetica','bold');
    let cx=mg+2; heads.forEach((h,i)=>{doc.text(h,cx,y+4.5);cx+=cols[i];});y+=6;
    anns.forEach((a,i)=>{
      if(y>277){doc.addPage();y=20;}
      let dM=null;
      if(calibPx>0&&a.x1!=null)dM=Math.hypot((a.x2-a.x1)*640,(a.y2-a.y1)*480)/calibPx;
      if(a.value!=null)dM=toMM(a.value,a.unit||'mm');
      doc.setFillColor(i%2?10:14,i%2?14:18,i%2?32:40);
      doc.rect(mg,y,W-mg*2,5.5,'F');
      doc.setTextColor(180,200,230);doc.setFontSize(6.5);doc.setFont('helvetica','normal');
      cx=mg+2;
      [String(i+1),a.type,a.label||'—',a.value!=null?`${a.value} ${a.unit||'mm'}`:'—',dM!=null?fmtV(dM,unit||'mm'):'—'].forEach((v,ci)=>{
        doc.text(String(v).slice(0,cols[ci]/1.6),cx,y+3.8);cx+=cols[ci];
      });y+=5.5;
    });y+=4;
  }
  /* Segments */
  if(segs.length){
    if(y>250){doc.addPage();y=20;}
    doc.setTextColor(255,150,0);doc.setFontSize(9);doc.setFont('helvetica','bold');
    doc.text('PARTES IDENTIFICADAS (IA)',mg,y);y+=4;
    segs.forEach((s,i)=>{
      if(y>277){doc.addPage();y=20;}
      doc.setFillColor(i%2?10:14,i%2?14:18,i%2?32:40);doc.rect(mg,y,W-mg*2,5.5,'F');
      doc.setTextColor(160,190,220);doc.setFontSize(6.5);doc.setFont('helvetica','normal');
      doc.text(`${i+1}. ${s.name||'Segmento'}`,mg+2,y+3.8);
      doc.setTextColor(80,110,160);doc.text((s.hint||'').slice(0,70),mg+48,y+3.8);
      y+=5.5;
    });y+=4;
  }
  /* Footer */
  const tp=doc.internal.getNumberOfPages();
  for(let p=1;p<=tp;p++){
    doc.setPage(p);
    doc.setFillColor(8,8,18);doc.rect(0,289,W,8,'F');
    doc.setTextColor(50,60,100);doc.setFontSize(6.5);doc.setFont('helvetica','normal');
    doc.text('MediScan 3D Pro · medición industrial inteligente',mg,294);
    doc.text(`${p}/${tp}`,W-mg,294,{align:'right'});
  }
  doc.save(`mediscan_${(objName||'informe').replace(/\s+/g,'_')}.pdf`);
}

/* ══════════════════════════════════════════
   AI HELPERS

async function aiIdentify(b64){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,
      system:`${IND_KB} Responde SOLO con JSON válido: {"name":"nombre objeto","shape":"box|cylinder|sphere|cone","parts":[{"name":"nombre","x1":0.1,"y1":0.1,"x2":0.5,"y2":0.5,"hint":"desc técnica","measurable":true}]}. Máx 8 partes. Sin markdown ni texto extra.`,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
        {type:'text',text:'Identifica este objeto industrial. Solo JSON.'}
      ]}]
    })
  });
  const d=await res.json();
  if(!res.ok)throw new Error(d.error?.message||`HTTP ${res.status}`);
  const txt=(d.content?.find(c=>c.type==='text')?.text||'').replace(/```json|```/g,'').trim();
  return JSON.parse(txt);
}

async function aiMeasureGroq(hint,objName,key){
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
    body:JSON.stringify({model:'meta-llama/llama-4-scout-17b-16e-instruct',max_tokens:300,
      messages:[
        {role:'system',content:`${IND_KB} Responde SOLO JSON: {"width_mm":N,"height_mm":N,"depth_mm":N,"notes":"texto corto","confidence":"alta|media|baja"}. Sin texto extra.`},
        {role:'user',content:`Objeto: ${objName||'industrial'}\nParte: ${hint}\nEstima dimensiones típicas en mm.`}
      ]
    })
  });
  const d=await res.json();
  const txt=(d.choices?.[0]?.message?.content||'{}').replace(/```json|```/g,'').trim();
  return JSON.parse(txt);
}

  const [anns,setAnns]=useState([]);
  const [annsB,setAnnsB]=useState([]);
  /* Segments (AI) */
  const [segs,setSegs]=useState([]);
  /* Metadata */
  const [objName,setObjName]=useState('');
  const [shape,setShape]=useState('box');
  /* Tool */
  const [tool,setTool]=useState('sel');
  const [color,setColor]=useState('#ff9500');
  const [unit,setUnit]=useState('mm');
  /* Calibration */
  const [calibPx,setCalibPx]=useState(0);
  const [calibPxB,setCalibPxB]=useState(0);
  const [calibLine,setCalibLine]=useState(null);
  const [calibInp,setCalibInp]=useState({v:'',u:'mm'});
  /* Modals */
  const [cropM,setCropM]=useState(null);
  const [editM,setEditM]=useState(null); // {idx, ann}
  const [saveM,setSaveM]=useState(false);
  const [saveName,setSaveName]=useState('');
  /* Views */
  const [view,setView]=useState('scan'); // scan|2d|3d|compare|projects|history
  const [btab,setBtab]=useState('tools'); // tools|anns|ai|table
  /* AI */
  const [aiLoad,setAiLoad]=useState(false);
  const [aiMsg,setAiMsg]=useState('');
  const [groqKey,setGroqKey]=useState(()=>LS.get('ms3_k',''));
  /* Projects */
  const [projects,setProjects]=useState(()=>LS.get('ms3_projs',[]));
  /* History (AI scans) */
  const [history,setHistory]=useState(()=>LS.get('ms3_hist',[]));

  const fileRef=useRef(null);
  const fileBRef=useRef(null);

  /* ── Load image ── */
  const loadImg=(file,slot='a')=>{
    if(!file)return;
    const r=new FileReader(); r.onload=e=>{
      if(slot==='a'){setImg(e.target.result);setAnns([]);setSegs([]);setCalibPx(0);setObjName('');}
      else{setImgB(e.target.result);setAnnsB([]);setCalibPxB(0);}
    }; r.readAsDataURL(file);
  };

  /* ── Calibration ── */
  const confirmCalib=()=>{
    const v=parseFloat(calibInp.v); if(!v||!calibLine)return;
    const mm=toMM(v,calibInp.u);
    const px=Math.hypot((calibLine.x2-calibLine.x1)*640,(calibLine.y2-calibLine.y1)*480);
    setCalibPx(px/mm);
    setAnns(a=>[...a,{id:uid(),type:'calib',x1:calibLine.x1,y1:calibLine.y1,x2:calibLine.x2,y2:calibLine.y2,color:'#ffdd00',label:`⚖ ${v}${calibInp.u}`,value:v,unit:calibInp.u}]);
    setCalibLine(null);
  };

  /* ── Crop ── */
  const applyCrop=({p1,p2})=>{
    if(!img)return;
    const im=new Image(); im.crossOrigin='anonymous';
    im.onload=()=>{
      const c=document.createElement('canvas');
      const x1=Math.min(p1.x,p2.x),y1=Math.min(p1.y,p2.y),x2=Math.max(p1.x,p2.x),y2=Math.max(p1.y,p2.y);
      c.width=Math.round(im.width*(x2-x1)); c.height=Math.round(im.height*(y2-y1));
      c.getContext('2d').drawImage(im,im.width*x1,im.height*y1,c.width,c.height,0,0,c.width,c.height);
      setImg(c.toDataURL('image/jpeg',.93)); setAnns([]); setSegs([]); setCalibPx(0); setCropM(null);
    }; im.src=img;
  };

  /* ── AI identify ── */
  const runAI=async()=>{
    if(!img){setAiMsg('⚠ Carga una imagen primero');return;}
    setAiLoad(true); setAiMsg('Analizando imagen con Claude...');
    try{
      const b64=img.includes(',')? img.split(',')[1]: img;
      const res=await aiIdentify(b64);
      setObjName(n=>res.name||n);
      setShape(res.shape||'box');
      const ns=(res.parts||[]).map((p,i)=>({id:uid(),name:p.name,x1:p.x1,y1:p.y1,x2:p.x2,y2:p.y2,hint:p.hint,color:COLS[i%COLS.length],measurable:p.measurable}));
      setSegs(ns);
      setAiMsg(`✓ ${res.name} · ${ns.length} partes identificadas`);
      /* save to history */
      const entry={id:uid(),name:res.name||objName,date:now(),thumb:img.slice(0,300),anns,segs:ns};
      const nh=[entry,...history].slice(0,60); setHistory(nh); LS.set('ms3_hist',nh);
    }catch(e){setAiMsg('✗ Error: '+e.message);}
    setAiLoad(false);
  };

  /* ── Groq measure ── */
  const measureSeg=async(seg)=>{
    const k=groqKey||LS.get('ms3_k',''); if(!k){setAiMsg('⚠ Introduce la Groq API Key');setBtab('ai');return;}
    setAiLoad(true); setAiMsg(`Midiendo: ${seg.name}...`);
    try{
      const r=await aiMeasureGroq(seg.hint||seg.name,objName,k);
      const na=[];
      if(r.width_mm) na.push({id:uid(),type:'dim',x1:seg.x1,y1:(seg.y1+seg.y2)/2,x2:seg.x2,y2:(seg.y1+seg.y2)/2,color:seg.color,label:`An ${r.width_mm}mm`,value:r.width_mm,unit:'mm',axis:'width',partName:seg.name});
      if(r.height_mm) na.push({id:uid(),type:'dim',x1:(seg.x1+seg.x2)/2,y1:seg.y1,x2:(seg.x1+seg.x2)/2,y2:seg.y2,color:seg.color,label:`Al ${r.height_mm}mm`,value:r.height_mm,unit:'mm',axis:'height',partName:seg.name});
      setAnns(a=>[...a,...na]);
      setAiMsg(`✓ ${seg.name}: ${r.width_mm||'?'}×${r.height_mm||'?'}mm (${r.confidence||'?'})\n${r.notes||''}`);
    }catch(e){setAiMsg('✗ Error Groq: '+e.message);}
    setAiLoad(false);
  };

  /* ── Save project ── */
  const saveProject=()=>{
    const p={id:uid(),name:saveName||objName||`Proyecto ${projects.length+1}`,date:now(),
      img,anns,segs,calibPx,unit,objName,shape,thumb:img?.slice(0,400)||null};
    const np=[p,...projects]; setProjects(np); LS.set('ms3_projs',np);
    setSaveM(false); setSaveName(''); setAiMsg('💾 Proyecto guardado');
  };
  const loadProject=(p)=>{setImg(p.img);setAnns(p.anns||[]);setSegs(p.segs||[]);setCalibPx(p.calibPx||0);setUnit(p.unit||'mm');setObjName(p.objName||p.name||'');setShape(p.shape||'box');setView('scan');};
  const delProject=(id)=>{const np=projects.filter(p=>p.id!==id);setProjects(np);LS.set('ms3_projs',np);};

  /* ── Export JSON ── */
  const exportJSON=()=>{
    const d={name:objName,date:new Date().toISOString(),anns,segs,calibPx,unit,shape};
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:'application/json'}));
    a.download=`mediscan_${objName||'export'}.json`; a.click();
  };

  /* ── Ann ops ── */
  const delAnn=i=>setAnns(a=>a.filter((_,j)=>j!==i));
  const openEdit=i=>setEditM({idx:i,ann:{...anns[i]}});
  const saveEdit=()=>{if(!editM)return; setAnns(a=>a.map((x,i)=>i===editM.idx?editM.ann:x)); setEditM(null);};

  /* ── VIEWS ── */
  const VIEWS=[
    {id:'scan',icon:'📷',lbl:'Escanear'},
    {id:'2d',icon:'📐',lbl:'2D'},
    {id:'3d',icon:'🧊',lbl:'3D'},
    {id:'compare',icon:'⇔',lbl:'Comparar'},
    {id:'projects',icon:'📁',lbl:'Proyectos'},
    {id:'history',icon:'🕒',lbl:'Historial'},
  ];

  /* ─────────────── RENDER ─────────────── */
  return <div style={{display:'flex',flexDirection:'column',height:'100vh',maxWidth:480,margin:'0 auto',background:'#09090f',overflow:'hidden',position:'relative'}}>

    {/* ── TOP BAR ── */}
    <div style={{padding:'8px 10px 4px',borderBottom:'1px solid #0f1020',background:'#07080e',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <div style={{fontSize:12,fontWeight:800,color:'#ff9500',letterSpacing:.5,flexShrink:0}}>⬡ MediScan</div>
        <input value={objName} onChange={e=>setObjName(e.target.value)} placeholder="Nombre del objeto..."
          style={{flex:1,background:'transparent',border:'none',color:'#889',fontSize:10,fontWeight:500,minWidth:0}}/>
        <button onClick={()=>setSaveM(true)} title="Guardar proyecto"
          style={{background:'rgba(255,150,0,.12)',border:'1px solid rgba(255,150,0,.25)',color:'#ff9500',borderRadius:6,padding:'3px 7px',fontSize:11}}>💾</button>
        <button onClick={()=>doExportPDF({img,anns,segs,objName,calibPx,unit})} title="Exportar PDF"
          style={{background:'rgba(100,150,255,.1)',border:'1px solid rgba(100,150,255,.2)',color:'#88aaff',borderRadius:6,padding:'3px 7px',fontSize:10,fontWeight:700}}>PDF</button>
        <button onClick={exportJSON} title="Exportar JSON"
          style={{background:'rgba(0,200,100,.07)',border:'1px solid rgba(0,200,100,.18)',color:'#44cc88',borderRadius:6,padding:'3px 7px',fontSize:10,fontWeight:700}}>JSON</button>
      </div>
      {/* Nav */}
      <div style={{display:'flex',gap:3,marginTop:5,overflowX:'auto',paddingBottom:1}}>
        {VIEWS.map(v=><button key={v.id} onClick={()=>setView(v.id)} className={`ntab${view===v.id?' on':''}`}>{v.icon} {v.lbl}</button>)}
      </div>
    </div>

    {/* ── MAIN ── */}
    <div style={{flex:1,overflow:'hidden',position:'relative'}}>

      {/* SCAN */}
      {view==='scan'&&<div style={{width:'100%',height:'100%',position:'relative'}}
        onDrop={e=>{e.preventDefault();const f=e.dataTransfer?.files?.[0];if(f?.type.startsWith('image/'))loadImg(f);}}
        onDragOver={e=>e.preventDefault()}>
        {!img&&<div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,color:'#223'}}>
          <div style={{fontSize:38}}>📷</div>
          <div style={{fontSize:12,fontWeight:700,textAlign:'center'}}>Arrastra una imagen<br/>o toca para cargar</div>
          <button onClick={()=>fileRef.current?.click()} style={{padding:'10px 24px',background:'linear-gradient(135deg,#ff6600,#ffaa00)',color:'#000',borderRadius:10,fontWeight:800,fontSize:12,border:'none'}}>Cargar imagen</button>
        </div>}
        <AnnotCanvas img={img} tool={tool} color={color} anns={anns} setAnns={setAnns} calibPx={calibPx}
          onCalib={l=>setCalibLine(l)} onCrop={m=>setCropM(m)}/>
        {/* AI scan bar */}
        {aiLoad&&<div style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'hidden'}}>
          <div style={{position:'absolute',left:0,right:0,height:2,background:'linear-gradient(90deg,transparent,#ff9500,transparent)',animation:'scanBar 1.6s ease-in-out infinite'}}/>
        </div>}
        {/* Segment overlays */}
        {segs.map(sg=><div key={sg.id} style={{position:'absolute',left:`${sg.x1*100}%`,top:`${sg.y1*100}%`,width:`${(sg.x2-sg.x1)*100}%`,height:`${(sg.y2-sg.y1)*100}%`,border:`1.5px solid ${sg.color}99`,borderRadius:3,pointerEvents:'none'}}>
          <div style={{position:'absolute',top:-13,left:0,fontSize:6.5,fontWeight:700,color:sg.color,background:'rgba(0,0,0,.75)',padding:'1px 4px',borderRadius:3,whiteSpace:'nowrap',maxWidth:90,overflow:'hidden',textOverflow:'ellipsis'}}>{sg.name}</div>
        </div>)}
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>loadImg(e.target.files[0],'a')}/>
      </div>}

      {/* 2D */}
      {view==='2d'&&<div style={{width:'100%',height:'100%',padding:6}}><View2D anns={anns} segs={segs} objName={objName}/></div>}

      {/* 3D */}
      {view==='3d'&&<div style={{width:'100%',height:'100%',padding:6,display:'flex',flexDirection:'column',gap:4}}>
        <div style={{flex:1}}><View3D anns={anns} segs={segs} shape={shape}/></div>
        <div style={{display:'flex',gap:4,padding:'0 2px',flexWrap:'wrap'}}>
          {['box','cylinder','sphere','cone','table','chair'].map(s=><button key={s} onClick={()=>setShape(s)}
            style={{padding:'3px 8px',borderRadius:5,background:shape===s?'rgba(255,150,0,.18)':'rgba(255,255,255,.04)',
              color:shape===s?'#ff9500':'#334',border:`1px solid ${shape===s?'rgba(255,150,0,.35)':'rgba(255,255,255,.06)'}`,fontSize:8,fontWeight:shape===s?700:400}}>
            {s}</button>)}
          <div style={{fontSize:8,color:'#223',alignSelf:'center',marginLeft:2}}>Arrastra para rotar</div>
        </div>
      </div>}

      {/* COMPARE */}
      {view==='compare'&&<CompareView imgA={img} imgB={imgB} annsA={anns} annsB={annsB} calibA={calibPx} calibB={calibPxB}
        onLoadA={f=>loadImg(f,'a')} onLoadB={f=>loadImg(f,'b')}/>}

      {/* PROJECTS */}
      {view==='projects'&&<div className="scr" style={{height:'100%',padding:10}}>
        <button onClick={()=>setSaveM(true)} style={{width:'100%',padding:'10px',background:'linear-gradient(135deg,#ff6600,#ffaa00)',color:'#000',border:'none',borderRadius:10,fontWeight:800,fontSize:12,marginBottom:10}}>
          + Guardar proyecto actual
        </button>
        {projects.length===0&&<div style={{textAlign:'center',color:'#1a2030',fontSize:10,padding:20}}>Sin proyectos guardados.</div>}
        {projects.map(p=><div key={p.id} className="pc" onClick={()=>loadProject(p)}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {p.thumb&&<img src={p.thumb} style={{width:42,height:42,borderRadius:6,objectFit:'cover',border:'1px solid #1a2030',flexShrink:0}}/>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,fontWeight:700,color:'#bbc'}}>{p.name}</div>
              <div style={{fontSize:8,color:'#336',marginTop:2}}>{p.date} · {(p.anns||[]).length} anot.</div>
            </div>
            <button onClick={e=>{e.stopPropagation();delProject(p.id);}}
              style={{background:'rgba(255,50,50,.1)',border:'1px solid rgba(255,50,50,.18)',color:'#ff4466',borderRadius:6,padding:'3px 7px',fontSize:9}}>✕</button>
          </div>
        </div>)}
      </div>}

      {/* HISTORY */}
      {view==='history'&&<div className="scr" style={{height:'100%'}}>
        {history.length===0&&<div style={{padding:20,textAlign:'center',color:'#1a2030',fontSize:10}}>Sin escaneos IA en el historial.</div>}
        {history.map((h,i)=><div key={h.id} style={{display:'flex',gap:8,padding:'8px 10px',borderBottom:'1px solid #0c0e1a',alignItems:'center',cursor:'pointer'}}
          onClick={()=>{setImg(h.img);setAnns(h.anns||[]);setSegs(h.segs||[]);setObjName(h.name||'');setView('scan');}}>
          {h.thumb&&<img src={h.thumb} style={{width:38,height:38,borderRadius:6,objectFit:'cover',border:'1px solid #141828',flexShrink:0}}/>}
          <div style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:'#aab'}}>{h.name||'Sin nombre'}</div>
            <div style={{fontSize:8,color:'#335',marginTop:2}}>{h.date} · {(h.segs||[]).length} partes IA</div>
          </div>
          <button onClick={e=>{e.stopPropagation();const nh=history.filter((_,j)=>j!==i);setHistory(nh);LS.set('ms3_hist',nh);}}
            style={{background:'rgba(255,50,50,.08)',border:'1px solid rgba(255,50,50,.15)',color:'#ff4466',borderRadius:5,padding:'2px 6px',fontSize:8}}>✕</button>
        </div>)}
      </div>}
    </div>

    {/* ── BOTTOM PANEL (solo en scan) ── */}
    {view==='scan'&&<div style={{flexShrink:0,background:'#07080e',borderTop:'1px solid #0f1020'}}>
      {/* Tabs */}
      <div style={{display:'flex',borderBottom:'1px solid #0c0e1a'}}>
        {[['tools','🛠 Herramientas'],['anns','📌 Anots'],['ai','🤖 IA'],['table','📊 Medidas']].map(([id,l])=>
          <button key={id} onClick={()=>setBtab(id)} className={`btab${btab===id?' on':''}`}>{l}</button>
        )}
      </div>

      {/* TOOLS */}
      {btab==='tools'&&<div className="scr" style={{maxHeight:195,padding:'7px 9px'}}>
        {/* Color row */}
        <div style={{display:'flex',gap:4,marginBottom:7,alignItems:'center'}}>
          <span style={{fontSize:7,color:'#336',fontWeight:700,marginRight:2}}>COLOR</span>
          {COLS.map(c=><div key={c} onClick={()=>setColor(c)}
            style={{width:17,height:17,borderRadius:'50%',background:c,cursor:'pointer',flexShrink:0,
              border:color===c?'2px solid #fff':'2px solid transparent'}}/>)}
        </div>
        {/* Tool groups */}
        {Object.entries(CATS).map(([cat,label])=>{
          const ts=TOOLS.filter(t=>t.cat===cat);
          return <div key={cat} style={{marginBottom:7}}>
            <div style={{fontSize:6.5,color:'#225',fontWeight:700,textTransform:'uppercase',letterSpacing:.06,marginBottom:4}}>{label}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
              {ts.map(t=><button key={t.id} className={`tb${tool===t.id?' act':''}`} onClick={()=>setTool(t.id)}>
                <span>{t.icon}</span>{t.lbl}
              </button>)}
            </div>
          </div>;
        })}
        {/* Unit */}
        <div style={{display:'flex',gap:4,marginTop:4,alignItems:'center'}}>
          <span style={{fontSize:7,color:'#336',fontWeight:700}}>UNIDAD</span>
          {Object.keys(UF).map(u=><button key={u} onClick={()=>setUnit(u)}
            style={{padding:'2px 7px',borderRadius:5,background:unit===u?'rgba(255,150,0,.15)':'rgba(255,255,255,.03)',
              color:unit===u?'#ff9500':'#225',border:`1px solid ${unit===u?'rgba(255,150,0,.35)':'rgba(255,255,255,.05)'}`,fontSize:8,fontWeight:unit===u?700:400}}>
            {u}</button>)}
        </div>
        <button onClick={()=>fileRef.current?.click()} style={{marginTop:7,width:'100%',padding:'7px',background:'rgba(255,255,255,.04)',border:'1px solid #111828',color:'#445',borderRadius:7,fontSize:9}}>
          📂 Cargar nueva imagen
        </button>
      </div>}

      {/* ANNS */}
      {btab==='anns'&&<div className="scr" style={{maxHeight:170}}>
        {anns.length===0&&<div style={{padding:14,textAlign:'center',color:'#1a2030',fontSize:9}}>Sin anotaciones.</div>}
        {anns.map((a,i)=><div key={a.id} style={{display:'flex',gap:5,padding:'5px 9px',borderBottom:'1px solid #0c0e1a',alignItems:'center'}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:a.color||'#ff9500',flexShrink:0}}/>
          <span style={{fontSize:8,color:'#ff9500',fontFamily:'JetBrains Mono',fontWeight:700,width:26,flexShrink:0}}>{a.type}</span>
          <span style={{flex:1,fontSize:8,color:'#556',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.label||'—'}</span>
          {a.value!=null&&<span style={{fontSize:8,color:'#cc9944',fontFamily:'JetBrains Mono',flexShrink:0}}>{a.value}{a.unit}</span>}
          <button onClick={()=>openEdit(i)} style={{background:'rgba(100,150,255,.1)',border:'1px solid rgba(100,150,255,.18)',color:'#88aaff',borderRadius:4,padding:'1px 4px',fontSize:8}}>✏</button>
          <button onClick={()=>delAnn(i)} style={{background:'rgba(255,50,50,.08)',border:'1px solid rgba(255,50,50,.15)',color:'#ff4466',borderRadius:4,padding:'1px 4px',fontSize:8}}>✕</button>
        </div>)}
        {anns.length>0&&<button onClick={()=>setAnns([])} style={{width:'100%',padding:'5px',background:'rgba(255,50,50,.05)',border:'none',color:'#441',fontSize:8,cursor:'pointer'}}>
          Borrar todas las anotaciones
        </button>}
      </div>}

      {/* AI */}
      {btab==='ai'&&<div className="scr" style={{maxHeight:215,padding:'8px 9px'}}>
        <button onClick={runAI} disabled={aiLoad}
          style={{width:'100%',padding:'9px',background:aiLoad?'#0e1020':'linear-gradient(135deg,#ff6600,#ffaa00)',
            color:aiLoad?'#334':'#000',border:'none',borderRadius:8,fontWeight:800,fontSize:12,marginBottom:7}}>
          {aiLoad?<><span className="spin" style={{display:'inline-block',marginRight:5}}>⟳</span>Analizando...</>:'🤖 Identificar con IA'}
        </button>
        {aiMsg&&<div style={{padding:'7px 9px',background:'rgba(255,150,0,.06)',border:'1px solid rgba(255,150,0,.12)',borderRadius:7,fontSize:8,color:'#aa8833',whiteSpace:'pre-wrap',marginBottom:7}}>
          {aiMsg}
        </div>}
        {segs.length>0&&<>
          <div style={{fontSize:7,color:'#336',fontWeight:700,textTransform:'uppercase',letterSpacing:.06,marginBottom:4}}>Partes detectadas</div>
          {segs.map(sg=><div key={sg.id} style={{display:'flex',gap:5,padding:'5px 7px',background:'rgba(255,255,255,.025)',borderRadius:6,marginBottom:3,alignItems:'center'}}>
            <div style={{width:7,height:7,borderRadius:2,background:sg.color,flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:9,fontWeight:700,color:'#bbc',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sg.name}</div>
              {sg.hint&&<div style={{fontSize:7,color:'#336',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sg.hint}</div>}
            </div>
            <button onClick={()=>measureSeg(sg)} style={{background:'rgba(80,200,80,.1)',border:'1px solid rgba(80,200,80,.18)',color:'#66cc66',borderRadius:5,padding:'2px 6px',fontSize:8,fontWeight:700,flexShrink:0}}>
              📏</button>
          </div>)}
          <div style={{fontSize:7,color:'#336',marginTop:5}}>💡 📏 usa Groq para estimar dimensiones típicas.</div>
        </>}
        {/* Groq key */}
        <div style={{marginTop:8}}>
          <div style={{fontSize:7,color:'#336',marginBottom:3}}>Groq API Key (para 📏 medir)</div>
          <input value={groqKey} onChange={e=>{setGroqKey(e.target.value);LS.set('ms3_k',e.target.value);}}
            placeholder="gsk_..."
            style={{width:'100%',padding:'6px 8px',background:'#080a14',border:'1px solid #141828',borderRadius:6,color:'#889',fontSize:9}}/>
        </div>
      </div>}

      {/* TABLE */}
      {btab==='table'&&<div className="scr" style={{maxHeight:200}}>
        <MeasureTable anns={anns} calibPx={calibPx} unit={unit} onEdit={openEdit} onDel={delAnn}/>
        {calibPx===0&&anns.length>0&&<div style={{padding:'5px 9px',fontSize:7.5,color:'#443',background:'rgba(255,200,0,.04)',borderTop:'1px solid rgba(255,200,0,.08)'}}>
          ⚖ Calibra la escala para ver medidas reales.
        </div>}
        {anns.length>0&&<button onClick={()=>{
          const csv=['#,tipo,etiqueta,valor,unidad'].concat(anns.map((a,i)=>`${i+1},${a.type},${a.label||''},${a.value||''},${a.unit||''}`)).join('\n');
          const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
          a.download=`medidas_${objName||'export'}.csv`; a.click();
        }} style={{width:'100%',padding:'5px',background:'rgba(100,200,100,.05)',border:'none',color:'#336',fontSize:8,cursor:'pointer'}}>
          ⬇ Exportar medidas CSV
        </button>}
      </div>}
    </div>}

    {/* ══ MODALES ══ */}

    {/* CALIBRAR */}
    {calibLine&&<div className="bk"><div className="sheet" style={{padding:'18px 14px'}}>
      <button onClick={()=>setCalibLine(null)} style={{position:'absolute',top:10,right:12,background:'rgba(255,50,50,.12)',border:'1px solid rgba(255,50,50,.25)',color:'#ff3366',borderRadius:'50%',width:26,height:26,fontSize:13}}>✕</button>
      <div style={{fontSize:13,fontWeight:800,color:'#ff9500',marginBottom:4}}>⚖ Calibrar escala</div>
      <div style={{fontSize:9,color:'#336',marginBottom:12}}>¿Cuánto mide la línea que has trazado?</div>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:10}}>
        <input type="number" min="0" step=".1" placeholder="Valor real" value={calibInp.v}
          onChange={e=>setCalibInp(s=>({...s,v:e.target.value}))}
          style={{flex:1,padding:'10px',background:'#07080f',border:'1px solid rgba(255,150,0,.35)',borderRadius:8,color:'#ff9500',fontSize:22,textAlign:'right'}}/>
        <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
          {['mm','cm','m','in','ft'].map(u=><button key={u} onClick={()=>setCalibInp(s=>({...s,u}))}
            style={{padding:'5px 8px',background:calibInp.u===u?'rgba(255,150,0,.18)':'rgba(255,255,255,.03)',
              color:calibInp.u===u?'#ff9500':'#224',border:`1px solid ${calibInp.u===u?'rgba(255,150,0,.35)':'rgba(255,255,255,.05)'}`,borderRadius:5,fontSize:10,fontWeight:calibInp.u===u?700:400}}>{u}</button>)}
        </div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>setCalibLine(null)} style={{flex:1,padding:'10px',background:'rgba(255,255,255,.03)',border:'1px solid #111828',color:'#336',borderRadius:8,fontSize:10}}>Cancelar</button>
        <button onClick={confirmCalib} style={{flex:2,padding:'10px',background:'linear-gradient(135deg,#cc5500,#ff9500)',color:'#fff',border:'none',borderRadius:8,fontSize:13,fontWeight:800}}>⚖ Calibrar</button>
      </div>
    </div></div>}

    {/* RECORTAR */}
    {cropM&&<div className="bk"><div className="sheet" style={{padding:'16px 14px'}}>
      <button onClick={()=>setCropM(null)} style={{position:'absolute',top:10,right:12,background:'rgba(255,50,50,.12)',border:'1px solid rgba(255,50,50,.25)',color:'#ff3366',borderRadius:'50%',width:26,height:26,fontSize:13}}>✕</button>
      <div style={{fontSize:13,fontWeight:800,color:'#ff9500',marginBottom:12}}>✂ Zona seleccionada</div>
      <div style={{display:'flex',flexDirection:'column',gap:7}}>
        <button onClick={()=>applyCrop(cropM)} style={{padding:'12px',background:'linear-gradient(135deg,#ff6600,#ffaa00)',color:'#000',border:'none',borderRadius:8,fontSize:12,fontWeight:800}}>
          ✂ Recortar imagen principal
        </button>
        <button onClick={()=>setCropM(null)} style={{padding:'9px',background:'rgba(255,255,255,.03)',border:'1px solid #111828',color:'#336',borderRadius:8,fontSize:10}}>Cancelar</button>
      </div>
    </div></div>}

    {/* EDITAR ANOTACIÓN */}
    {editM&&<div className="bk"><div className="sheet" style={{padding:'16px 14px'}}>
      <button onClick={()=>setEditM(null)} style={{position:'absolute',top:10,right:12,background:'rgba(255,50,50,.12)',border:'1px solid rgba(255,50,50,.25)',color:'#ff3366',borderRadius:'50%',width:26,height:26,fontSize:13}}>✕</button>
      <div style={{fontSize:13,fontWeight:800,color:'#88aaff',marginBottom:12}}>✏ Editar anotación</div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        <div>
          <div style={{fontSize:7,color:'#336',marginBottom:3}}>ETIQUETA</div>
          <input value={editM.ann.label||''} onChange={e=>setEditM(m=>({...m,ann:{...m.ann,label:e.target.value}}))}
            style={{width:'100%',padding:'8px',background:'#07080f',border:'1px solid #141828',borderRadius:7,color:'#bbc',fontSize:11}}/>
        </div>
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:7,color:'#336',marginBottom:3}}>VALOR</div>
            <input type="number" value={editM.ann.value??''} onChange={e=>setEditM(m=>({...m,ann:{...m.ann,value:parseFloat(e.target.value)||null}}))}
              style={{width:'100%',padding:'8px',background:'#07080f',border:'1px solid #141828',borderRadius:7,color:'#ffcc66',fontSize:16,textAlign:'right'}}/>
          </div>
          <div>
            <div style={{fontSize:7,color:'#336',marginBottom:3}}>UNIDAD</div>
            <select value={editM.ann.unit||'mm'} onChange={e=>setEditM(m=>({...m,ann:{...m.ann,unit:e.target.value}}))}
              style={{padding:'9px 7px',background:'#07080f',border:'1px solid #141828',borderRadius:7,color:'#ff9500',fontSize:11}}>
              {Object.keys(UF).map(u=><option key={u}>{u}</option>)}
            </select>
          </div>
        </div>
        <div>
          <div style={{fontSize:7,color:'#336',marginBottom:3}}>EJE (para dibujo 2D/3D)</div>
          <div style={{display:'flex',gap:4}}>
            {['width','height','depth','other'].map(ax=><button key={ax} onClick={()=>setEditM(m=>({...m,ann:{...m.ann,axis:ax}}))}
              style={{flex:1,padding:'5px',background:editM.ann.axis===ax?'rgba(255,150,0,.15)':'rgba(255,255,255,.03)',
                border:`1px solid ${editM.ann.axis===ax?'rgba(255,150,0,.35)':'#111828'}`,
                color:editM.ann.axis===ax?'#ff9500':'#336',borderRadius:6,fontSize:8,fontWeight:700}}>
              {ax}</button>)}
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setEditM(null)} style={{flex:1,padding:'9px',background:'rgba(255,255,255,.03)',border:'1px solid #111828',color:'#336',borderRadius:8,fontSize:10}}>Cancelar</button>
          <button onClick={saveEdit} style={{flex:2,padding:'9px',background:'linear-gradient(135deg,#223399,#4466ff)',color:'#fff',border:'none',borderRadius:8,fontSize:12,fontWeight:800}}>Guardar</button>
        </div>
      </div>
    </div></div>}

    {/* GUARDAR PROYECTO */}
    {saveM&&<div className="bk"><div className="sheet" style={{padding:'18px 14px'}}>
      <button onClick={()=>setSaveM(false)} style={{position:'absolute',top:10,right:12,background:'rgba(255,50,50,.12)',border:'1px solid rgba(255,50,50,.25)',color:'#ff3366',borderRadius:'50%',width:26,height:26,fontSize:13}}>✕</button>
      <div style={{fontSize:13,fontWeight:800,color:'#ff9500',marginBottom:12}}>💾 Guardar proyecto</div>
      <input value={saveName} onChange={e=>setSaveName(e.target.value)} placeholder={objName||'Nombre del proyecto...'}
        style={{width:'100%',padding:'10px',background:'#07080f',border:'1px solid #1a2035',borderRadius:8,color:'#bbc',fontSize:12,marginBottom:10}}/>
      <div style={{fontSize:8,color:'#336',marginBottom:12}}>
        Guardará: imagen · {anns.length} anotaciones · {segs.length} segmentos IA · calibración · unidades
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>setSaveM(false)} style={{flex:1,padding:'10px',background:'rgba(255,255,255,.03)',border:'1px solid #111828',color:'#336',borderRadius:8,fontSize:10}}>Cancelar</button>
        <button onClick={saveProject} style={{flex:2,padding:'10px',background:'linear-gradient(135deg,#ff6600,#ffaa00)',color:'#000',border:'none',borderRadius:8,fontSize:13,fontWeight:800}}>💾 Guardar</button>
      </div>
    </div></div>}

  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
