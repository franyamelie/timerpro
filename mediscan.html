    const mx=p2?(p1.x+p2.x)*50:p1.x*100,my=p2?(p1.y+p2.y)*50:p1.y*100;
    const sel=()=>{if(!ip){setSelId(a.id);setTool("sel");}};

    if(a.type==="rect"||a.type==="crop"){
      const rx=Math.min(p1.x,p2.x)*100,ry2=Math.min(p1.y,p2.y)*100,rw=Math.abs(p2.x-p1.x)*100,rh=Math.abs(p2.y-p1.y)*100;
      const sc=a.type==="crop"?"#ff9500":col;const area=!ip?getArea(a):null;
      return<g onClick={e=>{if(ip)return;e.stopPropagation();if(a.type!=="crop")sel();}} onMouseDown={e=>{if(a.type!=="crop"&&tool==="sel")onShapeDrag(e,a.id);}} onTouchStart={e=>{if(a.type!=="crop"&&tool==="sel")onShapeDrag(e,a.id);}} style={{cursor:a.type==="crop"?"default":tool==="sel"?"grab":"pointer"}}>
        <rect x={`${rx}%`} y={`${ry2}%`} width={`${rw}%`} height={`${rh}%`} stroke={sc} strokeWidth={sw} fill={ip?`${sc}10`:"rgba(0,100,255,.1)"} strokeDasharray={a.type==="crop"?"8,4":ld}/>
        {!ip&&<Pill mx={`${mx}`} my={`${my}`} a={a}/>}
      </g>;}
    if(a.type==="circ"){const r=Math.sqrt(Math.pow((p2.x-p1.x)*100,2)+Math.pow((p2.y-p1.y)*100,2));
      return<g onClick={e=>{if(ip)return;e.stopPropagation();sel();}} onMouseDown={e=>{if(tool==="sel")onShapeDrag(e,a.id);}} onTouchStart={e=>{if(tool==="sel")onShapeDrag(e,a.id);}} style={{cursor:tool==="sel"?"grab":"pointer"}}>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r={`${r}%`} stroke={col} strokeWidth={sw} fill={ip?`${col}10`:"rgba(0,100,255,.1)"} strokeDasharray={ld}/>
        {!ip&&<Pill mx={`${p1.x*100}`} my={`${p1.y*100}`} a={a}/>}
      </g>;}

    /* ── HANDLERS COMUNES para todas las formas especiales ──
       CRÍTICO: si esto es una previsualización en curso (ip=true), el onClick
       NO debe interceptar nada. Si no, el área invisible de 14px de la línea/curva
       que sigue al cursor mientras esperas el siguiente punto se come el clic
       (stopPropagation) antes de que llegue al onClick de la imagen — el punto
       nunca se registra y la herramienta da la sensación de "no soltar". */
    const sClick=e=>{if(ip)return;e.stopPropagation();sel();};
    const sDown=e=>{if(tool==="sel")onShapeDrag(e,a.id);};

    /* ── INCLINACIÓN: 2 puntos, ángulo respecto a horizontal ── */
    if(a.type==="incl"&&pts.length>=2){
      const dx=p2.x-p1.x,dy=p2.y-p1.y;
      const angR=Math.atan2(dy,dx);
      const angDeg=Math.abs(angR*180/Math.PI);
      /* Inclinación: línea inclinada + línea horizontal de referencia + arco que muestra el ángulo */
      const refLen=8; /* longitud de la línea horizontal de referencia en % */
      const arcR2=3.5;
      const arcX=p1.x*100+arcR2*Math.cos(0),arcY=p1.y*100; /* punto del arco en horizontal */
      const arcX2=p1.x*100+arcR2*Math.cos(angR),arcY2=p1.y*100+arcR2*Math.sin(angR);
      return<g onClick={sClick} onMouseDown={sDown} onTouchStart={sDown} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke="transparent" strokeWidth="14"/>
        {/* Línea horizontal de referencia */}
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p1.x*100+refLen}%`} y2={`${p1.y*100}%`} stroke={col} strokeWidth="1.2" strokeDasharray="4,2" opacity=".7"/>
        {/* Arco del ángulo de inclinación */}
        <path d={`M ${arcX}% ${arcY}% A ${arcR2}% ${arcR2}% 0 0 ${dy<0?0:1} ${arcX2}% ${arcY2}%`} stroke={col} strokeWidth="1.2" fill={`${col}20`}/>
        {/* Línea inclinada */}
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw}/>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1%" fill={col}/>
        <circle cx={`${p2.x*100}%`} cy={`${p2.y*100}%`} r="0.8%" fill={col}/>
        {!ip&&<Pill mx={`${mx}`} my={`${my-4.5}`} a={a}/>}
      </g>;
    }
    /* ── ÁNGULO 3 puntos (vértice = p2) ── */
    if(a.type==="ang"&&pts.length>=3){
      const p3=pts[2];
      const a1=Math.atan2(p1.y-p2.y,p1.x-p2.x),a2=Math.atan2(p3.y-p2.y,p3.x-p2.x);
      let angDeg=Math.abs((a2-a1)*180/Math.PI);if(angDeg>180)angDeg=360-angDeg;
      const autoVal=`${Math.round(angDeg)}°`;
      /* Arco de sector que rellena el ángulo — única representación que lo diferencia de cualquier otra medida */
      const arcR=4; /* % del viewport */
      const ax1=p2.x*100+arcR*Math.cos(a1),ay1=p2.y*100+arcR*Math.sin(a1);
      const ax2=p2.x*100+arcR*Math.cos(a2),ay2=p2.y*100+arcR*Math.sin(a2);
      const large=angDeg>180?1:0;
      const arcD=`M ${ax1}% ${ay1}% A ${arcR}% ${arcR}% 0 ${large} 1 ${ax2}% ${ay2}%`;
      return<g onClick={sClick} onMouseDown={sDown} onTouchStart={sDown} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
        <line x1={`${p2.x*100}%`} y1={`${p2.y*100}%`} x2={`${p1.x*100}%`} y2={`${p1.y*100}%`} stroke="transparent" strokeWidth="14"/>
        <line x1={`${p2.x*100}%`} y1={`${p2.y*100}%`} x2={`${p3.x*100}%`} y2={`${p3.y*100}%`} stroke="transparent" strokeWidth="14"/>
        {/* Relleno del sector angular */}
        <path d={`M ${p2.x*100}% ${p2.y*100}% L ${ax1}% ${ay1}% A ${arcR}% ${arcR}% 0 ${large} 1 ${ax2}% ${ay2}% Z`} fill={`${col}28`}/>
        <path d={arcD} stroke={col} strokeWidth={sw} fill="none"/>
        <line x1={`${p2.x*100}%`} y1={`${p2.y*100}%`} x2={`${p1.x*100}%`} y2={`${p1.y*100}%`} stroke={col} strokeWidth={sw}/>
        <line x1={`${p2.x*100}%`} y1={`${p2.y*100}%`} x2={`${p3.x*100}%`} y2={`${p3.y*100}%`} stroke={col} strokeWidth={sw}/>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="0.8%" fill={col}/>
        <circle cx={`${p2.x*100}%`} cy={`${p2.y*100}%`} r="1.2%" fill={col}/>
        <circle cx={`${p3.x*100}%`} cy={`${p3.y*100}%`} r="0.8%" fill={col}/>
        {!ip&&<Pill mx={`${p2.x*100}`} my={`${p2.y*100-5}`} a={a}/>}
      </g>;
    }
    /* ── RADIO / DIÁMETRO: 2 puntos (centro → borde) ── */
    if(a.type==="rad"&&pts.length>=2){
      const r=Math.sqrt(Math.pow((p2.x-p1.x)*100,2)+Math.pow((p2.y-p1.y)*100,2));
      /* Radio: círculo con relleno suave + cruz en el centro + radio señalado */
      const dx2=p2.x-p1.x,dy2=p2.y-p1.y,len2=Math.sqrt(dx2*dx2+dy2*dy2)||.001;
      const ox=dx2/len2*r,oy=dy2/len2*r; /* opuesto al radio */
      const crS=1.5; /* tamaño de la cruz */
      return<g onClick={sClick} onMouseDown={sDown} onTouchStart={sDown} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r={`${r}%`} stroke="transparent" strokeWidth="14" fill="none"/>
        {/* Relleno semitransparente de la circunferencia */}
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r={`${r}%`} stroke={col} strokeWidth={sw} fill={`${col}14`}/>
        {/* Línea de diámetro completo */}
        <line x1={`${p1.x*100-ox}%`} y1={`${p1.y*100-oy}%`} x2={`${p1.x*100+ox}%`} y2={`${p1.y*100+oy}%`} stroke={col} strokeWidth="1" strokeDasharray="5,3" opacity=".7"/>
        {/* Radio señalado */}
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw+0.5}/>
        {/* Cruz en centro */}
        <line x1={`${p1.x*100-crS}%`} y1={`${p1.y*100}%`} x2={`${p1.x*100+crS}%`} y2={`${p1.y*100}%`} stroke={col} strokeWidth="1.2"/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100-crS}%`} x2={`${p1.x*100}%`} y2={`${p1.y*100+crS}%`} stroke={col} strokeWidth="1.2"/>
        {!ip&&<Pill mx={`${mx}`} my={`${my-4.5}`} a={a}/>}
      </g>;
    }
    /* ── ESPESOR DE PARED (wall): 3 puntos ── */
    if(a.type==="wall"&&pts.length>=3){
      const p3=pts[2];
      /* FIX: antes el desplazamiento de la línea paralela (el "grosor") era un
         número fijo (.04) que ignoraba por completo dónde tocabas el 3er punto
         — por eso salía una línea inesperada sin relación con lo que hacías.
         Ahora el 3er punto SÍ define el grosor real: se proyecta sobre la
         perpendicular a la línea principal, así que cuanto más lejos lo
         coloques de la línea, más grosor se dibuja, en el lado que elijas. */
      const dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy)||1;
      const px2=-dy/len,py2=dx/len;
      let off=(p3.x-p1.x)*px2+(p3.y-p1.y)*py2;
      if(Math.abs(off)<.012)off=off<0?-.03:.03; /* evita una línea pegada/invisible si el 3er punto cae casi sobre la línea */
      const nx=px2*off,ny=py2*off;
      /* Vista previa del grosor medido (distancia perpendicular real, no la
         longitud de la línea principal) — igual que Ángulo/Inclinación
         muestran su valor en grados como vista previa antes de confirmar. */
      const rr=imgRef.current?.getBoundingClientRect();
      const autoVal=(scale&&rr)?`${(Math.abs(off)*Math.sqrt(rr.width*rr.width+rr.height*rr.height)/scale.ppu).toFixed(2)} ${scale.unit}`:"Espesor";
      const dispBadge=ip?"":(badge||autoVal);
      return<g onClick={sClick} onMouseDown={sDown} onTouchStart={sDown} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke="transparent" strokeWidth="14"/>
        <line x1={`${(p1.x+nx)*100}%`} y1={`${(p1.y+ny)*100}%`} x2={`${(p2.x+nx)*100}%`} y2={`${(p2.y+ny)*100}%`} stroke="transparent" strokeWidth="14"/>
        {/* Relleno de rayas — el patrón es inconfundible con cualquier otra herramienta */}
        {[0,.2,.4,.6,.8,1].map(t=>{
          const hx1=p1.x*100+t*(p2.x-p1.x)*100,hy1=p1.y*100+t*(p2.y-p1.y)*100;
          return<line key={t} x1={`${hx1}%`} y1={`${hy1}%`} x2={`${hx1+nx*100}%`} y2={`${hy1+ny*100}%`} stroke={col} strokeWidth="0.7" opacity="0.5"/>;
        })}
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw}/>
        <line x1={`${(p1.x+nx)*100}%`} y1={`${(p1.y+ny)*100}%`} x2={`${(p2.x+nx)*100}%`} y2={`${(p2.y+ny)*100}%`} stroke={col} strokeWidth={sw} strokeDasharray="5,2"/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${(p1.x+nx)*100}%`} y2={`${(p1.y+ny)*100}%`} stroke={col} strokeWidth="2"/>
        <line x1={`${p2.x*100}%`} y1={`${p2.y*100}%`} x2={`${(p2.x+nx)*100}%`} y2={`${(p2.y+ny)*100}%`} stroke={col} strokeWidth="2"/>
        {!ip&&<Pill mx={`${(p1.x+p2.x)*50+nx*50}`} my={`${(p1.y+p2.y)*50+ny*50-4}`} a={a}/>}
      </g>;
    }
    /* ── POLILÍNEA: múltiples puntos ── */
    if(a.type==="poly"&&pts.length>=2){
      /* Polilínea: puntos rombos (distintos a los círculos de Área) + líneas con guiones */
      const d="M "+pts.map(p=>`${p.x*100}% ${p.y*100}%`).join(" L ");
      const cx=pts.reduce((s,p)=>s+p.x,0)/pts.length*100;
      const cy=pts.reduce((s,p)=>s+p.y,0)/pts.length*100;
      /* Polilínea: rombos en los vértices (≠ círculos de Área) */
      const dmS=1.4; /* tamaño rombo */
      return<g onClick={sClick} onMouseDown={sDown} onTouchStart={sDown} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
        <path d={d} stroke="transparent" strokeWidth="14" fill="none"/>
        <path d={d} stroke={col} strokeWidth={sw} fill="none" strokeDasharray="8,3"/>
        {pts.map((p,i)=><path key={i}
          d={`M ${p.x*100}% ${(p.y-dmS/100)*100}% L ${(p.x+dmS/100)*100}% ${p.y*100}% L ${p.x*100}% ${(p.y+dmS/100)*100}% L ${(p.x-dmS/100)*100}% ${p.y*100}% Z`}
          fill={i===0||i===pts.length-1?"#fff":col} stroke={col} strokeWidth="0.6"/>)}
        {!ip&&<Pill mx={`${cx}`} my={`${cy-4}`} a={a}/>}
      </g>;
    }
    /* ── TOLERANCIA ±: 1 punto ── */
    if(a.type==="tol"&&pts.length>=1){
      /* Tolerancia: caja rectangular dividida en dos (superior: valor, inferior: ±tol) */
      const bW=9,bH=5,bX=p1.x*100,bY=p1.y*100-bH/2;
      return<g onClick={sClick} onMouseDown={sDown} onTouchStart={sDown} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${bX}%`} y2={`${bY+bH/2}%`} stroke={col} strokeWidth="1.5"/>
        <rect x={`${bX}%`} y={`${bY}%`} width={`${bW}%`} height={`${bH/2}%`} fill="rgba(255,255,255,.7)" stroke={col} strokeWidth="0.9"/>
        <rect x={`${bX}%`} y={`${bY+bH/2}%`} width={`${bW}%`} height={`${bH/2}%`} fill={`${col}22`} stroke={col} strokeWidth="0.9"/>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1%" fill={col}/>
        {!ip&&<Pill mx={`${bX+bW/2}`} my={`${bY-2}`} a={a}/>}
      </g>;
    }
    /* ── CHAFLÁN/FASEO: 3 puntos ── */
    if(a.type==="cham"&&pts.length>=3){
      const p3=pts[2];
      /* Chaflán: triángulo relleno que muestra el material eliminado en el corte */
      return<g onClick={sClick} onMouseDown={sDown} onTouchStart={sDown} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke="transparent" strokeWidth="14"/>
        <line x1={`${p2.x*100}%`} y1={`${p2.y*100}%`} x2={`${p3.x*100}%`} y2={`${p3.y*100}%`} stroke="transparent" strokeWidth="14"/>
        {/* Triángulo que representa el material eliminado */}
        <path d={`M ${p1.x*100}% ${p1.y*100}% L ${p2.x*100}% ${p2.y*100}% L ${p3.x*100}% ${p3.y*100}% Z`}
          fill={`${col}30`} stroke="none"/>
        {/* Línea del chaflán (diagonal de corte) */}
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p3.x*100}%`} y2={`${p3.y*100}%`} stroke={col} strokeWidth={sw+0.5}/>
        {/* Los dos lados del material */}
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw} opacity="0.6"/>
        <line x1={`${p2.x*100}%`} y1={`${p2.y*100}%`} x2={`${p3.x*100}%`} y2={`${p3.y*100}%`} stroke={col} strokeWidth={sw} opacity="0.6"/>
        {/* Punto de esquina */}
        <circle cx={`${p2.x*100}%`} cy={`${p2.y*100}%`} r="0.9%" fill={col}/>
        {!ip&&<Pill mx={`${(p1.x*100+p3.x*100)/2}`} my={`${(p1.y*100+p3.y*100)/2-4}`} a={a}/>}
      </g>;
    }
    /* ── ÁREA: 3+ puntos cerrados ── */
    if(a.type==="area"&&pts.length>=3){
      const d="M "+pts.map(p=>`${p.x*100}% ${p.y*100}%`).join(" L ")+" Z";
      const cx=pts.reduce((s,p)=>s+p.x,0)/pts.length*100;
      const cy=pts.reduce((s,p)=>s+p.y,0)/pts.length*100;
      /* ÁREA: relleno claramente visible (38% opacidad) + borde sólido + puntos en esquinas */
      return<g onClick={sClick} onMouseDown={sDown} onTouchStart={sDown} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
        <path d={d} stroke="transparent" strokeWidth="14" fill={`${col}38`}/>
        <path d={d} stroke={col} strokeWidth={sw+1} fill={`${col}22`} strokeDasharray="8,4"/>
        {pts.map((p,i)=><circle key={i} cx={`${p.x*100}%`} cy={`${p.y*100}%`} r="1.2%" fill="#fff" stroke={col} strokeWidth="0.8"/>)}
        {!ip&&<Pill mx={`${cx}`} my={`${cy}`} a={a}/>}
      </g>;
    }
    /* ── ARCO: 3 puntos (inicio, paso, fin) ── */
    if(a.type==="arc"&&pts.length>=3){
      const p3=pts[2];
      const arcD=`M ${p1.x*100}% ${p1.y*100}% Q ${p2.x*100}% ${p2.y*100}% ${p3.x*100}% ${p3.y*100}%`;
      /* Arco: líneas rectas de referencia desde los extremos al punto de control + relleno bajo la curva */
      const areaD=`M ${p1.x*100}% ${p1.y*100}% Q ${p2.x*100}% ${p2.y*100}% ${p3.x*100}% ${p3.y*100}% L ${p1.x*100}% ${p1.y*100}%`;
      return<g onClick={sClick} onMouseDown={sDown} onTouchStart={sDown} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
        <path d={arcD} stroke="transparent" strokeWidth="14" fill="none"/>
        {/* Cuerdas de referencia */}
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth="1" strokeDasharray="3,2" opacity=".5"/>
        <line x1={`${p3.x*100}%`} y1={`${p3.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth="1" strokeDasharray="3,2" opacity=".5"/>
        {/* Relleno bajo el arco */}
        <path d={areaD} fill={`${col}18`} stroke="none"/>
        {/* El arco en sí, grueso */}
        <path d={arcD} stroke={col} strokeWidth={sw+0.5} fill="none"/>
        {/* Marcadores en extremos y punto de control */}
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1%" fill={col}/>
        <circle cx={`${p3.x*100}%`} cy={`${p3.y*100}%`} r="1%" fill={col}/>
        <circle cx={`${p2.x*100}%`} cy={`${p2.y*100}%`} r="0.8%" fill="none" stroke={col} strokeWidth="1"/>
        {!ip&&<Pill mx={`${p2.x*100}`} my={`${p2.y*100-5}`} a={a}/>}
      </g>;
    }
    /* ── COORDENADA XY: 1 punto ── */
    if(a.type==="coord"&&pts.length>=1){
      const xPx=Math.round(p1.x*1000)/10,yPx=Math.round(p1.y*1000)/10;
      const aL=5.5; /* longitud de los ejes en % */
      return<g onClick={sClick} onMouseDown={sDown} onTouchStart={sDown} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="4%" fill="transparent"/>
        {/* Eje X (rojo) con flecha */}
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p1.x*100+aL}%`} y2={`${p1.y*100}%`} stroke="#ee2211" strokeWidth="2"/>
        <path d={`M ${p1.x*100+aL}% ${p1.y*100}% L ${p1.x*100+aL-1.5}% ${p1.y*100-.7}% L ${p1.x*100+aL-1.5}% ${p1.y*100+.7}% Z`} fill="#ee2211"/>
        {/* Eje Y (verde) con flecha */}
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p1.x*100}%`} y2={`${p1.y*100-aL}%`} stroke="#22aa44" strokeWidth="2"/>
        <path d={`M ${p1.x*100}% ${p1.y*100-aL}% L ${p1.x*100-.7}% ${p1.y*100-aL+1.5}% L ${p1.x*100+.7}% ${p1.y*100-aL+1.5}% Z`} fill="#22aa44"/>
        {/* Origen */}
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1%" fill={col}/>
        {!ip&&<Pill mx={`${p1.x*100+aL+2}`} my={`${p1.y*100-3}`} a={a}/>}
      </g>;
    }
    /* ── DEFLEXIÓN: 3 puntos ── */
    if(a.type==="defl"&&pts.length>=3){
      const p3=pts[2];
      const deflD=`M ${p1.x*100}% ${p1.y*100}% Q ${p2.x*100}% ${p2.y*100}% ${p3.x*100}% ${p3.y*100}%`;
      /* Deflexión: línea recta de la posición "sin deformar" + curva de deformación + flecha de desplazamiento */
      const midX=(p1.x+p3.x)*50,midY=(p1.y+p3.y)*50;
      const defX=p2.x*100,defY=p2.y*100;
      const dxArr=defX-midX,dyArr=defY-midY,lArr=Math.sqrt(dxArr*dxArr+dyArr*dyArr)||1;
      const arX=defX-dxArr/lArr*2,arY=defY-dyArr/lArr*2;
      const arAngle=Math.atan2(dyArr,dxArr);
      return<g onClick={sClick} onMouseDown={sDown} onTouchStart={sDown} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
        <path d={deflD} stroke="transparent" strokeWidth="14" fill="none"/>
        {/* Línea recta "sin deformar" */}
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p3.x*100}%`} y2={`${p3.y*100}%`} stroke={col} strokeWidth="1.5"/>
        {/* Curva de deflexión */}
        <path d={deflD} stroke={col} strokeWidth={sw} fill="none" strokeDasharray="6,3"/>
        {/* Flecha de desplazamiento (del medio de la línea al punto máximo de deflexión) */}
        <line x1={`${midX}%`} y1={`${midY}%`} x2={`${arX}%`} y2={`${arY}%`} stroke={col} strokeWidth="1.5"/>
        <path d={`M ${defX}% ${defY}% L ${arX+Math.cos(arAngle-0.4)*2}% ${arY+Math.sin(arAngle-0.4)*2}% L ${arX+Math.cos(arAngle+0.4)*2}% ${arY+Math.sin(arAngle+0.4)*2}% Z`} fill={col}/>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="0.9%" fill={col}/>
        <circle cx={`${p3.x*100}%`} cy={`${p3.y*100}%`} r="0.9%" fill={col}/>
        {!ip&&<Pill mx={`${defX}`} my={`${defY-4}`} a={a}/>}
      </g>;
    }
    /* ── NOTA DE TEXTO: 1 punto ── */
    if(a.type==="note"&&pts.length>=1){
      const dispBadge=ip?"":(badge||a.title||"Nota");
      return<g onClick={sClick} onMouseDown={sDown} onTouchStart={sDown} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="3%" fill="transparent"/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p1.x*100+5}%`} y2={`${(p1.y-.04)*100}%`} stroke={col} strokeWidth="1.5"/>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r=".8%" fill={col}/>
        {!ip&&<Pill mx={`${p1.x*100+8}`} my={`${(p1.y-.04)*100}`} a={a}/>}
      </g>;
    }
    /* ── RUGOSIDAD Ra: 1 punto ── */
    if(a.type==="rough"&&pts.length>=1){
      /* Rugosidad Ra: símbolo ISO √ con línea de acabado y líneas onduladas que simulan la textura */
      const bX=p1.x*100,bY=p1.y*100;
      return<g onClick={sClick} onMouseDown={sDown} onTouchStart={sDown} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
        <circle cx={`${bX}%`} cy={`${bY}%`} r="4%" fill="transparent"/>
        {/* Símbolo ISO de rugosidad (√ con barra) */}
        <path d={`M ${bX-2}% ${bY+2.5}% L ${bX}% ${bY}% L ${bX+2}% ${bY+2.5}%`} stroke={col} strokeWidth="2" fill="none"/>
        <line x1={`${bX}%`} y1={`${bY}%`} x2={`${bX+5}%`} y2={`${bY}%`} stroke={col} strokeWidth="1.8"/>
        {/* Líneas onduladas que simulan la textura de la superficie */}
        <path d={`M ${bX-3}% ${bY+4}% Q ${bX-2}% ${bY+3}% ${bX-1}% ${bY+4}% Q ${bX}% ${bY+5}% ${bX+1}% ${bY+4}% Q ${bX+2}% ${bY+3}% ${bX+3}% ${bY+4}%`}
          stroke={col} strokeWidth="0.9" fill="none" opacity="0.7"/>
        {!ip&&<Pill mx={`${bX+7}`} my={`${bY-1}`} a={a}/>}
      </g>;
    }

    if(a.points.length<2)return null; /* generic fallback below needs 2 points */
    const isDim=["dim","dist"].includes(a.type);
    const dbl=a.type==="dist"||a.arrowHead==="both";
    const noArr=a.arrowHead==="none";
    return<g onClick={e=>{if(ip)return;e.stopPropagation();sel();}} onMouseDown={e=>{if(tool==="sel"&&!ip)onShapeDrag(e,a.id);}} onTouchStart={e=>{if(tool==="sel"&&!ip)onShapeDrag(e,a.id);}} style={{cursor:ip?"crosshair":tool==="sel"?"grab":"pointer"}}>
      <defs>
        <marker id={aid+"e"} markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L10,3.5z" fill={col}/></marker>
        {dbl&&<marker id={aid+"s"} markerWidth="10" markerHeight="10" refX="3" refY="3.5" orient="auto-start-reverse"><path d="M0,0 L0,7 L10,3.5z" fill={col}/></marker>}
      </defs>
      <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke="transparent" strokeWidth="14"/>
      <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={a.type==="arr2"?sw+2:sw} strokeDasharray={ld}
        markerEnd={!noArr&&["dist","arr1","arr2"].includes(a.type)?`url(#${aid}e)`:"none"}
        markerStart={dbl?`url(#${aid}s)`:"none"}/>
      {isDim&&<><line x1={`${p1.x*100}%`} y1={`${(p1.y-.025)*100}%`} x2={`${p1.x*100}%`} y2={`${(p1.y+.025)*100}%`} stroke={col} strokeWidth={sw+1}/><line x1={`${p2.x*100}%`} y1={`${(p2.y-.025)*100}%`} x2={`${p2.x*100}%`} y2={`${(p2.y+.025)*100}%`} stroke={col} strokeWidth={sw+1}/></>}
      <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1%" fill={col} opacity={ip?.4:.8}/>
      <circle cx={`${p2.x*100}%`} cy={`${p2.y*100}%`} r="1%" fill={col} opacity={ip?.4:.8}/>
      {!ip&&<Pill mx={`${mx}`} my={`${my-4.5}`} a={a}/>}
    </g>;
  };

  /* V/S/P stats on image */
  const Stats=()=>{
    const g=ax=>{const a=anns.find(a=>a.axis===ax&&a.value!=null);return a?toMM(a.value,a.unit)/1000:0;};
    const W=g("width"),H=g("height"),D=g("depth");if(!W&&!H&&!D)return null;
    const st=[W&&D&&`S=${(W*D).toFixed(1)}m²`,W&&H&&D&&`V=${(W*H*D).toFixed(2)}m³`,W&&D&&`P=${(2*(W+D)).toFixed(1)}m`].filter(Boolean);
    return<>{st.map((s,i)=><g key={i} pointerEvents="none">
      <rect x="1%" y={`${84+i*7}%`} width={`${s.length*.72+2}%`} height="6%" rx="3%" fill="rgba(255,255,255,.95)" style={{filter:"drop-shadow(0 2px 8px rgba(0,0,0,.6))"}}/>
      <text x={`${(s.length*.72+2)/2+1}%`} y={`${87+i*7}%`} fill="#111" fontSize="2.6%" fontFamily="Inter,sans-serif" fontWeight="800" textAnchor="middle" dominantBaseline="middle">{s}</text>
    </g>)}</>;
  };

  /* ══ JSX ══ */
  const C="#ff9500";

  /* Import from industrial DB */
  const importFromDB=item=>{
    const newAnns=item.anns.map(a=>({
      id:uid(),type:"dot",icon:"⬤",title:a.title,
      value:a.value,unit:a.unit,axis:a.axis||"other",
      color:COLS[anns.length%COLS.length],
      points:[{x:.5+Math.random()*.2-.1,y:.5+Math.random()*.2-.1}],
      lineStyle:"solid",arrowHead:"end",isDB:true
    }));
    newAnns.forEach(a=>addA(a));
    setSheet("meas");
    setSync("✓ "+item.name+" importado");setTimeout(()=>setSync(""),3000);
  };


  /* ══ FcShape: renderiza cada herramienta con su forma real en el panel flotante ══ */
  const FcShape=({a,ip=false})=>{
    if(!a?.points||a.points.length<2)return null;
    const[p1,p2]=a.points,col=a.color||"#ff9500";
    const sw=ip?1.5:2.5;
    const aid=`fc${a.id||"p"}`;
    const typeLabel={line:"Línea",dim:"Cota",dist:"Distancia",arr1:"Flecha",arr2:"Flecha⇒",rect:"Rectángulo",circ:"Círculo"}[a.type]||a.type;
    const badge=ip?"":a.title?(a.value!=null?`${a.title}: ${a.value}${a.unit}`:a.title):(a.value!=null?`${a.value}${a.unit}`:`${typeLabel} — sin medida`);
    const mx=(p1.x+p2.x)*50, my=(p1.y+p2.y)*50;
    const bw=badge?badge.length*1.3+2:0;
    const openM=e=>{if(ip)return;e.stopPropagation();setMeasM({...a,_existing:true,_fc:true});setMIn({t:a.title||"",v:a.value!=null?String(a.value):"",u:a.unit||"cm",ax:a.axis||""});};
    /* MODO ICONOS (zona recortada): mismo criterio que en la pantalla principal —
       sobre la foto solo icono + número correlativo por tipo, sin valor. Tocar el
       icono abre el panel de info con destino Aquí/2D/3D en vez de editar directo. */
    const ord=typeOrd(fcAnns,a);
    const ic=(TOOLS.find(t=>t.id===a.type)?.icon)||"●";
    const inMulti=multiSel.includes(a.id);
    const tapBadge=e=>{
      e.stopPropagation();
      if(tool==="selpts"){
        setMultiSel(prev=>prev.includes(a.id)?prev.filter(id=>id!==a.id):[...prev,a.id]);
        return;
      }
      setSelId(a.id);
      setIconInfoM({ann:a,ordinal:ord,fc:true});
    };
    const BadgeEl=({bx,by})=>ip?null:<g onClick={tapBadge} style={{cursor:"pointer"}}>
      <circle cx={`${bx}%`} cy={`${by}%`} r="2.1%" fill="rgba(255,255,255,0.82)" stroke={col}
        strokeWidth={selId===a.id?"1.4":"1.0"}
        style={{filter:"drop-shadow(0 1px 4px rgba(0,0,0,.45))"}}/>
      {(inMulti||selId===a.id)&&<circle cx={`${bx}%`} cy={`${by}%`} r="3%" fill="none"
        stroke={inMulti?"#00cc66":col} strokeWidth="0.7" strokeDasharray={inMulti?"none":"3,2"}/>}
      <text x={`${bx}%`} y={`${by}%`} fill={col} fontSize={ic.length>1?"1.6%":"2.2%"} fontFamily="Inter,sans-serif" fontWeight="900" textAnchor="middle" dominantBaseline="central">{ic}</text>
      <circle cx={`${bx+1.6}%`} cy={`${by-1.6}%`} r="1%" fill={inMulti?"#00cc66":col} stroke="#fff" strokeWidth="0.3"/>
      <text x={`${bx+1.6}%`} y={`${by-1.6}%`} fill="#fff" fontSize="1.1%" fontFamily="Inter,sans-serif" fontWeight="900" textAnchor="middle" dominantBaseline="central">{inMulti?multiSel.indexOf(a.id)+1:ord}</text>
    </g>;

    /* ── RECTÁNGULO ── */
    if(a.type==="rect"){
      const rx=Math.min(p1.x,p2.x)*100,ry=Math.min(p1.y,p2.y)*100;
      const rw=Math.abs(p2.x-p1.x)*100,rh=Math.abs(p2.y-p1.y)*100;
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <rect x={`${rx}%`} y={`${ry}%`} width={`${rw}%`} height={`${rh}%`} stroke={col} strokeWidth={sw} fill={ip?`${col}28`:"rgba(255,150,0,.12)"}/>
        {!ip&&<BadgeEl bx={mx} by={my}/>}
      </g>;
    }
    /* ── CÍRCULO / ELIPSE ── */
    if(a.type==="circ"){
      const r=Math.sqrt(Math.pow((p2.x-p1.x)*100,2)+Math.pow((p2.y-p1.y)*100,2));
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r={`${r}%`} stroke={col} strokeWidth={sw} fill={ip?`${col}14`:"rgba(255,150,0,.07)"}/>
        {!ip&&<BadgeEl bx={p1.x*100} by={p1.y*100}/>}
      </g>;
    }
    /* ── COTA (dim): línea con topes perpendiculares ── */
    if(a.type==="dim"){
      const dx=p2.x*100-p1.x*100, dy=p2.y*100-p1.y*100;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const nx=(-dy/len)*3, ny=(dx/len)*3; // perpendicular
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw}/>
        <line x1={`${p1.x*100-nx}%`} y1={`${p1.y*100-ny}%`} x2={`${p1.x*100+nx}%`} y2={`${p1.y*100+ny}%`} stroke={col} strokeWidth={sw+1}/>
        <line x1={`${p2.x*100-nx}%`} y1={`${p2.y*100-ny}%`} x2={`${p2.x*100+nx}%`} y2={`${p2.y*100+ny}%`} stroke={col} strokeWidth={sw+1}/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke="transparent" strokeWidth="14"/>
        {!ip&&<BadgeEl bx={mx} by={my-5}/>}
      </g>;
    }
    /* ── DISTANCIA (dist): flecha doble ← → ── */
    if(a.type==="dist"){
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <defs>
          <marker id={`${aid}e`} markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L10,3.5z" fill={col}/></marker>
          <marker id={`${aid}s`} markerWidth="10" markerHeight="10" refX="3" refY="3.5" orient="auto-start-reverse"><path d="M0,0 L0,7 L10,3.5z" fill={col}/></marker>
        </defs>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw} markerEnd={`url(#${aid}e)`} markerStart={`url(#${aid}s)`}/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke="transparent" strokeWidth="14"/>
        {!ip&&<BadgeEl bx={mx} by={my-5}/>}
      </g>;
    }
    /* ── FLECHA SIMPLE (arr1) → ── */
    if(a.type==="arr1"){
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <defs><marker id={`${aid}e`} markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L10,3.5z" fill={col}/></marker></defs>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw} markerEnd={`url(#${aid}e)`}/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke="transparent" strokeWidth="14"/>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1%" fill={col} opacity=".7"/>
        {!ip&&<BadgeEl bx={mx} by={my-5}/>}
      </g>;
    }
    /* ── FLECHA GRUESA (arr2) ⇒ ── */
    if(a.type==="arr2"){
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <defs><marker id={`${aid}e`} markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L10,3.5z" fill={col}/></marker></defs>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw+3} markerEnd={`url(#${aid}e)`}/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke="transparent" strokeWidth="16"/>
        {!ip&&<BadgeEl bx={mx} by={my-6}/>}
      </g>;
    }
    /* ── INCLINACIÓN ── */
    if(a.type==="incl"){
      const dx=p2.x-p1.x,dy=p2.y-p1.y;
      const autoVal=`${Math.round(Math.abs(Math.atan2(dy,dx)*180/Math.PI))}°`;
      const dispBadge=ip?"":(badge||autoVal);
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw}/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p1.x*100+10}%`} y2={`${p1.y*100}%`} stroke={col} strokeWidth="1" strokeDasharray="3,2" opacity=".6"/>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1.2%" fill={col}/>
        {!ip&&<BadgeEl bx={mx} by={my-5}/>}
      </g>;
    }
    /* ── ÁNGULO 3 puntos ── */
    if(a.type==="ang"&&a.points?.length>=3){
      const p3=a.points[2];
      const a1=Math.atan2(p1.y-p2.y,p1.x-p2.x),a2=Math.atan2(p3.y-p2.y,p3.x-p2.x);
      let angDeg=Math.abs((a2-a1)*180/Math.PI);if(angDeg>180)angDeg=360-angDeg;
      const autoVal=`${Math.round(angDeg)}°`;
      const dispBadge=ip?"":(badge||autoVal);
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <line x1={`${p2.x*100}%`} y1={`${p2.y*100}%`} x2={`${p1.x*100}%`} y2={`${p1.y*100}%`} stroke={col} strokeWidth={sw}/>
        <line x1={`${p2.x*100}%`} y1={`${p2.y*100}%`} x2={`${p3.x*100}%`} y2={`${p3.y*100}%`} stroke={col} strokeWidth={sw}/>
        <circle cx={`${p2.x*100}%`} cy={`${p2.y*100}%`} r="1.5%" fill={col}/>
        {!ip&&<BadgeEl bx={p2.x*100} by={p2.y*100-5}/>}
      </g>;
    }
        /* ── RADIO/Ø ── */
    if(a.type==="rad"){
      const r=Math.sqrt(Math.pow((p2.x-p1.x)*100,2)+Math.pow((p2.y-p1.y)*100,2));
      const dispBadge=ip?"":(badge||`Ø~${Math.round(r*2)}%`);
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r={`${r}%`} stroke={col} strokeWidth={sw} fill={ip?`${col}14`:"rgba(255,150,0,.08)"}/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth="1" strokeDasharray="4,3"/>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1.2%" fill={col}/>
        {!ip&&<BadgeEl bx={(p1.x+p2.x)*50} by={(p1.y+p2.y)*50-5}/>}
      </g>;
    }
    /* ── TOLERANCIA ± ── */
    if(a.type==="tol"&&a.points?.length>=1){
      const disp=ip?"":(badge||"± Tol");
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p1.x*100+8}%`} y2={`${(p1.y-.05)*100}%`} stroke={col} strokeWidth="1.5"/>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1.5%" fill={col}/>
        {!ip&&disp&&<><rect x={`${p1.x*100+10}%`} y={`${(p1.y-.05)*100-4}%`} width={`${disp.length*1.4+2}%`} height="6%" rx="3%" fill="rgba(0,0,0,.8)"/><text x={`${p1.x*100+10+disp.length*.7}%`} y={`${(p1.y-.05)*100-1}%`} fill="#fff" fontSize="2.3%" fontFamily="Inter" fontWeight="900" textAnchor="middle" dominantBaseline="middle">{disp}</text></>}
      </g>;
    }
    /* ── CHAFLÁN ── */
    if(a.type==="cham"&&a.points?.length>=2){
      const dx=p2.x-p1.x,dy=p2.y-p1.y;
      const dispBadge=ip?"":(badge||"Chaflán");
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw}/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw-1} strokeDasharray="5,3"/>
        <circle cx={`${(p1.x+p2.x)*50}%`} cy={`${(p1.y+p2.y)*50}%`} r="1.2%" fill={col}/>
        {!ip&&<BadgeEl bx={mx} by={my-5}/>}
      </g>;
    }
    /* ── ÁREA ── */
    if(a.type==="area"&&a.points?.length>=3){
      const d="M "+a.points.map(p=>`${p.x*100}% ${p.y*100}%`).join(" L ")+" Z";
      const cx=a.points.reduce((s,p)=>s+p.x,0)/a.points.length*100;
      const cy=a.points.reduce((s,p)=>s+p.y,0)/a.points.length*100;
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <path d={d} stroke={col} strokeWidth={sw} fill={ip?`${col}20`:`${col}15`}/>
        {a.points.map((p,i)=><circle key={i} cx={`${p.x*100}%`} cy={`${p.y*100}%`} r="1%" fill={col}/>)}
        {!ip&&<BadgeEl bx={cx} by={cy}/>}
      </g>;
    }
    /* ── ARCO ── */
    if(a.type==="arc"&&a.points?.length>=3){
      const p3=a.points[2];
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <path d={`M ${p1.x*100}% ${p1.y*100}% Q ${p2.x*100}% ${p2.y*100}% ${p3.x*100}% ${p3.y*100}%`} stroke={col} strokeWidth={sw} fill="none"/>
        {!ip&&<BadgeEl bx={p2.x*100} by={p2.y*100-5}/>}
      </g>;
    }
    /* ── DEFLEXIÓN ── */
    if(a.type==="defl"&&a.points?.length>=3){
      const p3=a.points[2];
      const dispBadge=ip?"":(badge||"Deflexión");
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p3.x*100}%`} y2={`${p3.y*100}%`} stroke={col} strokeWidth="1.5" strokeDasharray="4,3"/>
        <path d={`M ${p1.x*100}% ${p1.y*100}% Q ${p2.x*100}% ${p2.y*100}% ${p3.x*100}% ${p3.y*100}%`} stroke={col} strokeWidth={sw} fill="none"/>
        {!ip&&<BadgeEl bx={p2.x*100} by={p2.y*100-5}/>}
      </g>;
    }
    /* ── COORDENADA ── */
    if(a.type==="coord"&&a.points?.length>=1){
      const xv=Math.round(p1.x*1000)/10,yv=Math.round(p1.y*1000)/10;
      const dispBadge=ip?"":(badge||`X:${xv} Y:${yv}`);
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1.5%" fill={col}/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p1.x*100+5}%`} y2={`${p1.y*100}%`} stroke={col} strokeWidth="1.5"/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p1.x*100}%`} y2={`${p1.y*100-5}%`} stroke={col} strokeWidth="1.5"/>
        {!ip&&dispBadge&&<><rect x={`${p1.x*100+4}%`} y={`${p1.y*100-8}%`} width={`${dispBadge.length*1.4+2}%`} height="6%" rx="3%" fill="rgba(0,0,0,.8)"/><text x={`${p1.x*100+4+dispBadge.length*.7}%`} y={`${p1.y*100-5}%`} fill="#fff" fontSize="2.4%" fontFamily="Inter" fontWeight="900" textAnchor="middle" dominantBaseline="middle">{dispBadge}</text></>}
      </g>;
    }
    /* ── NOTA ── */
    if(a.type==="note"&&a.points?.length>=1){
      const dispBadge=ip?"":(badge||"Nota");
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1%" fill={col}/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p1.x*100+5}%`} y2={`${(p1.y-.04)*100}%`} stroke={col} strokeWidth="1.5"/>
        {!ip&&dispBadge&&<><rect x={`${p1.x*100+4}%`} y={`${(p1.y-.04)*100-4}%`} width={`${Math.min(dispBadge.length*1.3+4,35)}%`} height="6%" rx="3%" fill="rgba(0,0,0,.85)"/><text x={`${p1.x*100+4+Math.min(dispBadge.length*.65,17.5)}%`} y={`${(p1.y-.04)*100-1}%`} fill="#fff" fontSize="2.3%" fontFamily="Inter" fontWeight="800" textAnchor="middle" dominantBaseline="middle">{dispBadge}</text></>}
      </g>;
    }
    /* ── RUGOSIDAD Ra ── */
    if(a.type==="rough"&&a.points?.length>=1){
      const dispBadge=ip?"":(badge||"Ra");
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <path d={`M ${p1.x*100-2}% ${p1.y*100+2}% L ${p1.x*100}% ${p1.y*100}% L ${p1.x*100+2}% ${p1.y*100+2}%`} stroke={col} strokeWidth="2" fill="none"/>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p1.x*100+4}%`} y2={`${p1.y*100}%`} stroke={col} strokeWidth="1.5"/>
        {!ip&&dispBadge&&<><rect x={`${p1.x*100+3}%`} y={`${p1.y*100-4}%`} width={`${dispBadge.length*1.4+2}%`} height="6%" rx="3%" fill="rgba(0,0,0,.8)"/><text x={`${p1.x*100+3+dispBadge.length*.7}%`} y={`${p1.y*100-1}%`} fill="#fff" fontSize="2.3%" fontFamily="Inter" fontWeight="900" textAnchor="middle" dominantBaseline="middle">{dispBadge}</text></>}
      </g>;
    }
    /* ── ESPESOR PARED ── */
    if(a.type==="wall"&&a.points?.length>=3){
      const p3=a.points[2];
      /* Mismo FIX que en la pantalla principal: el 3er punto define el grosor real
         (antes era un desplazamiento fijo que ignoraba dónde tocabas). */
      const dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy)||1;
      const px2=-dy/len,py2=dx/len;
      let off=(p3.x-p1.x)*px2+(p3.y-p1.y)*py2;
      if(Math.abs(off)<.012)off=off<0?-.03:.03;
      const nx=px2*off,ny=py2*off;
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw}/>
        <line x1={`${(p1.x+nx)*100}%`} y1={`${(p1.y+ny)*100}%`} x2={`${(p2.x+nx)*100}%`} y2={`${(p2.y+ny)*100}%`} stroke={col} strokeWidth={sw} strokeDasharray="5,2"/>
        {!ip&&<BadgeEl bx={(p1.x+p2.x)*50+nx*50} by={(p1.y+p2.y)*50+ny*50-5}/>}
      </g>;
    }
    /* ── POLILÍNEA ── */
    if(a.type==="poly"&&a.points?.length>=2){
      const d="M "+a.points.map(p=>`${p.x*100}% ${p.y*100}%`).join(" L ");
      return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
        <path d={d} stroke={col} strokeWidth={sw} fill="none"/>
        {a.points.map((p,i)=><circle key={i} cx={`${p.x*100}%`} cy={`${p.y*100}%`} r="1%" fill={col}/>)}
        {!ip&&<BadgeEl bx={a.points.reduce((s,p)=>s+p.x,0)/a.points.length*100} by={a.points.reduce((s,p)=>s+p.y,0)/a.points.length*100-5}/>}
      </g>;
    }
    /* ── LÍNEA SIMPLE ── */
    return<g onClick={openM} style={{cursor:ip?"crosshair":"pointer"}}>
      <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={sw}/>
      <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke="transparent" strokeWidth="14"/>
      <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1%" fill={col} opacity=".7"/>
      <circle cx={`${p2.x*100}%`} cy={`${p2.y*100}%`} r="1%" fill={col} opacity=".7"/>
      {!ip&&<BadgeEl bx={mx} by={my-5}/>}
    </g>;
  };

  return(
<div style={{maxWidth:"960px",margin:"0 auto",background:"var(--bg)",height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>

{/* HEADER */}

  {scr==="annotate"&&<>
    <button onClick={save} title="Guardar proyecto actual"

    <button onClick={()=>{

      style={{padding:"5px 9px",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",color:"var(--txt2)",borderRadius:"7px",fontSize:"11px"}}>🏠</button>
  </>}
  <button onClick={()=>setScr("setup")} title="Configurar API"
    style={{padding:"5px 9px",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",color:"var(--txt2)",borderRadius:"7px",fontSize:"12px"}}>⚙</button>
</div>

<div className="app-scroll" style={{flex:1,display:"flex",flexDirection:"column",padding:"8px",gap:"8px",overflowY:"scroll",height:0}}>

{/* HOME */}
{scr==="home"&&<div className="fade" style={{display:"flex",flexDirection:"column",gap:"8px"}}>
  {/* Recuperar sesión autosaved */}
  {(()=>{try{const s=localStorage.getItem("ms3_autosave");if(!s)return null;const d=JSON.parse(s);if(!d?.img)return null;
    return<button onClick={()=>{
      setImg(d.img);setAnns(d.anns||[]);setSegs(d.segs||[]);setPName(d.pName||"");
      setObjInfo(d.objInfo||null);setScale(d.scale||null);setColI(d.colI||0);setScr("annotate");
    }} style={{width:"100%",padding:"14px 18px",background:"linear-gradient(135deg,#0055cc,#0099ff)",color:"#fff",border:"none",
      borderRadius:"14px",fontSize:"13px",fontWeight:800,boxShadow:"0 4px 20px rgba(0,100,255,.3)",textAlign:"left",display:"flex",gap:"12px",alignItems:"center"}}>
      <span style={{fontSize:"28px"}}>↩</span>
      <div><div style={{fontSize:"13px",fontWeight:800}}>Continuar sesión anterior</div>
      <div style={{fontSize:"9px",opacity:.85,marginTop:"2px"}}>{d.pName||"Sin nombre"} · {d.anns?.filter(a=>a.value!=null).length||0} medidas guardadas</div></div>
    </button>;
  }catch{return null;}})()}
  <button onClick={()=>setScr("camera")} style={{width:"100%",padding:"18px",background:"linear-gradient(135deg,#ff6600,#ff9500,#ffcc00)",color:"#000",border:"none",borderRadius:"14px",fontSize:"15px",fontWeight:800,letterSpacing:"-.2px",boxShadow:"0 4px 28px rgba(255,150,0,.45)"}}>＋ NUEVO PROYECTO</button>
  {!GK()&&<div style={{background:"rgba(255,150,0,.12)",border:"1px solid rgba(255,150,0,.35)",borderRadius:"10px",padding:"10px 14px",fontSize:"9px",color:"#ff9500"}}>⚠️ Sin clave API Groq — toca ⚙ para configurarla</div>}
  {projs.length>0&&<div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"14px",overflow:"hidden"}}>
    <div style={{padding:"8px 13px",fontSize:"9px",color:"#ff9500",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>📁 Proyectos — {projs.length}</span><span style={{color:"#334",fontSize:"7px"}}>Toca · ✕ elimina</span></div>
    {projs.map(p=><div key={p.id} onClick={()=>loadP(p)} style={{display:"flex",alignItems:"center",gap:"9px",padding:"9px 12px",borderBottom:"1px solid rgba(255,255,255,.04)",cursor:"pointer"}}>

      <div style={{flex:1,minWidth:0}}><div style={{fontSize:"10px",color:"#eee",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div><div style={{fontSize:"8px",color:"#ff9500"}}>{p.measCount||p.anns?.filter(a=>a.value!=null).length||0} medidas · {p.date}</div></div>
      <button onClick={e=>delP(p.id,e)} style={{background:"transparent",border:"none",color:"#ff3366",fontSize:"14px",opacity:.6}}>✕</button>
    </div>)}
  </div>}
</div>}

{scr==="setup"&&<div className="fade" style={{display:"flex",flexDirection:"column",gap:"10px"}}>

    <button onClick={()=>{if(!keyIn.startsWith("gsk_")){alert("Debe empezar por gsk_");return;}localStorage.setItem("ms3_k",keyIn);setScr("home");}} style={{padding:"12px",background:"linear-gradient(135deg,#ff7700,#ffaa00)",color:"#fff",border:"none",borderRadius:"9px",fontSize:"11px",fontWeight:700}}>GUARDAR Y CONTINUAR</button>
  </div>
  {GK()&&<button onClick={()=>setScr("home")} style={{padding:"9px",background:"transparent",border:"1px solid rgba(255,255,255,.1)",color:"#3355aa",borderRadius:"8px",fontSize:"9px"}}>← Volver</button>}
</div>}

{scr==="camera"&&<div className="fade" style={{display:"flex",flexDirection:"column",gap:"8px"}}>
  <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"14px",overflow:"hidden"}}>
    <div style={{padding:"8px 13px",fontSize:"9px",color:"#ff3366",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",borderBottom:"1px solid rgba(255,255,255,.05)",display:"flex",gap:"6px",alignItems:"center"}}><span style={{fontSize:"8px"}}>●</span> Cámara en vivo</div>
    {cam==="off"&&<div style={{padding:"20px",textAlign:"center"}}><button onClick={startCam} style={{padding:"11px 26px",background:"linear-gradient(135deg,#ff7700,#ffaa00)",color:"#fff",border:"none",borderRadius:"10px",fontSize:"10px",fontWeight:700}}>📹 ACTIVAR CÁMARA</button></div>}
    {cam==="starting"&&<div style={{padding:"22px",textAlign:"center"}}><div style={{width:"28px",height:"28px",borderRadius:"50%",border:"3px solid #1e2535",borderTop:"3px solid #ff9500",margin:"0 auto"}} className="spin"/></div>}
    {cam==="live"&&<><div style={{position:"relative",background:"#000",aspectRatio:"4/3"}}><video ref={vidRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/><div style={{position:"absolute",left:0,right:0,height:"2px",background:"linear-gradient(90deg,transparent,#00b4ff,transparent)",animation:"scan 2.5s linear infinite",opacity:.7,pointerEvents:"none"}}/></div><div style={{display:"flex",gap:"10px",padding:"12px",justifyContent:"center",alignItems:"center"}}><button onClick={stopCam} style={{padding:"8px 14px",background:"rgba(255,50,50,.15)",border:"1px solid rgba(255,50,50,.3)",color:"#ff3366",borderRadius:"8px",fontSize:"9px"}}>✕</button><button onClick={capCam} style={{width:"56px",height:"56px",borderRadius:"50%",border:"3.5px solid #ff9500",background:"transparent",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 24px rgba(255,150,0,.5)"}}><div style={{width:"40px",height:"40px",borderRadius:"50%",background:"linear-gradient(135deg,#ff6600,#ffaa00)"}}/></button></div></>}
  </div>
  <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"14px",overflow:"hidden"}}>
    <div style={{padding:"8px 13px",fontSize:"9px",color:C,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",borderBottom:"1px solid rgba(255,255,255,.05)"}}>📷 Foto · Galería · Boceto · Plano · P&ID</div>
    <div style={{padding:"10px",display:"flex",flexDirection:"column",gap:"8px"}}>
      <button onClick={()=>camRef.current?.click()} style={{display:"flex",alignItems:"center",gap:"13px",padding:"14px",background:"rgba(255,150,0,.08)",border:"1px solid rgba(255,150,0,.2)",borderRadius:"11px",width:"100%"}}>
        <span style={{fontSize:"26px"}}>📷</span><div style={{textAlign:"left"}}><div style={{fontSize:"11px",fontWeight:700,color:"#ff9500"}}>TOMAR FOTO</div><div style={{fontSize:"8px",color:"#2a3a5a",marginTop:"2px"}}>Objeto · pieza · herramienta · equipo industrial...</div></div>
      </button>
      <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={onFile}/>
      <button onClick={()=>upRef.current?.click()} style={{display:"flex",alignItems:"center",gap:"13px",padding:"14px",background:"rgba(0,100,255,.05)",border:"1px solid rgba(0,150,255,.15)",borderRadius:"11px",width:"100%"}}>
        <span style={{fontSize:"26px"}}>🖼</span><div style={{textAlign:"left"}}><div style={{fontSize:"11px",fontWeight:700,color:"#66aaff"}}>GALERÍA / BOCETO / PLANO</div><div style={{fontSize:"8px",color:"#2a3a5a",marginTop:"2px"}}>JPG · PNG · P&ID · Croquis · Isométrico · DWG foto</div></div>
      </button>
      <input ref={upRef} type="file" accept="image/*" style={{display:"none"}} onChange={onFile}/>
    </div>
  </div>
</div>}

{/* LOADING */}
{scr==="loading"&&<div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"14px",overflow:"hidden"}} className="fade">
  {img&&<img src={img} alt="" style={{width:"100%",aspectRatio:"4/3",objectFit:"cover",opacity:.7}}/>}
  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"12px",padding:"26px"}}>
    <div style={{width:"38px",height:"38px",borderRadius:"50%",border:"3px solid #1e2535",borderTop:"3px solid #ff9500"}} className="spin"/>
    <div style={{fontSize:"10px",color:C,fontWeight:600}}>IA analizando · identificando partes · preparando medidas...</div>
    <div style={{fontSize:"9px",color:"#2a3a5a",textAlign:"center",lineHeight:1.7}}>Se detectarán las partes automáticamente<br/>y se marcarán con colores en la imagen</div>
  </div>

{/* ANNOTATE */}
{scr==="annotate"&&<div className="fade" style={{display:"flex",flexDirection:"column",gap:"0"}}>

  {/* Project name + object info */}
  <div style={{display:"flex",gap:"5px",marginBottom:"7px"}}>
    <input value={pName} onChange={e=>setPName(e.target.value)} placeholder="Nombre proyecto" style={{flex:1,padding:"7px 10px",background:"var(--bg2)",border:"1px solid rgba(0,100,200,.22)",borderRadius:"8px",color:C,fontSize:"11px",fontWeight:700}}/>

      <input type="number" min="0" value={a.value} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();updA(a.id,{value:e.target.value===""?null:parseFloat(e.target.value)});}} style={{width:"65px",padding:"4px 7px",background:"var(--bg2)",border:`1px solid ${selId===a.id?"rgba(0,180,255,.45)":"rgba(0,150,255,.18)"}`,borderRadius:"5px",color:selId===a.id?"#ffaa00":a.color,fontSize:"13px",textAlign:"right"}}/>
      <select value={a.unit} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();updA(a.id,{unit:e.target.value});}} style={{padding:"4px",background:"var(--bg2)",border:"1px solid rgba(0,150,255,.12)",borderRadius:"5px",color:"#334455",fontSize:"8px"}}>{["mm","cm","m","in","ft"].map(u=><option key={u}>{u}</option>)}</select>
      <span style={{fontSize:"8px",color:"#1e2535",flexShrink:0,minWidth:"34px"}}>{fmtV(toMM(a.value,a.unit),"mm")}</span>
      <button onClick={e=>{e.stopPropagation();delA(a.id);}} style={{background:"transparent",border:"none",color:"#ff3366",fontSize:"13px",opacity:.6,flexShrink:0}}>✕</button>
    </div>)}
    {/* Auto-calc metrics */}
    {(()=>{const g=ax=>{const a=anns.find(a=>a.axis===ax&&a.value!=null);return a?toMM(a.value,a.unit)/1000:0;};const W=g("width"),H=g("height"),D=g("depth");if(!W&&!H&&!D)return null;
    return<div style={{padding:"8px 13px",background:"rgba(0,80,200,.06)",borderTop:"1px solid rgba(0,100,200,.1)"}}>
      <div style={{fontSize:"8px",color:C,fontWeight:700,marginBottom:"5px"}}>📊 MÉTRICAS CALCULADAS</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 10px",fontSize:"9px",color:"#4488bb"}}>
        {W&&D&&<span>Área suelo: <b style={{color:C}}>{(W*D).toFixed(2)} m²</b></span>}
        {W&&D&&<span>Perímetro: <b style={{color:C}}>{(2*(W+D)).toFixed(2)} m</b></span>}
        {W&&H&&D&&<span>Volumen: <b style={{color:C}}>{(W*H*D).toFixed(3)} m³</b></span>}
        {H&&<span>Altura: <b style={{color:C}}>{H.toFixed(2)} m</b></span>}
        {H&&(W||D)&&<span>Área paredes: <b style={{color:C}}>{(2*H*(W+D)).toFixed(2)} m²</b></span>}
      </div>
    </div>;})()}
    <ShareBar onPNG={xPNG} onPDF={xPDF} onWA={xWA} onEmail={xEmail} onLink={genLink} onDXF={xDXF} onCopy={xCopy}/>
    {/* Edit selected annotation */}
    {selA&&<div style={{padding:"10px 13px",borderTop:"1px solid rgba(255,150,0,.2)",background:"rgba(255,100,0,.05)"}}>

        <input value={selA.title||""} placeholder="Título" onChange={e=>updA(selId,{title:e.target.value})} style={{flex:1,padding:"6px 9px",background:"var(--bg2)",border:"1px solid rgba(0,200,100,.2)",borderRadius:"7px",color:"var(--txt)",fontSize:"10px"}}/>
        <select value={selA.axis||""} onChange={e=>updA(selId,{axis:e.target.value})} style={{padding:"6px",background:"var(--bg2)",border:"1px solid rgba(0,200,100,.2)",borderRadius:"7px",color:"#44dd88",fontSize:"9px"}}>

        <button onClick={()=>delA(selId)} style={{padding:"5px 9px",background:"rgba(255,50,50,.1)",border:"1px solid rgba(255,50,50,.25)",color:"#ff3366",borderRadius:"6px",fontSize:"10px"}}>🗑</button>
      </div>
    </div>}
  </div>}

  {/* 2D PANEL */}

        <button onClick={redoFn} disabled={redo.length===0} title="Rehacer" style={{padding:"3px 8px",background:redo.length>0?"rgba(0,180,255,.15)":"transparent",border:`1px solid ${redo.length>0?"rgba(0,180,255,.35)":"transparent"}`,color:redo.length>0?"#00bbff":"#333",borderRadius:"6px",fontSize:"8px",fontWeight:700}}>↪ {redo.length}</button>
        <button onClick={()=>setSheet(null)} style={{background:"rgba(255,50,50,.18)",border:"1px solid rgba(255,50,50,.35)",color:"#ff5566",borderRadius:"50%",width:"22px",height:"22px",fontSize:"13px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>

    </div>
    {!hasDim&&<div style={{padding:"9px 13px",fontSize:"9px",color:"#2a3a5a",background:"rgba(0,60,180,.06)",borderBottom:"1px solid rgba(0,60,180,.1)",lineHeight:1.8}}>
      💡 Añade medidas con eje Ancho/Alto/Prof. para generar el plano<br/>

    </div>}
    {segs?.length>1&&<div style={{margin:"8px 13px",padding:"10px",background:"#fff",borderRadius:"10px",border:"1px solid var(--border)",boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>

        <button onClick={()=>{setPart3DSel(new Set());setPart2DSel(null);}} style={{padding:"6px 12px",borderRadius:"8px",fontSize:"9px",fontWeight:700,
          background:(!part3DSel||part3DSel.size===0)?"linear-gradient(135deg,#ff7700,#ffaa00)":"var(--bg3)",
          border:`2px solid ${(!part3DSel||part3DSel.size===0)?"#ff7700":"var(--border)"}`,
          color:(!part3DSel||part3DSel.size===0)?"#fff":"var(--txt2)",
          boxShadow:(!part3DSel||part3DSel.size===0)?"0 2px 8px rgba(255,119,0,.3)":"none"}}>
          {(!part3DSel||part3DSel.size===0)?"✓ ":""}Todas ({segs.length})</button>
        {segs.map(seg=>{
          const sel=part3DSel?.has(seg.id)??false;
          return<button key={seg.id} onClick={()=>{
            setPart3DSel(prev=>{const next=new Set(prev||[]);if(next.has(seg.id))next.delete(seg.id);else next.add(seg.id);return next;});
            setPart2DSel(seg.id===part2DSel?null:seg.id);
          }} style={{padding:"6px 12px",borderRadius:"8px",fontSize:"9px",fontWeight:700,
            background:sel?(seg.color||C):"var(--bg3)",
            border:`2px solid ${part2DSel===seg.id?"#000":sel?(seg.color||C):"var(--border)"}`,
            color:sel?"#fff":"var(--txt2)",
            boxShadow:sel?`0 2px 8px ${(seg.color||C)}55`:"none",

      {/* Panel interactivo de la pieza seleccionada */}
      {part2DSel&&(()=>{
        const seg=segs.find(s=>s.id===part2DSel);if(!seg)return null;
        const segMeas=anns.filter(a=>a.value!=null&&annInSeg(a,seg));
        return<div style={{marginTop:"12px",padding:"12px",background:"var(--bg3)",borderRadius:"10px",border:`2px solid ${seg.color||C}`,display:"flex",gap:"14px",alignItems:"flex-start",flexWrap:"wrap"}}>
          {/* Foto de la zona */}
          <div style={{flexShrink:0,position:"relative"}}>
            {img&&<img src={img} style={{
              width:"140px",height:"100px",objectFit:"cover",
              objectPosition:`${((seg.x1+seg.x2)/2)*100}% ${((seg.y1+seg.y2)/2)*100}%`,
              borderRadius:"8px",border:`2px solid ${seg.color||C}`,
              transform:`rotate(${rot2d}deg)`,transition:"transform .3s"
            }}/>}
            <div style={{position:"absolute",top:"4px",right:"4px",display:"flex",gap:"3px"}}>
              <button onClick={()=>setRot2d(r=>(r-90+360)%360)} title="Rotar -90°"

            </div>
          </div>
          {/* Info y acciones */}
          <div style={{flex:1,minWidth:"140px"}}>
            <div style={{fontSize:"11px",fontWeight:800,color:seg.color||C,marginBottom:"4px"}}>{seg.name}</div>
            <div style={{fontSize:"9px",color:"var(--txt2)",marginBottom:"8px"}}>
              {segMeas.length>0
                ?segMeas.map(a=><div key={a.id} style={{display:"flex",gap:"4px",alignItems:"center"}}>

    <div style={{padding:"8px 13px",fontSize:"9px",color:C,fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",borderBottom:"1px solid rgba(255,255,255,.05)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>

               color:col2,
               points:isV
                 ?[{x:base.x+ox,y:base.y-.06},{x:base.x+ox,y:base.y+.06}]
                 :[{x:base.x-.07,y:base.y+oy},{x:base.x+.07,y:base.y+oy}],
               lineStyle:"solid",arrowHead:"both"};
      addA(a);setColI(c=>c+1);
      setLadosSession(prev=>[...prev,a.id]);
      setDimVals(prev=>({...prev,[d.key]:""}));
      /* Feedback visual sin cerrar el modal */
      setAiMsg(`${d.icon} ${d.label}: ${v} ${dimVals.u} añadida ✓`);
    };
    const cancelarLados=()=>{
      /* Eliminar todas las medidas añadidas en esta sesión */
      if(ladosSession.length>0){
        setAnns(prev=>prev.filter(a=>!ladosSession.includes(a.id)));
        setLadosSession([]);
      }
      skipM();setMeasTab("simple");
    };
    const guardarLados=()=>{
      const count=ladosSession.length;
      setLadosSession([]);
      setMeasM(null);setMeasTab("simple");
      if(count>0&&window.confirm(`✅ ${count} medida(s) guardadas.\n\n¿Quieres verlas en el Plano 2D ahora?`)){
        setScopeAsk("2d");
      }
    };
    return<div>
      <div style={{fontSize:"9px",color:"var(--txt2)",marginBottom:"10px",lineHeight:1.7}}>
        Escribe el valor de cada lado/dimensión y pulsa <b>+</b> para añadirla a la imagen. Puedes añadir las que quieras.
        {ladosSession.length>0&&<span style={{color:"#ff7700",fontWeight:700}}> ({ladosSession.length} añadidas ✓)</span>}
      </div>
      <div style={{display:"flex",gap:"4px",marginBottom:"10px"}}>
        {["mm","cm","m","in","ft"].map(u=><button key={u} onClick={()=>setDimVals(s=>({...s,u}))} style={{flex:1,padding:"5px",background:dimVals.u===u?"rgba(255,119,0,.2)":"var(--bg3)",color:dimVals.u===u?"#cc5500":"var(--txt2)",border:`1px solid ${dimVals.u===u?"#ff9500":"var(--border)"}`,borderRadius:"6px",fontSize:"9px",fontWeight:dimVals.u===u?700:400}}>{u}</button>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"7px",maxHeight:"280px",overflowY:"auto",paddingRight:"2px"}}>
        {dims.map(d=>(
          <div key={d.key} style={{display:"flex",gap:"8px",alignItems:"center"}}>
            <div style={{width:"80px",fontSize:"9px",fontWeight:700,color:"var(--txt2)",flexShrink:0}}>{d.label}</div>
            <input type="number" min="0" step=".01" placeholder={d.placeholder}
              value={dimVals[d.key]||""} onChange={e=>setDimVals(s=>({...s,[d.key]:e.target.value}))}
              onKeyDown={e=>e.key==="Enter"&&addDim(d)}
              style={{flex:1,padding:"8px 10px",background:"#fff",border:`2px solid ${dimVals[d.key]?"#ff7700":"var(--border)"}`,borderRadius:"7px",color:"#1a1a1a",fontSize:"13px",textAlign:"right",transition:"border-color .15s"}}/>
            <button onClick={()=>addDim(d)} style={{padding:"8px 14px",background:"linear-gradient(135deg,#ff7700,#ffaa00)",color:"#fff",border:"none",borderRadius:"7px",fontSize:"14px",fontWeight:900,flexShrink:0,boxShadow:"0 2px 6px rgba(255,150,0,.4)"}}>+</button>
          </div>
        ))}
      </div>
      {/* Botón "Guardar todo" que añade todos los campos rellenos de una vez */}
      <button onClick={()=>{
        dims.forEach(d=>{if(dimVals[d.key])addDim(d);});
        setTimeout(()=>setAiMsg("✅ Todas las medidas añadidas a la imagen"),100);
      }} style={{width:"100%",marginTop:"8px",padding:"9px",background:"rgba(255,119,0,.12)",border:"2px dashed #ff9500",color:"#cc5500",borderRadius:"9px",fontSize:"10px",fontWeight:700}}>
        ⚡ Guardar todo — añade todos los campos rellenos a la imagen
      </button>
      <div style={{display:"flex",gap:"8px",marginTop:"12px"}}>
        <button onClick={cancelarLados} style={{flex:1,padding:"10px",background:"rgba(255,50,50,.1)",border:"1px solid rgba(255,50,50,.3)",color:"#cc2200",borderRadius:"9px",fontSize:"10px",fontWeight:700}}>
          🗑 Cancelar{ladosSession.length>0?` (borra ${ladosSession.length})`:""}</button>
        <button onClick={guardarLados} style={{flex:2,padding:"10px",background:"linear-gradient(135deg,#00aa44,#00dd66)",color:"#fff",border:"none",borderRadius:"9px",fontSize:"11px",fontWeight:800}}>
          ✓ Guardar{ladosSession.length>0?` (${ladosSession.length} medidas)`:""}</button>
      </div>
    </div>;
  })()}

  {/* ── TAB: AÑADIR A IMAGEN PRINCIPAL ── */}
  {measTab==="principal"&&(()=>{
    const existingMeas=editZone?fcAnns.filter(a=>a.value!=null):anns.filter(a=>a.value!=null);
    const seg=editZone?.seg;
    return<div>
      <div style={{fontSize:"9px",color:"var(--txt2)",marginBottom:"12px",lineHeight:1.7}}>
        {editZone
          ?`Estas ${existingMeas.length} medida(s) de la zona se copiarán a la imagen principal con las coordenadas reales.`
          :`Tienes ${existingMeas.length} medida(s) en la imagen. Elige cuáles mostrar en el plano 2D y la vista 3D.`}
      </div>
      {existingMeas.length===0&&<div style={{padding:"16px",textAlign:"center",color:"var(--txt2)",fontSize:"9px"}}>
        Aún no hay medidas confirmadas. Añade al menos una desde la pestaña "Medida" o "Lados".
      </div>}
      {existingMeas.length>0&&<div style={{display:"flex",flexDirection:"column",gap:"6px",maxHeight:"180px",overflowY:"auto"}}>
        {existingMeas.map(a=>(
          <div key={a.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 10px",background:"var(--bg3)",borderRadius:"8px",border:`1px solid ${a.color}44`}}>
            <span style={{fontSize:"16px",flexShrink:0}}>{a.icon||"●"}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:"10px",fontWeight:700,color:"var(--txt)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.title||a.type}</div>
              <div style={{fontSize:"9px",color:a.color,fontWeight:700}}>{a.value} {a.unit}{a.axis?` · ${a.axis}`:""}</div>
            </div>
            {/* Botones de acción por medida */}
            <button onClick={()=>{setMeasM({...a,_existing:true});setMIn({t:a.title||"",v:a.value!=null?String(a.value):"",u:a.unit||"cm",ax:a.axis||""});setMeasTab("simple");}}
              title="Editar" style={{background:"rgba(0,100,255,.1)",border:"1px solid rgba(0,100,255,.25)",color:"#0055cc",borderRadius:"6px",padding:"4px 8px",fontSize:"11px",cursor:"pointer",flexShrink:0}}>✎</button>
            <button onClick={()=>{if(window.confirm(`¿Eliminar "${a.title||a.type}"?`)){editZone?setFcAnns(p=>p.filter(x=>x.id!==a.id)):setAnns(p=>p.filter(x=>x.id!==a.id));}}}
              title="Eliminar" style={{background:"rgba(255,50,50,.1)",border:"1px solid rgba(255,50,50,.25)",color:"#cc2200",borderRadius:"6px",padding:"4px 8px",fontSize:"11px",cursor:"pointer",flexShrink:0}}>🗑</button>
          </div>
        ))}
      </div>}
      <div style={{display:"flex",gap:"8px",marginTop:"12px"}}>
        {editZone&&seg&&<button onClick={()=>{
          const newAnns=fcAnns.filter(x=>x.value!=null).map(x=>({...x,id:uid(),_fc:false,partId:seg.id,partName:seg.name,
            points:x.points.map(p=>({x:seg.x1+(p.x)*(seg.x2-seg.x1),y:seg.y1+(p.y)*(seg.y2-seg.y1)}))}));
          newAnns.forEach(a=>addA(a));
          setMeasM(null);setMeasTab("simple");
          setAiMsg(`✅ ${newAnns.length} medida(s) de "${seg.name}" añadidas a la imagen principal`);
        }} style={{flex:2,padding:"12px",background:"linear-gradient(135deg,#0055cc,#0099ff)",color:"#fff",border:"none",borderRadius:"9px",fontSize:"11px",fontWeight:700}}>
          ↑ Copiar todas a imagen principal
        </button>}
        <button onClick={()=>{setMeasM(null);setScopeAsk("2d");setMeasTab("simple");}} style={{flex:1,padding:"12px",background:"rgba(0,100,255,.1)",border:"1px solid rgba(0,100,255,.25)",color:"#0055cc",borderRadius:"9px",fontSize:"10px",fontWeight:700}}>📐 Ver 2D</button>
        <button onClick={()=>{setMeasM(null);setScopeAsk("3d");setMeasTab("simple");}} style={{flex:1,padding:"12px",background:"rgba(100,50,255,.1)",border:"1px solid rgba(100,50,255,.25)",color:"#6633cc",borderRadius:"9px",fontSize:"10px",fontWeight:700}}>🎮 Ver 3D</button>
      </div>
      <button onClick={()=>{skipM();setMeasTab("simple");}} style={{width:"100%",marginTop:"8px",padding:"10px",background:"var(--bg3)",border:"1px solid var(--border)",color:"var(--txt2)",borderRadius:"9px",fontSize:"10px"}}>↩ Cerrar</button>
    </div>;
  })()}
</div>}

      <button onClick={()=>{setViewPrompt(null);setScopeAsk("2d");}} style={{flex:1,padding:"8px 4px",background:"rgba(0,100,255,.08)",border:"1px solid rgba(0,100,255,.2)",color:"#0055cc",borderRadius:"8px",fontSize:"9px",fontWeight:700}}>📐 2D</button>
      <button onClick={()=>{setViewPrompt(null);setScopeAsk("3d");}} style={{flex:1,padding:"8px 4px",background:"rgba(100,50,255,.08)",border:"1px solid rgba(100,50,255,.2)",color:"#6633cc",borderRadius:"8px",fontSize:"9px",fontWeight:700}}>🎮 3D</button>
      <button onClick={()=>setViewPrompt(null)} style={{flex:1,padding:"8px 4px",background:"var(--bg3)",border:"1px solid var(--border)",color:"var(--txt2)",borderRadius:"8px",fontSize:"9px"}}>↩ Seguir</button>
    </div>}
  </div>;
})()}

{/* ══ ICON INFO MODAL — MODO ICONOS: al tocar un icono de medida (foto principal
    o pestaña de zona) se muestra el detalle completo y se elige dónde verla:
    aquí mismo, en la vista 2D o en la vista 3D. Las vistas 2D/3D siempre
    muestran TODAS las medidas completas (tipo+valor), sea cual sea su tipo. ══ */}
{iconInfoM&&(()=>{
  const{ann,ordinal,fc}=iconInfoM;
  const td=TOOLS.find(t=>t.id===ann.type);
  const col=ann.color||"#ff9500";
  const sinMedida=ann.value==null;
  const valTxt=sinMedida?`⚠ Sin medida — toca Editar`:`${ann.value} ${ann.unit}`;
  const editHere=()=>{
    setIconInfoM(null);setSelId(ann.id);setTool("sel");
    /* Siempre abrir el modal de medida, sea marcador o forma */
    setMeasM({...ann,_existing:true,_fc:!!fc});
    setMIn({t:ann.title||"",v:ann.value!=null?String(ann.value):"",u:ann.unit||"cm",ax:ann.axis||""});
  };
  const goTo=target=>{
    if(!fc){setIconInfoM(null);setScopeAsk(target);return;}
    const seg=editZone?.seg;if(!seg){setIconInfoM(null);return;}
    const newAnns=fcAnns.filter(x=>x.value!=null).map(x=>({
      ...x,id:uid(),_fc:false,partId:seg.id,partName:seg.name,
      points:x.points.map(p=>({x:seg.x1+(p.x)*(seg.x2-seg.x1),y:seg.y1+(p.y)*(seg.y2-seg.y1)}))
    }));
    setIconInfoM(null);setRemoveZoneM({seg,newAnns,targetSheet:target});
  };
  /* Popover compacto — no ocupa toda la pantalla, aparece como burbuja flotante */
  return<div data-modal="iconinfo" onClick={()=>setIconInfoM(null)}
    style={{position:"fixed",inset:0,zIndex:fc?960:600,background:"rgba(0,0,0,.15)"}}>
    <div onClick={e=>e.stopPropagation()}
      style={{position:"absolute",bottom:"80px",left:"50%",transform:"translateX(-50%)",
        width:"min(340px,calc(100% - 32px))",
        background:"#fff",border:`2px solid ${col}`,borderRadius:"14px",
        boxShadow:"0 8px 32px rgba(0,0,0,.25)",animation:"slideUp .15s ease",overflow:"hidden"}}>
      {/* Cabecera del popover */}
      <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",
        background:`${col}14`,borderBottom:`1px solid ${col}44`}}>
        <div style={{width:"32px",height:"32px",borderRadius:"50%",background:"#fff",
          border:`2.5px solid ${col}`,display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:"16px",color:col,flexShrink:0}}>{ann.icon||td?.icon||"●"}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:"12px",fontWeight:800,color:col}}>{td?.label||ann.type} #{ordinal}</div>
          {ann.title&&<div style={{fontSize:"9px",color:"var(--txt2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ann.title}</div>}
        </div>
        <div style={{fontSize:sinMedida?"11px":"14px",fontWeight:900,
          color:sinMedida?"#cc2200":col,flexShrink:0,
          background:sinMedida?"rgba(200,0,0,.1)":"transparent",
          padding:sinMedida?"3px 7px":"0",borderRadius:"6px"}}>{valTxt}</div>
        <button onClick={()=>setIconInfoM(null)} style={{background:"none",border:"none",color:"var(--txt2)",fontSize:"16px",padding:"0 2px",flexShrink:0}}>✕</button>
      </div>
      {/* Acciones en fila */}
      <div style={{display:"flex",gap:"0"}}>
        <button onClick={editHere} style={{flex:1,padding:"9px 6px",background:"transparent",
          border:"none",borderRight:"1px solid var(--border)",color:"#cc6600",
          fontSize:"9px",fontWeight:700,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}}>
          <span style={{fontSize:"14px"}}>✎</span>Editar
        </button>
        <button onClick={()=>goTo("2d")} style={{flex:1,padding:"9px 6px",background:"transparent",
          border:"none",borderRight:"1px solid var(--border)",color:"#0055cc",
          fontSize:"9px",fontWeight:700,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}}>
          <span style={{fontSize:"14px"}}>📐</span>Ver 2D
        </button>
        <button onClick={()=>goTo("3d")} style={{flex:1,padding:"9px 6px",background:"transparent",
          border:"none",color:"#6633cc",
          fontSize:"9px",fontWeight:700,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}}>
          <span style={{fontSize:"14px"}}>🎮</span>Ver 3D
        </button>
      </div>
    </div>
  </div>;
})()}

{addPartDlg&&<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:"var(--bg2)",border:"2px solid #00dd77",borderRadius:"18px 18px 0 0",padding:"20px 18px",zIndex:600,animation:"slideUp .22s ease",backdropFilter:"blur(24px)"}}>
  <button onClick={()=>setAddPartDlg(false)} style={{position:"absolute",top:"12px",right:"14px",background:"rgba(255,50,50,.15)",border:"1px solid rgba(255,50,50,.3)",color:"#ff3366",borderRadius:"50%",width:"28px",height:"28px",fontSize:"15px",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
  <div style={{fontSize:"13px",fontWeight:800,color:"#00dd77",marginBottom:"6px"}}>＋ AÑADIR NUEVA PARTE</div>

  <div style={{fontSize:"9px",color:"var(--txt2)",marginBottom:"8px"}}>Color de la parte:</div>

  <div style={{display:"flex",gap:"8px"}}>
    <button onClick={()=>setAddPartDlg(false)} style={{flex:1,padding:"12px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",color:"var(--txt2)",borderRadius:"9px",fontSize:"10px"}}>Cancelar</button>
    <button onClick={()=>{
      if(!newPartName.trim()){alert("Escribe el nombre de la parte");return;}

      setSegs(s=>[...s,{id:String(s.length+1),name:part.name,x1:.1,y1:.1,x2:.9,y2:.9,color:part.color,hint:"Dibuja sobre esta parte para medirla"}]);
      setNewPartName("");setAddPartDlg(false);setSheet(null);
      setAiMsg(`Parte "${part.name}" añadida. Ahora selecciona herramientas y dibuja sobre esa zona en la imagen.`);
    }} style={{flex:2,padding:"12px",background:"linear-gradient(135deg,#008844,#00dd77)",color:"#000",border:"none",borderRadius:"9px",fontSize:"12px",fontWeight:800}}>
      ＋ CREAR PARTE Y MEDIR
    </button>
  </div>
</div>}

{editZone&&<div style={{position:"fixed",inset:0,background:"rgba(255,255,255,.96)",zIndex:700,display:"flex",flexDirection:"column",overflow:"hidden"}}>
  {/* ══ FULL FLOATING CROP EDITOR ══ */}

    <div style={{flex:1}}>
      <div style={{fontSize:"11px",fontWeight:800,color:"#ff9500"}}>{editZone.seg.name} — Zona extraída</div>
      <div style={{fontSize:"8px",color:"var(--txt2)"}}>Selecciona herramienta → toca la imagen → añade medida</div>

      <button onClick={()=>setFcZoom(z=>Math.min(5,z+0.25))} style={{width:"28px",height:"28px",background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.12)",color:"var(--txt2)",borderRadius:"6px",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
    </div>
    {/* Botón SEGURO primero y bien grande: nunca pierde nada, solo oculta el panel */}
    <button onClick={goToMainKeepingZones} title="Volver a la imagen principal — esta pestaña sigue abierta con todo guardado" style={{background:"linear-gradient(135deg,#ff7700,#ffaa00)",border:"none",color:"#fff",borderRadius:"7px",padding:"0 14px",height:"32px",fontSize:"10px",fontWeight:800,display:"flex",alignItems:"center",gap:"5px",flexShrink:0}}>🏠 Pantalla principal</button>
    {/* Reposition: close panel, jump to main image with this piece pre-selected + Mover active */}
    <button onClick={()=>{
      const seg=editZone.seg;
      if(fcAnns.some(a=>a.value!=null)){setExitConfirm(true);return;}
      closeZone(activeZoneId,true);

      onTouchStart={e=>{if(e.touches.length===2){e.preventDefault();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;fcPinchRef.current=Math.sqrt(dx*dx+dy*dy);}}}
      onTouchMove={e=>{if(e.touches.length===2&&fcPinchRef.current){e.preventDefault();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const dist=Math.sqrt(dx*dx+dy*dy);const ratio=dist/fcPinchRef.current;setFcZoom(z=>Math.max(0.2,Math.min(5,z*ratio)));fcPinchRef.current=dist;}}}
      onTouchEnd={()=>{fcPinchRef.current=null;}}>
    <div style={{position:"relative",background:"#000",width:`${fcZoom*100}%`,margin:fcZoom<1?"0 auto":"0",minWidth:fcZoom>1?`${fcZoom*100}%`:"auto",transition:"width .15s"}}

      onClick={e=>{
        if(tool==="sel"||DRAG.includes(tool)||measM||calibM||fcClickLockRef.current)return;

        const r=e.currentTarget.getBoundingClientRect();
        const p={x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height};
        if(MRK.includes(tool)||td.npts===1){
          fcClickLockRef.current=true;
          const col=COLS[colI%COLS.length];
          const a={id:uid(),type:tool,icon:td.icon,color:col,points:[p],value:null,unit:"cm",title:"",axis:"",_fc:true};
          setFcHist(h=>[...h.slice(-20),JSON.parse(JSON.stringify(fcAnns))]);setFcRedo([]);
          setFcAnns(prev=>[...prev,a]);
          setMeasM({...a,_existing:true,_fc:true});setMIn({t:"",v:"",u:"cm",ax:""});
          return;
        }
        const pts=[...pend,p];
        if(pts.length>=td.npts){
          fcClickLockRef.current=true;
          const col=COLS[colI%COLS.length];
          const a={id:uid(),type:tool,icon:td.icon,color:col,points:pts,value:null,unit:"cm",title:"",axis:"",_fc:true};
          setFcHist(h=>[...h.slice(-20),JSON.parse(JSON.stringify(fcAnns))]);setFcRedo([]);
          setFcAnns(prev=>[...prev,a]);setPend([]);setPrev(null);
          setMeasM({...a,_existing:true,_fc:true});setMIn({t:"",v:"",u:"cm",ax:""});
        }else{setPend(pts);setPrev({type:tool,points:pts});}
      }}
      onMouseDown={e=>{
        if(!DRAG.includes(tool)||measM||calibM)return;
        const r=e.currentTarget.getBoundingClientRect();
        setDragSt({x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height});
      }}
      onMouseMove={e=>{
        const r=e.currentTarget.getBoundingClientRect();
        const p={x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height};
        if(pend.length>=1)setPrev({type:tool,points:[...pend,p]});
        if(dragSt)setPrev({type:tool,points:[dragSt,p]});
      }}
      onMouseUp={e=>{
        if(!dragSt)return;
        const r=e.currentTarget.getBoundingClientRect();
        const p={x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height};
        const ds=dragSt;setDragSt(null);setPrev(null);
        if(Math.abs(p.x-ds.x)<.01&&Math.abs(p.y-ds.y)<.01)return;
        const col=COLS[colI%COLS.length];
        const a={id:uid(),type:tool,color:col,points:[ds,p],value:null,unit:"cm",title:"",axis:"",_fc:true};
        setFcHist(h=>[...h.slice(-20),JSON.parse(JSON.stringify(fcAnns))]);setFcRedo([]);
        setFcAnns(prev=>[...prev,a]);
        setMeasM({...a,_existing:true,_fc:true});setMIn({t:"",v:"",u:"cm",ax:""});
      }}>
      <img src={editZone.croppedImg} style={{width:"100%",display:"block",cursor:tool==="sel"?"default":"crosshair",userSelect:"none",WebkitUserSelect:"none",touchAction:DRAG.includes(tool)?"none":"pan-y"}} draggable="false"/>

        {pend.length===1&&<circle cx={`${pend[0].x*100}%`} cy={`${pend[0].y*100}%`} r="5" fill={COLS[colI%COLS.length]} opacity=".9"/>}
      </svg>
      {/* Marker dots */}
      {fcAnns.filter(a=>MRK.includes(a.type)).map(a=>{
        const inMulti=multiSel.includes(a.id);
        const isSelected=selId===a.id;
        return<div key={a.id} style={{position:"absolute",left:`${a.points[0].x*100}%`,top:`${a.points[0].y*100}%`,transform:"translate(-50%,-50%)",
          width:"32px",height:"32px",borderRadius:"50%",
          background:"rgba(255,255,255,0.55)",
          backdropFilter:"blur(3px)",
          border:`3px solid ${inMulti?"#00cc66":a.color}`,
          outline:isSelected&&!inMulti?`3px dashed ${a.color}`:"none",outlineOffset:"3px",

          boxShadow:`0 2px 10px rgba(0,0,0,.4), 0 0 ${isSelected||inMulti?14:5}px ${inMulti?"#00cc66":a.color}`}}
          onClick={e=>{
            e.stopPropagation();
            if(tool==="selpts"){setMultiSel(prev=>prev.includes(a.id)?prev.filter(id=>id!==a.id):[...prev,a.id]);return;}
            setSelId(a.id);
            setIconInfoM({ann:a,ordinal:typeOrd(fcAnns,a),fc:true});
          }}>
          {a.icon||(a.type==="pin"?"📍":a.type==="star"?"⭐":a.type==="tgt"?"🎯":"●")}
          <div style={{position:"absolute",bottom:"-4px",right:"-4px",width:"15px",height:"15px",borderRadius:"50%",
            background:inMulti?"#00cc66":a.color,color:"var(--txt)",fontSize:"8px",fontWeight:900,display:"flex",alignItems:"center",
            justifyContent:"center",border:"2px solid #fff",pointerEvents:"none",
            boxShadow:"0 1px 4px rgba(0,0,0,.4)"}}>{inMulti?multiSel.indexOf(a.id)+1:typeOrd(fcAnns,a)}</div>
        </div>;
      })}
    </div>

    </div>{/* /scrollable viewport */}
    {/* Barra de desplazamiento horizontal personalizada */}
    {fcZoom>1&&<div style={{padding:"3px 8px 4px",background:"var(--bg)",borderTop:"1px solid var(--border)",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
        <span style={{fontSize:"7px",color:"#334",flexShrink:0}}>◀</span>
        <input type="range" min="0" max="100" value={fcPanX}

      </div>

    {/* MEASUREMENTS LIST for this zone */}
