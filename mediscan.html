/* ══ VIEW 2D ══ */
function View2D({anns,objName,sc}){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;
    const ctx=cv.getContext("2d"),W=cv.width,H=cv.height;

        ctx.beginPath();ctx.moveTo(rx,dY);ctx.lineTo(rx+rW,dY);ctx.stroke();

        ctx.fillStyle=TXT;ctx.font="8px 'Space Mono'";ctx.textAlign="center";ctx.fillText(wl||`${wx}mm`,rx+rW/2,dY-5);}
      if(hy&&rH>8){const dX=rx-26;ctx.strokeStyle=DIM;ctx.lineWidth=.8;
        ctx.beginPath();ctx.moveTo(rx-2,ry);ctx.lineTo(dX-2,ry);ctx.stroke();
        ctx.beginPath();ctx.moveTo(rx-2,ry+rH);ctx.lineTo(dX-2,ry+rH);ctx.stroke();
        ctx.beginPath();ctx.moveTo(dX,ry);ctx.lineTo(dX,ry+rH);ctx.stroke();
        [[ry,1],[ry+rH,-1]].forEach(([ay,d])=>{ctx.beginPath();ctx.moveTo(dX,ay);ctx.lineTo(dX-3,ay+d*7);ctx.lineTo(dX+3,ay+d*7);ctx.closePath();ctx.fill();});

    ctx.fillText("MEDISCAN 3D PRO",tbX+4,tbY+tbH*.66+11);

/* ══ V3D ══ */

/* ══ Piping 3D ══ */

  const ref=useRef(null);

    const addT=(s,e,r)=>{const d=new THREE.Vector3().subVectors(e,s),len=d.length();if(len<.001)return;const mid=new THREE.Vector3().addVectors(s,e).multiplyScalar(.5);const g=new THREE.CylinderGeometry(r,r,len,20);const m=new THREE.Mesh(g,mP);m.position.copy(mid);or(m,s,e);m.castShadow=true;piv.add(m);const gi=new THREE.CylinderGeometry(r*.76,r*.76,len+.002,18);const mi=new THREE.Mesh(gi,mI);mi.position.copy(mid);or(mi,s,e);piv.add(mi);};

/* ══ RoomMetrics ══ */
function RoomMetrics({anns}){
  const gd=ax=>{const a=anns.find(a=>a.axis===ax&&a.value!=null);return a?toMM(a.value,a.unit)/1000:0;};
  const wM=gd("width"),hM=gd("height"),dM=gd("depth");
  if(!wM&&!hM&&!dM)return null;
  const rows=[
    wM&&dM&&["Área suelo",`${(wM*dM).toFixed(2)} m²`],
    wM&&dM&&["Perímetro",`${(2*(wM+dM)).toFixed(2)} m`],
    wM&&hM&&dM&&["Volumen",`${(wM*hM*dM).toFixed(2)} m³`],
    hM&&["Altura",`${hM.toFixed(2)} m`],
    hM&&(wM||dM)&&["Área paredes",`${(2*hM*(wM+dM)).toFixed(2)} m²`],
    wM&&dM&&["Área techo",`${(wM*dM).toFixed(2)} m²`],
  ].filter(Boolean);
  if(!rows.length)return null;
  return <div style={{background:"linear-gradient(135deg,rgba(0,20,50,.88),rgba(0,30,62,.85))",border:"1px solid rgba(68,170,255,.28)",borderRadius:"14px",overflow:"hidden",boxShadow:"0 4px 24px rgba(0,0,0,.35)"}}>
    <div style={{padding:"7px 12px",fontSize:"8px",letterSpacing:".15em",color:"#44aaff",textTransform:"uppercase",borderBottom:"1px solid rgba(68,170,255,.12)",background:"rgba(68,170,255,.04)"}}>📊 Métricas calculadas</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
      {rows.map(([lb,val],i)=>(
        <div key={lb} style={{padding:"8px 12px",borderBottom:"1px solid rgba(255,255,255,.04)",borderRight:i%2===0?"1px solid rgba(255,255,255,.04)":"none"}}>
          <div style={{fontSize:"7px",color:"#3355aa",marginBottom:"2px"}}>{lb}</div>
          <div style={{fontSize:"11px",fontWeight:700,color:"#44aaff",fontFamily:"'Inter',sans-serif"}}>{val}</div>
        </div>
      ))}
    </div>
  </div>;
}

    try{const res=await fetch(GAPI,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${GK()}`},body:JSON.stringify({model:GMOD,max_tokens:200,messages:[{role:"user",content:[{type:"image_url",image_url:{url:`data:image/jpeg;base64,${b64}`}},{type:"text",text:pr}]}]})});const data=await res.json();setAiMsg(data.choices?.[0]?.message?.content||"Sin respuesta.");}
    catch{setAiMsg("Error IA.");}finally{setAiLoad(false);}
  };

  /* ─ save/load ─ */
  const save=()=>{const p={id:uid(),name:pName,title:pTitle,date:new Date().toLocaleDateString("es-ES"),img,origImg,rot,anns,scale,obj,pip,segs};const all=[p,...projs.filter(x=>x.name!==pName)].slice(0,20);localStorage.setItem("ms3_pj",JSON.stringify(all));setProjs(all);setSync("✓ Guardado");setTimeout(()=>setSync(""),2500);};
  const load=p=>{setImg(p.img||p.origImg);setOrigImg(p.origImg||p.img);setRot(p.rot||0);setAnns(p.anns||[]);setHist([]);setScale(p.scale||null);setObj(p.obj);setPip(p.pip||null);setPName(p.name);setPTitle(p.title||"");setSelId(null);setPend([]);setTool("sel");setSegs(p.segs||[]);setScr("annotate");setView("ann");};
  const delP=(id,e)=>{e.stopPropagation();const all=projs.filter(p=>p.id!==id);localStorage.setItem("ms3_pj",JSON.stringify(all));setProjs(all);};
  const genLink=()=>{const d={name:pName,anns,scale,objName:obj?.name,shape:obj?.shape,pip,segs};const enc=btoa(unescape(encodeURIComponent(JSON.stringify(d))));const url=`${location.href.split("?")[0].split("#")[0]}?s=${enc}`;navigator.clipboard?.writeText(url).then(()=>{setSync("☁ Enlace copiado");setTimeout(()=>setSync(""),4000);}).catch(()=>prompt("Copia:",url));};
  useEffect(()=>{const p=new URLSearchParams(location.search);const s=p.get("s");if(!s)return;try{const d=JSON.parse(decodeURIComponent(escape(atob(s))));setAnns(d.anns||[]);setScale(d.scale||null);setPName(d.name||"Proyecto");setObj({name:d.objName||"Objeto",shape:d.shape||"default",category:""});setPip(d.pip||null);setSegs(d.segs||[]);setAiMsg(`Proyecto "${d.name}" importado.`);setScr("camera");history.replaceState({},"",location.pathname);}catch{};},[]);

  /* ─ export ─ */
  const cap=async()=>{if(!capRef.current)return null;return html2canvas(capRef.current,{scale:2,useCORS:true,allowTaint:true,backgroundColor:"#0a0d14"});};
  const xPNG=async()=>{try{const cv=await cap();const url=cv.toDataURL("image/png");if(navigator.share&&navigator.canShare){try{const b=await(await fetch(url)).blob();const f=new File([b],"mediscan.png",{type:"image/png"});if(navigator.canShare({files:[f]})){await navigator.share({title:pName,files:[f]});return;}}catch{}}const a=document.createElement("a");a.href=url;a.download=`${pName}.png`;a.click();}catch{}};
  const xPDF=async()=>{try{const cv=await cap();const{jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:"landscape"});const W=pdf.internal.pageSize.getWidth(),H=cv.height*(W/cv.width);pdf.addImage(cv.toDataURL("image/jpeg",.92),"JPEG",0,0,W,H);pdf.setFontSize(8);pdf.setTextColor(0,180,255);pdf.text(`${pTitle||pName} · ${new Date().toLocaleDateString("es-ES")}`,3,H+8);pdf.save(`${pName}.pdf`);}catch{alert("Error PDF");}};
  const xWA=async()=>{try{const cv=await cap();const url=cv.toDataURL("image/png");if(navigator.share&&navigator.canShare){try{const b=await(await fetch(url)).blob();const f=new File([b],"mediscan.png",{type:"image/png"});if(navigator.canShare({files:[f]})){await navigator.share({title:pName,files:[f]});return;}}catch{}}const a=document.createElement("a");a.href=url;a.download=`${pName}.png`;a.click();setTimeout(()=>{if(confirm("¿Abrir WhatsApp?"))window.open("whatsapp://","_blank");},600);}catch{}};
  const xEmail=async()=>{try{const cv=await cap();const a=document.createElement("a");a.href=cv.toDataURL("image/png");a.download=`${pName}.png`;a.click();setTimeout(()=>alert("Imagen descargada. Adjúntala al email."),400);}catch{}};

  /* ─ SVG: Pill label (AR Meter dark style) ─ */
  const Pill=({mx,my,text,col,small=false})=>{
    if(!text)return null;
    const w=Math.max(text.length*.62,3)+3,x=parseFloat(mx),y=parseFloat(my);
    const fs=small?"2.3%":"2.8%",h=small?3.8:4.6,ry=small?1.9:2.3;
    return(<>
      <rect x={`${x-w/2}%`} y={`${y-ry}%`} width={`${w}%`} height={`${h}%`} rx={`${ry}%`}

      <rect x={`${x-w/2}%`} y={`${y-ry}%`} width={`${w}%`} height={`${h}%`} rx={`${ry}%`}
        fill="none" stroke={col||"#00b4ff"} strokeWidth="1"/>
      <text x={`${x}%`} y={`${y+.4}%`} fill={col||"#00b4ff"} fontSize={fs}
        fontFamily="Inter,sans-serif" fontWeight="700" textAnchor="middle" dominantBaseline="middle">{text}</text>
    </>);
  };

  /* ─ SVG: Shape renderer ─ */
  const Shape=({a,ip=false})=>{
    if(!a?.points||a.points.length<2)return null;
    const[p1,p2]=a.points,col=a.color||"#00b4ff";
    const sw=ip?1.5:selId===a.id?3.5:2;
    const aid=`sv${a.id||"p"}`;
    const ld=a.lineStyle==="dashed"?"8,5":a.lineStyle==="dotted"?"2,5":"none";
    const lm=ip?"":getMeas(a);
    const badge=a.title?(lm?`${a.title}: ${lm}`:a.title):lm;
    const mx=(p1.x+p2.x)*50,my=(p1.y+p2.y)*50;
    const sel=()=>{if(!ip){setSelId(a.id);setTool("sel");}};

    if(a.type==="tri"&&a.points.length>=3){const[q1,q2,q3]=a.points;
      return<g onClick={e=>{e.stopPropagation();sel();}} style={{cursor:"pointer"}}>
        <polygon points={`${q1.x*100}%,${q1.y*100}% ${q2.x*100}%,${q2.y*100}% ${q3.x*100}%,${q3.y*100}%`} stroke={col} strokeWidth={sw} fill={`${col}18`}/>
        {!ip&&badge&&<Pill mx={`${mx}`} my={`${my}`} text={badge} col={col}/>}
      </g>;}

    if(a.type==="rect"||a.type==="crop"){
      const rx=Math.min(p1.x,p2.x)*100,ry=Math.min(p1.y,p2.y)*100,rw=Math.abs(p2.x-p1.x)*100,rh=Math.abs(p2.y-p1.y)*100;
      const sc=a.type==="crop"?"#ff9500":col;
      const area=!ip?getArea(a):null;
      return<g onClick={e=>{e.stopPropagation();if(a.type!=="crop")sel();}} style={{cursor:a.type==="crop"?"default":"pointer"}}>
        <rect x={`${rx}%`} y={`${ry}%`} width={`${rw}%`} height={`${rh}%`} stroke={sc} strokeWidth={sw} fill={ip?`${sc}10`:"rgba(0,100,255,.12)"} strokeDasharray={a.type==="crop"?"8,4":ld}/>
        {!ip&&a.type!=="crop"&&badge&&<Pill mx={`${mx}`} my={`${my}`} text={badge} col={col}/>}
        {!ip&&area&&<Pill mx={`${mx}`} my={`${my+5.5}`} text={`A: ${area}`} col={col} small/>}
      </g>;}

    if(a.type==="circ"){const r=Math.sqrt(Math.pow((p2.x-p1.x)*100,2)+Math.pow((p2.y-p1.y)*100,2));
      return<g onClick={e=>{e.stopPropagation();sel();}} style={{cursor:"pointer"}}>
        <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r={`${r}%`} stroke={col} strokeWidth={sw} fill={ip?`${col}10`:"rgba(0,100,255,.1)"} strokeDasharray={ld}/>
        {!ip&&badge&&<Pill mx={`${p1.x*100}`} my={`${p1.y*100}`} text={badge} col={col}/>}
      </g>;}

    const isDim=["dim","dist"].includes(a.type);
    const dbl=a.type==="dist"||a.arrowHead==="both";
    const noArr=a.arrowHead==="none";
    return<g onClick={e=>{e.stopPropagation();sel();}} style={{cursor:ip?"crosshair":"pointer"}}>
      <defs>
        <marker id={aid+"e"} markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L0,7 L10,3.5z" fill={col}/></marker>
        {dbl&&<marker id={aid+"s"} markerWidth="10" markerHeight="10" refX="3" refY="3.5" orient="auto-start-reverse"><path d="M0,0 L0,7 L10,3.5z" fill={col}/></marker>}
      </defs>
      <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke="transparent" strokeWidth="14"/>
      <line x1={`${p1.x*100}%`} y1={`${p1.y*100}%`} x2={`${p2.x*100}%`} y2={`${p2.y*100}%`} stroke={col} strokeWidth={a.type==="arr2"?sw+2:sw} strokeDasharray={ld}
        markerEnd={!noArr&&["line","dim","dist","arr1","arr2","arr3","arr4"].includes(a.type)?`url(#${aid}e)`:"none"}
        markerStart={dbl?`url(#${aid}s)`:"none"}/>
      {isDim&&<>
        <line x1={`${p1.x*100}%`} y1={`${(p1.y-.025)*100}%`} x2={`${p1.x*100}%`} y2={`${(p1.y+.025)*100}%`} stroke={col} strokeWidth={sw+1}/>
        <line x1={`${p2.x*100}%`} y1={`${(p2.y-.025)*100}%`} x2={`${p2.x*100}%`} y2={`${(p2.y+.025)*100}%`} stroke={col} strokeWidth={sw+1}/>
      </>}
      <circle cx={`${p1.x*100}%`} cy={`${p1.y*100}%`} r="1%" fill={col} opacity={ip?.4:.8}/>
      <circle cx={`${p2.x*100}%`} cy={`${p2.y*100}%`} r="1%" fill={col} opacity={ip?.4:.8}/>
      {!ip&&badge&&<Pill mx={`${mx}`} my={`${my-4.5}`} text={badge} col={col}/>}
    </g>;
  };

  /* ─ V/S/P overlay ─ */

        <div style={{flex:1,minWidth:0}}>
          <span style={{fontSize:"9px",color:"#d0e8f8",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:500}}>{a.title||a.type}</span>
          {a.axis&&<span style={{fontSize:"8px",color:"#3355aa"}}>{a.axis==="width"?"X·Ancho":a.axis==="height"?"Y·Alto":a.axis==="depth"?"Z·Prof":a.axis}</span>}
        </div>
        <input type="number" min="0" value={a.value} onClick={e=>e.stopPropagation()}
          onChange={e=>{e.stopPropagation();updA(a.id,{value:e.target.value===""?null:parseFloat(e.target.value)});}}
          style={{width:"62px",padding:"4px 7px",background:"rgba(0,10,25,.8)",border:`1px solid ${selId===a.id?"rgba(0,180,255,.5)":"rgba(0,150,255,.2)"}`,borderRadius:"5px",color:selId===a.id?"#66ccff":a.color,fontSize:"13px",textAlign:"right"}}/>
        <select value={a.unit} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();updA(a.id,{unit:e.target.value});}} style={{padding:"4px",background:"rgba(0,10,25,.8)",border:"1px solid rgba(0,150,255,.15)",borderRadius:"5px",color:"#4466aa",fontSize:"8px"}}>
          {["mm","cm","m","in","ft"].map(u=><option key={u}>{u}</option>)}
        </select>
        <span style={{fontSize:"8px",color:"#2a3a5a",flexShrink:0,minWidth:"36px"}}>{fmtV(toMM(a.value,a.unit),"mm")}</span>
        <button onClick={e=>{e.stopPropagation();delA(a.id);}} style={{background:"transparent",border:"none",color:"#ff3366",fontSize:"13px",opacity:.6,flexShrink:0}}>✕</button>
      </div>
    ))}
    <RoomMetrics anns={anns}/>
  </div>)}

  {/* SEGMENTATION PANEL */}
  {panel==="seg"&&(
  <div style={{background:"rgba(12,16,28,.95)",border:"1px solid rgba(0,100,200,.2)",borderRadius:"12px",overflow:"hidden"}}>
    <div style={{padding:"8px 13px",fontSize:"9px",color:C,fontWeight:600,textTransform:"uppercase",borderBottom:"1px solid rgba(255,255,255,.06)"}}>🔍 Segmentación IA — Identificar partes</div>
    <div style={{padding:"10px 13px",display:"flex",gap:"7px"}}>
      <button onClick={segAI} disabled={segL||!img||!GK()}
        style={{flex:1,padding:"10px",background:segL?"rgba(0,100,255,.08)":"linear-gradient(135deg,#0044ff,#00b4ff)",color:segL?"#334455":"#fff",border:"none",borderRadius:"8px",fontSize:"10px",fontWeight:700,cursor:segL?"not-allowed":"pointer"}}>
        {segL?"⏳ Segmentando...":"🔍 Identificar y marcar partes del objeto"}
      </button>
      {segs.length>0&&<button onClick={()=>setSegs([])} style={{padding:"10px 12px",background:"rgba(255,50,50,.1)",border:"1px solid rgba(255,50,50,.25)",color:"#ff3366",borderRadius:"8px",fontSize:"10px"}}>✕</button>}
    </div>
    {!GK()&&<div style={{padding:"7px 13px",fontSize:"8px",color:"#ff9500"}}>⚠️ Necesita clave API — configura en ⚙</div>}
    {segs.length>0&&<div style={{maxHeight:"200px",overflowY:"auto"}}>
      {segs.map(seg=>(
        <div key={seg.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 13px",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
          <div style={{width:"13px",height:"13px",borderRadius:"2px",background:seg.color||C,flexShrink:0}}/>
          <div style={{flex:1}}><div style={{fontSize:"9px",color:"#d0e8f8",fontWeight:600}}>{seg.id}. {seg.name}</div><div style={{fontSize:"8px",color:"#334455"}}>{seg.hint||"Toca para medir"}</div></div>
          <button onClick={()=>{setMeas({id:uid(),type:"dot",icon:"🔍",title:seg.name,value:null,unit:"cm",axis:"",color:seg.color||C,points:[{x:(seg.x1+seg.x2)/2,y:(seg.y1+seg.y2)/2}]});setMIn({t:seg.name,v:"",u:"cm",ax:"other"});}}
            style={{padding:"5px 10px",background:"linear-gradient(135deg,#0044ff,#00b4ff)",border:"none",color:"#fff",borderRadius:"6px",fontSize:"8px",fontWeight:700}}>+ Medir</button>
        </div>
      ))}
    </div>}
    {aiMsg&&<div style={{padding:"9px 13px",fontSize:"9px",color:"#4488bb",lineHeight:1.8,borderTop:"1px solid rgba(255,255,255,.04)"}}>{aiMsg}</div>}
  </div>)}

  {/* EXPORT PANEL */}
  {panel==="exp"&&(
  <div style={{background:"rgba(12,16,28,.95)",border:"1px solid rgba(0,100,200,.2)",borderRadius:"12px",overflow:"hidden"}}>
    <div style={{padding:"8px 13px",fontSize:"9px",color:C,fontWeight:600,textTransform:"uppercase",borderBottom:"1px solid rgba(255,255,255,.06)"}}>📤 Exportar · Compartir · Sincronizar</div>
    <div style={{padding:"10px",display:"flex",flexDirection:"column",gap:"7px"}}>
      <div style={{display:"flex",gap:"7px"}}>
        <button onClick={xPNG} style={{flex:1,padding:"11px",background:"rgba(0,150,255,.12)",border:"1px solid rgba(0,150,255,.3)",color:C,borderRadius:"9px",fontSize:"10px",fontWeight:700}}>📥 Guardar PNG</button>
        <button onClick={xPDF} style={{flex:1,padding:"11px",background:"rgba(255,50,50,.09)",border:"1px solid rgba(255,50,50,.25)",color:"#ff3366",borderRadius:"9px",fontSize:"10px",fontWeight:700}}>📄 Exportar PDF</button>
      </div>
      <div style={{display:"flex",gap:"7px"}}>
        <button onClick={xWA} style={{flex:1,padding:"11px",background:"rgba(37,211,102,.09)",border:"1px solid rgba(37,211,102,.3)",color:"#25d366",borderRadius:"9px",fontSize:"10px",fontWeight:700}}>💬 WhatsApp</button>
        <button onClick={xEmail} style={{flex:1,padding:"11px",background:"rgba(100,150,255,.08)",border:"1px solid rgba(100,150,255,.22)",color:"#88aaff",borderRadius:"9px",fontSize:"10px",fontWeight:700}}>📧 Email</button>
      </div>
      <button onClick={genLink} style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,rgba(0,80,200,.2),rgba(60,0,200,.15))",border:"1px solid rgba(0,120,255,.3)",color:C,borderRadius:"9px",fontSize:"10px",fontWeight:700}}>☁ Generar enlace para compartir / sincronizar</button>
      <div style={{padding:"5px 4px",fontSize:"8px",color:"#2a3a5a",textAlign:"center"}}>El enlace incluye todas las anotaciones y medidas</div>
    </div>
  </div>)}

  {/* AI PANEL */}
  {panel==="ai"&&(
  <div style={{background:"rgba(12,16,28,.95)",border:"1px solid rgba(0,100,200,.2)",borderRadius:"12px",overflow:"hidden"}}>
    <div style={{padding:"8px 13px",fontSize:"9px",color:"#aa66ff",fontWeight:600,textTransform:"uppercase",borderBottom:"1px solid rgba(255,255,255,.06)"}}>🤖 Asistente IA — Análisis técnico</div>
    <div style={{padding:"10px 13px"}}>
      <button onClick={askAI} disabled={aiLoad||!img||!GK()}
        style={{width:"100%",padding:"10px",background:aiLoad?"rgba(150,100,255,.08)":"linear-gradient(135deg,#6600cc,#aa44ff)",color:aiLoad?"#6644aa":"#fff",border:"none",borderRadius:"8px",fontSize:"10px",fontWeight:700}}>
        {aiLoad?"⏳ Analizando...":"⚡ Analizar imagen y medidas con IA"}
      </button>
    </div>
    {aiMsg&&<div style={{padding:"9px 13px",fontSize:"9px",color:"#9988cc",lineHeight:1.9,borderTop:"1px solid rgba(255,255,255,.04)"}}>{aiMsg}</div>}
    {!GK()&&<div style={{padding:"7px 13px",fontSize:"8px",color:"#ff9500"}}>⚠️ Necesita clave API — configura en ⚙</div>}
  </div>)}

  </>)}
  {/* ─── END ANNOTATE VIEW ─── */}

  {/* ─── 2D VIEW ─── */}
  {view==="2d"&&(
  <div style={{background:"rgba(12,16,28,.95)",border:"1px solid rgba(0,100,200,.2)",borderRadius:"12px",overflow:"hidden"}}>
    <div style={{padding:"8px 13px",fontSize:"9px",color:C,fontWeight:600,textTransform:"uppercase",borderBottom:"1px solid rgba(255,255,255,.06)"}}>📐 Plano 2D AutoCAD — Frontal · Lateral · Planta</div>
    {!hasDim&&<div style={{padding:"9px 13px",fontSize:"9px",color:"#334455",background:"rgba(0,80,200,.06)",borderBottom:"1px solid rgba(0,80,200,.1)"}}>
      💡 Para ver el plano: en Anotar → añade medida → selecciona eje Ancho / Alto / Prof. en el modal
    </div>}
    <div ref={capRef}><View2D anns={anns} objName={pTitle||obj?.name} sc={scale}/></div>
  </div>)}

  {/* ─── 3D VIEW ─── */}
  {view==="3d"&&(
  <div style={{background:"rgba(12,16,28,.95)",border:"1px solid rgba(0,100,200,.2)",borderRadius:"12px",overflow:"hidden"}}>
    <div style={{padding:"8px 13px",fontSize:"9px",color:C,fontWeight:600,textTransform:"uppercase",borderBottom:"1px solid rgba(255,255,255,.06)"}}>🎮 Modelo 3D — Arrastra para rotar</div>
    {!hasDim&&<div style={{padding:"9px 13px",fontSize:"9px",color:"#334455",background:"rgba(0,80,200,.06)",borderBottom:"1px solid rgba(0,80,200,.1)"}}>
      💡 Asigna ejes Ancho/Alto/Prof. para ver las proporciones reales del objeto
    </div>}
    <div ref={capRef}><V3D anns={anns} shape={obj?.shape}/></div>
    <div style={{display:"flex",gap:"6px",padding:"7px 13px",flexWrap:"wrap",fontSize:"8px"}}>
      {["width","height","depth"].map(ax=>{const a=anns.find(a=>a.axis===ax&&a.value!=null);return a?<span key={ax} style={{color:a.color}}>● {ax==="width"?"Ancho":ax==="height"?"Alto":"Prof."}: {a.value}{a.unit}</span>:null;})}
    </div>
  </div>)}

  {/* ─── PIPING VIEW ─── */}
  {view==="pip"&&pip&&(
  <div style={{background:"rgba(12,16,28,.95)",border:"1px solid rgba(255,150,0,.25)",borderRadius:"12px",overflow:"hidden"}}>
    <div style={{padding:"8px 13px",fontSize:"9px",color:"#ff9500",fontWeight:600,textTransform:"uppercase",borderBottom:"1px solid rgba(255,150,0,.12)"}}>🔩 Piping 3D PBR</div>
    <div ref={capRef}><V3DPipe components={pip.components} dn={pip.dn}/></div>
    <div style={{padding:"5px 13px 7px",fontSize:"8px",color:"#5566aa"}}>{pip.label}</div>
    <div style={{maxHeight:"180px",overflowY:"auto",borderTop:"1px solid rgba(255,255,255,.06)"}}>
      {(pip.components||[]).map((c,i)=>(
        <div key={i} style={{padding:"6px 13px",borderBottom:"1px solid rgba(255,255,255,.04)",display:"flex",gap:"7px",fontSize:"9px"}}>
          <span style={{color:COLS[i%COLS.length],fontWeight:700}}>{i+1}.</span>
          <span style={{color:"#d0e8f8",textTransform:"capitalize"}}>{c.type?.replace(/_/g," ")}</span>
          <span style={{color:"#3355aa"}}>{c.dn?"DN"+c.dn:""} {c.length?"L:"+c.length+"mm":""} {c.valve_type?"("+c.valve_type+")":""}</span>
        </div>
      ))}
    </div>
  </div>)}

</div>)}
{/* ── END ANNOTATE ── */}

</div>
{/* END MAIN CONTENT */}

<canvas ref={canRef} style={{display:"none"}}/>

{/* ══ MEASURE MODAL (PASO 3) ══ */}
{meas&&(
<div data-modal="measure"
  style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
    width:"100%",maxWidth:"480px",background:"rgba(8,10,18,.98)",
    border:"1px solid rgba(0,150,255,.4)",borderRadius:"18px 18px 0 0",
    padding:"20px 18px",zIndex:500,animation:"slideUp .22s ease",
    backdropFilter:"blur(24px)",boxShadow:"0 -6px 40px rgba(0,0,0,.7)"}}>
  <button onClick={()=>setMeas(null)} style={{position:"absolute",top:"12px",right:"14px",background:"rgba(255,50,50,.15)",border:"1px solid rgba(255,50,50,.3)",color:"#ff3366",borderRadius:"50%",width:"28px",height:"28px",fontSize:"15px",display:"flex",alignItems:"center",justifyContent:"center",zIndex:20}}>✕</button>
  <div style={{marginBottom:"16px",paddingRight:"36px"}}>
    <div style={{fontSize:"12px",fontWeight:800,color:C,letterSpacing:"-.2px"}}>AÑADIR MEDIDA</div>
    <div style={{fontSize:"9px",color:"#3355aa",marginTop:"4px"}}>{meas.icon} {TOOLS.find(t=>t.id===meas.type)?.label} — escribe el valor y confirma</div>
  </div>
  <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
    <input placeholder="Título (ej: Longitud total, Diámetro exterior...)" value={mIn.t}
      onChange={e=>setMIn(s=>({...s,t:e.target.value}))}
      style={{width:"100%",padding:"10px 13px",background:"rgba(0,10,30,.8)",border:"1px solid rgba(0,150,255,.2)",borderRadius:"9px",color:"#d0e8f8",fontSize:"11px"}}/>
    <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
      <input type="number" min="0" step=".01" placeholder="Valor numérico" value={mIn.v}
        onChange={e=>setMIn(s=>({...s,v:e.target.value}))}
        style={{flex:1,padding:"11px 13px",background:"rgba(0,10,30,.8)",border:"1px solid rgba(0,180,255,.5)",borderRadius:"9px",color:C,fontSize:"22px",textAlign:"right"}}/>
      <div style={{display:"flex",gap:"3px",flexWrap:"wrap"}}>
        {["mm","cm","m","in","ft"].map(u=><button key={u} onClick={()=>setMIn(s=>({...s,u:u}))} style={{...btn(mIn.u===u),padding:"5px 9px"}}>{u}</button>)}
      </div>
    </div>
    <select value={mIn.ax} onChange={e=>setMIn(s=>({...s,ax:e.target.value}))}
      style={{padding:"10px 13px",background:"rgba(0,10,30,.8)",border:"1px solid rgba(0,150,255,.25)",borderRadius:"9px",color:C,fontSize:"10px"}}>
      <option value="">Tipo (activa vistas 2D y 3D si asignas eje)</option>
      <option value="width">Ancho (X) — activa 2D y 3D automáticamente</option>
      <option value="height">Alto (Y) — activa 2D y 3D automáticamente</option>
      <option value="depth">Profundidad (Z) — activa 2D y 3D automáticamente</option>
      <option value="other">Otra medida</option>
    </select>
    <div style={{display:"flex",gap:"8px"}}>
      <button onClick={skipM} style={{flex:1,padding:"11px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",color:"#3355aa",borderRadius:"9px",fontSize:"10px"}}>Sin valor</button>
      <button onClick={confirmM} style={{flex:2,padding:"11px",background:"linear-gradient(135deg,#0033ff,#00b4ff)",color:"#fff",border:"none",borderRadius:"9px",fontSize:"12px",fontWeight:800,boxShadow:"0 2px 16px rgba(0,150,255,.4)"}}>
        ✓ CONFIRMAR MEDIDA
      </button>
    </div>
  </div>
</div>)}

{/* CALIBRATE MODAL */}
{calib&&(
<div data-modal="calib" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:"rgba(8,10,18,.98)",border:"1px solid rgba(255,150,0,.4)",borderRadius:"18px 18px 0 0",padding:"20px 18px",zIndex:500,animation:"slideUp .22s ease",backdropFilter:"blur(24px)"}}>
  <button onClick={()=>setCalib(null)} style={{position:"absolute",top:"12px",right:"14px",background:"rgba(255,50,50,.15)",border:"1px solid rgba(255,50,50,.3)",color:"#ff3366",borderRadius:"50%",width:"28px",height:"28px",fontSize:"15px",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
  <div style={{fontSize:"12px",fontWeight:800,color:"#ff9500",marginBottom:"5px"}}>⚖ CALIBRAR ESCALA REAL</div>
  <div style={{fontSize:"9px",color:"#3355aa",marginBottom:"14px"}}>¿Cuánto mide la línea que acabas de trazar?</div>
  <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"12px"}}>
    <input type="number" min="0" step=".01" placeholder="Valor real" value={mIn.v} onChange={e=>setMIn(s=>({...s,v:e.target.value}))}
      style={{flex:1,padding:"11px 13px",background:"rgba(0,10,30,.8)",border:"1px solid rgba(255,150,0,.45)",borderRadius:"9px",color:"#ff9500",fontSize:"20px",textAlign:"right"}}/>
    <div style={{display:"flex",gap:"3px"}}>{["mm","cm","m","in","ft"].map(u=><button key={u} onClick={()=>setMIn(s=>({...s,u:u}))} style={{...btn(mIn.u===u,C2),padding:"5px 9px"}}>{u}</button>)}</div>
  </div>
  <div style={{display:"flex",gap:"8px"}}>
    <button onClick={()=>setCalib(null)} style={{flex:1,padding:"11px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",color:"#3355aa",borderRadius:"9px",fontSize:"10px"}}>Cancelar</button>
    <button onClick={confirmC} style={{flex:2,padding:"11px",background:"linear-gradient(135deg,#cc5500,#ff9500)",color:"#fff",border:"none",borderRadius:"9px",fontSize:"12px",fontWeight:800}}>⚖ CALIBRAR</button>
  </div>
</div>)}

{/* CROP MODAL */}
{cropD&&(
<div data-modal="crop" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:"rgba(8,10,18,.98)",border:"1px solid rgba(255,150,0,.4)",borderRadius:"18px 18px 0 0",padding:"20px 18px",zIndex:500,animation:"slideUp .22s ease",backdropFilter:"blur(24px)"}}>
  <button onClick={()=>setCropD(null)} style={{position:"absolute",top:"12px",right:"14px",background:"rgba(255,50,50,.15)",border:"1px solid rgba(255,50,50,.3)",color:"#ff3366",borderRadius:"50%",width:"28px",height:"28px",fontSize:"15px",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
  <div style={{fontSize:"12px",fontWeight:800,color:"#ff9500",marginBottom:"5px"}}>✂ ZONA SELECCIONADA</div>
  <div style={{fontSize:"9px",color:"#3355aa",marginBottom:"14px"}}>¿Trabajar solo con esta zona o mantener la imagen completa?</div>
  <div style={{display:"flex",gap:"8px"}}>
    <button onClick={()=>setCropD(null)} style={{flex:1,padding:"11px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",color:"#3355aa",borderRadius:"9px",fontSize:"10px"}}>Mantener completa</button>
    <button onClick={applyCrop} style={{flex:2,padding:"11px",background:"linear-gradient(135deg,#cc5500,#ff9500)",color:"#fff",border:"none",borderRadius:"9px",fontSize:"12px",fontWeight:800}}>✂ RECORTAR Y MEDIR</button>
  </div>
</div>)}

</div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
